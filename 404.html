<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found | KlassKit</title>
    <link rel="icon" type="image/x-icon" href="./media/icon.ico" />
    <link rel="icon" type="image/webp" href="./media/icon.webp" />
    <link rel="apple-touch-icon" href="./media/icon-180.png" />
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#1ea7fd">

    <script src="https://unpkg.com/lucide@1.16.0"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Nunito:wght@400;600;700;800&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/base.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        pink: '#ff4785',
                        orange: '#ff7e33',
                        green: '#00d063',
                        blue: '#1ea7fd',
                        dark: '#111827',
                    },
                    fontFamily: {
                        heading: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px 0px #111827',
                    }
                }
            }
        }
    </script>
    <style>
        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 4px solid var(--border-primary, #111827);
            box-shadow: 8px 8px 0px var(--border-primary, #111827);
        }

        .dark .glass-card {
            background: rgba(15, 23, 42, 0.8);
            border-color: #334155;
            box-shadow: 8px 8px 0px #000000;
        }

        /* Chunky Buttons */
        .btn-chunky {
            position: relative;
            background: white;
            border: 4px solid var(--border-primary, #111827);
            box-shadow: 0 4px 0px var(--border-primary, #111827);
            transition: all 0.15s cubic-bezier(0.2, 0.8, 0.2, 1);
            cursor: pointer;
        }

        .btn-chunky:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0px var(--border-primary, #111827);
        }

        .btn-chunky:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0px var(--border-primary, #111827);
        }

        .dark .btn-chunky {
            border-color: #334155;
            box-shadow: 0 4px 0px #000000;
        }

        .dark .btn-chunky:hover {
            box-shadow: 0 6px 0px #000000;
        }

        .dark .btn-chunky:active {
            box-shadow: 0 0px 0px #000000;
        }

        /* Animations */
        @keyframes pop-in {
            0% {
                opacity: 0;
                transform: scale(0.9) translateY(10px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .animate-pop-in {
            animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(-3deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(-3deg); }
        }

        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 bg-[#f8fafc] dark:bg-[#020617]">

    <div class="glass-card w-full max-w-md p-10 rounded-3xl animate-pop-in text-center">
        <div class="relative mb-10">
            <!-- Decorative dots/confetti -->
            <div class="absolute -top-4 -left-4 w-6 h-6 bg-pink rounded-full animate-bounce"></div>
            <div class="absolute -top-8 right-10 w-4 h-4 bg-green rounded-full animate-pulse"></div>
            <div class="absolute bottom-0 -right-4 w-8 h-8 bg-orange rounded-full animate-bounce" style="animation-delay: 0.5s"></div>
            
            <div class="w-24 h-24 bg-blue rounded-3xl border-4 border-dark dark:border-slate-500 flex items-center justify-center mx-auto animate-float shadow-hard">
                <i data-lucide="file-question" class="w-12 h-12 text-white"></i>
            </div>
        </div>

        <h1 class="font-heading text-4xl font-black text-dark dark:text-white uppercase tracking-tight leading-tight">
            404 <br><span class="text-blue">Lost in the Hallways</span>
        </h1>
        
        <p class="text-slate-500 dark:text-slate-400 font-bold mt-4 text-lg">
            Looks like this page skipped class or doesn't exist. Let's get you back where you belong.
        </p>

        <div class="mt-10 space-y-4">
            <a href="./hub.html" class="btn-chunky w-full py-4 rounded-2xl bg-green text-white font-heading text-xl uppercase tracking-wide flex items-center justify-center gap-3">
                <span>Back to Hub</span> <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
            </a>
            
            <a href="./index.html?home=1" class="inline-flex items-center text-sm font-black text-slate-400 hover:text-dark dark:hover:text-white uppercase tracking-tighter transition-colors py-2">
                <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> Return Home
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Theme sync with system/localStorage
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('theme_hub');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        });
    </script>
</body>

</html>
