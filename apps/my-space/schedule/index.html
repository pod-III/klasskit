<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Supabase Auth -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4"></script>
  <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
  <script src="/supabase.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Schedule — KlassKit</title>
  <link rel="icon" type="image/x-icon" href="../../../media/icon.ico" />
  <link rel="icon" type="image/webp" href="../../../media/icon.webp" />
  <script>if (localStorage.getItem("theme_schedule") === "dark" || (!localStorage.getItem("theme_schedule") && window.matchMedia("(prefers-color-scheme:dark)").matches)) { document.documentElement.classList.add("dark") }</script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@1.16.0"></script>
  <script src="../../../components/input-modal.js"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            pink: '#ff4785', orange: '#ff7e33', green: '#00d063',
            blue: '#1ea7fd', dark: '#0f172a', chalk: '#f8fafc',
          },
          fontFamily: {
            heading: ['Fredoka', 'sans-serif'],
            body: ['Nunito', 'sans-serif'],
          },
          boxShadow: {
            'neo': '4px 4px 0px 0px rgba(51,65,85,0.15)',
            'neo-sm': '2px 2px 0px 0px rgba(51,65,85,0.15)',
          },
        }
      }
    }
  </script>

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="../../../css/base.css" />
  <link rel="stylesheet" href="../../../css/components.css" />

</head>

<body class="h-screen flex flex-col text-dark relative bg-chalk">

  <!-- ====== HEADER ====== -->
  <header class="schedule-header flex-none h-12 flex items-center justify-between px-4 md:px-6 relative z-40">
    <div class="flex items-center gap-2 md:gap-3">
      <!-- Mobile sidebar toggle -->
      <button onclick="toggleMobileSidebar()"
        class="md:hidden p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        <i data-lucide="panel-left" class="w-5 h-5 text-slate-500 dark:text-slate-400"></i>
      </button>
      <div
        class="w-8 h-8 bg-orange rounded-xl border-[2px] border-white/40 flex items-center justify-center text-white shadow-neo-sm">
        <i data-lucide="calendar-days" class="w-5 h-5 stroke-[2.5px]"></i>
      </div>
      <div>
        <h1 class="font-heading font-bold text-lg md:text-xl tracking-tight leading-none text-dark dark:text-white">
          Schedule</h1>
        <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] leading-none mt-1">KlassKit Workspace
        </p>
      </div>
    </div>

    <!-- Internal App Navigation -->
    <nav
      class="hidden md:flex items-center gap-1 bg-slate-100 dark:bg-slate-800 p-1 rounded-xl border-2 border-[var(--border-primary)]">
      <button onclick="window.parent.MySpace.loadApp('myspace-home')"
        class="px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all text-slate-500 hover:text-dark dark:hover:text-white hover:bg-white/50 dark:hover:bg-slate-600 flex items-center gap-1.5">
        <i data-lucide="layout-dashboard" class="w-3.5 h-3.5"></i>
        <span>Dashboard</span>
      </button>
      <button onclick="window.parent.MySpace.loadApp('schedule')"
        class="px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all bg-white dark:bg-slate-700 shadow-neo-sm border-2 border-[var(--border-primary)] text-orange">Schedule</button>
      <button onclick="window.parent.MySpace.loadApp('admin-tracker')"
        class="px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all text-slate-500 hover:text-dark dark:hover:text-white hover:bg-white/50 dark:hover:bg-slate-600">Admin</button>
      <button onclick="window.parent.MySpace.loadApp('my-class')"
        class="px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all text-slate-500 hover:text-dark dark:hover:text-white hover:bg-white/50 dark:hover:bg-slate-600">Class</button>
      <button onclick="window.parent.MySpace.loadApp('tasks')"
        class="px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all text-slate-500 hover:text-dark dark:hover:text-white hover:bg-white/50 dark:hover:bg-slate-600">Tasks</button>
    </nav>

    <!-- Week Navigation -->
    <div class="flex items-center gap-1 md:gap-2">
      <button onclick="goToToday()"
        class="btn-chunky bg-orange text-white px-2 py-1 rounded-lg text-[10px] font-bold uppercase tracking-wider">Today</button>
      <button onclick="goToPrevWeek()"
        class="p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        <i data-lucide="chevron-left" class="w-4 h-4 text-slate-500 dark:text-slate-400"></i>
      </button>
      <span id="week-label"
        class="font-heading font-bold text-xs md:text-sm text-dark dark:text-white min-w-[140px] md:min-w-[180px] text-center"></span>
      <button onclick="goToNextWeek()"
        class="p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        <i data-lucide="chevron-right" class="w-4 h-4 text-slate-500 dark:text-slate-400"></i>
      </button>
    </div>

    <!-- Header Actions -->
    <div class="flex items-center gap-1 md:gap-2">
      <div id="sync-badge"
        class="flex items-center gap-1.5 px-2 py-1 rounded-xl border-[2px] border-[var(--border-primary)] bg-slate-100 dark:bg-slate-800 text-[9px] font-extrabold uppercase tracking-widest text-slate-500">
        <i data-lucide="hard-drive" class="w-3 h-3"></i> Local
      </div>
      <button onclick="cycleDayCount()" id="day-count-btn"
        class="btn-chunky bg-white dark:bg-slate-800 text-dark dark:text-slate-200 px-2 py-1 rounded-lg text-[10px] font-bold flex items-center gap-1"
        title="Days shown">
        <span id="day-count-label">5 days</span>
      </button>
      <button onclick="toggleViewMode()" id="view-mode-btn"
        class="btn-chunky bg-white dark:bg-slate-800 text-dark dark:text-slate-200 px-2 py-1 rounded-lg text-[10px] font-bold flex items-center gap-1"
        title="Toggle View Mode">
        <i data-lucide="calendar-days" class="w-3.5 h-3.5"></i>
        <span class="hidden lg:inline">Week View</span>
      </button>
      <button onclick="openSettingsModal()"
        class="btn-chunky bg-white dark:bg-slate-800 text-dark dark:text-slate-200 px-2 py-1 rounded-lg text-[10px] font-bold flex items-center gap-1"
        title="Settings">
        <i data-lucide="settings" class="w-3.5 h-3.5"></i>
      </button>
      <button id="export-btn" onclick="exportSchedule()"
        class="btn-chunky bg-white dark:bg-slate-800 text-dark dark:text-slate-200 p-1.5 rounded-lg cloud-hide"
        title="Backup">
        <i data-lucide="save" class="w-3.5 h-3.5"></i>
      </button>
      <button id="import-btn" onclick="triggerImport()"
        class="btn-chunky bg-white dark:bg-slate-800 text-dark dark:text-slate-200 p-1.5 rounded-lg cloud-hide"
        title="Restore">
        <i data-lucide="upload-cloud" class="w-3.5 h-3.5"></i>
      </button>
      <button onclick="toggleDarkMode()"
        class="btn-chunky bg-white dark:bg-slate-800 text-dark dark:text-slate-200 p-1.5 rounded-lg"
        title="Toggle Dark Mode">
        <i id="darkModeIcon" data-lucide="moon" class="w-3.5 h-3.5"></i>
      </button>
    </div>
  </header>

  <input type="file" id="importInput" accept=".json" class="hidden" onchange="processImport(this)">

  <!-- ====== MAIN LAYOUT ====== -->
  <div class="flex-1 flex overflow-hidden relative">

    <!-- ====== LEFT SIDEBAR ====== -->
    <aside class="schedule-sidebar flex-col p-4 gap-4 hidden md:flex custom-scrollbar" id="sidebar">
      <!-- Mobile close -->
      <button onclick="toggleMobileSidebar()"
        class="md:hidden self-end p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-400">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>

      <!-- Event Templates -->
      <div>
        <h3 class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-2 px-1">Event Types</h3>
        <div class="flex flex-col gap-1.5" id="template-list">
          <!-- Populated by JS -->
        </div>
      </div>

      <div class="w-full h-px bg-slate-200 dark:bg-slate-700"></div>

      <!-- Today's Events -->
      <div>
        <h3 class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-2 px-1">Today's Events</h3>
        <div id="today-events-list" class="flex flex-col gap-1 text-xs">
          <p class="text-slate-400 text-xs font-semibold px-1">No events today</p>
        </div>
      </div>

      <div class="w-full h-px bg-slate-200 dark:bg-slate-700"></div>

      <!-- Quick Stats -->
      <div>
        <h3 class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-2 px-1">This Week</h3>
        <div class="grid grid-cols-2 gap-2 mb-3">
          <div class="stat-card">
            <div class="stat-number text-blue" id="stat-events">0</div>
            <div class="stat-label">Events</div>
          </div>
          <div class="stat-card">
            <div class="stat-number text-orange" id="stat-tasks">0</div>
            <div class="stat-label">Tasks</div>
          </div>
        </div>
        <!-- Covered Classes -->
        <div
          class="p-2.5 bg-amber-50/50 dark:bg-amber-900/10 rounded-xl border border-amber-200/50 dark:border-amber-700/30">
          <div class="flex justify-between items-center mb-2 px-1">
            <span
              class="text-[8px] font-extrabold text-amber-600 dark:text-amber-400 uppercase tracking-wider flex items-center gap-1">
              <i data-lucide="user-check" class="w-3 h-3"></i> Covered Classes
            </span>
            <span id="covered-stats-count" class="text-[9px] font-bold text-amber-600 dark:text-amber-400">0</span>
          </div>
          <div id="sidebar-covered-classes"
            class="flex flex-col gap-1.5 max-h-[180px] overflow-y-auto custom-scrollbar pr-1">
            <p class="text-[10px] text-slate-400 italic px-1">No covered classes.</p>
          </div>
        </div>
      </div>
    </aside>

    <!-- ====== CALENDAR ====== -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <!-- Day headers -->
      <div class="day-headers" id="day-headers-row">
        <div class="time-gutter"></div>
        <!-- Day headers populated by JS -->
      </div>

      <!-- Scrollable calendar body -->
      <div class="calendar-wrapper flex-1 custom-scrollbar" id="calendar-wrapper">
        <div class="flex" style="min-height: 100%;">
          <!-- Time gutter -->
          <div class="time-gutter flex-none" id="time-gutter">
            <!-- Populated by JS -->
          </div>
          <!-- Day columns -->
          <div class="day-columns flex-1" id="day-columns">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>
    </div>

    <!-- ====== DETAIL PANEL ====== -->
    <aside class="detail-panel" id="detail-panel">
      <div class="panel-content flex flex-col">
        <!-- Panel header -->
        <div class="flex items-center justify-between p-4 border-b border-slate-200 dark:border-slate-700 flex-none">
          <h3 class="font-heading font-bold text-sm text-dark dark:text-white flex items-center gap-2">
            <i data-lucide="edit-3" class="w-4 h-4 text-blue"></i> Event Details
          </h3>
          <button onclick="closeDetailPanel()"
            class="p-1 rounded-md hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-400 transition-colors">
            <i data-lucide="x" class="w-4 h-4"></i>
          </button>
        </div>

        <!-- Panel body -->
        <div class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar" id="detail-body">
          <!-- Populated by JS when an event is selected -->
        </div>

        <!-- Panel footer -->
        <div class="flex-none p-4 border-t border-slate-200 dark:border-slate-700 flex gap-2" id="detail-footer">
          <!-- Delete & duplicate buttons -->
        </div>
      </div>
    </aside>
  </div>

  <!-- ====== EVENT CREATION MODAL ====== -->
  <div id="event-modal" class="hidden">
    <!-- Populated by JS -->
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="hidden">
    <div class="modal-backdrop" onclick="if(event.target===this) closeSettingsModal()">
      <div class="modal-card flex flex-col !max-w-xs">
        <div class="p-4 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between">
          <h2 class="font-heading font-bold text-lg text-dark dark:text-white flex items-center gap-2">
            <i data-lucide="settings" class="w-4 h-4 text-blue"></i>
            Schedule Settings
          </h2>
          <button onclick="closeSettingsModal()"
            class="p-1 rounded-md hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-400">
            <i data-lucide="x" class="w-4 h-4"></i>
          </button>
        </div>

        <div class="p-5 flex flex-col gap-4">
          <div>
            <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-1">Day Start
              Time</label>
            <input type="time" id="setting-start-hour" class="panel-input" step="3600">
          </div>
          <div>
            <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-1">Day End
              Time</label>
            <input type="time" id="setting-end-hour" class="panel-input" step="3600">
          </div>

          <button onclick="saveSettings()" class="btn-chunky bg-blue text-white w-full py-2 rounded-xl font-bold mt-2">
            Save Settings
          </button>

          <div class="h-px bg-slate-200 dark:bg-slate-700 my-1"></div>

          <button onclick="openHolidaysModal()"
            class="btn-chunky bg-white dark:bg-slate-800 text-dark dark:text-white w-full py-2 rounded-xl font-bold flex items-center justify-center gap-2 border-2 border-slate-200 dark:border-slate-700">
            <i data-lucide="calendar" class="w-4 h-4 text-pink"></i>
            Manage Days Off
          </button>
        </div>
      </div>
    </div>
  </div>
  <!-- Holidays Modal -->
  <div id="holidays-modal" class="hidden">
    <div class="modal-backdrop" onclick="if(event.target===this) closeHolidaysModal()">
      <div class="modal-card !max-w-sm flex flex-col max-h-[85vh] animate-pop-in">
        <div class="p-4 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between">
          <h2 class="font-heading font-bold text-lg text-dark dark:text-white flex items-center gap-2">
            <i data-lucide="calendar" class="w-4 h-4 text-pink"></i>
            Day Off Manager
          </h2>
          <button onclick="closeHolidaysModal()"
            class="p-1 rounded-md hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-400">
            <i data-lucide="x" class="w-4 h-4"></i>
          </button>
        </div>
        <div id="holidays-body" class="p-5 overflow-y-auto custom-scrollbar flex flex-col gap-6">
          <!-- Populated by JS -->
        </div>
        <div
          class="p-4 border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 rounded-b-2xl flex flex-col gap-3">
          <div class="flex gap-2">
            <button onclick="closeHolidaysModal(true)"
              class="btn-chunky bg-white dark:bg-slate-800 text-dark dark:text-white flex-1 py-2 rounded-xl font-bold">Cancel</button>
            <button id="holiday-save-btn" onclick="saveHolidays()"
              class="btn-chunky bg-pink text-white flex-1 py-2 rounded-xl font-bold shadow-neo-sm">Save Changes</button>
          </div>
          <p class="text-[9px] text-slate-500 text-center font-bold uppercase tracking-wider">Changes will apply after
            saving.</p>
        </div>
      </div>
    </div>
  </div>
  <script src="templates.js"></script>
  <script src="../shared/sync.js"></script>
  <script src="script.js"></script>
</body>

</html>
