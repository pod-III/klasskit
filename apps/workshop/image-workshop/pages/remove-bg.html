<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG Remover - KlassKit</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4"></script>
    <script src="/supabase.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@1.16.0"></script>
    <script src="../../../../components/input-modal.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'pink': '#ff4785',
                        'orange': '#ff7e33',
                        'green': '#00d063',
                        'blue': '#1ea7fd',
                        'dark': '#0f172a',
                        'chalk': '#f8fafc',
                    },
                    fontFamily: {
                        heading: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px 0px #0f172a',
                        'hard-hover': '8px 8px 0px 0px #0f172a',
                        'hard-blue': '4px 4px 0px 0px #1ea7fd',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8fafc;
            background-image: 
                linear-gradient(#cbd5e1 1px, transparent 1px),
                linear-gradient(90deg, #cbd5e1 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .dark body {
            background-color: #020617;
            background-image: 
                linear-gradient(#0f172a 1px, transparent 1px),
                linear-gradient(90deg, #0f172a 1px, transparent 1px);
        }

        .checkerboard {
            background-image: linear-gradient(45deg, #e2e8f0 25%, transparent 25%), 
                              linear-gradient(-45deg, #e2e8f0 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #e2e8f0 75%), 
                              linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        .dark .checkerboard {
            background-image: linear-gradient(45deg, #1e293b 25%, transparent 25%), 
                              linear-gradient(-45deg, #1e293b 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #1e293b 75%), 
                              linear-gradient(-45deg, transparent 75%, #1e293b 75%);
        }

        .btn-chunky {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-chunky:hover:not(:disabled) {
            transform: translateY(-4px);
            box-shadow: 8px 8px 0px 0px #0f172a;
        }
        .btn-chunky:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0px 0px 0px 0px #0f172a;
        }

        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .dark .glass {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="font-body text-dark dark:text-chalk min-h-screen p-4 md:p-8">

    <main class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex items-center gap-4">
                <a href="../index.html" class="bg-white dark:bg-slate-800 border-4 border-dark dark:border-slate-500 p-3 rounded-2xl shadow-hard btn-chunky">
                    <i data-lucide="arrow-left" class="w-6 h-6"></i>
                </a>
                <div>
                    <h1 class="font-heading font-bold text-3xl md:text-4xl">BG <span class="text-blue">REMOVER</span></h1>
                    <p class="text-slate-500 dark:text-slate-400 font-bold text-sm">AI-Powered Background Removal</p>
                </div>
            </div>
            
            <button id="themeToggle" class="bg-white dark:bg-slate-800 border-4 border-dark dark:border-slate-500 p-3 rounded-2xl shadow-hard btn-chunky">
                <i data-lucide="sun" class="w-6 h-6 hidden dark:block"></i>
                <i data-lucide="moon" class="w-6 h-6 block dark:hidden"></i>
            </button>
        </header>

        <!-- Main Content Area -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Left Panel: Controls -->
            <aside class="lg:col-span-4 flex flex-col gap-6">
                <!-- Upload Card -->
                <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-[2rem] p-6 shadow-hard relative overflow-hidden group">
                    <div class="absolute top-0 right-0 w-24 h-24 bg-blue/10 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-150"></div>
                    
                    <h2 class="font-heading font-bold text-xl mb-4 flex items-center gap-2">
                        <i data-lucide="upload" class="text-blue"></i>
                        STEP 1: UPLOAD
                    </h2>

                    <label class="block cursor-pointer">
                        <input type="file" id="imageInput" accept="image/*" class="hidden">
                        <div class="border-4 border-dashed border-slate-200 dark:border-slate-700 rounded-2xl p-8 text-center hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                            <i data-lucide="image-plus" class="w-12 h-12 mx-auto mb-3 text-slate-400"></i>
                            <p class="font-bold text-slate-500">Click or drag image here</p>
                        </div>
                    </label>
                </div>

                <!-- Action Card -->
                <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-[2rem] p-6 shadow-hard relative overflow-hidden group">
                    <div class="absolute top-0 right-0 w-24 h-24 bg-green/10 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-150"></div>
                    
                    <h2 class="font-heading font-bold text-xl mb-4 flex items-center gap-2">
                        <i data-lucide="sparkles" class="text-green"></i>
                        STEP 2: REMOVE
                    </h2>

                    <button id="processBtn" disabled class="w-full bg-blue text-white font-heading font-bold text-xl py-4 rounded-2xl border-4 border-dark shadow-hard btn-chunky disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                        <i data-lucide="wand-2"></i>
                        REMOVE BG
                    </button>

                    <div id="loadingOverlay" class="hidden mt-6">
                        <div class="flex items-center justify-between mb-2">
                            <span id="loadingStatus" class="text-xs font-bold uppercase tracking-widest text-slate-400">Initializing...</span>
                            <span id="loadingPercent" class="text-xs font-black text-blue">0%</span>
                        </div>
                        <div class="w-full h-4 bg-slate-100 dark:bg-slate-800 rounded-full border-2 border-dark overflow-hidden">
                            <div id="loadingBar" class="h-full bg-blue transition-all duration-300" style="width: 0%"></div>
                        </div>
                        <p class="text-[10px] text-slate-400 mt-2 italic">*First run downloads ~40MB of AI models</p>
                    </div>
                </div>

                <!-- Download Card -->
                <div id="downloadCard" class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-[2rem] p-6 shadow-hard relative overflow-hidden group opacity-50 pointer-events-none transition-opacity">
                    <div class="absolute top-0 right-0 w-24 h-24 bg-pink/10 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-150"></div>
                    
                    <h2 class="font-heading font-bold text-xl mb-4 flex items-center gap-2">
                        <i data-lucide="download" class="text-pink"></i>
                        STEP 3: SAVE
                    </h2>

                    <a id="downloadBtn" href="#" download="klasskit-bg-removed.png" class="w-full bg-green text-dark font-heading font-bold text-xl py-4 rounded-2xl border-4 border-dark shadow-hard btn-chunky flex items-center justify-center gap-2">
                        <i data-lucide="file-down"></i>
                        DOWNLOAD
                    </a>
                </div>
            </aside>

            <!-- Right Panel: Preview -->
            <section class="lg:col-span-8">
                <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-[2rem] p-4 shadow-hard h-full min-h-[500px] flex flex-col relative overflow-hidden">
                    
                    <div class="flex items-center gap-2 mb-4 p-2">
                        <button id="viewOriginal" class="px-4 py-2 rounded-xl font-bold text-sm bg-slate-100 dark:bg-slate-800 border-2 border-dark transition-colors">Original</button>
                        <button id="viewResult" class="px-4 py-2 rounded-xl font-bold text-sm bg-blue text-white border-2 border-dark transition-colors">Result</button>
                    </div>

                    <div class="flex-grow checkerboard rounded-2xl border-2 border-dark dark:border-slate-700 flex items-center justify-center overflow-hidden relative">
                        <div id="emptyState" class="text-center p-12">
                            <div class="w-20 h-20 bg-slate-100 dark:bg-slate-800 rounded-3xl border-4 border-dark dark:border-slate-700 flex items-center justify-center mx-auto mb-4">
                                <i data-lucide="image" class="w-10 h-10 text-slate-300"></i>
                            </div>
                            <p class="font-bold text-slate-400">No image selected</p>
                        </div>

                        <img id="originalPreview" src="" alt="Original" class="hidden max-w-full max-h-[600px] object-contain shadow-2xl">
                        <img id="resultPreview" src="" alt="Result" class="hidden max-w-full max-h-[600px] object-contain shadow-2xl">
                    </div>
                    
                    <div id="imageInfo" class="hidden mt-4 p-2 flex justify-between text-xs font-bold text-slate-500 uppercase tracking-widest">
                        <span id="imageDim">0 x 0</span>
                        <span id="imageSize">0 KB</span>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script type="module">
        import { removeBackground } from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.6.0/+esm';

        // Initialize Lucide
        lucide.createIcons();

        // Elements
        const imageInput = document.getElementById('imageInput');
        const processBtn = document.getElementById('processBtn');
        const downloadCard = document.getElementById('downloadCard');
        const downloadBtn = document.getElementById('downloadBtn');
        const originalPreview = document.getElementById('originalPreview');
        const resultPreview = document.getElementById('resultPreview');
        const emptyState = document.getElementById('emptyState');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingBar = document.getElementById('loadingBar');
        const loadingStatus = document.getElementById('loadingStatus');
        const loadingPercent = document.getElementById('loadingPercent');
        const viewOriginal = document.getElementById('viewOriginal');
        const viewResult = document.getElementById('viewResult');
        const imageInfo = document.getElementById('imageInfo');
        const imageDim = document.getElementById('imageDim');
        const imageSize = document.getElementById('imageSize');

        let currentFile = null;

        // --- THEME PERSISTENCE ---
        const themeToggle = document.getElementById('themeToggle');
        
        function updateThemeIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            themeToggle.innerHTML = isDark 
                ? '<i data-lucide="sun" class="w-6 h-6"></i>' 
                : '<i data-lucide="moon" class="w-6 h-6"></i>';
            lucide.createIcons();
        }

        async function initTheme() {
            await requireAuth();
            const savedTheme = localStorage.getItem('theme_workshop_removebg') || 'light';
            if (savedTheme === 'dark') document.documentElement.classList.add('dark');
            updateThemeIcon();
        }

        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme_workshop_removebg', isDark ? 'dark' : 'light');
            updateThemeIcon();
        });

        initTheme();

        // Handle Image Selection
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                currentFile = file;
                const url = URL.createObjectURL(file);
                
                originalPreview.src = url;
                originalPreview.classList.remove('hidden');
                resultPreview.classList.add('hidden');
                emptyState.classList.add('hidden');
                
                processBtn.disabled = false;
                downloadCard.classList.add('opacity-50', 'pointer-events-none');
                
                // Show info
                imageInfo.classList.remove('hidden');
                imageSize.textContent = `${(file.size / 1024).toFixed(1)} KB`;
                
                const img = new Image();
                img.onload = () => {
                    imageDim.textContent = `${img.width} x ${img.height}`;
                };
                img.src = url;

                // View Toggle
                viewOriginal.classList.add('bg-blue', 'text-white');
                viewOriginal.classList.remove('bg-slate-100', 'dark:bg-slate-800');
                viewResult.classList.remove('bg-blue', 'text-white');
                viewResult.classList.add('bg-slate-100', 'dark:bg-slate-800');
            }
        });

        // View Toggling
        viewOriginal.addEventListener('click', () => {
            if (!currentFile) return;
            originalPreview.classList.remove('hidden');
            resultPreview.classList.add('hidden');
            
            viewOriginal.classList.add('bg-blue', 'text-white');
            viewOriginal.classList.remove('bg-slate-100', 'dark:bg-slate-800');
            viewResult.classList.remove('bg-blue', 'text-white');
            viewResult.classList.add('bg-slate-100', 'dark:bg-slate-800');
        });

        viewResult.addEventListener('click', () => {
            if (!resultPreview.src) return;
            originalPreview.classList.add('hidden');
            resultPreview.classList.remove('hidden');
            
            viewResult.classList.add('bg-blue', 'text-white');
            viewResult.classList.remove('bg-slate-100', 'dark:bg-slate-800');
            viewOriginal.classList.remove('bg-blue', 'text-white');
            viewOriginal.classList.add('bg-slate-100', 'dark:bg-slate-800');
        });

        // Process Removal
        processBtn.addEventListener('click', async () => {
            if (!currentFile) return;

            processBtn.disabled = true;
            loadingOverlay.classList.remove('hidden');
            loadingBar.style.width = '0%';
            loadingStatus.textContent = 'Preparing...';
            loadingPercent.textContent = '0%';

            try {
                const config = {
                    progress: (key, current, total) => {
                        const pct = Math.round((current / total) * 100);
                        loadingBar.style.width = `${pct}%`;
                        loadingPercent.textContent = `${pct}%`;
                        
                        // Map keys to human readable status
                        if (key.includes('fetch')) loadingStatus.textContent = 'Downloading AI Model...';
                        else if (key.includes('onnx')) loadingStatus.textContent = 'Loading Engine...';
                        else if (key.includes('compute')) loadingStatus.textContent = 'Removing Background...';
                        else loadingStatus.textContent = 'Processing...';
                    }
                };

                const blob = await removeBackground(currentFile, config);
                const url = URL.createObjectURL(blob);

                resultPreview.src = url;
                resultPreview.classList.remove('hidden');
                originalPreview.classList.add('hidden');

                downloadBtn.href = url;
                downloadCard.classList.remove('opacity-50', 'pointer-events-none');
                
                // Switch View UI
                viewResult.classList.add('bg-blue', 'text-white');
                viewResult.classList.remove('bg-slate-100', 'dark:bg-slate-800');
                viewOriginal.classList.remove('bg-blue', 'text-white');
                viewOriginal.classList.add('bg-slate-100', 'dark:bg-slate-800');

                loadingStatus.textContent = 'Done!';
            } catch (error) {
                console.error('BG Removal Error:', error);
                loadingStatus.textContent = 'Error occurred!';
                loadingBar.classList.add('bg-pink');
                await showAlertModal('An error occurred during background removal. See console for details.', { title: "Error", icon: "x-octagon", iconColor: "red" });
            } finally {
                processBtn.disabled = false;
                setTimeout(() => {
                    if (loadingStatus.textContent === 'Done!') {
                        loadingOverlay.classList.add('hidden');
                    }
                }, 3000);
            }
        });
    </script>
</body>

</html>
