<!DOCTYPE html>
<html lang="en">
<head>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'e1-pink': '#FF6B95',
                        'e1-orange': '#FF8C42',
                        'e1-green': '#00E676',
                        'e1-blue': '#2979FF',

    <style>
        body {
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
            transition: background-color 0.3s ease;
        }
        .dark body {
            background-color: #0f172a;
            background-image: radial-gradient(#334155 1px, transparent 1px);
        }

        .btn-neo { transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-neo:hover:not(:disabled) { transform: translate(-2px, -2px); box-shadow: 4px 4px 0px 0px rgba(30, 41, 59, 1); }
        .btn-neo:active:not(:disabled) { transform: translate(2px, 2px); box-shadow: 0px 0px 0px 0px rgba(30, 41, 59, 1); }
        .dark .btn-neo:hover:not(:disabled) { box-shadow: 4px 4px 0px 0px #000000; }
        .dark .btn-neo:active:not(:disabled) { box-shadow: 0px 0px 0px 0px #000000; }

        .option-card { transition: all 0.15s ease-in-out; }
        .option-card:hover:not(.selected) { transform: translate(-2px, -2px); box-shadow: 4px 4px 0px 0px rgba(30, 41, 59, 1); border-color: #2979FF; }
        .dark .option-card:hover:not(.selected) { box-shadow: 4px 4px 0px 0px #000000; border-color: #2979FF; }
        
        .option-card.selected { 
            background-color: #1e293b; color: white; border-color: #1e293b;
            transform: translate(2px, 2px); box-shadow: 0px 0px 0px 0px rgba(30, 41, 59, 1);
        }
        .dark .option-card.selected { background-color: #334155; border-color: #475569; }

        .level-tab { transition: all 0.15s ease; }
        .level-tab.active { background-color: #1e293b; color: white; border-color: #1e293b; box-shadow: none; }
        .dark .level-tab.active { background-color: #334155; border-color: #475569; }
        .level-tab:not(.active):hover { background-color: #e2e8f0; color: #1e293b; }
        .dark .level-tab:not(.active):hover { background-color: #475569; color: white; }

        .accordion-content {
            display: grid; grid-template-rows: 0fr;
            transition: grid-template-rows 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .accordion-content.open { grid-template-rows: 1fr; }
        .accordion-inner { overflow: hidden; }
        
        .chevron { transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .chevron.open { transform: rotate(180deg); }

        /* Stepper */
        .stepper-dot {
            transition: all 0.2s ease;
        }
        .stepper-dot.active {
            transform: scale(1.15);
            box-shadow: 0 0 0 4px rgba(41, 121, 255, 0.25);
        }
        .stepper-dot.completed {
            background-color: #00E676 !important;
            border-color: #00a34d !important;
            color: #1e293b !important;
        }
        .stepper-line {
            transition: background-color 0.3s ease;
        }

        /* Tag chip */
        .tag-chip { transition: all 0.15s ease; }
        .tag-chip:hover { transform: translateY(-1px); }
        .tag-chip.active-chip {
            color: white !important;
            border-color: transparent !important;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: transparent; border-left: 3px solid #1e293b; }
        .dark ::-webkit-scrollbar-track { border-left-color: #334155; }
        ::-webkit-scrollbar-thumb { background: #2979FF; border: 3px solid #1e293b; border-right: none; }
        .dark ::-webkit-scrollbar-thumb { border-color: #334155; }
        ::-webkit-scrollbar-thumb:hover { background: #FF6B95; }
        
        .dark .shadow-neo { box-shadow: 4px 4px 0px 0px #000000; }
        .dark .shadow-neo-sm { box-shadow: 2px 2px 0px 0px #000000; }

        /* Toast Animation */
        @keyframes slideUpFade {
            0% { transform: translateY(100%); opacity: 0; }
            10% { transform: translateY(0); opacity: 1; }
            90% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(100%); opacity: 0; }
        }
        .toast-animate { animation: slideUpFade 3s ease-in-out forwards; }
    </style>
    
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>

    <script>
        // ── Auth Guard (Pro Only) ──────────────────────────────────────────────────
        (async () => {
            if (typeof requirePro === 'function') await requirePro();
        })();

        let commentBank = [];
        let state = {};
        let activeAccordion = 'general';

        const STORAGE_KEY = 'reportgen_state';

        const pronouns = {
            she: { subject: 'she', object: 'her', possessive: 'her', reflexive: 'herself', CapSubject: 'She', CapPossessive: 'Her' },
            he: { subject: 'he', object: 'him', possessive: 'his', reflexive: 'himself', CapSubject: 'He', CapPossessive: 'His' },
            they: { subject: 'they', object: 'them', possessive: 'their', reflexive: 'themselves', CapSubject: 'They', CapPossessive: 'Their' }
        };

        const themeColorMap = {
            'kk-pink': 'e1-pink',
            'kk-orange': 'e1-orange',
            'kk-amber': 'e1-amber',
            'kk-blue': 'e1-blue',
            'kk-purple': 'e1-purple',
            'kk-green': 'e1-green'
        };

        const tagColorMap = {
            'Confidence': 'bg-violet-100 text-violet-800 dark:bg-violet-900/40 dark:text-violet-300', 'Attitude': 'bg-rose-100 text-rose-800 dark:bg-rose-900/40 dark:text-rose-300', 'Progress': 'bg-cyan-100 text-cyan-800 dark:bg-cyan-900/40 dark:text-cyan-300',
            'Engagement': 'bg-indigo-100 text-indigo-800 dark:bg-indigo-900/40 dark:text-indigo-300', 'Character': 'bg-fuchsia-100 text-fuchsia-800 dark:bg-fuchsia-900/40 dark:text-fuchsia-300',
            'Teamwork': 'bg-sky-100 text-sky-800 dark:bg-sky-900/40 dark:text-sky-300', 'Participation': 'bg-lime-100 text-lime-800 dark:bg-lime-900/40 dark:text-lime-300', 'Respect': 'bg-pink-100 text-pink-800 dark:bg-pink-900/40 dark:text-pink-300',
            'Communication': 'bg-orange-100 text-orange-800 dark:bg-orange-900/40 dark:text-orange-300', 'Leadership': 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/40 dark:text-yellow-300',
            'Motivation': 'bg-red-100 text-red-800 dark:bg-red-900/40 dark:text-red-300', 'Perseverance': 'bg-emerald-100 text-emerald-800 dark:bg-emerald-900/40 dark:text-emerald-300', 'Initiative': 'bg-blue-100 text-blue-800 dark:bg-blue-900/40 dark:text-blue-300',
            'Focus': 'bg-purple-100 text-purple-800 dark:bg-purple-900/40 dark:text-purple-300', 'Resilience': 'bg-teal-100 text-teal-800 dark:bg-teal-900/40 dark:text-teal-300',
            'Grammar': 'bg-violet-100 text-violet-800 dark:bg-violet-900/40 dark:text-violet-300', 'Vocabulary': 'bg-pink-100 text-pink-800 dark:bg-pink-900/40 dark:text-pink-300', 'Speaking': 'bg-orange-100 text-orange-800 dark:bg-orange-900/40 dark:text-orange-300',
            'Listening': 'bg-blue-100 text-blue-800 dark:bg-blue-900/40 dark:text-blue-300', 'Reading': 'bg-emerald-100 text-emerald-800 dark:bg-emerald-900/40 dark:text-emerald-300', 'Writing': 'bg-teal-100 text-teal-800 dark:bg-teal-900/40 dark:text-teal-300',
            'Phonics': 'bg-amber-100 text-amber-800 dark:bg-amber-900/40 dark:text-amber-300',
            'Encouragement': 'bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-300', 'Celebration': 'bg-amber-100 text-amber-800 dark:bg-amber-900/40 dark:text-amber-300',
            'Gratitude': 'bg-rose-100 text-rose-800 dark:bg-rose-900/40 dark:text-rose-300', 'Growth': 'bg-cyan-100 text-cyan-800 dark:bg-cyan-900/40 dark:text-cyan-300',
            'Default': 'bg-slate-100 text-slate-800 dark:bg-slate-800 dark:text-slate-300'
        };

        // --- IndexedDB Logic ---
        let dataBase;
        const dbName = "KlassKitReportsDB";
        const dbVersion = 1;

        function initDB() {
            const request = indexedDB.open(dbName, dbVersion);
            request.onerror = (event) => console.error("IndexedDB Error:", event);
            request.onsuccess = (event) => { 
                dataBase = event.target.result; 
                // Initial cloud pull for archive
                loadArchiveFromCloud();
            };
            request.onupgradeneeded = (event) => {
                const dataBase = event.target.result;
                if (!dataBase.objectStoreNames.contains("reports")) {
                    const store = dataBase.createObjectStore("reports", { keyPath: "id", autoIncrement: true });
                    store.createIndex("className", "className", { unique: false });
                    store.createIndex("studentName", "studentName", { unique: false });
                }
            };
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = message;
            toast.classList.remove('toast-animate');
            void toast.offsetWidth; // Trigger reflow
            toast.classList.add('toast-animate');
        }

        async function saveReportToDB() {
            if (!dataBase) {
                await showAlertModal("Database not initialized yet.", {
                    title: 'Error',
                    icon: 'database',
                    iconColor: 'red'
                });
                return;
            }
            
            const studentName = document.getElementById('studentName').value.trim();
            const className = document.getElementById('className').value.trim() || 'Uncategorized';
            const pronoun = document.getElementById('pronoun').value;

            if (!studentName) {
                await showAlertModal("Please enter a Student Name to save their report.", {
                    title: 'Input Required',
                    icon: 'user',
                    iconColor: 'orange'
                });
                document.getElementById('studentName').focus();
                return;
            }

            const reportData = {
                className,
                studentName,
                pronoun,
                state: JSON.parse(JSON.stringify(state)), 
                timestamp: new Date().getTime()
            };

            const tx = dataBase.transaction("reports", "readwrite");
            const store = tx.objectStore("reports");

            const request = store.index("className").getAll(className);
            request.onsuccess = () => {
                const existing = request.result.find(r => r.studentName.toLowerCase() === studentName.toLowerCase());
                if (existing) {
                    reportData.id = existing.id;
                    store.put(reportData);
                } else {
                    store.add(reportData);
                }
                showToast("Saved to Archive!");
                // Auto-sync archive to cloud
                syncArchiveWithCloud();
            };
        }

        // Action Functions
        async function deleteReport(id, e) {
            if (e) e.stopPropagation();
            const confirmed = await showConfirmModal("Are you sure you want to delete this report?", {
                title: 'Delete Report?',
                confirmText: 'Delete',
                cancelText: 'Keep',
                icon: 'trash-2',
                iconColor: 'red'
            });
            if (!confirmed) return;
            const tx = dataBase.transaction("reports", "readwrite");
            tx.objectStore("reports").delete(id);
            tx.oncomplete = () => { 
                showToast("Report deleted"); 
                openDatabaseModal(); 
            };
        }

        function duplicateReport(report, e) {
            if (e) e.stopPropagation();
            const copy = JSON.parse(JSON.stringify(report));
            delete copy.id;
            copy.studentName = copy.studentName + " (Copy)";
            copy.timestamp = new Date().getTime();
            const tx = dataBase.transaction("reports", "readwrite");
            tx.objectStore("reports").add(copy);
            tx.oncomplete = () => { 
                showToast("Report duplicated"); 
                openDatabaseModal(); 
            };
        }

        async function deleteClass(className) {
            const confirmed = await showConfirmModal(`Are you sure you want to delete ALL reports for class ${className}?`, {
                title: 'Delete Class?',
                confirmText: 'Delete',
                cancelText: 'Keep',
                icon: 'trash-2',
                iconColor: 'red'
            });
            if (!confirmed) return;
            const tx = dataBase.transaction("reports", "readwrite");
            const store = tx.objectStore("reports");
            const request = store.index("className").getAllKeys(className);
            request.onsuccess = () => {
                request.result.forEach(id => store.delete(id));
            };
            tx.oncomplete = () => {
                showToast(`Deleted class ${className}`);
                openDatabaseModal();
            };
        }

        function exportClass(className) {
            const tx = dataBase.transaction("reports", "readonly");
            const store = tx.objectStore("reports");
            const request = store.index("className").getAll(className);
            request.onsuccess = () => {
                const dataStr = JSON.stringify(request.result, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `KlassKit_${className}_Backup.json`;
                a.click();
                URL.revokeObjectURL(url);
                showToast(`Exported ${className} successfully`);
            };
        }

        function triggerImport() {
            document.getElementById('importFile').click();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!Array.isArray(data)) throw new Error("Invalid format: Expected an array.");
                    
                    const tx = dataBase.transaction("reports", "readwrite");
                    const store = tx.objectStore("reports");
                    let count = 0;
                    
                    data.forEach(item => {
                        if (item.className && item.studentName && item.state) {
                            delete item.id; // Prevent collision
                            item.timestamp = new Date().getTime();
                            store.add(item);
                            count++;
                        }
                    });
                    
                    tx.oncomplete = () => {
                        showToast(`Imported ${count} reports!`);
                        openDatabaseModal();
                    };
                } catch(err) {
                    await showAlertModal("Error importing file. Please ensure it is a valid KlassKit export.", {
                        title: 'Import Error',
                        icon: 'file-x',
                        iconColor: 'red'
                    });
                }
                event.target.value = ''; // Reset input
            };
            reader.readAsText(file);
        }

            lucide.createIcons();
            modal.classList.remove('hidden');

            const tx = dataBase.transaction("reports", "readonly");
            const store = tx.objectStore("reports");
            const request = store.getAll();

            request.onsuccess = () => {

                    content.innerHTML = '<div class="text-center py-10 text-slate-500 font-bold">No saved reports yet.</div>';

                    classTitle.innerHTML = `
                        <div class="flex items-center gap-2">
                            <i data-lucide="users" class="w-5 h-5 text-e1-orange"></i> ${className} 
                            <span class="bg-slate-100 dark:bg-slate-800 text-slate-500 text-xs px-2 py-0.5 rounded-full border-2 border-slate-200 dark:border-slate-600">${grouped[className].length}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="exportClass('${className}')" class="btn-neo bg-white dark:bg-slate-800 border-2 border-e1-dark dark:border-slate-600 rounded px-2 py-1 text-xs font-bold text-slate-700 dark:text-slate-300 shadow-neo-sm flex items-center gap-1 hover:text-e1-blue transition-colors">
                                <i data-lucide="upload-cloud" class="w-3 h-3"></i> Export
                            </button>
                            <button onclick="deleteClass('${className}')" class="btn-neo bg-rose-100 dark:bg-rose-900/30 border-2 border-rose-900 dark:border-rose-400 rounded px-2 py-1 text-xs font-bold text-rose-700 dark:text-rose-400 shadow-neo-sm flex items-center gap-1 hover:bg-rose-200 transition-colors">
                                <i data-lucide="trash-2" class="w-3 h-3"></i> Delete

                    `;
                    classBlock.appendChild(classTitle);

                    const grid = document.createElement('div');
                    grid.className = 'grid grid-cols-1 md:grid-cols-2 gap-3';

                    grouped[className].sort((a,b) => b.timestamp - a.timestamp).forEach(report => {
                        const dateStr = new Date(report.timestamp).toLocaleDateString();
                        const card = document.createElement('div');
                        card.className = 'bg-slate-50 dark:bg-slate-800 border-3 border-e1-dark dark:border-slate-600 rounded-xl p-3 flex justify-between items-center shadow-neo-sm hover:-translate-y-1 transition-transform group';
                        
                        const infoDiv = document.createElement('div');
                        infoDiv.className = 'flex-grow cursor-pointer';
                        infoDiv.onclick = () => loadReportFromDB(report);
                        infoDiv.innerHTML = `
                            <p class="font-bold text-e1-dark dark:text-white truncate pr-2">${report.studentName}</p>
                            <p class="text-xs text-slate-500 dark:text-slate-400 capitalize">${report.pronoun} • Edited ${dateStr}</p>
                        `;

                        const actionsDiv = document.createElement('div');
                        actionsDiv.className = 'flex gap-1.5 shrink-0';

                        const loadBtn = document.createElement('button');
                        loadBtn.className = 'bg-e1-blue text-white p-2 rounded-lg border-2 border-e1-dark shadow-sm hover:bg-blue-600 transition-colors';
                        loadBtn.title = 'Load';
                        loadBtn.onclick = () => loadReportFromDB(report);
                        loadBtn.innerHTML = '<i data-lucide="upload" class="w-4 h-4"></i>';

                        const dupBtn = document.createElement('button');
                        dupBtn.className = 'bg-e1-green text-e1-dark p-2 rounded-lg border-2 border-e1-dark shadow-sm hover:bg-green-400 transition-colors';
                        dupBtn.title = 'Duplicate';
                        dupBtn.onclick = (e) => duplicateReport(report, e);
                        dupBtn.innerHTML = '<i data-lucide="copy" class="w-4 h-4"></i>';

                        const delBtn = document.createElement('button');
                        delBtn.className = 'bg-rose-500 text-white p-2 rounded-lg border-2 border-e1-dark shadow-sm hover:bg-rose-600 transition-colors';
                        delBtn.title = 'Delete';
                        delBtn.onclick = (e) => deleteReport(report.id, e);
                        delBtn.innerHTML = '<i data-lucide="trash-2" class="w-4 h-4"></i>';

                        actionsDiv.append(loadBtn, dupBtn, delBtn);
                        card.append(infoDiv, actionsDiv);
                        grid.appendChild(card);

                    classBlock.appendChild(grid);

                lucide.createIcons();

        function closeDatabaseModal() {
            document.getElementById('dbModal').classList.add('hidden');
        }

        function loadReportFromDB(report) {
            document.getElementById('className').value = report.className;
            document.getElementById('studentName').value = report.studentName;
            document.getElementById('pronoun').value = report.pronoun;
            
            commentBank.forEach(cat => {
                if (report.state && report.state[cat.id]) {
                    state[cat.id] = report.state[cat.id];
                } else {
                    state[cat.id] = { level: 'good', selectionIndex: null, activeTag: 'All' };
                }
            });

            closeDatabaseModal();
            renderStepper();
            renderAccordions();
            compileReport();
            saveState(); 
            showToast(`Loaded ${report.studentName}`);
        }

        // --- Core App Logic ---
        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        }

        function saveState() {
            const data = {
                className: document.getElementById('className').value,
                studentName: document.getElementById('studentName').value,
                pronoun: document.getElementById('pronoun').value,
                state: state,
                activeAccordion: activeAccordion
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            
            // Cloud Sync Current State
            if (typeof saveProgress === 'function' && !isSandbox()) {
                saveProgress('report-helper-state', data).catch(console.error);
            }
        }

        async function syncArchiveWithCloud() {
            if (!dataBase || typeof saveProgress !== 'function' || isSandbox()) return;
            
            const tx = dataBase.transaction("reports", "readonly");
            const store = tx.objectStore("reports");
            const request = store.getAll();
            
            request.onsuccess = async () => {
                const reports = request.result;
                try {
                    await saveProgress('report-helper-archive', { reports });
                    showToast("Archive synced to cloud!");
                } catch (e) {
                    console.error("Archive cloud sync failed", e);
                }
            };
        }

        async function loadArchiveFromCloud() {
            if (!dataBase || typeof loadProgress !== 'function' || isSandbox()) return;
            
            try {
                const cloudData = await loadProgress('report-helper-archive');
                if (cloudData && cloudData.reports) {
                    const tx = dataBase.transaction("reports", "readwrite");
                    const store = tx.objectStore("reports");
                    
                    // Simple merge: add if not exists
                    for (const report of cloudData.reports) {
                        const checkReq = store.get(report.id);
                        checkReq.onsuccess = () => {
                            if (!checkReq.result) {
                                store.add(report);
                            }
                        };
                    }
                    showToast("Archive pulled from cloud!");
                }
            } catch (e) {
                console.error("Archive cloud load failed", e);
            }
        }

        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return null;
                return JSON.parse(raw);
            } catch { return null; }
        }

        function onInputChange() {
            compileReport();
            saveState();
        }

        async function fetchComments() {
            try {
                const response = await fetch('comments.json');
                if (!response.ok) throw new Error('Network error');
                commentBank = await response.json();
                
                const saved = loadState();

                commentBank.forEach(cat => {
                    if (saved && saved.state && saved.state[cat.id]) {
                        state[cat.id] = saved.state[cat.id];
                        if (!state[cat.id].activeTag) state[cat.id].activeTag = 'All';
                    } else {
                        state[cat.id] = { level: 'good', selectionIndex: null, activeTag: 'All' };
                    }
                });

                if (saved) {
                    if (saved.className) document.getElementById('className').value = saved.className;
                    if (saved.studentName) document.getElementById('studentName').value = saved.studentName;
                    if (saved.pronoun) document.getElementById('pronoun').value = saved.pronoun;
                    if (saved.activeAccordion !== undefined) activeAccordion = saved.activeAccordion;
                }

                // Cloud Sync Load
                if (typeof loadProgress === 'function' && !isSandbox()) {
                    const cloudState = await loadProgress('report-helper-state');
                    if (cloudState) {
                        // Merge cloud state if needed or just use it
                        Object.assign(state, cloudState.state || {});
                    }
                }

                document.getElementById('loadingMsg').style.display = 'none';
                renderStepper();
                renderAccordions();
                compileReport();
            } catch (error) {
                document.getElementById('loadingMsg').innerHTML = `<div class="text-red-500">Failed to load comments.json</div>`;
            }
        }

        function parseText(text, nameStr, pronounObj) {
            if(!text) return "";
            return text
                .replace(/\[Name\]/g, nameStr)
                .replace(/\[CapSubject\]/g, pronounObj.CapSubject)
                .replace(/\[subject\]/g, pronounObj.subject)
                .replace(/\[CapPossessive\]/g, pronounObj.CapPossessive)
                .replace(/\[possessive\]/g, pronounObj.possessive)
                .replace(/\[object\]/g, pronounObj.object)
                .replace(/\[reflexive\]/g, pronounObj.reflexive);
        }

        function getTagColor(tag) {
            return tagColorMap[tag] || tagColorMap['Default'];
        }

        function extractTags(category, level) {
            const items = category.levels[level];
            const tags = new Set();
            items.forEach(item => {
                if (typeof item === 'string' && item.includes(' | ')) {
                    tags.add(item.split(' | ')[0].trim());
                }
            });
            return Array.from(tags);
        }

        function renderStepper() {
            const container = document.getElementById('stepperContainer');
            container.innerHTML = '';

            commentBank.forEach((cat, idx) => {
                const catState = state[cat.id];
                const isCompleted = catState && catState.selectionIndex !== null;
                const isActive = activeAccordion === cat.id;
                const colorClass = themeColorMap[cat.theme] || 'e1-blue';

                const dotWrap = document.createElement('div');
                dotWrap.className = 'flex flex-col items-center gap-1 cursor-pointer group relative';
                dotWrap.style.zIndex = '2';
                dotWrap.onclick = () => { activeAccordion = cat.id; renderStepper(); renderAccordions(); saveState(); };

                const dot = document.createElement('div');
                const baseClasses = `stepper-dot w-9 h-9 rounded-full border-3 flex items-center justify-center font-headings font-bold text-sm transition-all`;
                
                if (isCompleted) {
                    dot.className = `${baseClasses} completed border-e1-dark dark:border-slate-600`;
                    dot.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i>`;
                } else if (isActive) {
                    dot.className = `${baseClasses} active bg-${colorClass} text-white border-e1-dark dark:border-slate-600`;
                    dot.innerText = idx + 1;
                } else {
                    dot.className = `${baseClasses} bg-white dark:bg-slate-800 text-slate-400 dark:text-slate-500 border-slate-300 dark:border-slate-600 group-hover:border-e1-blue`;
                    dot.innerText = idx + 1;
                }
                dotWrap.appendChild(dot);

                const label = document.createElement('span');
                const shortTitle = cat.title.replace(/^\d+\.\s*/, '').split(' ')[0];
                label.className = `text-[10px] font-bold uppercase tracking-wider max-w-[70px] text-center leading-tight ${isActive ? 'text-e1-dark dark:text-white' : 'text-slate-400 dark:text-slate-500'}`;
                label.innerText = shortTitle;
                dotWrap.appendChild(label);

                container.appendChild(dotWrap);

                if (idx < commentBank.length - 1) {
                    const line = document.createElement('div');
                    const prevCompleted = isCompleted;
                    line.className = `stepper-line flex-1 h-[3px] rounded-full -mt-4 ${prevCompleted ? 'bg-e1-green' : 'bg-slate-200 dark:bg-slate-700'}`;
                    container.appendChild(line);
                }
            });
            lucide.createIcons();
        }

        function renderAccordions() {
            const container = document.getElementById('optionsContainer');
            container.innerHTML = ""; 

            commentBank.forEach((category, idx) => {
                const catState = state[category.id];
                if (activeAccordion !== category.id) return;

                const colorClass = themeColorMap[category.theme] || 'e1-blue';

                const section = document.createElement('div');
                section.className = `bg-white dark:bg-slate-800 border-4 border-e1-dark dark:border-slate-700 rounded-2xl mb-5 shadow-neo border-t-8 border-t-${colorClass} overflow-hidden`;

                const header = document.createElement('div');
                header.className = `w-full px-5 py-4 flex justify-between items-center text-left bg-slate-50 dark:bg-slate-800/80 border-b-2 border-slate-100 dark:border-slate-700`;

                const titleWrapper = document.createElement('div');
                titleWrapper.className = "flex items-center gap-3";
                
                const numBadge = document.createElement('div');
                numBadge.className = `w-8 h-8 rounded-full flex items-center justify-center font-headings font-bold text-sm bg-e1-dark text-white border-2 border-transparent shadow-neo-sm`;
                numBadge.innerText = idx + 1;
                titleWrapper.appendChild(numBadge);
                
                const titleText = document.createElement('h3');
                titleText.className = `font-headings font-bold text-xl text-e1-dark dark:text-white tracking-tight`;
                titleText.innerText = category.title.replace(/^\d+\.\s*/, '');
                titleWrapper.appendChild(titleText);
                
                header.appendChild(titleWrapper);
                section.appendChild(header);

                const bodyInner = document.createElement('div');
                bodyInner.className = "p-5 flex flex-col gap-4";

                const levelNav = document.createElement('div');
                levelNav.className = "flex gap-2 bg-e1-chalk dark:bg-slate-900 p-1.5 rounded-xl border-3 border-e1-dark dark:border-slate-600 w-fit";
                
                const levels = [
                    { key: 'support', label: 'Needs Support' },
                    { key: 'good', label: 'Developing/Good' },
                    { key: 'excellent', label: 'Excellent' }
                ];

                levels.forEach(lvl => {
                    const btn = document.createElement('button');
                    btn.className = `level-tab px-4 py-1.5 rounded-lg text-sm font-bold font-headings border-2 border-transparent text-slate-500 dark:text-slate-400 cursor-pointer ${catState.level === lvl.key ? 'active' : ''}`;
                    btn.innerText = lvl.label;
                    btn.onclick = (e) => {
                        e.stopPropagation(); 
                        state[category.id].level = lvl.key;
                        state[category.id].selectionIndex = null;
                        state[category.id].activeTag = 'All';
                        renderStepper();
                        renderAccordions();
                        compileReport();
                        saveState();
                    };
                    levelNav.appendChild(btn);
                });
                bodyInner.appendChild(levelNav);

                const tags = extractTags(category, catState.level);
                if (tags.length > 0) {
                    const chipRow = document.createElement('div');
                    chipRow.className = "flex flex-wrap gap-2";

                    const allChip = document.createElement('button');
                    const isAllActive = catState.activeTag === 'All';
                    allChip.className = `tag-chip px-3 py-1 rounded-lg text-xs font-bold border-2 cursor-pointer ${isAllActive ? 'active-chip bg-e1-dark dark:bg-slate-500 text-white border-transparent' : 'bg-white dark:bg-slate-900 text-slate-500 dark:text-slate-400 border-slate-300 dark:border-slate-600'}`;
                    allChip.innerText = `All (${category.levels[catState.level].length})`;
                    allChip.onclick = (e) => {
                        e.stopPropagation();
                        state[category.id].activeTag = 'All';
                        renderAccordions();
                        saveState();
                    };
                    chipRow.appendChild(allChip);

                    tags.forEach(tag => {
                        const chip = document.createElement('button');
                        const isTagActive = catState.activeTag === tag;
                        const count = category.levels[catState.level].filter(i => typeof i === 'string' && i.startsWith(tag + ' | ')).length;
                        const bgColor = getTagColor(tag);

                        chip.className = `tag-chip px-3 py-1 rounded-lg text-xs font-bold border-2 cursor-pointer ${isTagActive ? `active-chip ${bgColor}` : 'bg-white dark:bg-slate-900 text-slate-500 dark:text-slate-400 border-slate-300 dark:border-slate-600'}`;
                        chip.innerText = `${tag} (${count})`;
                        chip.onclick = (e) => {
                            e.stopPropagation();
                            state[category.id].activeTag = tag;
                            renderAccordions();
                            saveState();
                        };
                        chipRow.appendChild(chip);
                    });
                    bodyInner.appendChild(chipRow);
                }

                const optionsGrid = document.createElement('div');
                optionsGrid.className = "flex flex-col gap-3";
                
                const optionsArray = category.levels[catState.level];
                optionsArray.forEach((optItem, index) => {
                    let tag = null;
                    let rawText = optItem;

                    if (typeof optItem === 'string' && optItem.includes(' | ')) {
                        const parts = optItem.split(' | ');
                        tag = parts[0].trim();
                        rawText = parts[1].trim();
                    }

                    if (catState.activeTag !== 'All' && tag !== catState.activeTag) return;

                    const btn = document.createElement('button');
                    const isSelected = catState.selectionIndex === index;
                    btn.className = `option-card text-left p-4 border-3 border-e1-dark dark:border-slate-600 rounded-xl bg-e1-chalk dark:bg-slate-900 font-semibold text-[0.95rem] cursor-pointer leading-relaxed flex flex-col gap-2 ${isSelected ? 'selected' : 'text-slate-600 dark:text-slate-300'}`;
                    
                    if (tag) {
                        const badgeColor = isSelected ? 'bg-white/20 text-white border-white/30' : `${getTagColor(tag)} border-transparent`;
                        btn.innerHTML = `<span class="inline-block px-2.5 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider border-2 ${badgeColor}">${tag}</span>`;
                    }

                    const textSpan = document.createElement('span');
                    textSpan.innerText = parseText(rawText, "Student", pronouns.he);
                    btn.appendChild(textSpan);
                    
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        state[category.id].selectionIndex = index;
                        
                        if (idx < commentBank.length - 1) {
                            activeAccordion = commentBank[idx + 1].id;
                        } else {
                            activeAccordion = null; 
                        }
                        
                        renderStepper();
                        renderAccordions(); 
                        compileReport();
                        saveState();
                    };
                    
                    optionsGrid.appendChild(btn);
                });

                bodyInner.appendChild(optionsGrid);
                section.appendChild(bodyInner);
                container.appendChild(section);
            });
            
            lucide.createIcons();
        }

        function compileReport() {
            let nameInput = document.getElementById('studentName').value.trim();
            if (!nameInput) nameInput = "[Name]";
            
            const pData = pronouns[document.getElementById('pronoun').value];
            let finalReportParts = [];

            commentBank.forEach(category => {
                const catState = state[category.id];
                if (catState && catState.selectionIndex !== null) {
                    let rawItem = category.levels[catState.level][catState.selectionIndex];
                    
                    if (typeof rawItem === 'string' && rawItem.includes(' | ')) {
                        rawItem = rawItem.split(' | ')[1].trim();
                    }
                    
                    const parsedSentence = parseText(rawItem, nameInput, pData);
                    finalReportParts.push(parsedSentence);
                }
            });

            const finalText = finalReportParts.join(" ");
            const outputArea = document.getElementById('outputReport');
            outputArea.value = finalText;

            const isComplete = finalReportParts.length === commentBank.length && finalReportParts.length > 0;

            if (isComplete) {
                outputArea.classList.add('bg-white', 'text-e1-dark', 'dark:bg-slate-700', 'dark:text-white');
                outputArea.classList.remove('bg-e1-chalk', 'text-slate-700', 'dark:bg-slate-800', 'dark:text-slate-300');
            } else {
                outputArea.classList.add('bg-e1-chalk', 'text-slate-700', 'dark:bg-slate-800', 'dark:text-slate-300');
                outputArea.classList.remove('bg-white', 'text-e1-dark', 'dark:bg-slate-700', 'dark:text-white');
            }

            const badge = document.getElementById('completionBadge');
            if (isComplete) { badge.classList.remove('hidden'); } else { badge.classList.add('hidden'); }

            const textToCount = finalText.trim();
            const words = textToCount ? textToCount.split(/\s+/).length : 0;
            document.getElementById('wordCount').innerText = words;
            document.getElementById('charCount').innerText = textToCount.length;
        }

        function clearAll() {
            document.getElementById('studentName').value = '';
            commentBank.forEach(cat => { 
                state[cat.id].selectionIndex = null;
                state[cat.id].activeTag = 'All';
            });
            activeAccordion = commentBank.length > 0 ? commentBank[0].id : null;
            renderStepper();
            renderAccordions();
            compileReport();
            saveState();
            document.getElementById('studentName').focus();
        }

        function copyReport() {
            const output = document.getElementById('outputReport');
            if (!output.value) return;
            
            navigator.clipboard.writeText(output.value).catch(() => {
                output.select();
                document.execCommand('copy');
            });
            
            const btn = document.getElementById('copyBtn');
            const originalHTML = btn.innerHTML;
            
            btn.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i> Copied!`;
            btn.classList.replace('bg-e1-green', 'bg-e1-blue');
            btn.classList.replace('text-e1-dark', 'text-white');
            lucide.createIcons();
            
            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.classList.replace('bg-e1-blue', 'bg-e1-green');
                btn.classList.replace('text-white', 'text-e1-dark');
                lucide.createIcons();
            }, 1500);
        }

        window.onload = () => {
            initDB();
            lucide.createIcons();
            fetchComments();
            document.getElementById('studentName').focus();
        };
    </script>
</body>
</html>
