<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Supabase Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <script src="/supabase.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lesson Extractor — English 1</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@1.16.0"></script>
    <script src="../../../components/input-modal.js"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">

    <script>
        // Inline tailwind config for fonts
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { heading: ['Fredoka', 'sans-serif'], body: ['Nunito', 'sans-serif'] },
                }
            }
        }
    </script>
</head>

<body>

    <header>
        <div class="max-w-[1440px] mx-auto px-6 py-4 flex items-center justify-between gap-3">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-pink-500 rounded-2xl border-4 border-slate-900 flex items-center justify-center shadow-[4px_4px_0_#1e293b]" style="background:var(--color-pink);">
                    <i data-lucide="book-open" class="w-7 h-7 text-white"></i>
                </div>
                <div>
                    <h1 class="text-2xl leading-none" id="doc-title">Lesson Extractor</h1>
                    <div class="flex items-center gap-2 mt-1.5">
                        <span id="current-set-name" class="text-[10px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest">Unsaved Session</span>
                        <span id="save-status-indicator" class="w-1.5 h-1.5 rounded-full bg-orange-400"></span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-3">

                <button onclick="toggleDark()" class="btn-chunky btn-chalk !p-2.5 !rounded-2xl" title="Toggle Mode">
                    <i data-lucide="moon" class="w-6 h-6" id="dark-icon"></i>
                </button>
                <button onclick="clearData()" class="btn-chunky btn-chalk !p-2.5 !rounded-2xl" title="Clear All">
                    <i data-lucide="trash-2" class="w-6 h-6"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-[1440px] mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-[450px_1fr] gap-10 items-start">
            
            <!-- Left Pane: Inputs (Metadata + Quick Paste) -->
            <aside class="flex flex-col gap-8 lg:sticky lg:top-28">
                
                <button onclick="toggleLibrary()" class="btn-chunky w-full py-3 bg-slate-900 dark:bg-slate-800 border-3 border-slate-900 dark:border-white/10 rounded-xl text-white font-heading font-bold text-lg shadow-hard flex items-center justify-center gap-2 hover:bg-slate-700 transition-colors">
                    <i data-lucide="library" class="w-5 h-5 text-blue-400"></i> MY LIBRARY
                </button>

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="createNewSet()" class="btn-chunky w-full py-2 bg-white dark:bg-slate-800 border-3 border-slate-900 dark:border-white/10 rounded-xl text-slate-900 dark:text-white font-heading font-bold text-sm shadow-hard flex items-center justify-center gap-2 transition-colors">
                        <i data-lucide="plus" class="w-4 h-4 text-green-500"></i> NEW
                    </button>
                    <button onclick="showSaveModal()" class="btn-chunky w-full py-2 bg-white dark:bg-slate-800 border-3 border-slate-900 dark:border-white/10 rounded-xl text-slate-900 dark:text-white font-heading font-bold text-sm shadow-hard flex items-center justify-center gap-2 transition-colors">
                        <i data-lucide="save" class="w-4 h-4 text-blue-500"></i> SAVE AS
                    </button>
                </div>                
                <div class="seg-track w-full">
                    <button class="seg-btn active" id="tab-paste" onclick="switchTab('paste')">✏️ Paste Text</button>
                    <button class="seg-btn" id="tab-overview" onclick="switchTab('overview')">📊 Overview View</button>
                </div>

                <!-- Unit Metadata -->
                <div id="unit-metadata" class="card p-6 flex flex-col gap-6 bg-slate-50 dark:bg-slate-900/50">
                    <div class="flex flex-col gap-2">
                        <label class="font-heading text-xs uppercase tracking-widest opacity-50">Unit Title</label>
                        <input type="text" id="unit-title-input" oninput="updateUnitMetadata()"
                            class="bg-white dark:bg-slate-900 border-3 border-slate-900 dark:border-slate-700 rounded-xl px-4 py-3 text-lg focus:outline-none focus:border-blue-500 transition-colors"
                            placeholder="e.g. Book 1, Unit 5">
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="font-heading text-xs uppercase tracking-widest opacity-50">Unit Aims / Objectives</label>
                        <textarea id="unit-aims-input" oninput="updateUnitMetadata()"
                            class="bg-white dark:bg-slate-900 border-3 border-slate-900 dark:border-slate-700 rounded-xl px-4 py-3 h-28 resize-none focus:outline-none focus:border-blue-500 transition-colors"
                            placeholder="What should students achieve?"></textarea>
                    </div>
                </div>

                <!-- Paste Section (Inside Aside on Desktop) -->
                <div id="view-paste-container" class="flex flex-col gap-6">
                    <div class="card overflow-visible">
                        <div class="relative z-20 p-4 border-b-3 border-slate-900 dark:border-slate-700 flex items-center justify-between text-white" style="background:var(--color-blue);">
                            <div class="flex items-center gap-3">
                                <i data-lucide="clipboard-paste" class="w-6 h-6"></i>
                                <h3 class="font-heading text-lg">Input Notes</h3>
                            </div>
                        </div>

                        <!-- Extract Button Above Editor -->
                        <div class="p-4 bg-slate-50 dark:bg-slate-800 border-b-3 border-slate-900 dark:border-slate-700 flex justify-end">
                            <button onclick="processPastedText()" class="btn-chunky btn-green w-full">
                                <i data-lucide="sparkles" class="w-5 h-5"></i> Extract Data
                            </button>
                        </div>
                        
                        <!-- Quill Editor Container -->
                        <div class="bg-white dark:bg-slate-900">
                            <div id="editor-container"></div>
                        </div>
                    </div>
                </div>


            </aside>

            <!-- Right Pane: Results (Modules or Overview) -->
            <section class="flex flex-col gap-8 min-w-0">
                <!-- Overview View -->
                <div id="view-overview" class="hidden">
                    <div id="overview-content"></div>
                </div>

                <!-- Modules Display -->
                <div id="view-modules" class="space-y-8">
                    <div id="module-nav" class="hidden"></div>
                    <div id="modules-container" class="space-y-12"></div>
                </div>
            </section>

        </div>
    </main>

    <div id="toast-container"></div>

    <!-- Library Drawer -->
    <aside id="library-drawer" class="fixed inset-y-0 left-0 w-80 bg-white dark:bg-slate-900 border-r-4 border-slate-900 dark:border-slate-700 shadow-2xl transform -translate-x-full transition-transform duration-300 flex flex-col z-[100]">
        <div class="p-5 border-b-3 border-slate-900 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 flex justify-between items-center">
            <h2 class="font-heading font-bold text-xl flex items-center gap-2">
                <i data-lucide="library" class="w-5 h-5 text-blue-500"></i> Library
            </h2>
            <button onclick="toggleLibrary()" class="p-2 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition-colors">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>

        <div class="p-4 border-b-2 border-slate-100 dark:border-slate-800/50">
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 opacity-40"></i>
                <input type="text" id="library-search" oninput="renderLibrary()" placeholder="Search sets..." class="w-full pl-9 pr-4 py-2 bg-slate-50 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:outline-none focus:border-blue-500">
            </div>
        </div>

        <div id="library-list" class="flex-grow overflow-y-auto p-4 space-y-3 custom-scrollbar bg-transparent">
            <!-- Library items injected here -->
        </div>
    </aside>

    <!-- Save Modal -->
    <div id="save-modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm animate-pop">
        <div class="card max-w-sm w-full p-8 flex flex-col items-center bg-white dark:bg-slate-900 border-3 border-slate-900 dark:border-slate-700 shadow-hard">
            <div class="w-16 h-16 rounded-2xl bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center border-3 border-blue-500 mb-6">
                <i data-lucide="save" class="w-8 h-8 text-blue-500"></i>
            </div>
            <h3 class="text-2xl font-heading font-bold mb-2">Save Lesson</h3>
            <p class="text-sm opacity-60 font-bold mb-6">Give your lesson set a name</p>
            
            <input type="text" id="set-name-input" class="w-full bg-slate-50 dark:bg-slate-800 border-3 border-slate-900 dark:border-slate-700 px-4 py-3 mb-8 text-center text-lg font-bold rounded-xl focus:outline-none focus:border-blue-500" placeholder="e.g. Unit 5 Vocabulary">

            <div class="flex gap-4 w-full">
                <button onclick="closeSaveModal()" class="flex-1 btn-chunky bg-white dark:bg-slate-800 border-3 border-slate-900 dark:border-slate-700 py-3 rounded-xl font-bold">
                    Cancel
                </button>
                <button onclick="confirmSaveSet()" class="flex-1 btn-chunky bg-blue-500 text-white border-3 border-slate-900 py-3 rounded-xl font-bold shadow-hard-sm">
                    Save
                </button>
            </div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm animate-pop">
        <div class="card max-w-sm w-full p-8 flex flex-col items-center text-center bg-white dark:bg-slate-900 border-3 border-slate-900 dark:border-slate-700 shadow-hard">
            <div id="confirm-icon-bg" class="w-16 h-16 rounded-full flex items-center justify-center mb-4 bg-slate-100 dark:bg-slate-800 border-3 border-slate-900">
                <i id="confirm-icon" data-lucide="alert-triangle" class="w-8 h-8"></i>
            </div>
            <h3 id="confirm-title" class="text-2xl font-heading font-bold mb-2">Are you sure?</h3>
            <p id="confirm-desc" class="text-sm opacity-60 font-bold mb-6">This action cannot be undone.</p>
            <div class="flex gap-3 w-full">
                <button id="confirm-cancel" class="flex-1 btn-chunky bg-white dark:bg-slate-800 border-3 border-slate-900 dark:border-slate-700 py-2 rounded-xl font-bold">Cancel</button>
                <button id="confirm-do" class="flex-1 btn-chunky bg-pink-500 text-white border-3 border-slate-900 py-2 rounded-xl font-bold shadow-hard-sm">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Main Logic -->
    <script src="script.js"></script>
</body>

</html>
