<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English 1 – Comment Maker</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@1.16.0/dist/umd/lucide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4"></script>
  <script src="../../../supabase.js"></script>
  <script src="../../../components/input-modal.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            pink:   { DEFAULT: '#FF6B95' },
            orange: { DEFAULT: '#FF8C42' },
            green:  { DEFAULT: '#00E676' },
            blue:   { DEFAULT: '#2979FF' },
            dark:   { DEFAULT: '#1e293b' },
            chalk:  { DEFAULT: '#f8fafc' },
          },
          fontFamily: {
            fredoka: ['Fredoka', 'sans-serif'],
            nunito:  ['Nunito', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Nunito', sans-serif; }
    h1, h2, h3, .fredoka { font-family: 'Fredoka', sans-serif; }
    .btn { transition: transform 0.1s ease, box-shadow 0.1s ease; }
    .btn:hover  { transform: translate(-2px,-2px); box-shadow: 6px 6px 0px 0px rgba(30,41,59,1); }
    .btn:active { transform: translate(2px,2px);   box-shadow: 2px 2px 0px 0px rgba(30,41,59,1); }
    .score-input { -moz-appearance: textfield; }
    .score-input::-webkit-outer-spin-button,
    .score-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .comment-card { animation: popIn 0.3s cubic-bezier(.18,.89,.32,1.28) both; }
    .comment-card:nth-child(2) { animation-delay: 0.08s; }
    .comment-card:nth-child(3) { animation-delay: 0.16s; }
    @keyframes popIn {
      from { opacity:0; transform: scale(0.88) translateY(10px); }
      to   { opacity:1; transform: scale(1) translateY(0); }
    }
    .student-pill { cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; }
    .student-pill:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0px 0px rgba(30,41,59,1); }
    .hard  { box-shadow: 4px 4px 0px 0px rgba(30,41,59,1); }
    .hard-sm { box-shadow: 2px 2px 0px 0px rgba(30,41,59,1); }
    
    /* Premium Slider Styles */
    .kk-slider {
      -webkit-appearance: none;
      width: 100%;
      height: 8px;
      background: #e2e8f0;
      border: 2px solid #1e293b;
      border-radius: 9999px;
      outline: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .dark .kk-slider { background: #334155; }
    .kk-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      background: white;
      border: 3px solid #1e293b;
      border-radius: 50%;
      box-shadow: 2px 2px 0px 0px rgba(30,41,59,1);
      transition: all 0.2s ease;
    }
    .kk-slider:hover::-webkit-slider-thumb { transform: scale(1.15); }
    .kk-slider:active::-webkit-slider-thumb { transform: scale(0.9); }
    .kk-slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      background: white;
      border: 3px solid #1e293b;
      border-radius: 50%;
      box-shadow: 2px 2px 0px 0px rgba(30,41,59,1);
    }
  </style>
</head>
<body class="bg-[#f8fafc] dark:bg-slate-900 min-h-screen transition-colors duration-300">
  <script>if(window.self!==window.top){const h=document.querySelector('header');if(h)h.style.display='none';}</script>

  <!-- Header -->
  <header class="bg-[#2979FF] border-b-4 border-[#1e293b] px-6 py-4 flex items-center justify-between hard">
    <div class="flex items-center gap-3">
      <div class="bg-[#f8fafc] border-2 border-[#1e293b] rounded-xl p-2 hard-sm">
        <i data-lucide="message-square-text" class="text-[#1e293b]" style="width:26px;height:26px;stroke-width:2.5"></i>
      </div>
      <div>
        <h1 class="text-white fredoka text-2xl font-bold leading-tight">Comment Maker</h1>
        <p class="text-blue-100 text-xs font-semibold tracking-wide">English 1 Batam · Progress Update</p>
      </div>
    </div>
    <button id="darkToggle" class="bg-[#f8fafc] border-2 border-[#1e293b] rounded-xl p-2 hard-sm btn" title="Toggle dark mode">
      <i data-lucide="moon" id="darkIcon" style="width:20px;height:20px;stroke-width:2.5"></i>
    </button>
  </header>

  <div class="max-w-3xl mx-auto px-4 py-6 space-y-5">

    <!-- Class Selector & Student Roster -->
    <section class="bg-white dark:bg-slate-800 border-4 border-[#1e293b] rounded-2xl p-5 hard space-y-4">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
        <div class="flex items-center gap-2">
          <div class="bg-[#FF8C42]/20 border-2 border-[#1e293b] rounded-xl p-1.5 hard-sm">
            <i data-lucide="school" class="text-[#FF8C42]" style="width:20px;height:20px;stroke-width:2.5"></i>
          </div>
          <select id="classSelector" onchange="switchClass(this.value)" class="bg-[#f8fafc] dark:bg-slate-700 border-3 border-[#1e293b] rounded-xl px-3 py-1.5 fredoka font-bold text-[#1e293b] dark:text-white focus:outline-none min-w-[140px]"></select>
          <button onclick="addNewClass()" class="btn bg-[#2979FF] border-[3px] border-[#1e293b] rounded-xl p-1.5 text-white hard-sm" title="Add Class">
            <i data-lucide="plus" style="width:18px;height:18px;stroke-width:3"></i>
          </button>
          <button onclick="deleteCurrentClass()" class="btn bg-red-400 border-[3px] border-[#1e293b] rounded-xl p-1.5 text-white hard-sm" title="Delete Class">
            <i data-lucide="trash" style="width:18px;height:18px;stroke-width:3"></i>
          </button>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="exportClassToJSON()" class="btn bg-white dark:bg-slate-700 border-2 border-[#1e293b] p-2 rounded-xl hard-sm" title="Export Class">
            <i data-lucide="download" style="width:16px;height:16px;stroke-width:2.5"></i>
          </button>
          <button onclick="triggerImport()" class="btn bg-white dark:bg-slate-700 border-2 border-[#1e293b] p-2 rounded-xl hard-sm" title="Import Class">
            <i data-lucide="upload" style="width:16px;height:16px;stroke-width:2.5"></i>
          </button>
          <input type="file" id="importFile" accept=".json" class="hidden" onchange="importClassFromJSON(event)" />
        </div>
        <button onclick="addNewStudent()" class="btn bg-[#FF6B95] border-[3px] border-[#1e293b] rounded-xl px-4 py-2 fredoka font-bold text-white text-sm hard-sm flex items-center gap-2">
          <i data-lucide="user-plus" style="width:16px;height:16px;stroke-width:3"></i> Add Student
        </button>
      </div>

      <div class="border-t-2 border-slate-100 dark:border-slate-700 pt-4">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-3">
          <h2 class="fredoka text-lg font-bold text-[#1e293b] dark:text-[#f8fafc] flex items-center gap-2">
            <i data-lucide="users" style="width:18px;height:18px;stroke-width:2.5;color:#FF8C42"></i>
            Students
            <span id="rosterCount" class="text-xs bg-[#FF8C42]/20 border-2 border-[#1e293b] rounded-lg px-2 py-0.5 font-nunito">0</span>
          </h2>
          <div class="relative flex-1 max-w-xs">
            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" style="width:14px;height:14px"></i>
            <input type="text" id="rosterSearch" oninput="renderRoster()" placeholder="Search students…" class="w-full pl-9 pr-3 py-1.5 border-2 border-[#1e293b] rounded-xl bg-[#f8fafc] dark:bg-slate-700 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-[#FF8C42]/50" />
          </div>
        </div>
        <div id="rosterList" class="flex flex-wrap gap-2 min-h-[38px] items-center">
          <p class="text-slate-400 font-semibold text-sm italic" id="rosterEmpty">No students yet.</p>
        </div>
      </div>
    </section>

    <!-- Score Input Card -->
    <section class="bg-white dark:bg-slate-800 border-4 border-[#1e293b] rounded-2xl p-6 hard">
      <h2 class="fredoka text-2xl font-bold text-[#1e293b] dark:text-[#f8fafc] mb-4 flex items-center gap-2">
        <i data-lucide="clipboard-list" style="width:24px;height:24px;stroke-width:2.5;color:#2979FF"></i>
        <span id="formTitle">Select or Add a Student</span>
      </h2>

      <!-- Student Name -->
      <div class="mb-4">
        <label class="block fredoka font-semibold text-[#1e293b] dark:text-[#f8fafc] mb-1 text-sm">Student Name</label>
        <input id="studentName" type="text" placeholder="e.g. Aisyah" readonly
          class="w-full border-4 border-[#1e293b] rounded-xl px-4 py-2 fredoka text-lg font-bold bg-[#f8fafc] dark:bg-slate-700 dark:text-[#f8fafc] focus:outline-none cursor-default opacity-70" />
      </div>

      <!-- Pronoun Selector -->
      <div class="mb-4">
        <label class="block fredoka font-semibold text-[#1e293b] dark:text-[#f8fafc] mb-1 text-sm">
          <i data-lucide="user" style="width:13px;height:13px;stroke-width:2.5;color:#2979FF;display:inline"></i>
          Pronoun
        </label>
        <div id="pronounBtns" class="flex gap-2">
          <button type="button" data-pronoun="they" onclick="setPronoun('they')"
            class="btn pronoun-btn flex-1 border-3 border-[#1e293b] rounded-xl py-2 fredoka font-bold text-sm hard-sm transition-colors">They / Them</button>
          <button type="button" data-pronoun="he" onclick="setPronoun('he')"
            class="btn pronoun-btn flex-1 border-3 border-[#1e293b] rounded-xl py-2 fredoka font-bold text-sm hard-sm transition-colors">He / Him</button>
          <button type="button" data-pronoun="she" onclick="setPronoun('she')"
            class="btn pronoun-btn flex-1 border-3 border-[#1e293b] rounded-xl py-2 fredoka font-bold text-sm hard-sm transition-colors">She / Her</button>
        </div>
      </d      <!-- Score Sliders Categorized -->
      <div class="space-y-6">
        <!-- Section 1: Classroom Performance -->
        <div>
          <p class="fredoka font-bold text-xs text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-1.5">
            <i data-lucide="layout" style="width:13px;height:13px;stroke-width:2.5"></i> Classroom Performance
          </p>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-8 gap-y-4">
            <div class="space-y-2">
              <div class="flex items-center justify-between">
                <label class="fredoka font-semibold text-[#1e293b] dark:text-[#f8fafc] text-xs flex items-center gap-1.5 uppercase tracking-tighter"><i data-lucide="hand" class="w-3.5 h-3.5 text-pink"></i> Participation</label>
                <span id="val_participation" class="text-xs font-black text-pink bg-pink/10 px-1.5 rounded-lg border border-pink/20">0</span>
              </div>
              <input id="s_participation" type="range" min="0" max="100" value="0" oninput="document.getElementById('val_participation').textContent = this.value" class="kk-slider accent-pink" />
            </div>
            <div class="space-y-2">
              <div class="flex items-center justify-between">
                <label class="fredoka font-semibold text-[#1e293b] dark:text-[#f8fafc] text-xs flex items-center gap-1.5 uppercase tracking-tighter"><i data-lucide="ear" class="w-3.5 h-3.5 text-blue"></i> Listening</label>
                <span id="val_listening" class="text-xs font-black text-blue bg-blue/10 px-1.5 rounded-lg border border-blue/20">0</span>
              </div>
              <input id="s_listening" type="range" min="0" max="100" value="0" oninput="document.getElementById('val_listening').textContent = this.value" class="kk-slider accent-blue" />
            </div>
            <div class="space-y-2">
              <div class="flex items-center justify-between">
                <label class="fredoka font-semibold text-[#1e293b] dark:text-[#f8fafc] text-xs flex items-center gap-1.5 uppercase tracking-tighter"><i data-lucide="mic" class="w-3.5 h-3.5 text-pink"></i> Speaking</label>
                <span id="val_spoken" class="text-xs font-black text-pink bg-pink/10 px-1.5 rounded-lg border border-pink/20">0</span>
              </div>
              <input id="s_spoken" type="range" min="0" max="100" value="0" oninput="document.getElementById('val_spoken').textContent = this.value" class="kk-slider accent-pink" />
            </div>
            <div class="space-y-2">
              <div class="flex items-center justify-between">
                <label class="fredoka font-semibold text-[#1e293b] dark:text-[#f8fafc] text-xs flex items-center gap-1.5 uppercase tracking-tighter"><i data-lucide="calendar-check" class="w-3.5 h-3.5 text-orange"></i> Attendance</label>
                <span id="val_attendance" class="text-xs font-black text-orange bg-orange/10 px-1.5 rounded-lg border border-orange/20">0</span>
              </div>
              <input id="s_attendance" type="range" min="0" max="100" value="0" oninput="document.getElementById('val_attendance').textContent = this.value" class="kk-slider accent-orange" />
            </div>
          </div>
        </div>

        <!-- Section 2: Social & Emotional -->
        <div>
          <p class="fredoka font-bold text-xs text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-1.5">
            <i data-lucide="users" style="width:13px;height:13px;stroke-width:2.5"></i> Social & Emotional
          </p>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-8 gap-y-4">
            <div class="space-y-2">
              <div class="flex items-center justify-between">
                <label class="fredoka font-semibold text-[#1e293b] dark:text-[#f8fafc] text-xs flex items-center gap-1.5 uppercase tracking-tighter"><i data-lucide="users" class="w-3.5 h-3.5 text-orange"></i> Social Skills</label>
                <span id="val_social" class="text-xs font-black text-orange bg-orange/10 px-1.5 rounded-lg border border-orange/20">0</span>
              </div>
              <input id="s_social" type="range" min="0" max="100" value="0" oninput="document.getElementById('val_social').textContent = this.value" class="kk-slider accent-orange" />
            </div>
            <div class="space-y-2">
              <div class="flex items-center justify-between">
                <label class="fredoka font-semibold text-[#1e293b] dark:text-[#f8fafc] text-xs flex items-center gap-1.5 uppercase tracking-tighter"><i data-lucide="shield-check" class="w-3.5 h-3.5 text-green"></i> Confidence</label>
                <span id="val_confidence" class="text-xs font-black text-green bg-green/10 px-1.5 rounded-lg border border-green/20">0</span>
              </div>
              <input id="s_confidence" type="range" min="0" max="100" value="0" oninput="document.getElementById('val_confidence').textContent = this.value" class="kk-slider accent-green" />
            </div>
          </div>
        </div>

        <!-- Section 3: Academic Progress -->
        <div>
          <p class="fredoka font-bold text-xs text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-1.5">
            <i data-lucide="book-open" style="width:13px;height:13px;stroke-width:2.5"></i> Academic Progress
          </p>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-8 gap-y-4">
            <div class="space-y-2">
              <div class="flex items-center justify-between">
                <label class="fredoka font-semibold text-[#1e293b] dark:text-[#f8fafc] text-xs flex items-center gap-1.5 uppercase tracking-tighter"><i data-lucide="trending-up" class="w-3.5 h-3.5 text-green"></i> Progress</label>
                <span id="val_progress" class="text-xs font-black text-green bg-green/10 px-1.5 rounded-lg border border-green/20">0</span>
              </div>
              <input id="s_progress" type="range" min="0" max="100" value="0" oninput="document.getElementById('val_progress').textContent = this.value" class="kk-slider accent-green" />
            </div>
            <div class="space-y-2">
              <div class="flex items-center justify-between">
                <label class="fredoka font-semibold text-[#1e293b] dark:text-[#f8fafc] text-xs flex items-center gap-1.5 uppercase tracking-tighter"><i data-lucide="spell-check" class="w-3.5 h-3.5 text-pink"></i> Grammar</label>
                <span id="val_grammar" class="text-xs font-black text-pink bg-pink/10 px-1.5 rounded-lg border border-pink/20">0</span>
              </div>
              <input id="s_grammar" type="range" min="0" max="100" value="0" oninput="document.getElementById('val_grammar').textContent = this.value" class="kk-slider accent-pink" />
            </div>
            <div class="space-y-2">
              <div class="flex items-center justify-between">
                <label class="fredoka font-semibold text-[#1e293b] dark:text-[#f8fafc] text-xs flex items-center gap-1.5 uppercase tracking-tighter"><i data-lucide="book-open" class="w-3.5 h-3.5 text-blue"></i> Reading</label>
                <span id="val_reading" class="text-xs font-black text-blue bg-blue/10 px-1.5 rounded-lg border border-blue/20">0</span>
              </div>
              <input id="s_reading" type="range" min="0" max="10" value="0" oninput="document.getElementById('val_reading').textContent = this.value" class="kk-slider accent-blue" />
            </div>
            <div class="space-y-2">
              <div class="flex items-center justify-between">
                <label class="fredoka font-semibold text-[#1e293b] dark:text-[#f8fafc] text-xs flex items-center gap-1.5 uppercase tracking-tighter"><i data-lucide="a-large-small" class="w-3.5 h-3.5 text-orange"></i> Vocabulary</label>
                <span id="val_vocabulary" class="text-xs font-black text-orange bg-orange/10 px-1.5 rounded-lg border border-orange/20">0</span>
              </div>
              <input id="s_vocabulary" type="range" min="0" max="10" value="0" oninput="document.getElementById('val_vocabulary').textContent = this.value" class="kk-slider accent-orange" />
            </div>
            <div class="space-y-2">
              <div class="flex items-center justify-between">
                <label class="fredoka font-semibold text-[#1e293b] dark:text-[#f8fafc] text-xs flex items-center gap-1.5 uppercase tracking-tighter"><i data-lucide="pen-line" class="w-3.5 h-3.5 text-green"></i> Writing</label>
                <span id="val_writing" class="text-xs font-black text-green bg-green/10 px-1.5 rounded-lg border border-green/20">0</span>
              </div>
              <input id="s_writing" type="range" min="0" max="10" value="0" oninput="document.getElementById('val_writing').textContent = this.value" class="kk-slider accent-green" />
            </div>
            <div class="space-y-2">
              <div class="flex items-center justify-between">
                <label class="fredoka font-semibold text-[#1e293b] dark:text-[#f8fafc] text-xs flex items-center gap-1.5 uppercase tracking-tighter"><i data-lucide="notebook-pen" class="w-3.5 h-3.5 text-pink"></i> Homework</label>
                <span id="val_homework" class="text-xs font-black text-pink bg-pink/10 px-1.5 rounded-lg border border-pink/20">0</span>
              </div>
              <input id="s_homework" type="range" min="0" max="10" value="0" oninput="document.getElementById('val_homework').textContent = this.value" class="kk-slider accent-pink" />
            </div>
            <div class="col-span-1 sm:col-span-2 space-y-2 bg-[#2979FF]/5 p-3 rounded-2xl border-2 border-[#1e293b]/10">
              <div class="flex items-center justify-between">
                <label class="fredoka font-semibold text-[#1e293b] dark:text-[#f8fafc] text-xs flex items-center gap-1.5 uppercase tracking-tighter"><i data-lucide="alert-triangle" class="w-3.5 h-3.5 text-blue"></i> Accuracy (Errors)</label>
                <span id="val_errors" class="text-xs font-black text-blue bg-blue/10 px-1.5 rounded-lg border border-blue/20">0</span>
              </div>
              <input id="s_errors" type="range" min="0" max="10" value="0" oninput="document.getElementById('val_errors').textContent = this.value" class="kk-slider accent-blue" />
            </div>
          </div>
        </div>
      </div>

      <div id="errorBox" class="hidden mt-3 bg-red-100 border-2 border-red-500 rounded-xl p-3 text-red-700 font-semibold text-sm"></div>

      <!-- Buttons -->
      <div class="flex gap-3 mt-5">
        <button id="generateBtn" onclick="saveAndGenerate()"
          class="btn flex-1 bg-[#FF6B95] border-4 border-[#1e293b] rounded-xl py-3 fredoka text-white text-xl font-bold hard flex items-center justify-center gap-2">
          <i data-lucide="sparkles" style="width:20px;height:20px;stroke-width:2.5"></i>
          Save & Generate
        </button>
        <button onclick="deleteCurrentStudent()"
          class="btn bg-slate-200 dark:bg-slate-700 border-4 border-[#1e293b] rounded-xl px-4 py-3 fredoka font-bold text-[#1e293b] dark:text-[#f8fafc] hard">
          <i data-lucide="trash-2" style="width:20px;height:20px;stroke-width:2.5"></i>
        </button>
      </div>
    </section>

    <!-- Output -->
    <section id="outputSection" class="hidden space-y-4">
      <h2 class="fredoka text-2xl font-bold text-[#1e293b] dark:text-[#f8fafc] flex items-center gap-2">
        <i data-lucide="star" style="width:24px;height:24px;stroke-width:2.5;color:#FF8C42"></i>
        <span id="outputName">Comments</span>
      </h2>
      <div id="commentCards" class="space-y-3"></div>
      <button onclick="copyAll()"
        class="btn w-full bg-[#00E676] border-4 border-[#1e293b] rounded-xl py-3 fredoka text-[#1e293b] text-lg font-bold hard flex items-center justify-center gap-2">
        <i data-lucide="copy" style="width:20px;height:20px;stroke-width:2.5"></i>
        Copy Full Comment
      </button>
    </section>

  </div>

  <!-- Add Student Modal -->
  <div id="modal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden px-4">
    <div class="bg-white dark:bg-slate-800 border-4 border-[#1e293b] rounded-2xl p-6 w-full max-w-sm hard">
      <h3 class="fredoka text-xl font-bold text-[#1e293b] dark:text-[#f8fafc] mb-3">New Student</h3>
      <input id="modalName" type="text" placeholder="Student name…"
        class="w-full border-4 border-[#1e293b] rounded-xl px-4 py-2 fredoka text-lg font-bold bg-[#f8fafc] dark:bg-slate-700 dark:text-[#f8fafc] focus:outline-none mb-4"
        onkeydown="if(event.key==='Enter') confirmAddStudent()" />
      <div class="flex gap-2">
        <button onclick="confirmAddStudent()"
          class="btn flex-1 bg-[#2979FF] border-4 border-[#1e293b] rounded-xl py-2 fredoka font-bold text-white hard-sm">Add</button>
        <button onclick="closeModal()"
          class="btn flex-1 bg-slate-200 dark:bg-slate-600 border-4 border-[#1e293b] rounded-xl py-2 fredoka font-bold text-[#1e293b] dark:text-[#f8fafc] hard-sm">Cancel</button>
      </div>
    </div>
  </div>

<script>
  lucide.createIcons();

  // ── Auth Guard (Pro Only) ──────────────────────────────────────────────────
  (async () => {
    if (typeof requirePro === 'function') await requirePro();
  })();

  // ── Dark Mode ─────────────────────────────────────────────────────────────
  const darkToggle = document.getElementById('darkToggle');
  if (localStorage.getItem('e1_dark') === '1') {
    document.documentElement.classList.add('dark');
    document.getElementById('darkIcon').setAttribute('data-lucide', 'sun');
    lucide.createIcons();
  }
  darkToggle.addEventListener('click', () => {
    document.documentElement.classList.toggle('dark');
    const isDark = document.documentElement.classList.contains('dark');
    document.getElementById('darkIcon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
    lucide.createIcons();
    localStorage.setItem('e1_dark', isDark ? '1' : '0');
  });

  // ── State Management ────────────────────────────────────────────────────────
  let state = {
    classes: [
      { id: 'default', name: 'Class 1', students: [] }
    ],
    activeClassId: 'default',
    currentStudentId: null
  };

  // Migration from old flat students
  const oldStudents = JSON.parse(localStorage.getItem('e1_students'));
  if (oldStudents && Array.isArray(oldStudents)) {
    state.classes[0].students = oldStudents;
    localStorage.removeItem('e1_students');
    saveLocal();
  }

  async function save() {
    saveLocal();
    if (typeof saveProgress === 'function' && !isSandbox()) {
      try {
        await saveProgress('pu-helper', state);
      } catch (e) {
        console.warn('Cloud save failed', e);
      }
    }
  }

  function saveLocal() {
    localStorage.setItem('pu_helper_v2', JSON.stringify(state));
  }

  function loadLocal() {
    const saved = localStorage.getItem('pu_helper_v2');
    if (saved) state = JSON.parse(saved);
  }

  async function syncWithCloud() {
    if (typeof loadProgress === 'function' && !isSandbox()) {
      try {
        const cloudState = await loadProgress('pu-helper');
        if (cloudState) {
          state = cloudState;
          saveLocal();
        }
      } catch (e) {
        console.warn('Cloud load failed', e);
      }
    }
  }

  function getActiveClass() {
    return state.classes.find(c => c.id === state.activeClassId) || state.classes[0];
  }

  function getStudent(id) {
    const cls = getActiveClass();
    return cls.students.find(s => s.id === id) || null;
  }

  // ── Class Management ───────────────────────────────────────────────────────
  function switchClass(id) {
    state.activeClassId = id;
    state.currentStudentId = null;
    save();
    renderClassSelector();
    renderRoster();
    clearForm();
    document.getElementById('outputSection').classList.add('hidden');
  }

  async function addNewClass() {
    const name = await quickPrompt('Enter new class name:');
    if (!name) return;
    const newCls = { id: Date.now().toString(), name, students: [] };
    state.classes.push(newCls);
    switchClass(newCls.id);
  }

  async function deleteCurrentClass() {
    if (state.classes.length <= 1) {
      await showAlertModal('You must have at least one class.', {
        title: 'Cannot Delete',
        icon: 'alert-circle',
        iconColor: 'orange'
      });
      return;
    }
    const cls = getActiveClass();
    const confirmed = await showConfirmModal(`Delete class "${cls.name}" and all its students?`, {
      title: 'Delete Class?',
      confirmText: 'Delete',
      cancelText: 'Keep',
      icon: 'trash-2',
      iconColor: 'red'
    });
    if (!confirmed) return;
    state.classes = state.classes.filter(c => c.id !== state.activeClassId);
    state.activeClassId = state.classes[0].id;
    switchClass(state.activeClassId);
  }

  function renderClassSelector() {
    const sel = document.getElementById('classSelector');
    sel.innerHTML = '';
    state.classes.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.name;
      opt.selected = c.id === state.activeClassId;
      sel.appendChild(opt);
    });
  }

  function exportClassToJSON() {
    const cls = getActiveClass();
    const dataStr = JSON.stringify(cls, null, 2);
    const blob = new Blob([dataStr], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `KlassKit_PU_${cls.name.replace(/\s+/g, '_')}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Class exported!');
  }

  function triggerImport() {
    document.getElementById('importFile').click();
  }

  function importClassFromJSON(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (data.name && Array.isArray(data.students)) {
          data.id = Date.now().toString(); // New ID to avoid collision
          state.classes.push(data);
          switchClass(data.id);
          showToast('Class imported!');
        } else {
          throw new Error('Invalid format');
        }
      } catch (err) {
        await showAlertModal('Error importing file. Please ensure it is a valid PU Helper class export.', {
          title: 'Import Error',
          icon: 'file-x',
          iconColor: 'red'
        });
      }
      event.target.value = '';
    };
    reader.readAsText(file);
  }

  // ── Roster ─────────────────────────────────────────────────────────────────
  function renderRoster() {
    const list  = document.getElementById('rosterList');
    const search = document.getElementById('rosterSearch').value.toLowerCase();
    const activeCls = getActiveClass();
    
    const filteredStudents = activeCls.students.filter(s => s.name.toLowerCase().includes(search));
    
    document.getElementById('rosterCount').textContent = activeCls.students.length;
    list.innerHTML = '';

    if (activeCls.students.length === 0) {
      list.innerHTML = '<p class="text-slate-400 font-semibold text-sm italic">No students in this class. Click "Add Student" to begin.</p>';
      return;
    }

    if (filteredStudents.length === 0 && search) {
      list.innerHTML = '<p class="text-slate-400 font-semibold text-sm italic">No students matching search.</p>';
      return;
    }

    filteredStudents.forEach(s => {
      const done = s.scores && Object.values(s.scores).every(v => v !== '' && v !== undefined);
      const isActive = s.id === currentId;
      const pill = document.createElement('button');
      pill.className = 'student-pill border-2 border-[#1e293b] rounded-xl px-3 py-1.5 fredoka font-bold text-sm hard-sm flex items-center gap-1';
      pill.style.background = isActive ? '#2979FF' : (document.documentElement.classList.contains('dark') ? '#334155' : '#f8fafc');
      pill.style.color = isActive ? '#fff' : (document.documentElement.classList.contains('dark') ? '#f8fafc' : '#1e293b');
      pill.innerHTML = `${done ? '<span style="color:#00E676">✓</span>' : ''} ${s.name}`;
      pill.onclick = () => loadStudent(s.id);
      list.appendChild(pill);
    });
  }

  let currentPronoun = 'they';

  function setPronoun(p) {
    currentPronoun = p;
    renderPronounButtons();
    // Persist to current student
    if (currentId) {
      const s = getStudent(currentId);
      if (s) { s.pronoun = p; save(); }
    }
  }

  function renderPronounButtons() {
    document.querySelectorAll('.pronoun-btn').forEach(btn => {
      const p = btn.getAttribute('data-pronoun');
      const active = p === currentPronoun;
      btn.style.background = active ? '#2979FF' : (document.documentElement.classList.contains('dark') ? '#334155' : '#f8fafc');
      btn.style.color = active ? '#fff' : (document.documentElement.classList.contains('dark') ? '#f8fafc' : '#1e293b');
    });
  }

  function loadStudent(id) {
    state.currentStudentId = id;
    saveLocal(); // Quick save current student selection
    const s = getStudent(id);
    if (!s) return;

    document.getElementById('studentName').value = s.name;
    document.getElementById('formTitle').textContent = `Scores for ${s.name}`;

    const sc = s.scores || {};
    const fieldIds = ['participation','social','listening','confidence','spoken','attendance','errors','progress','grammar','reading','vocabulary','writing','homework'];
    fieldIds.forEach(id => {
      const val = sc[id] ?? 0;
      const el = document.getElementById(`s_${id}`);
      if (el) {
        el.value = val;
        const valLabel = document.getElementById(`val_${id}`);
        if (valLabel) valLabel.textContent = val;
      }
    });

    currentPronoun = s.pronoun || 'they';
    renderPronounButtons();

    renderRoster();
    hideError();

    if (s.comments) {
      renderComments(s.name, s.comments);
    } else {
      document.getElementById('outputSection').classList.add('hidden');
    }
  }

  // ── Modal ──────────────────────────────────────────────────────────────────
  function addNewStudent() {
    document.getElementById('modalName').value = '';
    document.getElementById('modal').classList.remove('hidden');
    setTimeout(() => document.getElementById('modalName').focus(), 60);
  }
  function closeModal() {
    document.getElementById('modal').classList.add('hidden');
  }
  function confirmAddStudent() {
    const name = document.getElementById('modalName').value.trim();
    if (!name) return;
    const s = { id: Date.now().toString(), name, scores: {}, comments: null, pronoun: 'they' };
    const cls = getActiveClass();
    cls.students.push(s);
    save();
    closeModal();
    renderRoster();
    loadStudent(s.id);
  }
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
  });

  // ── Save & Generate ────────────────────────────────────────────────────────
  function saveAndGenerate() {
    if (!state.currentStudentId) { showError('Please select or add a student first.'); return; }
    const name = document.getElementById('studentName').value.trim();

    const fields = {
      participation: document.getElementById('s_participation').value,
      social:        document.getElementById('s_social').value,
      listening:     document.getElementById('s_listening').value,
      confidence:    document.getElementById('s_confidence').value,
      spoken:        document.getElementById('s_spoken').value,
      attendance:    document.getElementById('s_attendance').value,
      errors:        document.getElementById('s_errors').value,
      progress:      document.getElementById('s_progress').value,
      grammar:       document.getElementById('s_grammar').value,
      reading:       document.getElementById('s_reading').value,
      vocabulary:    document.getElementById('s_vocabulary').value,
      writing:       document.getElementById('s_writing').value,
      homework:      document.getElementById('s_homework').value,
    };

    const labels = { participation:'Participation', social:'Social', listening:'Listening',
                     confidence:'Confidence', spoken:'Speaking', attendance:'Attendance', errors:'Accuracy (Errors)',
                     progress:'Progress', grammar:'Grammar', reading:'Reading', vocabulary:'Vocabulary', writing:'Writing', homework:'Homework' };

    for (const [k, v] of Object.entries(fields)) {
      if (v === '' || isNaN(+v)) { showError(`Please enter a score for "${labels[k]}".`); return; }
      if (+v < 0 || +v > 100)    { showError(`"${labels[k]}" must be between 0 and 100.`);  return; }
    }
    hideError();

    const s = getStudent(state.currentStudentId);
    s.name   = name;
    s.scores = fields;
    s.pronoun = currentPronoun;
    s.comments = buildComments(name, fields, currentPronoun);
    save();
    renderRoster();
    renderComments(name, s.comments);
  }

  async function deleteCurrentStudent() {
    if (!state.currentStudentId) return;
    const confirmed = await showConfirmModal('Delete this student and their scores?', {
      title: 'Delete Student?',
      confirmText: 'Delete',
      cancelText: 'Keep',
      icon: 'trash-2',
      iconColor: 'red'
    });
    if (!confirmed) return;
    const cls = getActiveClass();
    cls.students = cls.students.filter(s => s.id !== state.currentStudentId);
    state.currentStudentId = null;
    save();
    renderRoster();
    clearForm();
    document.getElementById('outputSection').classList.add('hidden');
  }

  function clearForm() {
    document.getElementById('studentName').value = '';
    document.getElementById('formTitle').textContent = 'Select or Add a Student';
    const ids = ['participation','social','listening','confidence','spoken','attendance','errors','progress','grammar','reading','vocabulary','writing','homework'];
    ids.forEach(id => {
      const el = document.getElementById(`s_${id}`);
      if (el) {
        el.value = 0;
        const valLabel = document.getElementById(`val_${id}`);
        if (valLabel) valLabel.textContent = 0;
      }
    });
    currentPronoun = 'they';
    renderPronounButtons();
  }

  // ── Comment Engine ─────────────────────────────────────────────────────────
  let hopefulPhrases = {};

  async function loadComments() {
    try {
      const resp = await fetch('comments.json');
      if (!resp.ok) throw new Error('Network response was not ok');
      hopefulPhrases = await resp.json();
    } catch (e) {
      console.error('Failed to load comments:', e);
      showError('Failed to load comment phrases. Please refresh.');
    }
  }

  function level(v) {
    v = +v;
    if (v >= 90) return 'excellent';
    if (v >= 70) return 'good';
    if (v >= 50) return 'developing';
    return 'needs_work';
  }

  function pick(arr) { 
    if (!arr || arr.length === 0) return '...';
    return arr[Math.floor(Math.random() * arr.length)]; 
  }

  // ── Pronoun Replacement Engine ──────────────────────────────────────────
  const PRONOUN_MAP = {
    he:  { subject: 'He',  object: 'him', poss: 'his',  refl: 'himself',  are: 'is',  were: 'was', have: 'have' },
    she: { subject: 'She', object: 'her', poss: 'her',  refl: 'herself',  are: 'is',  were: 'was', have: 'have' },
    they:{ subject: 'They',object: 'them',poss: 'their', refl: 'themselves',are: 'are', were: 'were', have: 'have' },
  };

  /** Add third-person singular -s/-es/-ies to a base verb */
  function conjugate3rd(verb) {
    const low = verb.toLowerCase();
    if (['can','will','would','could','should','may','might','must','shall'].includes(low)) return verb;
    if (low === 'are') return 'is';
    if (low === 'have') return 'has';
    if (low === 'do') return 'does';
    if (low === 'go') return 'goes';
    if (/(?:s|sh|ch|x|z)$/.test(low)) return verb + 'es';
    if (/[^aeiou]y$/.test(low)) return verb.slice(0, -1) + 'ies';
    return verb + 's';
  }

  function applyPronoun(text, pronoun) {
    if (pronoun === 'they') return text;            // JSON already uses they
    const m = PRONOUN_MAP[pronoun];

    // Order matters: longest / most specific first
    // 1. Reflexive
    text = text.replace(/\bthemselves\b/g, m.refl);
    text = text.replace(/\bThemselves\b/g, m.refl.charAt(0).toUpperCase() + m.refl.slice(1));

    // 2. Possessive  (before object, since "their" contains "the")
    text = text.replace(/\bTheir\b/g, m.poss.charAt(0).toUpperCase() + m.poss.slice(1));
    text = text.replace(/\btheir\b/g, m.poss);

    // 3. Object  (use word boundary to avoid partial matches)
    text = text.replace(/\bthem\b/g, m.object);
    text = text.replace(/\bThem\b/g, m.object.charAt(0).toUpperCase() + m.object.slice(1));

    // 4. "They are" / "they are"  →  "He is" / "he is"
    text = text.replace(/\bThey are\b/g, m.subject + ' ' + m.are);
    text = text.replace(/\bthey are\b/g, m.subject.toLowerCase() + ' ' + m.are);

    // 5. "They were" / "they were"
    text = text.replace(/\bThey were\b/g, m.subject + ' ' + m.were);
    text = text.replace(/\bthey were\b/g, m.subject.toLowerCase() + ' ' + m.were);

    // 6. "They have" / "they have"
    text = text.replace(/\bThey have\b/g, m.subject + ' has');
    text = text.replace(/\bthey have\b/g, m.subject.toLowerCase() + ' has');

    // 7. "They + verb" → "He/She + verb+s" for remaining verbs
    text = text.replace(/\bThey (\w+)/g, (_, verb) => m.subject + ' ' + conjugate3rd(verb));
    text = text.replace(/\bthey (\w+)/g, (_, verb) => m.subject.toLowerCase() + ' ' + conjugate3rd(verb));

    return text;
  }

  function personalise(text, name, pronoun) {
    // Randomly decide whether to use the name or keep the pronoun (approx 50/50)
    if (Math.random() > 0.5) return text;

    // Replace the first subject pronoun with the student's name
    if (pronoun === 'he') return text.replace(/\bHe\b/, name).replace(/\bhe\b/, name);
    if (pronoun === 'she') return text.replace(/\bShe\b/, name).replace(/\bshe\b/, name);
    // For 'they' pronoun: need to conjugate the verb that follows
    return text.replace(/\bThey (\w+)/, (_, verb) => name + ' ' + conjugate3rd(verb))
               .replace(/\bthey (\w+)/, (_, verb) => name.toLowerCase() + ' ' + conjugate3rd(verb));
  }

  function buildComments(name, sc, pronoun) {
    pronoun = pronoun || 'they';
    const labels = { participation:'Participation', social:'Social', listening:'Listening', confidence:'Confidence', spoken:'Speaking', attendance:'Attendance', errors:'Accuracy',
                     progress:'Progress', grammar:'Grammar', reading:'Reading', vocabulary:'Vocabulary', writing:'Writing', homework:'Homework' };
    let skillBreakdown = `Here is ${name}'s progress across all skills:\n\n`;
    for (const [k, v] of Object.entries(sc)) {
      const raw = pick(hopefulPhrases[k][level(v)]);
      const withPronoun = applyPronoun(raw, pronoun);
      const personal = personalise(withPronoun, name, pronoun);
      skillBreakdown += `• ${labels[k]}:\n  ${personal}\n\n`;
    }
    skillBreakdown += `Keep up the great work, ${name}!`;

    return [skillBreakdown.trim()];
  }

  // ── Render Comments ────────────────────────────────────────────────────────
  let lastComments = [];

  const styleConfig = [
    { label:'Skill Breakdown (Hopeful)', icon:'list-checks', color:'#00E676' }
  ];

  function renderComments(name, comments) {
    lastComments = comments;
    document.getElementById('outputName').textContent = `Comments for ${name}`;
    const container = document.getElementById('commentCards');
    container.innerHTML = '';

    comments.forEach((text, i) => {
      const cfg = styleConfig[i];
      const card = document.createElement('div');
      card.className = 'comment-card border-4 border-[#1e293b] rounded-2xl p-4 hard';
      card.style.background = cfg.color + '18';
      // Added whitespace-pre-wrap to the paragraph so \n line breaks render properly
      card.innerHTML = `
        <div class="flex items-center justify-between mb-2">
          <span class="fredoka font-bold text-sm px-3 py-1 rounded-lg border-2 border-[#1e293b] text-white flex items-center gap-1 hard-sm"
                style="background:${cfg.color}">
            <i data-lucide="${cfg.icon}" style="width:13px;height:13px;stroke-width:2.5"></i>
            ${cfg.label}
          </span>
          <button onclick="copyOne(${i})" title="Copy this comment"
            class="btn bg-white dark:bg-slate-700 border-2 border-[#1e293b] rounded-lg p-1.5 hard-sm">
            <i data-lucide="copy" style="width:16px;height:16px;stroke-width:2.5"></i>
          </button>
        </div>
        <p class="text-[#1e293b] dark:text-[#f8fafc] font-semibold leading-relaxed whitespace-pre-wrap">${text}</p>
      `;
      container.appendChild(card);
    });

    lucide.createIcons();
    document.getElementById('outputSection').classList.remove('hidden');
    document.getElementById('outputSection').scrollIntoView({ behavior:'smooth', block:'start' });
  }

  function copyOne(i) {
    navigator.clipboard.writeText(lastComments[i]).then(() => showToast('Copied!'));
  }
  function copyAll() {
    navigator.clipboard.writeText(lastComments[0]).then(() => showToast('Comment copied!'));
  }

  function showToast(msg) {
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#00E676;border:4px solid #1e293b;border-radius:12px;padding:10px 24px;font-family:Fredoka,sans-serif;font-weight:700;font-size:18px;color:#1e293b;box-shadow:4px 4px 0px 0px rgba(30,41,59,1);z-index:9999';
    t.textContent = '✓ ' + msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2000);
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = '⚠ ' + msg;
    box.classList.remove('hidden');
  }
  function hideError() {
    document.getElementById('errorBox').classList.add('hidden');
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  (async () => {
    loadLocal();
    await syncWithCloud();
    await loadComments();
    renderClassSelector();
    renderPronounButtons();
    renderRoster();
    
    if (state.currentStudentId && getStudent(state.currentStudentId)) {
      loadStudent(state.currentStudentId);
    } else {
      const cls = getActiveClass();
      if (cls.students.length > 0) {
        loadStudent(cls.students[0].id);
      }
    }
  })();
</script>
</body>
</html>
