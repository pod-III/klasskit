<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic List - KlassKit</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4"></script>
    <script src="/supabase.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@1.16.0"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'pink': '#ff4785',
                        'orange': '#ff7e33',
                        'green': '#00d063',
                        'blue': '#1ea7fd',
                        'dark': '#0f172a',
                        'chalk': '#f8fafc',
                    },
                    fontFamily: {
                        heading: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px 0px #0f172a',
                        'hard-hover': '8px 8px 0px 0px #0f172a',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8fafc;
            background-image: 
                linear-gradient(#cbd5e1 1px, transparent 1px),
                linear-gradient(90deg, #cbd5e1 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .dark body {
            background-color: #020617;
            background-image: 
                linear-gradient(#0f172a 1px, transparent 1px),
                linear-gradient(90deg, #0f172a 1px, transparent 1px);
        }

        .btn-chunky {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-chunky:hover:not(:disabled) {
            transform: translateY(-4px);
            box-shadow: 8px 8px 0px 0px #0f172a;
        }
        .btn-chunky:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0px 0px 0px 0px #0f172a;
        }

        /* Hide scrollbar for cleaner look */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

<body class="font-body text-dark dark:text-chalk min-h-screen p-4 md:p-8">

    <main class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex items-center gap-4">
                <a href="../index.html" class="bg-white dark:bg-slate-800 border-4 border-dark dark:border-slate-500 p-3 rounded-2xl shadow-hard btn-chunky">
                    <i data-lucide="arrow-left" class="w-6 h-6"></i>
                </a>
                <div>
                    <h1 class="font-heading font-bold text-3xl md:text-4xl">MAGIC <span class="text-green underline decoration-4 underline-offset-4">LIST</span></h1>
                    <p class="text-slate-500 dark:text-slate-400 font-bold text-sm">Transform messy text into clean data</p>
                </div>
            </div>
            
            <button id="themeToggle" class="bg-white dark:bg-slate-800 border-4 border-dark dark:border-slate-500 p-3 rounded-2xl shadow-hard btn-chunky">
                <i data-lucide="sun" class="w-6 h-6 hidden dark:block"></i>
                <i data-lucide="moon" class="w-6 h-6 block dark:hidden"></i>
            </button>
        </header>

        <!-- Main Workspace -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Input Section -->
            <div class="lg:col-span-4 flex flex-col gap-4">
                <div class="flex justify-between items-end px-2">
                    <label class="font-heading font-bold text-xl flex items-center gap-2">
                        <i data-lucide="keyboard" class="text-blue"></i> INPUT
                    </label>
                    <button onclick="clearAll()" class="text-xs font-black uppercase text-slate-400 hover:text-pink transition-colors">Clear All</button>
                </div>
                <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-[2rem] shadow-hard flex flex-col overflow-hidden h-[500px]">
                    <textarea id="inputText" 
                        class="w-full flex-grow p-6 font-body text-lg outline-none resize-none bg-transparent placeholder-slate-400"
                        placeholder="Paste paragraph, list, or notes..."></textarea>
                    
                    <div class="bg-slate-50 dark:bg-slate-800 border-t-4 border-dark dark:border-slate-700 px-4 py-3 flex justify-between items-center text-[10px] font-black uppercase tracking-widest text-slate-400">
                        <span id="inputLines">0 Lines</span>
                        <span id="inputWords">0 Words</span>
                    </div>
                </div>
            </div>

            <!-- Actions Section -->
            <div class="lg:col-span-4 flex flex-col gap-6">
                <!-- Data Parsing Card -->
                <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-[2rem] p-6 shadow-hard">
                    <h3 class="font-heading font-bold text-lg mb-4 flex items-center gap-2">
                        <i data-lucide="braces" class="text-orange"></i> DATA PARSING
                    </h3>
                    <div class="grid grid-cols-1 gap-3">
                        <button onclick="process('paragraphToCsv')" class="btn-chunky w-full bg-slate-50 dark:bg-slate-800 border-4 border-dark dark:border-slate-500 rounded-2xl p-4 flex items-center gap-4 group">
                            <div class="bg-orange text-white p-2 rounded-xl border-2 border-dark group-hover:scale-110 transition-transform">
                                <i data-lucide="text" class="w-5 h-5"></i>
                            </div>
                            <div class="text-left">
                                <span class="block font-heading font-bold text-lg leading-none">Paragraph &rarr; Commas</span>
                                <span class="block text-[10px] font-bold text-slate-400 uppercase mt-1">Split sentences into data</span>
                            </div>
                        </button>

                        <button onclick="process('linesToComma')" class="btn-chunky w-full bg-slate-50 dark:bg-slate-800 border-4 border-dark dark:border-slate-500 rounded-2xl p-4 flex items-center gap-4 group">
                            <div class="bg-blue text-white p-2 rounded-xl border-2 border-dark group-hover:scale-110 transition-transform">
                                <i data-lucide="arrow-down-to-line" class="w-5 h-5"></i>
                            </div>
                            <div class="text-left">
                                <span class="block font-heading font-bold text-lg leading-none">Lines &rarr; Commas</span>
                                <span class="block text-[10px] font-bold text-slate-400 uppercase mt-1">Merge list into one line</span>
                            </div>
                        </button>

                        <button onclick="process('commaToLines')" class="btn-chunky w-full bg-slate-50 dark:bg-slate-800 border-4 border-dark dark:border-slate-500 rounded-2xl p-4 flex items-center gap-4 group">
                            <div class="bg-pink text-white p-2 rounded-xl border-2 border-dark group-hover:scale-110 transition-transform">
                                <i data-lucide="wrap-text" class="w-5 h-5"></i>
                            </div>
                            <div class="text-left">
                                <span class="block font-heading font-bold text-lg leading-none">Comma &rarr; Lines</span>
                                <span class="block text-[10px] font-bold text-slate-400 uppercase mt-1">Breaks CSV into vertical data</span>
                            </div>
                        </button>
                    </div>
                </div>

                <!-- List Gen Card -->
                <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-[2rem] p-6 shadow-hard">
                    <h3 class="font-heading font-bold text-lg mb-4 flex items-center gap-2">
                        <i data-lucide="list-checks" class="text-green"></i> LIST GENERATION
                    </h3>
                    <div class="grid grid-cols-1 gap-3">
                        <button onclick="process('commaToList')" class="btn-chunky w-full bg-slate-50 dark:bg-slate-800 border-4 border-dark dark:border-slate-500 rounded-2xl p-4 flex items-center gap-4 group">
                            <div class="bg-dark text-white p-2 rounded-xl border-2 border-transparent group-hover:scale-110 transition-transform">
                                <i data-lucide="list" class="w-5 h-5"></i>
                            </div>
                            <div class="text-left">
                                <span class="block font-heading font-bold text-lg leading-none">Bullet List</span>
                                <span class="block text-[10px] font-bold text-slate-400 uppercase mt-1">Clean dot-points</span>
                            </div>
                        </button>

                        <div class="flex bg-slate-50 dark:bg-slate-800 border-4 border-dark dark:border-slate-500 rounded-2xl overflow-hidden shadow-hard hover:translate-y-[-2px] transition-transform">
                            <button onclick="process('commaToOrdered')" class="flex-grow p-4 flex items-center gap-4 text-left border-r-4 border-dark dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700">
                                <div class="bg-dark text-white p-2 rounded-xl">
                                    <i data-lucide="list-ordered" class="w-5 h-5"></i>
                                </div>
                                <span class="font-heading font-bold text-lg leading-none">Numbered</span>
                            </button>
                            <select id="numOpt" class="bg-white dark:bg-slate-800 p-4 font-heading font-bold text-lg outline-none cursor-pointer w-24 text-center">
                                <option value="dot">1.</option>
                                <option value="paren">1)</option>
                                <option value="alpha">a.</option>
                                <option value="roman">I.</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Result Section -->
            <div class="lg:col-span-4 flex flex-col gap-4">
                <div class="flex justify-between items-end px-2">
                    <label class="font-heading font-bold text-xl flex items-center gap-2">
                        <i data-lucide="sparkles" class="text-green"></i> RESULT
                    </label>
                    <span id="outputState" class="text-[10px] font-black uppercase text-slate-400 italic">Ready</span>
                </div>
                <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-[2rem] shadow-hard flex flex-col overflow-hidden h-[500px]">
                    <textarea id="outputText" readonly
                        class="w-full flex-grow p-6 font-body text-lg outline-none resize-none bg-slate-50/50 dark:bg-slate-800/20 text-slate-600 dark:text-slate-300"
                        placeholder="Result will appear here..."></textarea>
                    
                    <div class="bg-white dark:bg-slate-900 border-t-4 border-dark dark:border-slate-700 p-4">
                        <button id="copyBtn" onclick="copyOutput()" disabled class="btn-chunky w-full bg-green text-dark font-heading font-bold py-4 rounded-2xl border-4 border-dark flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                            <i data-lucide="copy" class="w-5 h-5"></i> COPY TO CLIPBOARD
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // --- PERSISTENCE ---
        const TOOL_ID = 'workshop_formatter';
        let saveTimeout;

        async function initPersistence() {
            // Load Theme
            const savedTheme = localStorage.getItem('theme_workshop_formatter') || 'light';
            if (savedTheme === 'dark') document.documentElement.classList.add('dark');
            updateThemeIcon();

            // Load Progress
            const progress = await loadProgress(TOOL_ID);
            if (progress && progress.text) {
                inputEl.value = progress.text;
                inputEl.dispatchEvent(new Event('input'));
            }
        }

        function triggerSave() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                saveProgress(TOOL_ID, { text: inputEl.value });
            }, 1000);
        }

        // Theme Handling
        const themeToggle = document.getElementById('themeToggle');
        
        function updateThemeIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            themeToggle.innerHTML = isDark 
                ? '<i data-lucide="sun" class="w-6 h-6"></i>' 
                : '<i data-lucide="moon" class="w-6 h-6"></i>';
            lucide.createIcons();
        }

        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme_workshop_formatter', isDark ? 'dark' : 'light');
            updateThemeIcon();
        });

        // Initialize on load
        window.onload = async () => {
            if (typeof requireAuth === 'function') await requireAuth();
            await initPersistence();
            lucide.createIcons();
        };

        const inputEl = document.getElementById('inputText');
        const outputEl = document.getElementById('outputText');
        const copyBtn = document.getElementById('copyBtn');
        const outputState = document.getElementById('outputState');

        // Live Counters & Auto-save
        inputEl.addEventListener('input', () => {
            const text = inputEl.value;
            document.getElementById('inputWords').textContent = `${text.trim() ? text.trim().split(/\s+/).length : 0} Words`;
            document.getElementById('inputLines').textContent = `${text ? text.split(/\n/).length : 0} Lines`;
            triggerSave();
        });

        function toggleOutputState(hasContent, type) {
            if (hasContent) {
                copyBtn.disabled = false;
                outputState.textContent = type;
                outputState.classList.replace('text-slate-400', 'text-green');
            } else {
                copyBtn.disabled = true;
                outputState.textContent = 'Ready';
                outputState.classList.replace('text-green', 'text-slate-400');
            }
        }

        function process(action) {
            const rawText = inputEl.value.trim();
            if (!rawText) {
                // Subtle shake animation if empty
                inputEl.parentElement.classList.add('animate-pulse');
                setTimeout(() => inputEl.parentElement.classList.remove('animate-pulse'), 500);
                return;
            }

            let result = '';
            let formatType = '';

            // Handle Paragraph to CSV (2D split: lines and commas)
            if (action === 'paragraphToCsv') {
                // Split input by period or semicolon
                const sentences = rawText.split(/[.;]/);
                
                const csvLines = sentences.map(sentence => {
                    // Remove basic punctuation inside the sentence
                    const cleanSentence = sentence.replace(/[,/#!$%\^&\*:{}=\-_`~()\"\'\?]/g, "");
                    // Split into words, remove empty items, and join with commas
                    const words = cleanSentence.trim().split(/\s+/).filter(w => w !== '');
                    return words.join(', ');
                }).filter(line => line !== ''); // Remove empty lines generated by trailing periods
                
                result = csvLines.join('\n');
                formatType = 'CSV Lines';
                
                outputEl.value = result;
                toggleOutputState(true, formatType);
                return; // Early return since this has unique logic
            }

            // Standard Processing for other 1D list actions
            let items = [];
            if (action === 'linesToComma') {
                items = rawText.split(/\n/);
            } else {
                items = rawText.split(',');
            }

            // Clean up array
            items = items.map(item => item.trim()).filter(item => item !== '');

            if (action === 'linesToComma') {
                result = items.join(', ');
                formatType = 'CSV';
            } 
            else if (action === 'commaToLines') {
                result = items.join('\n');
                formatType = 'Lines';
            }
            else if (action === 'commaToList') {
                result = items.map(i => `• ${i}`).join('\n');
                formatType = 'Bullet List';
            } 
            else if (action === 'commaToOrdered') {
                const style = document.getElementById('numOpt').value;
                result = items.map((item, index) => {
                    let marker = '';
                    let n = index + 1;
                    if (style === 'dot') marker = `${n}.`;
                    if (style === 'paren') marker = `${n})`;
                    if (style === 'alpha') marker = `${String.fromCharCode(96 + n)}.`;
                    if (style === 'roman') marker = `${toRoman(n)}.`;
                    return `${marker} ${item}`;
                }).join('\n');
                formatType = 'Numbered List';
            }

            outputEl.value = result;
            toggleOutputState(true, formatType);
        }

        function toRoman(num) {
            const lookup = {M:1000,CM:900,D:500,CD:400,C:100,XC:90,L:50,XL:40,X:10,IX:9,V:5,IV:4,I:1};
            let roman = '';
            for (let i in lookup) { while (num >= lookup[i]) { roman += i; num -= lookup[i]; } }
            return roman;
        }

        function clearAll() {
            inputEl.value = ''; outputEl.value = '';
            inputEl.dispatchEvent(new Event('input'));
            toggleOutputState(false);
        }

        function copyOutput() {
            if (!outputEl.value) return;
            outputEl.select();
            document.execCommand('copy');
            const originalHTML = copyBtn.innerHTML;
            copyBtn.innerHTML = `<i data-lucide="check" class="w-5 h-5"></i> COPIED!`;
            copyBtn.classList.replace('bg-green', 'bg-blue');
            copyBtn.classList.add('text-white');
            lucide.createIcons();
            setTimeout(() => {
                copyBtn.innerHTML = originalHTML;
                copyBtn.classList.replace('bg-blue', 'bg-green');
                copyBtn.classList.remove('text-white');
                lucide.createIcons();
            }, 2000);
        }
    </script>
</body>
</html>
