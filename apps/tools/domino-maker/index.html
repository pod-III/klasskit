<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Domino Card Maker — KlassKit</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          pink:   '#ff4785',
          orange: '#ff7e33',
          green:  '#00d063',
          blue:   '#1ea7fd',
          dark:   '#0f172a',
          chalk:  '#f8fafc',
        },
        fontFamily: {
          display: ['Fredoka', 'sans-serif'],
          body: ['Nunito', 'sans-serif'],
        },
      }
    }
  }
</script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

<script>
  // Theme sync with hub/localStorage (KlassKit convention).
  // The hub stores values via JSON.stringify, so theme_hub is the quoted
  // string `"dark"`. Parse defensively so both quoted and raw values match.
  function readStoredTheme(key) {
    const raw = localStorage.getItem(key);
    if (raw == null) return null;
    try { return JSON.parse(raw); } catch (e) { return raw; }
  }
  function syncTheme() {
    const toolTheme = readStoredTheme('theme_domino-maker');
    const hubTheme = readStoredTheme('theme_hub');
    if (toolTheme === 'dark' || (!toolTheme && hubTheme === 'dark') || (!toolTheme && !hubTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  }
  syncTheme();
  window.addEventListener('storage', (e) => {
    if (e.key === 'theme_hub' || e.key === 'theme_domino-maker') {
      syncTheme();
    }
  });
</script>

<style>
  :root { color-scheme: light; }
  html.dark { color-scheme: dark; }

  .chunky {
    border-width: 3px;
    box-shadow: 4px 4px 0px 0px rgba(15,23,42,1);
    transition: transform 120ms ease, box-shadow 120ms ease;
  }
  html.dark .chunky { box-shadow: 4px 4px 0px 0px rgba(148,163,184,1); }

  .chunky-btn {
    border-width: 3px;
    box-shadow: 4px 4px 0px 0px rgba(15,23,42,1);
    transition: transform 100ms ease, box-shadow 100ms ease;
  }
  html.dark .chunky-btn { box-shadow: 4px 4px 0px 0px rgba(148,163,184,1); }
  .chunky-btn:hover { transform: translate(-1px,-1px) rotate(-0.5deg); }
  .chunky-btn:active {
    transform: translate(2px,2px);
    box-shadow: 0px 0px 0px 0px rgba(15,23,42,1) !important;
  }

  .page-frame { page-break-after: always; }
  .page-frame:last-child { page-break-after: auto; }

  .page {
    width: 210mm;
    height: 297mm;
    background: #ffffff;
    box-sizing: border-box;
    padding: 10mm;
    display: grid;
    margin: 0 auto;
    grid-template-columns: repeat(2, 1fr);
    gap: 0;
  }

  /* A single domino: two halves split by a centre line. Tiles sit edge to
     edge so their borders form one continuous grid you can cut in straight
     lines, while each tile still reads as a two-half domino card. */
  .domino-tile {
    display: flex;
    align-items: stretch;
    width: 100%;
    height: 100%;
    background: #ffffff;
    color: #1e293b;
    border: 2px solid #1e293b;
    border-radius: 0;
    box-sizing: border-box;
    overflow: hidden;
    min-width: 0;
    min-height: 0;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .domino-half {
    flex: 1 1 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 2.5mm;
    min-width: 0;
    overflow: hidden;
  }
  /* Centre hinge line: a border (not a background) so it always prints,
     even when Chrome's "Background graphics" option is off. */
  .domino-divider {
    align-self: stretch;
    width: 0;
    flex-shrink: 0;
    border-left: 2px solid #1e293b;
  }
  .domino-half span {
    display: block;
    word-break: break-word;
    line-height: 1.1;
  }
  .domino-half img {
    max-height: 90%;
    max-width: 85%;
    object-fit: contain;
  }

  @media print {
    @page { size: A4; margin: 0; }
    html, body {
      margin: 0 !important;
      padding: 0 !important;
      background: #fff;
    }
    * {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .no-print { display: none !important; }
    /* Strip the on-screen page chrome so only the A4 sheets print. */
    .print-reset {
      max-width: none !important;
      margin: 0 !important;
      padding: 0 !important;
    }
    #output {
      margin: 0 !important;
      padding: 0 !important;
      overflow: visible !important;
    }
    /* Drop the on-screen gap between sheets so it can't push content onto an
       extra blank page. */
    #output > * { margin: 0 !important; }
    .page-frame {
      box-shadow: none !important;
      border: none !important;
      border-radius: 0 !important;
      margin: 0 !important;
      overflow: hidden;
      page-break-after: always;
      break-after: page;
    }
    .page-frame:last-child {
      page-break-after: auto;
      break-after: auto;
    }
    /* Slightly under 297mm to avoid a sub-pixel overflow that would emit a
       blank page after every sheet. */
    .page {
      width: 210mm;
      height: 296mm;
      box-shadow: none !important;
    }
  }
</style>
</head>

<body class="bg-chalk dark:bg-slate-900 font-body text-dark dark:text-slate-100 min-h-screen">

  <div class="print-reset max-w-7xl mx-auto p-4 md:p-8">

    <header class="no-print flex items-start justify-between gap-4 mb-8">
      <div>
        <h1 class="font-display text-3xl md:text-4xl font-bold text-dark dark:text-white">Domino Card Maker</h1>
        <p class="text-slate-500 dark:text-slate-400 mt-1">Paste a word list, get a printable set of matching domino tiles.</p>
      </div>
      <button id="darkToggle" aria-label="Toggle dark mode"
        class="chunky-btn shrink-0 bg-white dark:bg-slate-800 border-dark dark:border-slate-400 rounded-xl p-2.5">
        <i data-lucide="moon" class="w-5 h-5"></i>
      </button>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-[380px_1fr] gap-6 items-start">

      <!-- CONTROLS -->
      <aside class="no-print space-y-5">

        <div class="chunky bg-white dark:bg-slate-800 border-dark dark:border-slate-400 rounded-2xl p-5">
          <label class="font-display font-semibold text-sm flex items-center gap-2 mb-2">
            <i data-lucide="list" class="w-4 h-4 text-blue"></i> Word list
          </label>
          <textarea id="wordList" rows="10"
            placeholder="One word per line, or separate with commas.&#10;I'll automatically link them into a matching chain.&#10;Image URLs (.jpg/.png/.svg) work too."
            class="w-full border-3 border-dark dark:border-slate-500 rounded-xl p-3 text-sm bg-chalk dark:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-blue resize-none"></textarea>
          <div class="flex items-center justify-between mt-2">
            <span id="itemCount" class="text-xs text-slate-500 dark:text-slate-400">0 words entered</span>
            <button id="loadExample" class="text-xs font-semibold text-blue hover:underline">Load example</button>
          </div>
        </div>

        <div class="chunky bg-white dark:bg-slate-800 border-dark dark:border-slate-400 rounded-2xl p-5 space-y-4">
          <p class="font-display font-semibold text-sm flex items-center gap-2">
            <i data-lucide="grid-3x3" class="w-4 h-4 text-orange"></i> Set layout
          </p>

          <div class="grid grid-cols-2 gap-3">
            <label class="text-xs font-semibold text-slate-600 dark:text-slate-300">
              Set size (tiles)
              <input id="setSize" type="number" min="4" max="120" value="36"
                class="w-full mt-1 border-3 border-dark dark:border-slate-500 rounded-xl p-2 bg-chalk dark:bg-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-blue" />
            </label>
            <label class="text-xs font-semibold text-slate-600 dark:text-slate-300">
              Tiles per page
              <input id="tilesPerPage" type="number" min="2" max="40" value="18"
                class="w-full mt-1 border-3 border-dark dark:border-slate-500 rounded-xl p-2 bg-chalk dark:bg-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-blue" />
            </label>
          </div>

          <label class="text-xs font-semibold text-slate-600 dark:text-slate-300 block">
            Text size
            <select id="fontSize" class="w-full mt-1 border-3 border-dark dark:border-slate-500 rounded-xl p-2 bg-chalk dark:bg-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-blue">
              <option value="text-sm">Small</option>
              <option value="text-base" selected>Medium</option>
              <option value="text-lg">Large</option>
            </select>
          </label>

          <label class="flex items-center gap-2 text-xs font-semibold text-slate-600 dark:text-slate-300">
            <input id="uppercase" type="checkbox" checked class="w-4 h-4 accent-pink" />
            UPPERCASE text
          </label>
        </div>

        <div class="chunky bg-white dark:bg-slate-800 border-dark dark:border-slate-400 rounded-2xl p-5 space-y-3">
          <button id="generateBtn"
            class="chunky-btn w-full bg-green border-dark rounded-xl py-3 font-display font-semibold flex items-center justify-center gap-2">
            <i data-lucide="sparkles" class="w-4 h-4"></i> Generate set
          </button>
          <button id="shuffleBtn"
            class="chunky-btn w-full bg-orange border-dark rounded-xl py-2.5 font-display font-semibold flex items-center justify-center gap-2">
            <i data-lucide="shuffle" class="w-4 h-4"></i> Reshuffle layout
          </button>
          <button id="printBtn"
            class="chunky-btn w-full bg-blue border-dark rounded-xl py-2.5 font-display font-semibold text-white flex items-center justify-center gap-2">
            <i data-lucide="printer" class="w-4 h-4"></i> Print / Save as PDF
          </button>
        </div>
      </aside>

      <!-- OUTPUT -->
      <main>
        <p id="statsLine" class="no-print text-sm text-slate-500 dark:text-slate-400 mb-3"></p>
        <div id="output" class="space-y-8 overflow-x-auto pb-8">
          <div id="emptyState" class="chunky bg-white dark:bg-slate-800 border-dark dark:border-slate-400 rounded-2xl p-12 text-center text-slate-400 dark:text-slate-500">
            <i data-lucide="layout-grid" class="w-10 h-10 mx-auto mb-3"></i>
            <p class="font-display font-semibold">Your domino set will appear here</p>
            <p class="text-sm mt-1">Paste a word list and hit Generate.</p>
          </div>
        </div>
      </main>

    </div>
  </div>

<script>
  lucide.createIcons();

  const wordListEl = document.getElementById('wordList');
  const setSizeEl = document.getElementById('setSize');
  const tilesPerPageEl = document.getElementById('tilesPerPage');
  const fontSizeEl = document.getElementById('fontSize');
  const uppercaseEl = document.getElementById('uppercase');
  const outputEl = document.getElementById('output');
  const emptyStateEl = document.getElementById('emptyState');
  const itemCountEl = document.getElementById('itemCount');
  const statsLineEl = document.getElementById('statsLine');

  const COLS = 2; // a domino tile is two halves side by side — pages are always 2 tiles wide

  const EXAMPLE = `FORGET
SPILL
TEAR
TRIP
DROP
CRASH
SMASH
SCRATCH
KNOCK OVER
BREAK
FALL`;

  const STORAGE_KEY = 'klasskit-domino-maker-v2';
  let currentTiles = [];

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function parseList(raw) {
    return raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
  }

  function isImageURL(s) {
    return /^(https?:\/\/|data:image\/)/i.test(s) && (/\.(png|jpe?g|gif|webp|svg)(\?.*)?$/i.test(s) || s.startsWith('data:image'));
  }

  function updateCount() {
    const items = parseList(wordListEl.value);
    itemCountEl.textContent = `${items.length} word${items.length === 1 ? '' : 's'} entered`;
  }

  // Builds a closed matching loop: tile i = (item i, item i+1), wrapping so the
  // last tile links back to the first. Cycles the word list if it's shorter
  // than the requested set size, so duplicates show up naturally.
  function buildChain(items, n) {
    if (!items.length || n <= 0) return [];
    const seq = [];
    for (let i = 0; i < n; i++) seq.push(items[i % items.length]);
    const tiles = [];
    for (let i = 0; i < n; i++) tiles.push([seq[i], seq[(i + 1) % n]]);
    return tiles;
  }

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function renderHalf(val, opts) {
    if (!val) return '<div class="domino-half"></div>';
    if (isImageURL(val)) {
      return `<div class="domino-half"><img src="${escapeHtml(val)}" alt="" /></div>`;
    }
    const upClass = opts.uppercase ? 'uppercase' : '';
    return `<div class="domino-half"><span class="font-display font-bold ${opts.fontSize} ${upClass}">${escapeHtml(val)}</span></div>`;
  }

  function renderTile(pair, opts) {
    if (!pair) return '<div></div>';
    const [left, right] = pair;
    return `
      <div class="domino-tile">
        ${renderHalf(left, opts)}
        <div class="domino-divider"></div>
        ${renderHalf(right, opts)}
      </div>`;
  }

  function renderPage(pageTiles, rows, opts) {
    let cellsHTML = '';
    for (let i = 0; i < COLS * rows; i++) {
      cellsHTML += renderTile(pageTiles[i], opts);
    }
    return `
      <div class="page-frame chunky bg-white border-dark rounded-2xl mx-auto" style="width:210mm;">
        <div class="page" style="grid-template-rows:repeat(${rows},1fr);">
          ${cellsHTML}
        </div>
      </div>`;
  }

  function saveSettings() {
    const data = {
      list: wordListEl.value,
      setSize: setSizeEl.value,
      tilesPerPage: tilesPerPageEl.value,
      fontSize: fontSizeEl.value,
      uppercase: uppercaseEl.checked,
    };
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
  }

  function loadSettings() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      if (data.list) wordListEl.value = data.list;
      if (data.setSize) setSizeEl.value = data.setSize;
      if (data.tilesPerPage) tilesPerPageEl.value = data.tilesPerPage;
      if (data.fontSize) fontSizeEl.value = data.fontSize;
      if (typeof data.uppercase === 'boolean') uppercaseEl.checked = data.uppercase;
    } catch (e) {}
  }

  function renderTiles() {
    const tilesPerPage = Math.max(2, Math.min(40, parseInt(tilesPerPageEl.value) || 18));
    const rows = Math.ceil(tilesPerPage / COLS);
    const pages = [];
    for (let i = 0; i < currentTiles.length; i += tilesPerPage) {
      pages.push(currentTiles.slice(i, i + tilesPerPage));
    }
    const opts = { fontSize: fontSizeEl.value, uppercase: uppercaseEl.checked };
    outputEl.innerHTML = pages.map(p => renderPage(p, rows, opts)).join('');

    const items = parseList(wordListEl.value);
    let note = '';
    if (items.length > 0 && items.length < currentTiles.length) {
      note = ` · words repeated to fill the set`;
    } else if (items.length > currentTiles.length) {
      note = ` · using first ${currentTiles.length} words`;
    }
    statsLineEl.textContent = `${currentTiles.length} tiles · ${pages.length} page${pages.length === 1 ? '' : 's'} · ${tilesPerPage} per page (${COLS}×${rows} grid)${note}`;
  }

  function generate() {
    const items = parseList(wordListEl.value);
    updateCount();
    saveSettings();

    if (items.length === 0) {
      currentTiles = [];
      outputEl.innerHTML = '';
      outputEl.appendChild(emptyStateEl);
      statsLineEl.textContent = '';
      lucide.createIcons();
      return;
    }

    const setSize = Math.max(4, Math.min(120, parseInt(setSizeEl.value) || 36));
    currentTiles = shuffleArray(buildChain(items, setSize));
    renderTiles();
  }

  function reshuffle() {
    if (currentTiles.length === 0) return;
    currentTiles = shuffleArray(currentTiles.slice());
    renderTiles();
  }

  document.getElementById('generateBtn').addEventListener('click', generate);
  document.getElementById('shuffleBtn').addEventListener('click', reshuffle);
  document.getElementById('printBtn').addEventListener('click', () => window.print());
  document.getElementById('loadExample').addEventListener('click', () => {
    wordListEl.value = EXAMPLE;
    updateCount();
    generate();
  });
  wordListEl.addEventListener('input', updateCount);

  document.getElementById('darkToggle').addEventListener('click', () => {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme_domino-maker', isDark ? 'dark' : 'light');
  });

  loadSettings();
  updateCount();
  if (parseList(wordListEl.value).length > 0) generate();
</script>
</body>
</html>
