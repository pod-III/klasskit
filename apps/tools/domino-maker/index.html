<script>
  function readStoredTheme(key) {
    const raw = localStorage.getItem(key);
    if (raw == null) return null;
    try { return JSON.parse(raw); } catch (e) { return raw; }
  }
  function syncTheme() {
    const toolTheme = readStoredTheme('theme_domino-maker');
    const hubTheme = readStoredTheme('theme_hub');
    if (toolTheme === 'dark' || (!toolTheme && hubTheme === 'dark') || (!toolTheme && !hubTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  }
  syncTheme();
  window.addEventListener('storage', (e) => {
    if (e.key === 'theme_hub' || e.key === 'theme_domino-maker') {
      syncTheme();
    }
  });
</script>

<style>

<script>
  lucide.createIcons();

  const wordListEl = document.getElementById('wordList');
  const setSizeEl = document.getElementById('setSize');
  const tilesPerPageEl = document.getElementById('tilesPerPage');
  const fontSizeEl = document.getElementById('fontSize');
  const uppercaseEl = document.getElementById('uppercase');
  const outputEl = document.getElementById('output');
  const emptyStateEl = document.getElementById('emptyState');
  const itemCountEl = document.getElementById('itemCount');
  const statsLineEl = document.getElementById('statsLine');
  const dupWarningEl = document.getElementById('dupWarning');
  const shuffleBtn = document.getElementById('shuffleBtn');

  const COLS = 2;

  const EXAMPLE = `FORGET
SPILL
TEAR
TRIP
DROP
CRASH
SMASH
SCRATCH
KNOCK OVER
BREAK
FALL`;

  const STORAGE_KEY = 'klasskit-domino-maker-v2';
  let currentTiles = [];
  let autoSaveTimer = null;

  // ===== IndexedDB Sets Management =====
  const DB_NAME = 'klasskit-domino-maker';
  const DB_VERSION = 1;
  const STORE_NAME = 'sets';
  let activeSetId = null;
  let dataBase = null;

  function openDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, DB_VERSION);
      request.onerror = () => reject(request.error);
      request.onsuccess = () => { dataBase = request.result; resolve(dataBase); };
      request.onupgradeneeded = (e) => {
        const dataBase = e.target.result;
        if (!dataBase.objectStoreNames.contains(STORE_NAME)) {
          const store = dataBase.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
          store.createIndex('name', 'name', { unique: false });
          store.createIndex('lastUsed', 'lastUsed', { unique: false });
          store.createIndex('usageCount', 'usageCount', { unique: false });
        }
      };
    });
  }

  async function ensureDB() {
    if (!dataBase) dataBase = await openDB();
    return dataBase;
  }

  async function saveSetToDB(record) {
    const database = await ensureDB();
    return new Promise((resolve, reject) => {
      const tx = database.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      const req = store.put(record);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function getSetById(id) {
    const database = await ensureDB();
    return new Promise((resolve, reject) => {
      const tx = database.transaction(STORE_NAME, 'readonly');
      const store = tx.objectStore(STORE_NAME);
      const req = store.get(id);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function deleteSetById(id) {
    const database = await ensureDB();
    return new Promise((resolve, reject) => {
      const tx = database.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      const req = store.delete(id);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  async function getAllSets() {
    const database = await ensureDB();
    return new Promise((resolve, reject) => {
      const tx = database.transaction(STORE_NAME, 'readonly');
      const store = tx.objectStore(STORE_NAME);
      const req = store.getAll();
      req.onsuccess = () => {
        const sets = req.result || [];
        // backward compatibility
        sets.forEach(s => {
          if (!s.lastUsed) s.lastUsed = s.createdAt || Date.now();
          if (typeof s.usageCount !== 'number') s.usageCount = 0;
        });
        resolve(sets);
      };
      req.onerror = () => reject(req.error);
    });
  }

  function getWorkspaceData() {
    return {
      list: wordListEl.value,
      setSize: setSizeEl.value,
      tilesPerPage: tilesPerPageEl.value,
      fontSize: fontSizeEl.value,
      uppercase: uppercaseEl.checked,
    };
  }

  function applyWorkspaceData(data) {
    wordListEl.value = data.list || '';
    setSizeEl.value = data.setSize || 36;
    tilesPerPageEl.value = data.tilesPerPage || 18;
    fontSizeEl.value = data.fontSize || 'text-base';
    uppercaseEl.checked = typeof data.uppercase === 'boolean' ? data.uppercase : true;
  }

  function updateActiveIndicator(name) {
    const el = document.getElementById('activeSetIndicator');
    const nameEl = document.getElementById('activeSetName');
    if (activeSetId !== null && name) {
      el.classList.remove('hidden');
      nameEl.textContent = name;
    } else {
      el.classList.add('hidden');
    }
    lucide.createIcons();
  }

  async function autoSaveIfActive() {
    if (activeSetId === null) return;
    const set = await getSetById(activeSetId);
    if (!set) return;
    const data = getWorkspaceData();
    Object.assign(set, data, { lastUsed: Date.now() });
    await saveSetToDB(set);
    // Debounce cloud sync to avoid API spam on every keystroke
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(() => {
      syncLibraryToCloud().catch(() => {});
    }, 800);
  }

  async function newWorkspace() {
    activeSetId = null;
    applyWorkspaceData({ list: '', setSize: 36, tilesPerPage: 18, fontSize: 'text-base', uppercase: true });
    currentTiles = [];
    outputEl.innerHTML = '';
    outputEl.appendChild(emptyStateEl);
    statsLineEl.classList.add('hidden');
    shuffleBtn.disabled = true;
    updateActiveIndicator('');
    updateCount();
    lucide.createIcons();
  }

  function openSaveAsModal() {
    const modal = document.getElementById('saveAsModal');
    const input = document.getElementById('saveAsName');
    input.value = '';
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    setTimeout(() => input.focus(), 50);
  }

  function closeSaveAsModal() {
    const modal = document.getElementById('saveAsModal');
    modal.classList.add('hidden');
    modal.classList.remove('flex');
  }

  async function confirmSaveAs() {
    const name = document.getElementById('saveAsName').value.trim();
    if (!name) return;
    const data = getWorkspaceData();
    const now = Date.now();
    const record = {
      name,
      ...data,
      createdAt: now,
      lastUsed: now,
      usageCount: 0,
    };
    activeSetId = await saveSetToDB(record);
    updateActiveIndicator(name);
    closeSaveAsModal();
    renderLibrary();
    await syncLibraryToCloud().catch(() => {});
  }

  async function loadSet(id) {
    const set = await getSetById(id);
    if (!set) return;
    activeSetId = id;
    set.usageCount = (set.usageCount || 0) + 1;
    set.lastUsed = Date.now();
    await saveSetToDB(set);
    applyWorkspaceData(set);
    updateCount();
    generate();
    updateActiveIndicator(set.name);
    renderLibrary();
    await syncLibraryToCloud().catch(() => {});
  }

  async function deleteSet(id) {
    if (!confirm('Delete this saved set?')) return;
    await deleteSetById(id);
    if (activeSetId === id) {
      activeSetId = null;
      updateActiveIndicator('');
    }
    renderLibrary();
    await syncLibraryToCloud().catch(() => {});
  }

  function closeActiveSet() {
    activeSetId = null;
    updateActiveIndicator('');
    renderLibrary();
  }

  function escapeHtmlAttr(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function renderLibrary() {
    const listEl = document.getElementById('libraryList');
    const sortMode = document.getElementById('librarySort').value;
    let sets = await getAllSets();

    if (sortMode === 'recent') {
      sets.sort((a, b) => (b.lastUsed || 0) - (a.lastUsed || 0));
    } else if (sortMode === 'alpha') {
      sets.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
    } else if (sortMode === 'popular') {
      sets.sort((a, b) => (b.usageCount || 0) - (a.usageCount || 0));
    }

    if (sets.length === 0) {
      listEl.innerHTML = `
        <div class="text-center py-6">
          <i data-lucide="package-open" class="w-8 h-8 mx-auto mb-2 text-slate-300 dark:text-slate-600"></i>
          <p class="text-xs text-slate-400">No saved sets yet.</p>
        </div>`;
      return;
    }

    listEl.innerHTML = sets.map(s => {
      const isActive = s.id === activeSetId;
      const activeBadge = isActive ? '<span class="dm-badge bg-brand-blue text-white ml-2">Active</span>' : '';
      return `
        <div class="dm-library-item ${isActive ? 'active' : ''} flex items-center gap-2 group">
          <button onclick="loadSet(${s.id})" class="flex-1 text-left min-w-0">
            <p class="text-sm font-bold truncate dark:text-white flex items-center">${escapeHtmlAttr(s.name)}${activeBadge}</p>
            <p class="text-[10px] text-slate-400 font-medium">${new Date(s.lastUsed).toLocaleDateString()} · Used ${s.usageCount || 0}×</p>
          </button>
          <button onclick="deleteSet(${s.id})" class="delete-btn p-1.5 rounded-lg text-slate-400 hover:text-brand-pink hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors shrink-0" title="Delete">
            <i data-lucide="trash-2" class="w-4 h-4"></i>
          </button>
        </div>
      `;
    }).join('');
    lucide.createIcons();
  }

  // ===== Existing Functions =====

  function toggleTheme() {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme_domino-maker', isDark ? 'dark' : 'light');
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function parseList(raw) {
    return raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
  }

  function isImageURL(s) {
    return /^(https?:\/\/|data:image\/)/i.test(s) && (/\.(png|jpe?g|gif|webp|svg)(\?.*)?$/i.test(s) || s.startsWith('data:image'));
  }

  function updateCount() {
    const items = parseList(wordListEl.value);
    itemCountEl.textContent = `${items.length} word${items.length === 1 ? '' : 's'} entered`;

    // Duplicate detection
    const seen = new Set();
    const dups = [];
    for (const item of items) {
      const key = item.toLowerCase();
      if (seen.has(key)) dups.push(item);
      seen.add(key);
    }
    if (dups.length > 0) {
      dupWarningEl.textContent = `⚠ Duplicate words detected: ${[...new Set(dups)].join(', ')} — the chain may not work as a game.`;
      dupWarningEl.classList.remove('hidden');
    } else {
      dupWarningEl.classList.add('hidden');
    }
  }

  function buildChain(items, n) {
    if (!items.length || n <= 0) return [];
    const seq = [];
    for (let i = 0; i < n; i++) seq.push(items[i % items.length]);
    const tiles = [];
    for (let i = 0; i < n; i++) tiles.push([seq[i], seq[(i + 1) % n]]);
    return tiles;
  }

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function renderHalf(val, opts) {
    if (!val) return '<div class="domino-half"></div>';
    if (isImageURL(val)) {
      return `<div class="domino-half">
        <img src="${escapeHtml(val)}" alt="" onerror="this.classList.add('error')" />
        <span class="img-fallback font-heading font-bold text-xs">Image failed to load</span>
      </div>`;
    }
    const upClass = opts.uppercase ? 'uppercase' : '';
    return `<div class="domino-half"><span class="font-heading font-bold ${opts.fontSize} ${upClass}">${escapeHtml(val)}</span></div>`;
  }

  function renderTile(pair, opts) {
    const [left, right] = pair;
    return `
      <div class="domino-tile">
        ${renderHalf(left, opts)}
        <div class="domino-divider"></div>
        ${renderHalf(right, opts)}
      </div>`;
  }

  function renderPage(pageTiles, opts, pageIndex) {
    const pageRows = Math.ceil(pageTiles.length / COLS);
    let cellsHTML = '';
    for (let i = 0; i < pageTiles.length; i++) {
      cellsHTML += renderTile(pageTiles[i], opts);
    }
    const delay = (pageIndex * 0.08).toFixed(2);
    return `
      <div class="page-frame dm-enter bg-white mx-auto" style="width:210mm; overflow: hidden; animation-delay: ${delay}s;">
        <div class="page" style="grid-template-rows:repeat(${pageRows},1fr);">
          ${cellsHTML}
        </div>
      </div>`;
  }

  // ===== Cloud Sync =====
  const CLOUD_TOOL_KEY = 'domino-maker';

  async function saveWorkspaceToCloud() {
    const data = getWorkspaceData();
    await saveProgress(CLOUD_TOOL_KEY + '-workspace', data);
  }

  async function loadWorkspaceFromCloud() {
    const data = await loadProgress(CLOUD_TOOL_KEY + '-workspace');
    if (data) {
      applyWorkspaceData(data);
      return true;
    }
    // Fallback to old localStorage key (one-time migration)
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const oldData = JSON.parse(raw);
        applyWorkspaceData(oldData);
        await saveProgress(CLOUD_TOOL_KEY + '-workspace', oldData);
        localStorage.removeItem(STORAGE_KEY);
        return true;
      }
    } catch (e) {}
    return false;
  }

  async function syncLibraryToCloud() {
    const sets = await getAllSets();
    await saveProgress(CLOUD_TOOL_KEY, { sets, activeId: activeSetId });
  }

  async function syncLibraryFromCloud() {
    const payload = await loadProgress(CLOUD_TOOL_KEY);
    if (!payload || !Array.isArray(payload.sets) || !payload.sets.length) return false;
    // Validate payload before wiping local data
    if (!payload.sets.every(s => s && typeof s.name === 'string')) return false;

    const dataBase = await ensureDB();
    const tx = dataBase.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);

    await new Promise((resolve, reject) => {
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
      tx.onabort = () => reject(tx.error || new Error('Transaction aborted'));

      const clearReq = store.clear();
      clearReq.onerror = () => reject(clearReq.error);
      clearReq.onsuccess = () => {
        for (const set of payload.sets) {
          const { id, ...data } = set;
          // Preserve original IDs so activeSetId stays valid
          store.put({ ...data, id: set.id });
        }
      };
    });

    if (typeof payload.activeId === 'number') activeSetId = payload.activeId;
    return true;
  }

  // ===== Legacy wrappers (replaced by cloud sync) =====
  function saveSettings() {
    saveWorkspaceToCloud().catch(() => {});
  }

  function loadSettings() {
    loadWorkspaceFromCloud().catch(() => {});
  }

  function renderTiles() {
    const tilesPerPage = Math.max(2, Math.min(40, parseInt(tilesPerPageEl.value) || 18));
    const rows = Math.ceil(tilesPerPage / COLS);
    const pages = [];
    for (let i = 0; i < currentTiles.length; i += tilesPerPage) {
      pages.push(currentTiles.slice(i, i + tilesPerPage));
    }
    const opts = { fontSize: fontSizeEl.value, uppercase: uppercaseEl.checked };
    outputEl.innerHTML = pages.map((p, i) => renderPage(p, opts, i)).join('');

    const items = parseList(wordListEl.value);
    let note = '';
    if (items.length > 0 && items.length < currentTiles.length) {
      note = ` · words repeated to fill the set`;
    } else if (items.length > currentTiles.length) {
      note = ` · using first ${currentTiles.length} words`;
    }
    statsLineEl.innerHTML = `<i data-lucide="info" class="w-3.5 h-3.5"></i> ${currentTiles.length} tiles · ${pages.length} page${pages.length === 1 ? '' : 's'} · ${tilesPerPage} per page (${COLS}×${rows} grid)${note}`;
    statsLineEl.classList.remove('hidden');
    lucide.createIcons();
  }

  function generate() {
    const items = parseList(wordListEl.value);
    updateCount();
    saveSettings();

    if (items.length === 0) {
      currentTiles = [];
      outputEl.innerHTML = '';
      outputEl.appendChild(emptyStateEl);
      statsLineEl.classList.add('hidden');
      shuffleBtn.disabled = true;
      lucide.createIcons();
      return;
    }

    const setSize = Math.max(4, Math.min(120, parseInt(setSizeEl.value) || 36));
    currentTiles = shuffleArray(buildChain(items, setSize));
    shuffleBtn.disabled = false;
    renderTiles();
  }

  function reshuffle() {
    if (currentTiles.length === 0) return;
    currentTiles = shuffleArray(currentTiles.slice());
    renderTiles();
  }

  document.getElementById('generateBtn').addEventListener('click', generate);
  document.getElementById('shuffleBtn').addEventListener('click', reshuffle);
  document.getElementById('printBtn').addEventListener('click', () => window.print());
  document.getElementById('loadExample').addEventListener('click', () => {
    wordListEl.value = EXAMPLE;
    updateCount();
    generate();
  });
  document.getElementById('clearList').addEventListener('click', () => {
    wordListEl.value = '';
    updateCount();
    generate();
  });
  wordListEl.addEventListener('input', updateCount);

  // Auto-save triggers
  [wordListEl, setSizeEl, tilesPerPageEl].forEach(el => {
    el.addEventListener('input', () => autoSaveIfActive());
    el.addEventListener('change', () => autoSaveIfActive());
  });
  [fontSizeEl, uppercaseEl].forEach(el => {
    el.addEventListener('change', () => autoSaveIfActive());
  });

  // Save As modal keyboard
  document.getElementById('saveAsName').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); confirmSaveAs(); }
    if (e.key === 'Escape') { closeSaveAsModal(); }
  });
  document.getElementById('saveAsModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('saveAsModal')) closeSaveAsModal();
  });

  // Cloud-first startup
  (async function init() {
    await loadWorkspaceFromCloud().catch(() => {});
    await syncLibraryFromCloud().catch(() => {});
    updateCount();
    shuffleBtn.disabled = currentTiles.length === 0;
    if (parseList(wordListEl.value).length > 0) generate();
    renderLibrary();
  })();
</script>
</body>
</html>
