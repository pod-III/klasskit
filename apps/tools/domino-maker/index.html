<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Domino Card Maker — KlassKit</title>
<link rel="icon" type="image/x-icon" href="../../../media/icon.ico" />
<link rel="icon" type="image/webp" href="../../../media/icon.webp" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          brand: {
            pink: '#ff4785',
            orange: '#ff7e33',
            green: '#00d063',
            blue: '#1ea7fd',
            dark: '#1e293b',
            chalk: '#f8fafc',
          }
        },
        fontFamily: {
          heading: ['Fredoka', 'sans-serif'],
          body: ['Nunito', 'sans-serif'],
        },
        boxShadow: {
          'neo-sm': 'var(--shadow-hard-sm)',
          'neo': 'var(--shadow-hard-md)',
          'neo-lg': 'var(--shadow-hard-lg)',
        }
      }
    }
  }
</script>
<script src="https://unpkg.com/lucide@1.16.0"></script>

<link rel="stylesheet" href="../../../css/base.css" />
<link rel="stylesheet" href="../../../css/components.css" />

<script>
  function readStoredTheme(key) {
    const raw = localStorage.getItem(key);
    if (raw == null) return null;
    try { return JSON.parse(raw); } catch (e) { return raw; }
  }
  function syncTheme() {
    const toolTheme = readStoredTheme('theme_domino-maker');
    const hubTheme = readStoredTheme('theme_hub');
    if (toolTheme === 'dark' || (!toolTheme && hubTheme === 'dark') || (!toolTheme && !hubTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  }
  syncTheme();
  window.addEventListener('storage', (e) => {
    if (e.key === 'theme_hub' || e.key === 'theme_domino-maker') {
      syncTheme();
    }
  });
</script>

<style>
  .page-frame { page-break-after: always; }
  .page-frame:last-child { page-break-after: auto; }

  .page {
    width: 210mm;
    height: 297mm;
    background: #ffffff;
    box-sizing: border-box;
    padding: 10mm;
    display: grid;
    margin: 0 auto;
    grid-template-columns: repeat(2, 1fr);
    gap: 0;
  }

  .domino-tile {
    display: flex;
    align-items: stretch;
    width: 100%;
    height: 100%;
    background: #ffffff;
    color: #1e293b;
    border: 2px solid #1e293b;
    border-radius: 0;
    box-sizing: border-box;
    overflow: hidden;
    min-width: 0;
    min-height: 0;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .domino-half {
    flex: 1 1 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 2.5mm;
    min-width: 0;
    overflow: hidden;
  }
  .domino-divider {
    align-self: stretch;
    width: 0;
    flex-shrink: 0;
    border-left: 2px solid #1e293b;
  }
  .domino-half span {
    display: block;
    word-break: break-word;
    line-height: 1.1;
  }
  .domino-half img {
    max-height: 90%;
    max-width: 85%;
    object-fit: contain;
  }
  .domino-half img.error {
    display: none;
  }
  .domino-half .img-fallback {
    display: none;
    font-size: 0.7rem;
    color: #64748b;
    text-align: center;
  }
  .domino-half img.error + .img-fallback {
    display: block;
  }

  @media print {
    @page { size: A4; margin: 0; }
    html, body {
      margin: 0 !important;
      padding: 0 !important;
      background: #fff;
    }
    * {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .no-print { display: none !important; }
    .print-reset {
      max-width: none !important;
      margin: 0 !important;
      padding: 0 !important;
    }
    #output {
      margin: 0 !important;
      padding: 0 !important;
      overflow: visible !important;
    }
    #output > * { margin: 0 !important; }
    .page-frame {
      box-shadow: none !important;
      border: none !important;
      border-radius: 0 !important;
      margin: 0 !important;
      overflow: hidden;
      page-break-after: always;
      break-after: page;
    }
    .page-frame:last-child {
      page-break-after: auto;
      break-after: auto;
    }
    .page {
      width: 210mm;
      height: 296mm;
      box-shadow: none !important;
    }
  }

  /* Duplicate warning toast */
  .toast-warning {
    background: var(--color-orange);
    color: white;
    border: 3px solid var(--border-primary);
    box-shadow: var(--shadow-md);
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    animation: pop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }
</style>
</head>

<body class="font-body text-brand-dark dark:text-white min-h-screen flex flex-col transition-colors duration-300">

  <!-- Navbar -->
  <nav class="sticky top-0 z-50 glass-panel border-b-[3px] border-brand-dark dark:border-slate-700 px-4 py-3 no-print">
    <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-brand-green rounded-lg border-[3px] border-brand-dark flex items-center justify-center shadow-neo shrink-0">
          <i data-lucide="layout-grid" class="text-brand-dark"></i>
        </div>
        <h1 class="font-heading text-2xl font-bold text-brand-dark dark:text-white tracking-wide">Domino Maker</h1>
      </div>
      <button onclick="toggleTheme()"
        class="stick-btn bg-white dark:bg-slate-800 text-brand-dark dark:text-white group" aria-label="Toggle dark mode">
        <i data-lucide="moon" class="w-5 h-5 dark:hidden group-hover:rotate-12 transition-transform"></i>
        <i data-lucide="sun" class="w-5 h-5 hidden dark:block group-hover:rotate-90 transition-transform"></i>
      </button>
    </div>
  </nav>

  <div class="print-reset max-w-7xl mx-auto p-4 md:p-8 flex-grow w-full">

    <div class="grid grid-cols-1 lg:grid-cols-[380px_1fr] gap-6 items-start">

      <!-- CONTROLS -->
      <aside class="no-print space-y-5">

        <div class="hub-card bg-white dark:bg-slate-800 p-5">
          <label class="font-heading font-semibold text-sm flex items-center gap-2 mb-2">
            <i data-lucide="list" class="w-4 h-4 text-brand-blue"></i> Word list

          <textarea id="wordList" rows="10"

            class="input-chunky w-full p-3 text-sm resize-none"></textarea>
          <div id="dupWarning" class="hidden mt-2 text-xs font-bold text-brand-orange"></div>
          <div class="flex items-center justify-between mt-2">
            <span id="itemCount" class="text-xs text-slate-500 dark:text-slate-400">0 words entered</span>
            <div class="flex gap-2">
              <button id="clearList" class="text-xs font-semibold text-brand-pink hover:underline">Clear</button>
              <button id="loadExample" class="text-xs font-semibold text-brand-blue hover:underline">Load example</button>
            </div>
          </div>
        </div>

        <div class="hub-card bg-white dark:bg-slate-800 p-5 space-y-4">
          <p class="font-heading font-semibold text-sm flex items-center gap-2">
            <i data-lucide="grid-3x3" class="w-4 h-4 text-brand-orange"></i> Set layout
          </p>

          <div class="grid grid-cols-2 gap-3">
            <label class="text-xs font-semibold text-slate-600 dark:text-slate-300">
              Set size (tiles)
              <input id="setSize" type="number" min="4" max="120" value="36"
                class="input-chunky w-full mt-1 p-2 text-sm" />
            </label>
            <label class="text-xs font-semibold text-slate-600 dark:text-slate-300">
              Tiles per page
              <input id="tilesPerPage" type="number" min="2" max="40" value="18"
                class="input-chunky w-full mt-1 p-2 text-sm" />
            </label>
          </div>

          <label class="text-xs font-semibold text-slate-600 dark:text-slate-300 block">
            Text size
            <select id="fontSize" class="input-chunky w-full mt-1 p-2 text-sm">
              <option value="text-sm">Small</option>
              <option value="text-base" selected>Medium</option>
              <option value="text-lg">Large</option>
            </select>
          </label>

          <label class="flex items-center gap-2 text-xs font-semibold text-slate-600 dark:text-slate-300">
            <input id="uppercase" type="checkbox" checked class="w-4 h-4 accent-brand-pink" />

        </div>

        <!-- Active Set Indicator -->
        <div id="activeSetIndicator" class="hidden animate-pop-in">
          <div class="bg-brand-blue/10 border-2 border-brand-blue/30 rounded-xl p-3 flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-brand-blue flex items-center justify-center text-white shrink-0 shadow-neo-sm">
              <i data-lucide="layers" class="w-4 h-4"></i>
            </div>
            <div class="min-w-0">
              <p class="text-[10px] font-bold text-brand-blue uppercase tracking-wider leading-none mb-1">Active Set</p>
              <p id="activeSetName" class="text-sm font-bold truncate dark:text-white">Untitled</p>
            </div>
            <button onclick="closeActiveSet()" class="ml-auto text-slate-400 hover:text-brand-pink transition-colors" title="Close active set">
              <i data-lucide="x" class="w-4 h-4"></i>
            </button>
          </div>
        </div>

        <!-- Action Grid -->
        <div class="grid grid-cols-2 gap-3">
          <button onclick="newWorkspace()"
            class="btn-chunky bg-white dark:bg-slate-700 text-brand-dark dark:text-white rounded-xl py-3 font-heading font-semibold flex items-center justify-center gap-2">
            <i data-lucide="file-plus" class="w-4 h-4"></i> New
          </button>
          <button onclick="openSaveAsModal()"
            class="btn-chunky bg-brand-blue text-white rounded-xl py-3 font-heading font-semibold flex items-center justify-center gap-2">
            <i data-lucide="save" class="w-4 h-4"></i> Save As
          </button>
        </div>

        <div class="hub-card bg-white dark:bg-slate-800 p-5 space-y-3">
          <button id="generateBtn"
            class="btn-chunky w-full bg-brand-green text-brand-dark rounded-xl py-3 font-heading font-semibold flex items-center justify-center gap-2">
            <i data-lucide="sparkles" class="w-4 h-4"></i> Generate set
          </button>
          <button id="shuffleBtn"
            class="btn-chunky w-full bg-brand-orange text-brand-dark rounded-xl py-2.5 font-heading font-semibold flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
            <i data-lucide="shuffle" class="w-4 h-4"></i> Reshuffle layout

          <button id="printBtn"

            <i data-lucide="printer" class="w-4 h-4"></i> Print / Save as PDF
          </button>
        </div>

        <!-- Library -->
        <div class="hub-card bg-white dark:bg-slate-800 p-5 space-y-3">
          <div class="flex items-center justify-between">
            <p class="font-heading font-semibold text-sm flex items-center gap-2">
              <i data-lucide="library" class="w-4 h-4 text-brand-blue"></i> Library
            </p>
            <select id="librarySort" onchange="renderLibrary()"
              class="text-xs font-bold bg-slate-100 dark:bg-slate-700 border-2 border-slate-200 dark:border-slate-600 rounded-lg px-2 py-1 focus:outline-none focus:ring-2 focus:ring-brand-blue cursor-pointer">
              <option value="recent">Recent</option>
              <option value="alpha">A–Z</option>
              <option value="popular">Popular</option>
            </select>
          </div>
          <div id="libraryList" class="space-y-2 max-h-64 overflow-y-auto custom-scrollbar pr-1">
            <p class="text-xs text-slate-400 text-center py-4">No saved sets yet.</p>
          </div>

      <!-- OUTPUT -->
      <main>
        <p id="statsLine" class="no-print text-sm text-slate-500 dark:text-slate-400 mb-3"></p>
        <div id="output" class="space-y-8 overflow-x-auto pb-8">
          <div id="emptyState" class="hub-card bg-white dark:bg-slate-800 p-12 text-center text-slate-400 dark:text-slate-500">
            <i data-lucide="layout-grid" class="w-10 h-10 mx-auto mb-3"></i>
            <p class="font-heading font-semibold">Your domino set will appear here</p>
            <p class="text-sm mt-1">Paste a word list and hit Generate.</p>
          </div>
        </div>
      </main>

    </div>
  </div>

  <!-- Save As Modal -->
  <div id="saveAsModal" class="fixed inset-0 z-[60] hidden items-center justify-center" style="background: rgba(30,41,59,0.7); backdrop-filter: blur(4px);">
    <div class="bg-white dark:bg-slate-800 border-[3px] border-brand-dark dark:border-slate-600 rounded-2xl p-6 w-full max-w-sm mx-4 shadow-neo-lg animate-pop-in">
      <h3 class="font-heading font-bold text-xl mb-4 text-brand-dark dark:text-white">Save Set</h3>
      <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1 block">Set Name</label>
      <input id="saveAsName" type="text" placeholder="My Domino Set"
        class="input-chunky w-full px-3 py-2 text-sm mb-4" />
      <div class="flex gap-3">
        <button onclick="closeSaveAsModal()"
          class="btn-chunky flex-1 bg-slate-100 dark:bg-slate-700 text-brand-dark dark:text-white rounded-xl py-2 text-sm">Cancel</button>
        <button onclick="confirmSaveAs()"
          class="btn-chunky flex-1 bg-brand-green text-brand-dark rounded-xl py-2 text-sm">Save</button>
      </div>
    </div>
  </div>

<script>
  lucide.createIcons();

  const wordListEl = document.getElementById('wordList');
  const setSizeEl = document.getElementById('setSize');
  const tilesPerPageEl = document.getElementById('tilesPerPage');
  const fontSizeEl = document.getElementById('fontSize');
  const uppercaseEl = document.getElementById('uppercase');
  const outputEl = document.getElementById('output');
  const emptyStateEl = document.getElementById('emptyState');
  const itemCountEl = document.getElementById('itemCount');
  const statsLineEl = document.getElementById('statsLine');
  const dupWarningEl = document.getElementById('dupWarning');
  const shuffleBtn = document.getElementById('shuffleBtn');

  const COLS = 2;

  const EXAMPLE = `FORGET
SPILL
TEAR
TRIP
DROP
CRASH
SMASH
SCRATCH
KNOCK OVER
BREAK
FALL`;

  const STORAGE_KEY = 'klasskit-domino-maker-v2';
  let currentTiles = [];

  // ===== IndexedDB Sets Management =====
  const DB_NAME = 'klasskit-domino-maker';
  const DB_VERSION = 1;
  const STORE_NAME = 'sets';
  let activeSetId = null;
  let db = null;

  function openDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, DB_VERSION);
      request.onerror = () => reject(request.error);
      request.onsuccess = () => { db = request.result; resolve(db); };
      request.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          const store = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
          store.createIndex('name', 'name', { unique: false });
          store.createIndex('lastUsed', 'lastUsed', { unique: false });
          store.createIndex('usageCount', 'usageCount', { unique: false });
        }
      };
    });
  }

  async function ensureDB() {
    if (!db) db = await openDB();
    return db;
  }

  async function saveSetToDB(record) {
    const database = await ensureDB();
    return new Promise((resolve, reject) => {
      const tx = database.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      const req = store.put(record);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function getSetById(id) {
    const database = await ensureDB();
    return new Promise((resolve, reject) => {
      const tx = database.transaction(STORE_NAME, 'readonly');
      const store = tx.objectStore(STORE_NAME);
      const req = store.get(id);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function deleteSetById(id) {
    const database = await ensureDB();
    return new Promise((resolve, reject) => {
      const tx = database.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      const req = store.delete(id);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  async function getAllSets() {
    const database = await ensureDB();
    return new Promise((resolve, reject) => {
      const tx = database.transaction(STORE_NAME, 'readonly');
      const store = tx.objectStore(STORE_NAME);
      const req = store.getAll();
      req.onsuccess = () => {
        const sets = req.result || [];
        // backward compatibility
        sets.forEach(s => {
          if (!s.lastUsed) s.lastUsed = s.createdAt || Date.now();
          if (typeof s.usageCount !== 'number') s.usageCount = 0;
        });
        resolve(sets);
      };
      req.onerror = () => reject(req.error);
    });
  }

  function getWorkspaceData() {
    return {
      list: wordListEl.value,
      setSize: setSizeEl.value,
      tilesPerPage: tilesPerPageEl.value,
      fontSize: fontSizeEl.value,
      uppercase: uppercaseEl.checked,
    };
  }

  function applyWorkspaceData(data) {
    wordListEl.value = data.list || '';
    setSizeEl.value = data.setSize || 36;
    tilesPerPageEl.value = data.tilesPerPage || 18;
    fontSizeEl.value = data.fontSize || 'text-base';
    uppercaseEl.checked = typeof data.uppercase === 'boolean' ? data.uppercase : true;
  }

  function updateActiveIndicator(name) {
    const el = document.getElementById('activeSetIndicator');
    const nameEl = document.getElementById('activeSetName');
    if (activeSetId !== null && name) {
      el.classList.remove('hidden');
      nameEl.textContent = name;
    } else {
      el.classList.add('hidden');
    }
    lucide.createIcons();
  }

  async function autoSaveIfActive() {
    if (activeSetId === null) return;
    const set = await getSetById(activeSetId);
    if (!set) return;
    const data = getWorkspaceData();
    Object.assign(set, data, { lastUsed: Date.now() });
    await saveSetToDB(set);
  }

  async function newWorkspace() {
    activeSetId = null;
    applyWorkspaceData({ list: '', setSize: 36, tilesPerPage: 18, fontSize: 'text-base', uppercase: true });
    currentTiles = [];
    outputEl.innerHTML = '';
    outputEl.appendChild(emptyStateEl);
    statsLineEl.textContent = '';
    shuffleBtn.disabled = true;
    updateActiveIndicator('');
    updateCount();
    lucide.createIcons();
  }

  function openSaveAsModal() {
    const modal = document.getElementById('saveAsModal');
    const input = document.getElementById('saveAsName');
    input.value = '';
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    setTimeout(() => input.focus(), 50);
  }

  function closeSaveAsModal() {
    const modal = document.getElementById('saveAsModal');
    modal.classList.add('hidden');
    modal.classList.remove('flex');
  }

  async function confirmSaveAs() {
    const name = document.getElementById('saveAsName').value.trim();
    if (!name) return;
    const data = getWorkspaceData();
    const now = Date.now();
    const record = {
      name,
      ...data,
      createdAt: now,
      lastUsed: now,
      usageCount: 0,
    };
    activeSetId = await saveSetToDB(record);
    updateActiveIndicator(name);
    closeSaveAsModal();
    renderLibrary();
  }

  async function loadSet(id) {
    const set = await getSetById(id);
    if (!set) return;
    activeSetId = id;
    set.usageCount = (set.usageCount || 0) + 1;
    set.lastUsed = Date.now();
    await saveSetToDB(set);
    applyWorkspaceData(set);
    updateCount();
    generate();
    updateActiveIndicator(set.name);
    renderLibrary();
  }

  async function deleteSet(id) {
    if (!confirm('Delete this saved set?')) return;
    await deleteSetById(id);
    if (activeSetId === id) {
      activeSetId = null;
      updateActiveIndicator('');
    }
    renderLibrary();
  }

  function closeActiveSet() {
    activeSetId = null;
    updateActiveIndicator('');
    renderLibrary();
  }

  function escapeHtmlAttr(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function renderLibrary() {
    const listEl = document.getElementById('libraryList');
    const sortMode = document.getElementById('librarySort').value;
    let sets = await getAllSets();

    if (sortMode === 'recent') {
      sets.sort((a, b) => (b.lastUsed || 0) - (a.lastUsed || 0));
    } else if (sortMode === 'alpha') {
      sets.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
    } else if (sortMode === 'popular') {
      sets.sort((a, b) => (b.usageCount || 0) - (a.usageCount || 0));
    }

    if (sets.length === 0) {
      listEl.innerHTML = '<p class="text-xs text-slate-400 text-center py-4">No saved sets yet.</p>';
      return;
    }

    listEl.innerHTML = sets.map(s => {
      const isActive = s.id === activeSetId;
      const activeBadge = isActive ? '<span class="inline-block bg-brand-blue text-white text-[9px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded ml-2">Active</span>' : '';
      return `
        <div class="flex items-center gap-2 p-2 rounded-xl border-2 ${isActive ? 'border-brand-blue bg-brand-blue/5' : 'border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50'} group">
          <button onclick="loadSet(${s.id})" class="flex-1 text-left min-w-0">
            <p class="text-sm font-bold truncate dark:text-white flex items-center">${escapeHtmlAttr(s.name)}${activeBadge}</p>
            <p class="text-[10px] text-slate-400 font-medium">${new Date(s.lastUsed).toLocaleDateString()} · Used ${s.usageCount || 0}×</p>
          </button>
          <button onclick="deleteSet(${s.id})" class="p-1.5 rounded-lg text-slate-400 hover:text-brand-pink hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors shrink-0" title="Delete">
            <i data-lucide="trash-2" class="w-4 h-4"></i>
          </button>
        </div>
      `;
    }).join('');
    lucide.createIcons();
  }

  // ===== Existing Functions =====

  function toggleTheme() {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme_domino-maker', isDark ? 'dark' : 'light');
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function parseList(raw) {
    return raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
  }

  function isImageURL(s) {
    return /^(https?:\/\/|data:image\/)/i.test(s) && (/\.(png|jpe?g|gif|webp|svg)(\?.*)?$/i.test(s) || s.startsWith('data:image'));
  }

  function updateCount() {
    const items = parseList(wordListEl.value);
    itemCountEl.textContent = `${items.length} word${items.length === 1 ? '' : 's'} entered`;

    // Duplicate detection
    const seen = new Set();
    const dups = [];
    for (const item of items) {
      const key = item.toLowerCase();
      if (seen.has(key)) dups.push(item);
      seen.add(key);
    }
    if (dups.length > 0) {
      dupWarningEl.textContent = `⚠ Duplicate words detected: ${[...new Set(dups)].join(', ')} — the chain may not work as a game.`;
      dupWarningEl.classList.remove('hidden');
    } else {
      dupWarningEl.classList.add('hidden');
    }
  }

  function buildChain(items, n) {
    if (!items.length || n <= 0) return [];
    const seq = [];
    for (let i = 0; i < n; i++) seq.push(items[i % items.length]);
    const tiles = [];
    for (let i = 0; i < n; i++) tiles.push([seq[i], seq[(i + 1) % n]]);
    return tiles;
  }

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function renderHalf(val, opts) {
    if (!val) return '<div class="domino-half"></div>';
    if (isImageURL(val)) {
      return `<div class="domino-half">
        <img src="${escapeHtml(val)}" alt="" onerror="this.classList.add('error')" />
        <span class="img-fallback font-heading font-bold text-xs">Image failed to load</span>
      </div>`;
    }
    const upClass = opts.uppercase ? 'uppercase' : '';
    return `<div class="domino-half"><span class="font-heading font-bold ${opts.fontSize} ${upClass}">${escapeHtml(val)}</span></div>`;
  }

  function renderTile(pair, opts) {
    const [left, right] = pair;
    return `
      <div class="domino-tile">
        ${renderHalf(left, opts)}
        <div class="domino-divider"></div>
        ${renderHalf(right, opts)}
      </div>`;
  }

  function renderPage(pageTiles, opts) {
    const pageRows = Math.ceil(pageTiles.length / COLS);
    let cellsHTML = '';
    for (let i = 0; i < pageTiles.length; i++) {
      cellsHTML += renderTile(pageTiles[i], opts);
    }
    return `
      <div class="page-frame hub-card bg-white mx-auto" style="width:210mm;">
        <div class="page" style="grid-template-rows:repeat(${pageRows},1fr);">
          ${cellsHTML}
        </div>
      </div>`;
  }

  function saveSettings() {
    const data = {
      list: wordListEl.value,
      setSize: setSizeEl.value,
      tilesPerPage: tilesPerPageEl.value,
      fontSize: fontSizeEl.value,
      uppercase: uppercaseEl.checked,
    };
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
  }

  function loadSettings() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      if (data.list) wordListEl.value = data.list;
      if (data.setSize) setSizeEl.value = data.setSize;
      if (data.tilesPerPage) tilesPerPageEl.value = data.tilesPerPage;
      if (data.fontSize) fontSizeEl.value = data.fontSize;
      if (typeof data.uppercase === 'boolean') uppercaseEl.checked = data.uppercase;
    } catch (e) {}
  }

  function renderTiles() {
    const tilesPerPage = Math.max(2, Math.min(40, parseInt(tilesPerPageEl.value) || 18));
    const rows = Math.ceil(tilesPerPage / COLS);
    const pages = [];
    for (let i = 0; i < currentTiles.length; i += tilesPerPage) {
      pages.push(currentTiles.slice(i, i + tilesPerPage));
    }
    const opts = { fontSize: fontSizeEl.value, uppercase: uppercaseEl.checked };
    outputEl.innerHTML = pages.map(p => renderPage(p, opts)).join('');
    lucide.createIcons();

    const items = parseList(wordListEl.value);
    let note = '';
    if (items.length > 0 && items.length < currentTiles.length) {
      note = ` · words repeated to fill the set`;
    } else if (items.length > currentTiles.length) {
      note = ` · using first ${currentTiles.length} words`;
    }
    statsLineEl.textContent = `${currentTiles.length} tiles · ${pages.length} page${pages.length === 1 ? '' : 's'} · ${tilesPerPage} per page (${COLS}×${rows} grid)${note}`;
  }

  function generate() {
    const items = parseList(wordListEl.value);
    updateCount();
    saveSettings();

    if (items.length === 0) {
      currentTiles = [];
      outputEl.innerHTML = '';
      outputEl.appendChild(emptyStateEl);
      statsLineEl.textContent = '';
      shuffleBtn.disabled = true;
      lucide.createIcons();
      return;
    }

    const setSize = Math.max(4, Math.min(120, parseInt(setSizeEl.value) || 36));
    currentTiles = shuffleArray(buildChain(items, setSize));
    shuffleBtn.disabled = false;
    renderTiles();
  }

  function reshuffle() {
    if (currentTiles.length === 0) return;
    currentTiles = shuffleArray(currentTiles.slice());
    renderTiles();
  }

  document.getElementById('generateBtn').addEventListener('click', generate);
  document.getElementById('shuffleBtn').addEventListener('click', reshuffle);
  document.getElementById('printBtn').addEventListener('click', () => window.print());
  document.getElementById('loadExample').addEventListener('click', () => {
    wordListEl.value = EXAMPLE;
    updateCount();
    generate();
  });
  document.getElementById('clearList').addEventListener('click', () => {
    wordListEl.value = '';
    updateCount();
    generate();
  });
  wordListEl.addEventListener('input', updateCount);

  // Auto-save triggers
  [wordListEl, setSizeEl, tilesPerPageEl].forEach(el => {
    el.addEventListener('input', () => autoSaveIfActive());
    el.addEventListener('change', () => autoSaveIfActive());
  });
  [fontSizeEl, uppercaseEl].forEach(el => {
    el.addEventListener('change', () => autoSaveIfActive());
  });

  // Save As modal keyboard
  document.getElementById('saveAsName').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); confirmSaveAs(); }
    if (e.key === 'Escape') { closeSaveAsModal(); }
  });
  document.getElementById('saveAsModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('saveAsModal')) closeSaveAsModal();
  });

  loadSettings();
  updateCount();
  shuffleBtn.disabled = currentTiles.length === 0;
  if (parseList(wordListEl.value).length > 0) generate();
  renderLibrary();
</script>
</body>
</html>
