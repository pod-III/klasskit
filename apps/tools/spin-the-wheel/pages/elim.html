<!doctype html>
<html lang="en" class="light">

<head>
    <!-- Supabase Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4"></script>
    <script src="/supabase.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Elimination Grid - KlassKit</title>
    <link rel="icon" type="image/x-icon" href="../../../../media/icon.ico" />
    <link rel="icon" type="image/webp" href="../../../../media/icon.webp" />

    <!-- External Libraries -->
    <script src="https://unpkg.com/lucide@1.16.0"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet" />

    <!-- Theme Configuration -->
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        pink: "#FF6B95",
                        orange: "#FF8C42",
                        green: "#00E676",
                        blue: "#2979FF",
                        purple: "#7C4DFF",
                        dark: "#0f172a",
                        chalk: "#f8fafc",
                        surface: "rgba(255, 255, 255, 0.85)",
                        border: "rgba(203, 213, 225, 0.6)",
                    },
                    fontFamily: {
                        heading: ["Fredoka", "sans-serif"],
                        body: ["Nunito", "sans-serif"],
                        mono: ["JetBrains Mono", "monospace"],
                    },
                    boxShadow: {
                        neo: "4px 4px 0px 0px rgba(51, 65, 85, 0.15)",
                        "neo-sm": "2px 2px 0px 0px rgba(51, 65, 85, 0.15)",
                        "neo-lg": "8px 8px 0px 0px rgba(51, 65, 85, 0.15)",
                    },
                },
            },
        };
    </script>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        body {
            font-family: "Nunito", sans-serif;
            background-color: #f8fafc;
            background-image:
                linear-gradient(#e2e8f0 1.5px, transparent 1.5px),
                linear-gradient(90deg, #e2e8f0 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            color: #1e293b;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition:
                background-color 0.3s,
                color 0.3s;
        }

        html.dark body {
            background-color: #020617;
            background-image:
                linear-gradient(#0f172a 1.5px, transparent 1.5px),
                linear-gradient(90deg, #0f172a 1.5px, transparent 1.5px);
            color: #e2e8f0;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        html.dark .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .console-frame {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(203, 213, 225, 0.6);
            border-radius: 1.5rem;
            box-shadow: 8px 8px 0px rgba(51, 65, 85, 0.15);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        html.dark .console-frame {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.4);
        }

        .btn-chunky {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(0);
            position: relative;
            border: 1px solid rgba(203, 213, 225, 0.6);
            box-shadow: 4px 4px 0 rgba(51, 65, 85, 0.15);
            font-family: "Fredoka", sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        html.dark .btn-chunky {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.4);
            background-color: rgba(30, 41, 59, 0.8);
            color: #e2e8f0;
        }

        .btn-chunky:hover:not(:disabled) {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 rgba(51, 65, 85, 0.15);
            filter: brightness(105%);
        }

        html.dark .btn-chunky:hover:not(:disabled) {
            box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.4);
        }

        .btn-chunky:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 rgba(51, 65, 85, 0.15) !important;
        }

        html.dark .btn-chunky:active:not(:disabled) {
            box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.4) !important;
        }

        .btn-chunky:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translateY(2px);
            box-shadow: 0 0 0 rgba(51, 65, 85, 0.15);
            filter: grayscale(100%);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(203, 213, 225, 0.6);
            border-radius: 10px;
            border: 2px solid transparent;
            background-clip: content-box;
        }

        html.dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
        }

        .grid-card {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(203, 213, 225, 0.6);
            box-shadow: 4px 4px 0 rgba(51, 65, 85, 0.15);
        }

        html.dark .grid-card {
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.4);
        }

        .grid-card:hover:not(.eliminated):not(.highlight) {
            transform: translateY(-4px);
            box-shadow: 6px 6px 0 rgba(51, 65, 85, 0.15);
        }

        html.dark .grid-card:hover:not(.eliminated):not(.highlight) {
            box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.4);
        }

        .grid-card.highlight {
            background: #fef08a !important;
            border-color: #ff8c42 !important;
            transform: translateY(-8px) scale(1.05);
            box-shadow: 8px 8px 0 rgba(255, 140, 66, 0.3) !important;
            z-index: 20;
        }

        html.dark .grid-card.highlight {
            background: #eab308 !important;
            color: #1e293b !important;
        }

        .grid-card.eliminated {
            opacity: 0.5;
            transform: scale(0.95);
            box-shadow: none !important;
            border-style: dashed;
            border-color: #cbd5e1;
        }

        html.dark .grid-card.eliminated {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .elimination-mark {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .grid-card.eliminated .elimination-mark {
            opacity: 1;
            transform: scale(1);
        }

        /* Winner Modal */
        .winner-modal {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            transition: opacity 0.5s ease;
        }

        .winner-card {
            background: #ffffff;
            border: 2px solid #0f172a;
            box-shadow: 12px 12px 0 rgba(0, 230, 118, 0.3);
            transform: scale(0.9);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        html.dark .winner-card {
            background: rgba(15, 23, 42, 0.95);
            border-color: #00e676;
            box-shadow: 12px 12px 0 rgba(0, 230, 118, 0.2);
        }

        .winner-modal.active .winner-card {
            transform: scale(1);
            opacity: 1;
        }

        .winner-name {
            background: linear-gradient(135deg,
                    #ff6b95 0%,
                    #ff8c42 50%,
                    #00e676 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Sunburst */
        .sunburst {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 200vmax;
            height: 200vmax;
            background: repeating-conic-gradient(from 0deg,
                    rgba(0, 230, 118, 0.06) 0deg 15deg,
                    transparent 15deg 30deg);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 40;
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* Set/Group Selector */
        .set-item {
            transition: all 0.2s ease;
        }

        .set-item:hover {
            background: rgba(41, 121, 255, 0.1);
        }

        .set-item.active {
            background: rgba(41, 121, 255, 0.15);
            border-color: #2979ff;
        }

        html.dark .set-item.active {
            background: rgba(124, 77, 255, 0.15);
            border-color: #7c4dff;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-2px, 0, 0) rotate(-1deg);
            }

            20%,
            80% {
                transform: translate3d(3px, 0, 0) rotate(2deg);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-5px, 0, 0) rotate(-3deg);
            }

            40%,
            60% {
                transform: translate3d(5px, 0, 0) rotate(3deg);
            }
        }

        .shake {
            animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(203, 213, 225, 0.6);
            border: 1px solid rgba(203, 213, 225, 0.8);
            transition: 0.3s;
            border-radius: 34px;
        }

        html.dark .slider {
            background-color: rgba(30, 41, 59, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            box-shadow: 2px 2px 0px rgba(51, 65, 85, 0.15);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 50%;
        }

        html.dark .slider:before {
            background-color: #94a3b8;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.4);
        }

        input:checked+.slider {
            background-color: rgba(0, 230, 118, 0.3);
            border-color: #00e676;
        }

        html.dark input:checked+.slider {
            background-color: rgba(0, 230, 118, 0.2);
            border-color: #00e676;
        }

        input:checked+.slider:before {
            transform: translateX(24px);
            background-color: #00e676;
        }

        /* Panel animations */
        #controls, #config-panel {
            transition:
                transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #controls.collapsed { transform: translateX(-100%); width: 0; min-width: 0; padding: 0; margin: 0; border: none; overflow: hidden; }
        #config-panel.collapsed { transform: translateX(100%); width: 0; min-width: 0; padding: 0; margin: 0; border: none; overflow: hidden; }
        @media (max-width: 768px) {
            #controls { position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; transform: translateX(-100%); }
            #controls.mobile-open { transform: translateX(0); }
            #controls.collapsed { transform: translateX(-100%); width: 85%; min-width: 300px; }
            #config-panel { position: fixed; top: 0; right: 0; height: 100vh; z-index: 100; transform: translateX(100%); }
            #config-panel.mobile-open { transform: translateX(0); }
            #config-panel.collapsed { transform: translateX(100%); width: 85%; min-width: 300px; }
        }
    </style>
</head>

<body class="h-screen w-screen overflow-hidden">
    <div id="toast-container"
        class="fixed top-4 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none"></div>

    <!-- Sunburst Background -->
    <div id="sunburst" class="sunburst"></div>

    <!-- Winner Modal -->
    <div id="winner-modal" class="winner-modal fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="winner-card w-full max-w-md p-6 md:p-8 rounded-3xl text-center relative">
            <button onclick="closeWinnerModal()"
                class="absolute top-4 right-4 text-slate-400 hover:text-dark dark:hover:text-slate-200">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>

            <div class="mb-6 flex justify-center">
                <div
                    class="w-20 h-20 bg-green/10 rounded-full flex items-center justify-center border-4 border-green text-green animate-bounce">
                    <i data-lucide="trophy" class="w-10 h-10"></i>
                </div>
            </div>

            <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">
                The Winner Is
            </h2>
            <h1 id="winner-name-display"
                class="winner-name text-4xl md:text-5xl font-heading font-bold mb-6 break-words leading-tight">
                Name
            </h1>

            <button onclick="resetGrid()"
                class="w-full btn-chunky bg-green text-dark dark:text-dark py-3 rounded-xl font-bold">
                <i data-lucide="play" class="w-5 h-5 inline mr-2"></i> Play
                Again
            </button>
        </div>
    </div>

    <div class="console-frame w-full h-full relative flex z-10 rounded-none md:rounded-2xl">
        <!-- LEFT PANEL: LIBRARY + ACTION -->
        <aside id="controls"
            class="w-72 glass-panel border-r-[1px] border-slate-300 dark:border-white/10 flex flex-col z-50 h-full shrink-0">
            <!-- Header -->
            <div
                class="p-4 border-b-[1px] border-slate-300 dark:border-white/10 bg-slate-50/50 dark:bg-slate-800/50 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-3 flex-1 min-w-0">
                    <a href="../index.html"
                        class="p-2 bg-white dark:bg-slate-700 border-[1px] border-slate-300 dark:border-white/10 rounded-lg text-slate-400 hover:text-blue transition-colors shadow-sm"
                        title="Back to Home">
                        <i data-lucide="home" class="w-4 h-4"></i>
                    </a>
                    <div class="flex-1 min-w-0">
                        <h1
                            class="text-xl font-heading text-dark dark:text-slate-100 tracking-wide leading-none truncate">
                            ELIM<span class="text-pink">GRID</span>
                        </h1>
                        <!-- Active Indicator -->
                        <div id="active-indicator" class="flex items-center gap-1.5 mt-1 hidden">
                            <span class="relative flex h-2 w-2">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-2 w-2 bg-green"></span>
                            </span>
                            <span id="active-set-name" class="text-[10px] font-bold text-slate-400 truncate max-w-[120px] uppercase tracking-wider"></span>
                        </div>
                    </div>
                </div>
                <button onclick="toggleTheme()"
                    class="p-2 bg-white dark:bg-slate-700 border-[1px] border-slate-300 dark:border-white/10 rounded-lg text-slate-400 hover:text-blue transition-colors shadow-sm">
                    <i data-lucide="moon" class="w-4 h-4 hidden dark:block"></i>
                    <i data-lucide="sun" class="w-4 h-4 block dark:hidden"></i>
                </button>
            </div>

            <!-- Content -->
            <div class="flex-1 p-4 overflow-y-auto custom-scrollbar space-y-4 bg-transparent relative">
                <!-- Action Grid -->
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="newSet()" class="btn-chunky bg-white dark:bg-slate-800 py-3 rounded-xl flex flex-col items-center justify-center gap-1 group">
                        <div class="w-8 h-8 rounded-lg bg-blue/10 flex items-center justify-center text-blue group-hover:scale-110 transition-transform">
                            <i data-lucide="file-plus-2" class="w-5 h-5"></i>
                        </div>
                        <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">New List</span>
                    </button>
                    <button onclick="openSaveAsModal()" class="btn-chunky bg-white dark:bg-slate-800 py-3 rounded-xl flex flex-col items-center justify-center gap-1 group">
                        <div class="w-8 h-8 rounded-lg bg-green/10 flex items-center justify-center text-green group-hover:scale-110 transition-transform">
                            <i data-lucide="save" class="w-5 h-5"></i>
                        </div>
                        <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">Save As</span>
                    </button>
                </div>

                <!-- Library Section -->
                <div class="p-3 bg-slate-50/50 dark:bg-slate-800/50 border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-sm">
                    <div class="flex items-center justify-between mb-3">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="library" class="w-3.5 h-3.5 text-blue"></i>
                            Your Library
                        </label>
                        <select id="library-sort" onchange="renderLibrary()" class="bg-transparent text-[10px] font-bold text-slate-500 outline-none cursor-pointer hover:text-blue transition-colors">
                            <option value="recent">Recent</option>
                            <option value="alpha">A-Z</option>
                            <option value="popular">Popular</option>
                        </select>
                    </div>
                    <div id="library-list" class="space-y-1.5 max-h-[180px] overflow-y-auto custom-scrollbar pr-1">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- MAIN ACTION -->
                <button id="eliminateBtn" onclick="triggerElimination()"
                    class="w-full btn-chunky bg-pink text-white dark:text-white py-5 rounded-xl text-lg tracking-widest flex items-center justify-center gap-3 hover:brightness-110 shadow-neo-lg disabled:opacity-50 disabled:grayscale">
                    <i data-lucide="bomb" class="w-6 h-6"></i>
                    ELIMINATE
                </button>

                <!-- STATS -->
                <div class="p-3 bg-slate-50/50 dark:bg-slate-800/50 border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-sm">
                    <div class="flex justify-between items-center border-b-[1px] border-slate-200 dark:border-white/10 pb-2 mb-2">
                        <span class="text-xs font-black text-slate-400 uppercase">Survivors</span>
                        <span id="remainingCount" class="font-heading font-bold text-2xl text-dark dark:text-white">0</span>
                    </div>
                    <div class="w-full bg-slate-200 dark:bg-slate-700 h-3 rounded-full overflow-hidden border-[1px] border-slate-300 dark:border-white/10">
                        <div id="progressBar" class="h-full bg-blue transition-all duration-500 w-0"></div>
                    </div>
                </div>

            </div>

            <!-- Footer -->
            <div class="p-3 border-t-[1px] border-slate-300 dark:border-white/10 bg-slate-50/50 dark:bg-slate-800/50 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-2">
                    <button onclick="toggleMute()" id="muteBtn"
                        class="p-2 bg-white dark:bg-slate-700 border-[1px] border-slate-300 dark:border-white/10 rounded-lg text-slate-400 hover:text-dark dark:hover:text-slate-200 transition-colors shadow-sm" title="Toggle Sound">
                        <i id="muteIcon" data-lucide="volume-2" class="w-4 h-4"></i>
                    </button>
                    <button onclick="resetGrid()"
                        class="p-2 bg-white dark:bg-slate-700 border-[1px] border-slate-300 dark:border-white/10 rounded-lg text-slate-400 hover:text-orange transition-colors shadow-sm" title="Reset Grid">
                        <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                    </button>
                    <button onclick="clearAll()"
                        class="p-2 bg-white dark:bg-slate-700 border-[1px] border-slate-300 dark:border-white/10 rounded-lg text-slate-400 hover:text-pink transition-colors shadow-sm" title="Clear Participants">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
                <div class="font-heading font-black text-slate-400 text-[10px] uppercase tracking-wider">
                    TOTAL: <span id="totalCount" class="text-blue">0</span>
                </div>
            </div>
        </aside>

        <!-- RIGHT PANEL: EDIT ITEMS -->
        <aside id="config-panel"
            class="w-80 glass-panel border-l-[1px] border-slate-300 dark:border-white/10 flex flex-col z-50 h-full shrink-0 order-last">
            <div class="p-4 border-b-[1px] border-slate-300 dark:border-white/10 bg-slate-50/50 dark:bg-slate-800/50 flex items-center justify-between shrink-0">
                <h2 class="text-sm font-heading font-bold text-dark dark:text-slate-100 tracking-wide">EDIT <span class="text-orange">ITEMS</span></h2>
                <button onclick="toggleRightPanel()" class="md:hidden p-2 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-lg">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="flex-1 p-4 overflow-y-auto custom-scrollbar bg-transparent space-y-3">
                <div class="p-3 bg-slate-50/50 dark:bg-slate-800/50 border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-sm space-y-2">
                    <div class="flex justify-between items-center border-b-[1px] border-slate-200 dark:border-white/10 pb-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="users" class="w-4 h-4 text-orange"></i> Edit Items
                        </label>
                        <button onclick="toggleBatch()" class="text-[10px] text-blue font-bold hover:underline uppercase">Batch Edit</button>
                    </div>
                    <button onclick="document.getElementById('img-upload-elim').click()"
                        class="btn-chunky w-full bg-blue text-white py-2.5 rounded-xl text-xs flex items-center justify-center gap-2">
                        <i data-lucide="image-plus" class="w-4 h-4"></i> ADD IMAGE(S)
                    </button>
                    <input type="file" id="img-upload-elim" accept="image/*" multiple class="hidden" onchange="addImageOptions(this)" />
                    <div class="flex gap-2">
                        <input type="text" id="optionInput" placeholder="Add name..."
                            class="flex-1 border-[1px] border-slate-300 dark:border-white/10 rounded-lg px-3 py-2 font-bold text-dark dark:text-slate-200 text-sm bg-white/50 dark:bg-slate-900/50 focus:outline-none focus:border-blue focus:ring-1 focus:ring-blue"
                            onkeydown="if (event.key === 'Enter') addOption();" />
                        <button onclick="addOption()" class="btn-chunky bg-green text-dark px-3 rounded-lg">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <div id="batchContainer" class="hidden animate-slide-down">
                        <textarea id="batchInput" rows="3"
                            class="w-full p-2 bg-white/50 dark:bg-slate-900/50 text-dark dark:text-slate-200 font-mono text-xs border-[1px] border-slate-300 dark:border-white/10 rounded-lg resize-none mb-2"
                            placeholder="One name per line..."></textarea>
                        <button onclick="saveBatch()" class="w-full btn-chunky bg-dark text-white py-2 rounded-lg text-xs">Update List</button>
                    </div>
                    <div id="optionsList" class="flex flex-wrap gap-1 max-h-[calc(100vh-380px)] overflow-y-auto custom-scrollbar pt-1 pr-1">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </aside>

        <!-- MAIN GRID AREA -->
        <main id="main-area"
            class="flex-1 relative h-full bg-slate-50/50 dark:bg-slate-900/50 flex flex-col overflow-hidden transition-colors duration-300">
            <button id="left-toggle-btn" onclick="toggleLeftPanel()" title="Toggle Library panel"
                class="absolute top-4 left-4 z-30 p-2 glass-panel border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-neo-sm hover:translate-y-[-2px] transition-transform text-slate-500 hover:text-dark dark:hover:text-slate-200">
                <i data-lucide="panel-left-close" class="w-5 h-5" id="left-toggle-icon"></i>
            </button>
            <button id="right-toggle-btn" onclick="toggleRightPanel()" title="Toggle Items panel"
                class="absolute top-4 right-4 z-30 p-2 glass-panel border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-neo-sm hover:translate-y-[-2px] transition-transform text-slate-500 hover:text-dark dark:hover:text-slate-200">
                <i data-lucide="panel-right-close" class="w-5 h-5" id="right-toggle-icon"></i>
            </button>

            <!-- Grid -->
            <div class="flex-1 overflow-y-auto p-4 md:p-6 custom-scrollbar">
                <div id="game-grid"
                    class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4 pb-24">
                    <!-- Cards populated by JS -->
                </div>
            </div>

            <!-- Empty State -->
            <div id="empty-state"
                class="hidden absolute inset-0 flex flex-col items-center justify-center text-slate-400">
                <div
                    class="w-24 h-24 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center mb-4">
                    <i data-lucide="users" class="w-12 h-12"></i>
                </div>
                <p class="font-heading text-xl font-bold">
                    No Participants
                </p>
                <p class="text-sm">Add students or select a saved set</p>
            </div>
        </main>
    </div>

    <!-- New Set Modal -->
    <div id="set-modal"
        class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-50 backdrop-blur-sm p-4">
        <div
            class="glass-panel w-full max-w-md border-[1px] border-slate-300 dark:border-white/10 rounded-3xl shadow-neo-lg p-6 relative animate-bounce-in">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-heading text-2xl font-bold text-dark dark:text-white">
                    Save New Set
                </h2>
                <button onclick="closeSetModal()"
                    class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition-colors">
                    <i data-lucide="x" class="w-6 h-6 text-slate-500"></i>
                </button>
            </div>

            <input type="text" id="new-set-name" placeholder="Set name (e.g. Class 7A)"
                class="w-full p-4 mb-4 bg-white/50 dark:bg-slate-900/50 text-dark dark:text-slate-200 font-heading text-lg font-bold border-[1px] border-slate-300 dark:border-white/10 rounded-xl focus:border-blue focus:ring-1 focus:ring-blue outline-none shadow-inner" />

            <div class="mt-6 flex gap-3">
                <button onclick="closeSetModal()"
                    class="flex-1 btn-chunky bg-white dark:bg-slate-700 text-dark dark:text-white py-3 rounded-xl font-bold">
                    Cancel
                </button>
                <button onclick="createNewSet()"
                    class="flex-1 btn-chunky bg-green text-dark dark:text-dark py-3 rounded-xl font-bold">
                    Create Set
                </button>
            </div>
        </div>
    </div>

    <script>
        // Universal Slides/Sets Management Pattern Implementation
        const appState = {
            data: {
                name: "",
                participants: ["Alice", "Bob", "Charlie", "Diana", "Evan", "Fiona"],
                eliminatedIndices: [],
                totalEliminations: 0,
            },
            activeId: null
        };

        const STORAGE_KEY = "elimgrid_library_v2";
        const SESSION_KEY = "elimgrid_session_state";
        let isAnimating = false;
        let isMuted = false;
        let audioInitialized = false;
        let synth, noiseSynth, winSynth;
        let leftPanelOpen = true, rightPanelOpen = true;

        function toggleLeftPanel() {
            const panel = document.getElementById("controls");
            const icon = document.getElementById("left-toggle-icon");
            leftPanelOpen = !leftPanelOpen;
            if (window.innerWidth < 768) panel.classList.toggle("mobile-open", leftPanelOpen);
            else panel.classList.toggle("collapsed", !leftPanelOpen);
            icon.setAttribute("data-lucide", leftPanelOpen ? "panel-left-close" : "panel-left-open");
            lucide.createIcons();
        }

        function toggleRightPanel() {
            const panel = document.getElementById("config-panel");
            const icon = document.getElementById("right-toggle-icon");
            rightPanelOpen = !rightPanelOpen;
            if (window.innerWidth < 768) panel.classList.toggle("mobile-open", rightPanelOpen);
            else panel.classList.toggle("collapsed", !rightPanelOpen);
            icon.setAttribute("data-lucide", rightPanelOpen ? "panel-right-close" : "panel-right-open");
            lucide.createIcons();
        }

        function togglePanel() { toggleLeftPanel(); }

        async function addImageOptions(fileInput) {
            const files = Array.from(fileInput.files);
            if (!files.length) return;
            fileInput.value = '';
            showToast(`Adding ${files.length} image${files.length > 1 ? 's' : ''}...`, 'info');
            files.forEach(file => {
                const name = file.name.replace(/\.[^.]+$/, '');
                appState.data.participants.push(name);
            });
            onContentChange();
            renderList();
            renderGrid();
            showToast(`Added ${files.length} item${files.length > 1 ? 's' : ''}`, 'success');
        }

        // Persistence Helpers
        function getLibrary() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        function saveLibrary(library) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(library));
            saveProgress(STORAGE_KEY, library).catch(err => {
                console.error('[Cloud Sync] Failed to save library:', err);
                showToast('Cloud sync failed - data saved locally', 'warning');
            });
        }

        function onContentChange() {
            updateSessionPersistence();
            
            if (appState.activeId) {
                const library = getLibrary();
                const index = library.findIndex(item => item.id === appState.activeId);
                if (index !== -1) {
                    library[index] = {
                        ...library[index],
                        name: appState.data.name,
                        participants: [...appState.data.participants],
                        lastUsed: Date.now()
                    };
                    saveLibrary(library);
                }
            }
        }

        function updateSessionPersistence() {
            const sessionState = {
                data: appState.data,
                activeId: appState.activeId,
                isMuted: isMuted
            };
            localStorage.setItem('elimgrid_session', JSON.stringify(appState.data));
            localStorage.setItem('elimgrid_activeId', appState.activeId);
            saveProgress(SESSION_KEY, sessionState).catch(err => {
                console.error('[Cloud Sync] Failed to save session:', err);
            });
        }

        // Lifecycle Workflows
        function newSet() {
            appState.data = {
                name: "",
                participants: [],
                eliminatedIndices: [],
                totalEliminations: 0
            };
            appState.activeId = null;
            updateUI();
            renderLibrary();
            showToast("New list ready", "info");
        }

        function openSaveAsModal() {
            const name = prompt("Enter a name for this list:", appState.data.name || "");
            if (name === null) return;
            if (!name.trim()) {
                showToast("Name is required", "error");
                return;
            }
            saveAsNew(name.trim());
        }

        function saveAsNew(name) {
            const library = getLibrary();
            const newId = Date.now();
            const newEntry = {
                id: newId,
                name: name,
                participants: [...appState.data.participants],
                createdAt: Date.now(),
                lastUsed: Date.now(),
                usageCount: 1
            };
            library.push(newEntry);
            saveLibrary(library);
            
            appState.activeId = newId;
            appState.data.name = name;
            
            renderLibrary();
            updateActiveIndicator();
            showToast(`Saved as "${name}"`, "success");
        }

        function loadSet(id) {
            const library = getLibrary();
            const item = library.find(i => i.id === id);
            if (!item) return;

            item.usageCount = (item.usageCount || 0) + 1;
            item.lastUsed = Date.now();
            saveLibrary(library);

            appState.activeId = id;
            appState.data = {
                name: item.name,
                participants: [...item.participants],
                eliminatedIndices: [],
                totalEliminations: 0
            };

            updateUI();
            renderLibrary();
            showToast(`Loaded ${item.name}`, "info");
        }

        function deleteLibraryItem(id, event) {
            if (event) event.stopPropagation();
            if (!confirm("Are you sure you want to delete this list?")) return;

            let library = getLibrary();
            library = library.filter(i => i.id !== id);
            saveLibrary(library);

            if (appState.activeId === id) {
                newSet();
            } else {
                renderLibrary();
            }
            showToast("List deleted", "info");
        }

        // UI Updates
        function updateUI() {
            updateActiveIndicator();
            renderGrid();
            renderList();
            updateStats();
        }

        function updateActiveIndicator() {
            const indicator = document.getElementById("active-indicator");
            const nameEl = document.getElementById("active-set-name");
            
            if (appState.activeId) {
                indicator.classList.remove("hidden");
                nameEl.textContent = appState.data.name;
            } else {
                indicator.classList.add("hidden");
            }
        }

        function renderLibrary() {
            const list = document.getElementById("library-list");
            const sortBy = document.getElementById("library-sort").value;
            let library = getLibrary();

            if (library.length === 0) {
                list.innerHTML = '<p class="text-[10px] text-slate-400 text-center py-4 italic uppercase tracking-widest">Library is empty</p>';
                return;
            }

            if (sortBy === "recent") library.sort((a, b) => b.lastUsed - a.lastUsed);
            else if (sortBy === "alpha") library.sort((a, b) => a.name.localeCompare(b.name));
            else if (sortBy === "popular") library.sort((a, b) => (b.usageCount || 0) - (a.usageCount || 0));

            list.innerHTML = library.map(item => `
                <div onclick="loadSet(${item.id})" class="group flex items-center justify-between p-2 rounded-xl border-[1px] cursor-pointer transition-all ${appState.activeId === item.id ? 'bg-blue/10 border-blue/30' : 'border-transparent hover:bg-slate-100 dark:hover:bg-slate-800'}">
                    <div class="flex items-center gap-2 overflow-hidden">
                        <div class="w-7 h-7 rounded-lg bg-slate-200 dark:bg-slate-700 flex items-center justify-center text-xs font-black text-slate-500 shrink-0">
                            ${item.name.charAt(0).toUpperCase()}
                        </div>
                        <div class="flex flex-col overflow-hidden">
                            <span class="text-xs font-bold truncate text-dark dark:text-slate-200">${item.name}</span>
                            <span class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">${item.participants.length} Participants</span>
                        </div>
                    </div>
                    <button onclick="deleteLibraryItem(${item.id}, event)" class="p-1.5 text-slate-300 hover:text-pink opacity-0 group-hover:opacity-100 transition-all">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                    </button>
                </div>
            `).join("");
            
            lucide.createIcons();
        }

        // Grid Rendering
        function renderGrid() {
            const grid = document.getElementById("game-grid");
            const emptyState = document.getElementById("empty-state");
            grid.innerHTML = "";

            if (appState.data.participants.length === 0) {
                emptyState.classList.remove("hidden");
                updateStats();
                lucide.createIcons();
                return;
            }

            emptyState.classList.add("hidden");

            appState.data.participants.forEach((name, i) => {
                const isEliminated = appState.data.eliminatedIndices.includes(i);
                const card = document.createElement("div");
                card.id = `card-${i}`;
                card.className = `grid-card relative rounded-2xl p-4 min-h-[100px] flex flex-col items-center justify-center cursor-pointer select-none ${isEliminated ? "eliminated" : ""}`;
                card.onclick = () => manualToggle(i);

                const display = name.length > 15 ? name.substring(0, 13) + "..." : name;
                const fontSize = name.length > 10 ? "text-sm" : name.length > 6 ? "text-base" : "text-lg";

                card.innerHTML = `
                    <div class="text-center font-heading font-bold text-dark dark:text-white break-words w-full leading-tight ${fontSize}" title="${name}">
                        ${display}
                    </div>
                    <div class="elimination-mark">
                        <i data-lucide="x" class="w-12 h-12 text-pink stroke-[3]"></i>
                    </div>
                `;
                grid.appendChild(card);
            });

            updateStats();
            lucide.createIcons();
        }

        function renderList() {
            const list = document.getElementById("optionsList");
            list.innerHTML = appState.data.participants.map((name, i) => `
                <div class="flex items-center gap-1 bg-white dark:bg-slate-700 border-[1px] border-slate-300 dark:border-white/10 rounded-lg px-2 py-1 text-[10px] font-black text-dark dark:text-slate-200 shadow-neo-sm uppercase tracking-tighter transition-all">
                    ${name}
                    <button onclick="removeParticipant(${i})" class="ml-1 text-slate-400 hover:text-pink">
                        <i data-lucide="x" class="w-3 h-3"></i>
                    </button>
                </div>
            `).join("");
            lucide.createIcons();
        }

        function updateStats() {
            const total = appState.data.participants.length;
            const remaining = total - appState.data.eliminatedIndices.length;

            document.getElementById("remainingCount").textContent = remaining;
            document.getElementById("totalCount").textContent = total;

            const bar = document.getElementById("progressBar");
            const pct = total === 0 ? 0 : (remaining / total) * 100;
            bar.style.width = `${pct}%`;
            bar.className = `h-full transition-all duration-500 ${pct > 50 ? "bg-blue" : pct > 20 ? "bg-orange" : "bg-pink"}`;

            const btn = document.getElementById("eliminateBtn");
            btn.disabled = remaining <= 1 || isAnimating;
        }

        // Actions
        function addOption() {
            const input = document.getElementById("optionInput");
            const name = input.value.trim();
            if (!name) return;

            appState.data.participants.push(name);
            input.value = "";
            onContentChange();
            renderGrid();
            renderList();
        }

        function removeParticipant(index) {
            appState.data.participants.splice(index, 1);
            appState.data.eliminatedIndices = appState.data.eliminatedIndices
                .filter(i => i !== index)
                .map(i => i > index ? i - 1 : i);
            
            onContentChange();
            renderGrid();
            renderList();
        }

        function toggleBatch() {
            const container = document.getElementById("batchContainer");
            const input = document.getElementById("batchInput");
            if (container.classList.contains("hidden")) {
                input.value = appState.data.participants.join("\n");
                container.classList.remove("hidden");
            } else container.classList.add("hidden");
        }

        function saveBatch() {
            const input = document.getElementById("batchInput");
            appState.data.participants = input.value.split(/[\n,]+/).map(s => s.trim()).filter(s => s.length > 0);
            appState.data.eliminatedIndices = [];
            onContentChange();
            toggleBatch();
            renderGrid();
            renderList();
            showToast("List updated", "success");
        }

        function clearAll() {
            if (!confirm("Clear current list?")) return;
            appState.data.participants = [];
            appState.data.eliminatedIndices = [];
            onContentChange();
            renderGrid();
            renderList();
        }

        function resetGrid() {
            appState.data.eliminatedIndices = [];
            document.getElementById("sunburst").style.opacity = "0";
            closeWinnerModal();
            renderGrid();
            onContentChange();
        }

        function manualToggle(index) {
            if (isAnimating) return;
            const idx = appState.data.eliminatedIndices.indexOf(index);
            if (idx === -1) appState.data.eliminatedIndices.push(index);
            else appState.data.eliminatedIndices.splice(idx, 1);
            
            onContentChange();
            renderGrid();
            checkWinner();
        }

        async function triggerElimination() {
            const available = appState.data.participants.map((_, i) => i).filter(i => !appState.data.eliminatedIndices.includes(i));
            if (available.length <= 1 || isAnimating) return;

            isAnimating = true;
            await initAudio();
            const btn = document.getElementById("eliminateBtn");
            btn.disabled = true;

            let rounds = 15 + Math.floor(Math.random() * 10);
            let delay = 50;
            let lastIdx = -1;

            for (let i = 0; i < rounds; i++) {
                const current = available[Math.floor(Math.random() * available.length)];
                if (lastIdx !== -1) document.getElementById(`card-${lastIdx}`)?.classList.remove("highlight");
                const card = document.getElementById(`card-${current}`);
                if (card) {
                    card.classList.add("highlight");
                    lastIdx = current;
                    playTick();
                }
                await new Promise(r => setTimeout(r, delay));
                delay *= 1.1;
            }

            const victim = lastIdx;
            const victimCard = document.getElementById(`card-${victim}`);
            victimCard.classList.add("shake");
            await new Promise(r => setTimeout(r, 500));

            playBoom();
            appState.data.eliminatedIndices.push(victim);
            victimCard.classList.remove("highlight", "shake");
            victimCard.classList.add("eliminated");

            isAnimating = false;
            onContentChange();
            updateStats();
            checkWinner();
        }

        function checkWinner() {
            const remaining = appState.data.participants.length - appState.data.eliminatedIndices.length;
            if (remaining === 1 && appState.data.participants.length > 1) {
                const winnerIdx = appState.data.participants.findIndex((_, i) => !appState.data.eliminatedIndices.includes(i));
                setTimeout(() => declareWinner(winnerIdx), 300);
            }
        }

        function declareWinner(index) {
            playWin();
            const winnerName = appState.data.participants[index];
            document.getElementById("sunburst").style.opacity = "0.6";
            document.getElementById("winner-name-display").textContent = winnerName;
            const modal = document.getElementById("winner-modal");
            modal.classList.remove("hidden");
            modal.classList.add("flex");
            requestAnimationFrame(() => modal.classList.add("active"));

            const colors = ["#FF6B95", "#FF8C42", "#00E676", "#2979FF"];
            const end = Date.now() + 3000;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors });
                if (Date.now() < end) requestAnimationFrame(frame);
            })();
        }

        function closeWinnerModal() {
            const modal = document.getElementById("winner-modal");
            modal.classList.remove("active");
            setTimeout(() => { modal.classList.add("hidden"); modal.classList.remove("flex"); }, 300);
            document.getElementById("sunburst").style.opacity = "0";
        }

        // Audio
        async function initAudio() {
            if (audioInitialized || isMuted) return;
            await Tone.start();
            synth = new Tone.MembraneSynth({ pitchDecay: 0.05, octaves: 2, oscillator: { type: "sine" }, envelope: { attack: 0.001, decay: 0.05, sustain: 0, release: 0.01 }, volume: -10 }).toDestination();
            noiseSynth = new Tone.NoiseSynth({ noise: { type: "white" }, envelope: { attack: 0.005, decay: 0.1, sustain: 0 } }).toDestination();
            winSynth = new Tone.PolySynth(Tone.Synth, { volume: -5, oscillator: { type: "triangle" }, envelope: { attack: 0.01, decay: 0.1, sustain: 0.1, release: 1 } }).toDestination();
            audioInitialized = true;
        }

        function playTick() { try { if (!isMuted && synth) synth.triggerAttackRelease("C2", "32n", Tone.now()); } catch (e) {} }
        function playBoom() { try { if (!isMuted && noiseSynth) noiseSynth.triggerAttackRelease("16n", Tone.now()); } catch (e) {} }
        function playWin() { 
            if (!isMuted && winSynth) { 
                try {
                    const now = Tone.now() + 0.05; 
                    winSynth.triggerAttackRelease(["C4", "E4", "G4"], "8n", now); 
                    winSynth.triggerAttackRelease(["E4", "G4", "C5"], "8n", now + 0.1); 
                    winSynth.triggerAttackRelease(["G4", "C5", "E5"], "2n", now + 0.2); 
                } catch (e) {}
            } 
        }

        function toggleMute() {
            isMuted = !isMuted;
            const icon = document.getElementById("muteIcon");
            icon.setAttribute("data-lucide", isMuted ? "volume-x" : "volume-2");
            if (!isMuted && !audioInitialized) initAudio();
            lucide.createIcons();
        }

        // Theme & Panel
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle("dark");
            localStorage.setItem("theme_spin-the-wheel", isDark ? "dark" : "light");
            lucide.createIcons();
        }

        function loadTheme() {
            const saved = localStorage.getItem("theme_spin-the-wheel");
            if (saved === "dark" || (!saved && window.matchMedia("(prefers-color-scheme: dark)").matches))
                document.documentElement.classList.add("dark");
        }


        function showToast(message, type = "info") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            const colors = { success: "bg-green text-dark border-green", error: "bg-pink text-white border-pink", info: "bg-blue text-white border-blue" };
            toast.className = `${colors[type]} px-4 py-3 rounded-xl shadow-neo border-[1px] font-bold text-sm flex items-center gap-2 pointer-events-auto transform transition-all duration-300 translate-y-[-20px] opacity-0`;
            toast.innerHTML = `<i data-lucide="${type === "success" ? "check-circle" : type === "error" ? "x-circle" : "info"}" class="w-4 h-4"></i> ${message}`;
            container.appendChild(toast);
            lucide.createIcons();
            requestAnimationFrame(() => toast.classList.remove("translate-y-[-20px]", "opacity-0"));
            setTimeout(() => { toast.classList.add("translate-y-[-20px]", "opacity-0"); setTimeout(() => toast.remove(), 300); }, 2500);
        }

        // Migration
        async function migrateLegacyData() {
            const MIGRATED_KEY = 'elimgrid_migrated_v2';
            if (localStorage.getItem(MIGRATED_KEY)) return;

            const DB_NAME = "ElimGridDB_v3";
            const STORE_NAME = "sets";

            // Local Migration
            try {
                const request = indexedDB.open(DB_NAME);
                request.onsuccess = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.close();
                        checkCloudMigration();
                        return;
                    }

                    const transaction = db.transaction(STORE_NAME, 'readonly');
                    const store = transaction.objectStore(STORE_NAME);
                    const getAll = store.getAll();

                    getAll.onsuccess = () => {
                        const legacyData = getAll.result;
                        if (legacyData && legacyData.length > 0) {
                            const library = getLibrary();
                            legacyData.forEach(item => {
                                if (!library.some(l => l.name === item.name)) {
                                    library.push({
                                        id: Date.now() + Math.random(),
                                        name: item.name || 'Legacy Set',
                                        participants: item.participants || [],
                                        createdAt: item.updatedAt || Date.now(),
                                        lastUsed: item.updatedAt || Date.now(),
                                        usageCount: 1
                                    });
                                }
                            });
                            saveLibrary(library);
                            renderLibrary();
                        }
                        db.close();
                        checkCloudMigration();
                    };
                };
                request.onerror = () => checkCloudMigration();
            } catch (e) {
                checkCloudMigration();
            }

            async function checkCloudMigration() {
                try {
                    const cloudData = await loadProgress('elimination_picker_data');
                    if (cloudData && Array.isArray(cloudData.sets)) {
                        const library = getLibrary();
                        cloudData.sets.forEach(item => {
                            if (!library.some(l => l.name === item.name)) {
                                library.push({
                                    id: Date.now() + Math.random(),
                                    name: item.name || 'Cloud Set',
                                    participants: item.participants || [],
                                    createdAt: item.updatedAt || Date.now(),
                                    lastUsed: item.updatedAt || Date.now(),
                                    usageCount: 1
                                });
                            }
                        });
                        saveLibrary(library);
                        renderLibrary();
                    }
                } catch (e) {}
                localStorage.setItem(MIGRATED_KEY, 'true');
            }
        }

        // Init
        async function init() {
            await requireAuth();
            loadTheme();

            // Initial Cloud Sync
            if (getLibrary().length === 0) {
                const cloudLibrary = await loadProgress(STORAGE_KEY);
                if (cloudLibrary) {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(cloudLibrary));
                }
            }

            // Load session state from cloud
            const cloudSession = await loadProgress(SESSION_KEY);
            if (cloudSession) {
                if (cloudSession.isMuted !== undefined) {
                    isMuted = cloudSession.isMuted;
                }
                if (cloudSession.activeId) {
                    localStorage.setItem('elimgrid_activeId', cloudSession.activeId);
                }
                if (cloudSession.data) {
                    localStorage.setItem('elimgrid_session', JSON.stringify(cloudSession.data));
                }
            }

            const savedActiveId = localStorage.getItem('elimgrid_activeId');
            if (savedActiveId && savedActiveId !== "null") loadSet(parseInt(savedActiveId));
            else {
                const session = localStorage.getItem('elimgrid_session');
                if (session) { appState.data = JSON.parse(session); updateUI(); }
                else updateUI();
            }
            renderLibrary();
            window.addEventListener("resize", () => {
                const controls = document.getElementById("controls");
                if (window.innerWidth >= 768) controls.classList.remove("hidden-panel-mobile");
                else controls.classList.remove("hidden-panel-desktop");
            });
        }

        window.onload = init;
    </script>
</body>

</html>
