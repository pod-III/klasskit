<!doctype html>
<html lang="en" class="light">

<head>
    <!-- Supabase Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4"></script>
    <script src="/supabase.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mystery Deck - KlassKit</title>
    <link rel="icon" type="image/x-icon" href="../../../../media/icon.ico" />
    <link rel="icon" type="image/webp" href="../../../../media/icon.webp" />

    <!-- External Libraries -->
    <script src="https://unpkg.com/lucide@1.16.0"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;700;900&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet" />

    <!-- Theme Configuration -->
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        pink: "#FF6B95",
                        orange: "#FF8C42",
                        green: "#00E676",
                        blue: "#2979FF",
                        purple: "#7C4DFF",
                        dark: "#0f172a",
                        chalk: "#f8fafc",
                        surface: "rgba(255, 255, 255, 0.85)",
                        border: "rgba(203, 213, 225, 0.6)",
                    },
                    fontFamily: {
                        heading: ["Fredoka", "sans-serif"],
                        body: ["Nunito", "sans-serif"],
                        mono: ["JetBrains Mono", "monospace"],
                    },
                    boxShadow: {
                        neo: "4px 4px 0px 0px rgba(51, 65, 85, 0.15)",
                        "neo-sm": "2px 2px 0px 0px rgba(51, 65, 85, 0.15)",
                        "neo-lg": "8px 8px 0px 0px rgba(51, 65, 85, 0.15)",
                    },
                },
            },
        };
    </script>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        body {
            font-family: "Nunito", sans-serif;
            background-color: #f8fafc;
            background-image:
                linear-gradient(#e2e8f0 1.5px, transparent 1.5px),
                linear-gradient(90deg, #e2e8f0 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            color: #1e293b;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition:
                background-color 0.3s,
                color 0.3s;
        }

        html.dark body {
            background-color: #020617;
            background-image:
                linear-gradient(#0f172a 1.5px, transparent 1.5px),
                linear-gradient(90deg, #0f172a 1.5px, transparent 1.5px);
            color: #e2e8f0;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        html.dark .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .console-frame {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(203, 213, 225, 0.6);
            border-radius: 1.5rem;
            box-shadow: 8px 8px 0px rgba(51, 65, 85, 0.15);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        html.dark .console-frame {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.4);
        }

        .btn-chunky {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(0);
            position: relative;
            border: 1px solid rgba(203, 213, 225, 0.6);
            box-shadow: 4px 4px 0 rgba(51, 65, 85, 0.15);
            font-family: "Fredoka", sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        html.dark .btn-chunky {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.4);
            background-color: rgba(30, 41, 59, 0.8);
            color: #e2e8f0;
        }

        .btn-chunky:hover:not(:disabled) {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 rgba(51, 65, 85, 0.15);
            filter: brightness(105%);
        }

        html.dark .btn-chunky:hover:not(:disabled) {
            box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.4);
        }

        .btn-chunky:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 rgba(51, 65, 85, 0.15) !important;
        }

        html.dark .btn-chunky:active:not(:disabled) {
            box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.4) !important;
        }

        .btn-chunky:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translateY(2px);
            box-shadow: 0 0 0 rgba(51, 65, 85, 0.15);
            filter: grayscale(100%);
        }

        .btn-chunky.active {
            background: #2979ff !important;
            color: white !important;
            border-color: #2979ff !important;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(203, 213, 225, 0.6);
            border-radius: 10px;
            border: 2px solid transparent;
            background-clip: content-box;
        }

        html.dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Card Styles */
        .card-3d {
            perspective: 1000px;
            transform-style: preserve-3d;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        .card-3d.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            border-radius: 1rem;
            border: 1px solid rgba(203, 213, 225, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        html.dark .card-face {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .card-front {
            background: linear-gradient(135deg,
                    #2979ff 0%,
                    #ff6b95 50%,
                    #ff8c42 100%);
            z-index: 2;
        }

        .card-front::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(-45deg,
                    transparent,
                    transparent 10px,
                    rgba(255, 255, 255, 0.1) 10px,
                    rgba(255, 255, 255, 0.1) 20px);
        }

        .card-front::after {
            content: "?";
            font-family: "Fredoka", sans-serif;
            font-weight: 700;
            font-size: 2.5rem;
            color: #1e293b;
            background: white;
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(203, 213, 225, 0.6);
            box-shadow: 4px 4px 0 rgba(51, 65, 85, 0.15);
            z-index: 1;
        }

        html.dark .card-front::after {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.4);
        }

        .card-back {
            background: rgba(255, 255, 255, 0.95);
            transform: rotateY(180deg);
            padding: 1rem;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.05);
        }

        html.dark .card-back {
            background: rgba(30, 41, 59, 0.95);
        }

        /* Playing Card */
        .playing-card {
            position: absolute;
            width: 120px;
            height: 170px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .playing-card:hover:not(.flipped):not(.focused) {
            z-index: 100 !important;
            transform: translateY(-20px) scale(1.05) rotate(var(--rotation, 0deg)) !important;
        }

        .playing-card.focused {
            position: fixed !important;
            z-index: 9999 !important;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .playing-card.dimmed {
            opacity: 0.3;
            filter: grayscale(0.5);
        }

        .playing-card.removing {
            animation: cardRemove 0.4s forwards;
        }

        @keyframes cardRemove {
            to {
                transform: scale(0) rotate(360deg) !important;
                opacity: 0;
            }
        }

        /* Stack View */
        .stack-container {
            position: relative;
            width: 140px;
            height: 200px;
            cursor: pointer;
        }

        .stack-card {
            position: absolute;
            top: 0;
            left: 0;
            width: 140px;
            /* Explicit width instead of 100% */
            height: 200px;
            /* Explicit height instead of 100% */
            transition: all 0.3s ease;
        }

        .stack-card.focused {
            width: 140px;
            height: 200px;
        }

        .stack-card:nth-child(1) {
            transform: translate(0, 0) rotate(0deg);
            z-index: 5;
        }

        .stack-card:nth-child(2) {
            transform: translate(3px, 3px) rotate(1.5deg);
            z-index: 4;
        }

        .stack-card:nth-child(3) {
            transform: translate(6px, 6px) rotate(-1deg);
            z-index: 3;
        }

        .stack-card:nth-child(4) {
            transform: translate(9px, 9px) rotate(2deg);
            z-index: 2;
        }

        .stack-card:nth-child(5) {
            transform: translate(12px, 12px) rotate(-2deg);
            z-index: 1;
        }

        .stack-container:hover .stack-card:nth-child(1) {
            transform: translate(-2px, -5px) rotate(-3deg);
        }

        .stack-container:hover .stack-card:nth-child(2) {
            transform: translate(1px, -2px) rotate(-0.5deg);
        }

        .stack-container:hover .stack-card:nth-child(3) {
            transform: translate(4px, 1px) rotate(0.5deg);
        }

        .stack-container:hover .stack-card:nth-child(4) {
            transform: translate(7px, 4px) rotate(1.5deg);
        }

        .stack-container:hover .stack-card:nth-child(5) {
            transform: translate(10px, 7px) rotate(-1deg);
        }

        /* Draw hint */
        .draw-hint {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }
        }

        /* Deck/Set Selector */
        .deck-item {
            transition: all 0.2s ease;
        }

        .deck-item:hover {
            background: rgba(41, 121, 255, 0.1);
        }

        .deck-item.active {
            background: rgba(41, 121, 255, 0.15);
            border-color: #2979ff;
        }

        html.dark .deck-item.active {
            background: rgba(124, 77, 255, 0.15);
            border-color: #7c4dff;
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(203, 213, 225, 0.6);
            border: 1px solid rgba(203, 213, 225, 0.8);
            transition: 0.3s;
            border-radius: 34px;
        }

        html.dark .slider {
            background-color: rgba(30, 41, 59, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            box-shadow: 2px 2px 0px rgba(51, 65, 85, 0.15);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 50%;
        }

        html.dark .slider:before {
            background-color: #94a3b8;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.4);
        }

        input:checked+.slider {
            background-color: rgba(0, 230, 118, 0.3);
            border-color: #00e676;
        }

        html.dark input:checked+.slider {
            background-color: rgba(0, 230, 118, 0.2);
            border-color: #00e676;
        }

        input:checked+.slider:before {
            transform: translateX(24px);
            background-color: #00e676;
        }

        /* Panel animations */
        #controls, #config-panel {
            transition:
                transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #controls.collapsed { transform: translateX(-100%); width: 0; min-width: 0; padding: 0; margin: 0; border: none; overflow: hidden; }
        #config-panel.collapsed { transform: translateX(100%); width: 0; min-width: 0; padding: 0; margin: 0; border: none; overflow: hidden; }
        @media (max-width: 768px) {
            #controls { position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; transform: translateX(-100%); }
            #controls.mobile-open { transform: translateX(0); }
            #controls.collapsed { transform: translateX(-100%); width: 85%; min-width: 300px; }
            #config-panel { position: fixed; top: 0; right: 0; height: 100vh; z-index: 100; transform: translateX(100%); }
            #config-panel.mobile-open { transform: translateX(0); }
            #config-panel.collapsed { transform: translateX(100%); width: 85%; min-width: 300px; }
        }

        /* Focus actions - no blur overlay */
        .focus-actions {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            display: flex;
            gap: 1rem;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .focus-actions.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* Loading toast */
        .loading-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
            pointer-events: none;
        }

        .loading-toast-inner {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 1rem;
            padding: 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            color: white;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.3s ease;
        }

        .loading-toast.visible .loading-toast-inner {
            opacity: 1;
            transform: scale(1);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: #00e676;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="h-screen w-screen overflow-hidden">
    <div id="toast-container"
        class="fixed top-4 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none"></div>

    <!-- Loading Toast -->
    <div id="loading-toast" class="loading-toast">
        <div class="loading-toast-inner">
            <div class="spinner"></div>
            <span class="font-heading font-bold text-lg">Shuffling...</span>
        </div>
    </div>

    <!-- Focus Actions (no overlay) -->
    <div id="focus-actions" class="focus-actions">
        <button onclick="eliminateFocusedCard()"
            class="btn-chunky bg-white dark:bg-slate-700 text-dark dark:text-slate-200 border-[1px] border-slate-300 dark:border-white/10 py-3 px-6 rounded-xl font-bold flex items-center gap-2 hover:text-pink hover:border-pink">
            <i data-lucide="x-circle" class="w-5 h-5"></i> Eliminate
        </button>
        <button onclick="unfocusCard()"
            class="btn-chunky bg-blue text-white py-3 px-6 rounded-xl font-bold flex items-center gap-2">
            <i data-lucide="rotate-ccw" class="w-5 h-5"></i> Return
        </button>
    </div>

    <div class="console-frame w-full h-full relative flex z-10 rounded-none md:rounded-2xl">
        <!-- LEFT PANEL: LIBRARY + ACTIONS -->
        <aside id="controls"
            class="w-72 glass-panel border-r-[1px] border-slate-300 dark:border-white/10 flex flex-col z-50 h-full shrink-0">
            <!-- Header -->
            <div
                class="p-4 border-b-[1px] border-slate-300 dark:border-white/10 bg-slate-50/50 dark:bg-slate-800/50 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-3 flex-1 min-w-0">
                    <a href="../index.html"
                        class="p-2 bg-white dark:bg-slate-700 border-[1px] border-slate-300 dark:border-white/10 rounded-lg text-slate-400 hover:text-blue transition-colors shadow-sm"
                        title="Back to Home">
                        <i data-lucide="home" class="w-4 h-4"></i>
                    </a>
                    <div class="flex-1 min-w-0">
                        <h1
                            class="text-xl font-heading text-dark dark:text-slate-100 tracking-wide leading-none truncate">
                            MYSTERY<span class="text-pink">DECK</span>
                        </h1>
                        <!-- Active Indicator -->
                        <div id="active-indicator" class="flex items-center gap-1.5 mt-1 hidden">
                            <span class="relative flex h-2 w-2">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-2 w-2 bg-green"></span>
                            </span>
                            <span id="active-set-name" class="text-[10px] font-bold text-slate-400 truncate max-w-[120px] uppercase tracking-wider"></span>
                        </div>
                    </div>
                </div>
                <button onclick="toggleTheme()"
                    class="p-2 bg-white dark:bg-slate-700 border-[1px] border-slate-300 dark:border-white/10 rounded-lg text-slate-400 hover:text-blue transition-colors shadow-sm">
                    <i data-lucide="moon" class="w-4 h-4 hidden dark:block"></i>
                    <i data-lucide="sun" class="w-4 h-4 block dark:hidden"></i>
                </button>
            </div>

            <!-- Content -->
            <div class="flex-1 p-4 overflow-y-auto custom-scrollbar space-y-4 bg-transparent relative">
                <!-- Action Grid -->
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="newSet()" class="btn-chunky bg-white dark:bg-slate-800 py-3 rounded-xl flex flex-col items-center justify-center gap-1 group">
                        <div class="w-8 h-8 rounded-lg bg-blue/10 flex items-center justify-center text-blue group-hover:scale-110 transition-transform">
                            <i data-lucide="file-plus-2" class="w-5 h-5"></i>
                        </div>
                        <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">New List</span>
                    </button>
                    <button onclick="openSaveAsModal()" class="btn-chunky bg-white dark:bg-slate-800 py-3 rounded-xl flex flex-col items-center justify-center gap-1 group">
                        <div class="w-8 h-8 rounded-lg bg-green/10 flex items-center justify-center text-green group-hover:scale-110 transition-transform">
                            <i data-lucide="save" class="w-5 h-5"></i>
                        </div>
                        <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">Save As</span>
                    </button>
                </div>

                <!-- VIEW MODE TOGGLE -->
                <div class="p-3 bg-slate-50/50 dark:bg-slate-800/50 border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-sm">
                    <div class="flex justify-between items-center border-b-[1px] border-slate-200 dark:border-white/10 pb-2 mb-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="layout" class="w-3.5 h-3.5 text-blue"></i>
                            View Mode
                        </label>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="setViewMode('spread')" id="mode-spread"
                            class="btn-chunky active py-2 rounded-lg text-[10px] font-black uppercase">
                            <i data-lucide="grid-3x3" class="w-3.5 h-3.5 inline mr-1"></i>
                            Spread
                        </button>
                        <button onclick="setViewMode('stack')" id="mode-stack"
                            class="btn-chunky py-2 rounded-lg text-[10px] font-black uppercase">
                            <i data-lucide="layers" class="w-3.5 h-3.5 inline mr-1"></i>
                            Stack
                        </button>
                    </div>
                </div>

                <!-- Library Section -->
                <div class="p-3 bg-slate-50/50 dark:bg-slate-800/50 border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-sm">
                    <div class="flex items-center justify-between mb-3">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="library" class="w-3.5 h-3.5 text-blue"></i>
                            Your Library
                        </label>
                        <select id="library-sort" onchange="renderLibrary()" class="bg-transparent text-[10px] font-bold text-slate-500 outline-none cursor-pointer hover:text-blue transition-colors">
                            <option value="recent">Recent</option>
                            <option value="alpha">A-Z</option>
                            <option value="popular">Popular</option>
                        </select>
                    </div>
                    <div id="library-list" class="space-y-1.5 max-h-[180px] overflow-y-auto custom-scrollbar pr-1">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- DRAW RANDOM (Stack Mode) -->
                <button id="draw-random-btn" onclick="drawRandomCard()"
                    class="hidden w-full btn-chunky bg-gradient-to-r from-pink to-orange text-white dark:text-white py-4 rounded-xl text-lg tracking-widest flex items-center justify-center gap-3 hover:brightness-110 shadow-neo-lg animate-pop-in">
                    <i data-lucide="zap" class="w-6 h-6"></i>
                    DRAW RANDOM
                </button>

            </div>

            <!-- Footer -->
            <div class="p-3 border-t-[1px] border-slate-300 dark:border-white/10 bg-slate-50/50 dark:bg-slate-800/50 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-2">
                    <button onclick="toggleMute()" id="mute-btn"
                        class="p-2 bg-white dark:bg-slate-700 border-[1px] border-slate-300 dark:border-white/10 rounded-lg text-slate-400 hover:text-dark dark:hover:text-slate-200 transition-colors shadow-sm" title="Toggle Sound">
                        <i id="mute-icon" data-lucide="volume-2" class="w-4 h-4"></i>
                    </button>
                    <button onclick="shuffleCards()"
                        class="p-2 bg-white dark:bg-slate-700 border-[1px] border-slate-300 dark:border-white/10 rounded-lg text-slate-400 hover:text-blue transition-colors shadow-sm" title="Shuffle Deck">
                        <i data-lucide="shuffle" class="w-4 h-4"></i>
                    </button>
                    <button onclick="resetSession()"
                        class="p-2 bg-white dark:bg-slate-700 border-[1px] border-slate-300 dark:border-white/10 rounded-lg text-slate-400 hover:text-orange transition-colors shadow-sm" title="Reset Session">
                        <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                    </button>
                    <button onclick="clearAll()"
                        class="p-2 bg-white dark:bg-slate-700 border-[1px] border-slate-300 dark:border-white/10 rounded-lg text-slate-400 hover:text-pink transition-colors shadow-sm" title="Clear Deck">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
                <div class="font-heading font-black text-slate-400 text-[10px] uppercase tracking-wider">
                    TOTAL: <span id="total-cards" class="text-blue">0</span>
                </div>
            </div>
        </aside>

        <!-- RIGHT PANEL: EDIT ITEMS -->
        <aside id="config-panel"
            class="w-80 glass-panel border-l-[1px] border-slate-300 dark:border-white/10 flex flex-col z-50 h-full shrink-0 order-last">
            <div class="p-4 border-b-[1px] border-slate-300 dark:border-white/10 bg-slate-50/50 dark:bg-slate-800/50 flex items-center justify-between shrink-0">
                <h2 class="text-sm font-heading font-bold text-dark dark:text-slate-100 tracking-wide">EDIT <span class="text-orange">ITEMS</span></h2>
                <button onclick="toggleRightPanel()" class="md:hidden p-2 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-lg">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="flex-1 p-4 overflow-y-auto custom-scrollbar bg-transparent space-y-3">
                <!-- EDIT ITEMS -->
                <div class="p-3 bg-slate-50/50 dark:bg-slate-800/50 border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-sm space-y-2">
                    <div class="flex justify-between items-center border-b-[1px] border-slate-200 dark:border-white/10 pb-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="list-plus" class="w-4 h-4 text-orange"></i> Edit Items
                        </label>
                        <button onclick="toggleBatch()" class="text-[10px] text-blue font-bold hover:underline uppercase">Batch Edit</button>
                    </div>
                    <button onclick="document.getElementById('img-upload-card').click()"
                        class="btn-chunky w-full bg-blue text-white py-2.5 rounded-xl text-xs flex items-center justify-center gap-2">
                        <i data-lucide="image-plus" class="w-4 h-4"></i> ADD IMAGE(S)
                    </button>
                    <input type="file" id="img-upload-card" accept="image/*" multiple class="hidden" onchange="addImageCards(this)" />
                    <div class="flex gap-2">
                        <input type="text" id="card-input" placeholder="Add item..."
                            class="flex-1 border-[1px] border-slate-300 dark:border-white/10 rounded-lg px-3 py-2 font-bold text-dark dark:text-slate-200 text-sm bg-white/50 dark:bg-slate-900/50 focus:outline-none focus:border-blue focus:ring-1 focus:ring-blue"
                            onkeydown="if (event.key === 'Enter') addCard();" />
                        <button onclick="addCard()" class="btn-chunky bg-green text-dark px-3 rounded-lg">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <div id="batch-container" class="hidden animate-slide-down">
                        <textarea id="batch-input" rows="3"
                            class="w-full p-2 bg-white/50 dark:bg-slate-900/50 text-dark dark:text-slate-200 font-mono text-xs border-[1px] border-slate-300 dark:border-white/10 rounded-lg resize-none mb-2"
                            placeholder="One item per line..."></textarea>
                        <button onclick="saveBatch()" class="w-full btn-chunky bg-dark text-white py-2 rounded-lg text-xs">Update List</button>
                    </div>
                    <div id="card-list" class="flex flex-wrap gap-1 max-h-[calc(100vh-400px)] overflow-y-auto custom-scrollbar pt-1 pr-1">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </aside>

        <!-- MAIN CARD AREA -->
        <main id="main-area"
            class="flex-1 relative h-full bg-slate-50/50 dark:bg-slate-900/50 flex flex-col overflow-hidden transition-colors duration-300">
            <button id="left-toggle-btn" onclick="toggleLeftPanel()" title="Toggle Library panel"
                class="absolute top-4 left-4 z-30 p-2 glass-panel border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-neo-sm hover:translate-y-[-2px] transition-transform text-slate-500 hover:text-dark dark:hover:text-slate-200">
                <i data-lucide="panel-left-close" class="w-5 h-5" id="left-toggle-icon"></i>
            </button>
            <button id="right-toggle-btn" onclick="toggleRightPanel()" title="Toggle Items panel"
                class="absolute top-4 right-4 z-30 p-2 glass-panel border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-neo-sm hover:translate-y-[-2px] transition-transform text-slate-500 hover:text-dark dark:hover:text-slate-200">
                <i data-lucide="panel-right-close" class="w-5 h-5" id="right-toggle-icon"></i>
            </button>

            <!-- Cards Container -->
            <div id="cards-container" class="flex-1 relative overflow-hidden">
                <!-- Cards rendered here -->
            </div>

            <!-- Empty State -->
            <div id="empty-state"
                class="hidden absolute inset-0 flex flex-col items-center justify-center text-slate-400 pointer-events-none">
                <div
                    class="w-24 h-24 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center mb-4">
                    <i data-lucide="layers" class="w-12 h-12"></i>
                </div>
                <p class="font-heading text-xl font-bold">Deck is Empty</p>
                <p class="text-sm">Add cards or select a saved deck</p>
            </div>
        </main>
    </div>

    <!-- New Deck Modal -->
    <div id="deck-modal"
        class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-50 backdrop-blur-sm p-4">
        <div
            class="glass-panel w-full max-w-md border-[1px] border-slate-300 dark:border-white/10 rounded-3xl shadow-neo-lg p-6 relative">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-heading text-2xl font-bold text-dark dark:text-white">
                    Save New Deck
                </h2>
                <button onclick="closeDeckModal()"
                    class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition-colors">
                    <i data-lucide="x" class="w-6 h-6 text-slate-500"></i>
                </button>
            </div>

            <input type="text" id="new-deck-name" placeholder="Deck name (e.g. Vocabulary Set 1)"
                class="w-full p-4 mb-4 bg-white/50 dark:bg-slate-900/50 text-dark dark:text-slate-200 font-heading text-lg font-bold border-[1px] border-slate-300 dark:border-white/10 rounded-xl focus:border-blue focus:ring-1 focus:ring-blue outline-none shadow-inner" />

            <div class="flex gap-3">
                <button onclick="closeDeckModal()"
                    class="flex-1 btn-chunky bg-white dark:bg-slate-700 text-dark dark:text-white py-3 rounded-xl font-bold">
                    Cancel
                </button>
                <button onclick="createNewDeck()"
                    class="flex-1 btn-chunky bg-green text-dark dark:text-dark py-3 rounded-xl font-bold">
                    Create Deck
                </button>
            </div>
        </div>
    </div>

    <script>
        // Universal Slides/Sets Management Pattern Implementation
        const appState = {
            data: {
                name: "",
                cards: ["Apple", "Banana", "Orange", "Elephant", "Tiger", "Lion", "Giraffe", "Penguin"],
                eliminatedIndices: [],
                viewMode: "spread" // spread or stack
            },
            activeId: null
        };

        const STORAGE_KEY = "cardpicker_library_v2";
        let isShuffling = false;
        let isMuted = false;
        let audioInitialized = false;
        let focusedCardIndex = -1;
        let synth, noiseSynth, winSynth;
        // Data model helpers
        const optText = p => (typeof p === 'object' && p !== null) ? (p.text || p.name || '') : (p || '');
        const optImg  = p => (typeof p === 'object' && p !== null) ? (p.img  || null) : null;

        let leftPanelOpen = true, rightPanelOpen = true;

        function toggleLeftPanel() {
            const panel = document.getElementById("controls");
            const icon = document.getElementById("left-toggle-icon");
            leftPanelOpen = !leftPanelOpen;
            if (window.innerWidth < 768) panel.classList.toggle("mobile-open", leftPanelOpen);
            else panel.classList.toggle("collapsed", !leftPanelOpen);
            icon.setAttribute("data-lucide", leftPanelOpen ? "panel-left-close" : "panel-left-open");
            lucide.createIcons();
        }

        function toggleRightPanel() {
            const panel = document.getElementById("config-panel");
            const icon = document.getElementById("right-toggle-icon");
            rightPanelOpen = !rightPanelOpen;
            if (window.innerWidth < 768) panel.classList.toggle("mobile-open", rightPanelOpen);
            else panel.classList.toggle("collapsed", !rightPanelOpen);
            icon.setAttribute("data-lucide", rightPanelOpen ? "panel-right-close" : "panel-right-open");
            lucide.createIcons();
        }

        function togglePanel() { toggleLeftPanel(); }

        async function addImageCards(fileInput) {
            const files = Array.from(fileInput.files);
            if (!files.length) return;
            fileInput.value = '';
            showToast(`Adding ${files.length} image${files.length > 1 ? 's' : ''}...`, 'info');
            const promises = files.map(file => new Promise(resolve => {
                const text = file.name.replace(/\.[^.]+$/, '');
                const readLocal = () => { const r = new FileReader(); r.onload = e => resolve({ text, img: e.target.result }); r.readAsDataURL(file); };
                if (typeof isSandbox === 'function' && !isSandbox() && typeof uploadMedia === 'function') {
                    uploadMedia(file, 'mysterydeck', 'cards').then(url => resolve({ text, img: url })).catch(readLocal);
                } else { readLocal(); }
            }));
            const items = await Promise.all(promises);
            items.forEach(item => appState.data.cards.push({ text: item.text, img: item.img }));
            appState.data.eliminatedIndices = [];
            onContentChange();
            renderCards();
            renderCardList();
            showToast(`Added ${files.length} image${files.length > 1 ? 's' : ''}`, 'success');
        }

        // Persistence Helpers
        function getLibrary() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        function saveLibrary(library) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(library));
            saveProgress(STORAGE_KEY, library).catch(console.error);
        }

        function onContentChange() {
            updateSessionPersistence();
            
            if (appState.activeId) {
                const library = getLibrary();
                const index = library.findIndex(item => item.id === appState.activeId);
                if (index !== -1) {
                    library[index] = {
                        ...library[index],
                        name: appState.data.name,
                        cards: [...appState.data.cards],
                        lastUsed: Date.now()
                    };
                    saveLibrary(library);
                }
            }
        }

        function updateSessionPersistence() {
            localStorage.setItem('cardpicker_session', JSON.stringify(appState.data));
            localStorage.setItem('cardpicker_activeId', appState.activeId);
        }

        // Lifecycle Workflows
        function newSet() {
            appState.data = {
                name: "",
                cards: [],
                eliminatedIndices: [],
                viewMode: appState.data.viewMode
            };
            appState.activeId = null;
            updateUI();
            renderLibrary();
            showToast("New list ready", "info");
        }

        function openSaveAsModal() {
            const name = prompt("Enter a name for this list:", appState.data.name || "");
            if (name === null) return;
            if (!name.trim()) {
                showToast("Name is required", "error");
                return;
            }
            saveAsNew(name.trim());
        }

        function saveAsNew(name) {
            const library = getLibrary();
            const newId = Date.now();
            const newEntry = {
                id: newId,
                name: name,
                cards: [...appState.data.cards],
                createdAt: Date.now(),
                lastUsed: Date.now(),
                usageCount: 1
            };
            library.push(newEntry);
            saveLibrary(library);
            
            appState.activeId = newId;
            appState.data.name = name;
            
            renderLibrary();
            updateActiveIndicator();
            showToast(`Saved as "${name}"`, "success");
        }

        function loadSet(id) {
            const library = getLibrary();
            const item = library.find(i => i.id === id);
            if (!item) return;

            item.usageCount = (item.usageCount || 0) + 1;
            item.lastUsed = Date.now();
            saveLibrary(library);

            appState.activeId = id;
            appState.data = {
                name: item.name,
                cards: [...item.cards],
                eliminatedIndices: [],
                viewMode: appState.data.viewMode
            };

            updateUI();
            renderLibrary();
            showToast(`Loaded ${item.name}`, "info");
        }

        function deleteLibraryItem(id, event) {
            if (event) event.stopPropagation();
            if (!confirm("Are you sure you want to delete this list?")) return;

            let library = getLibrary();
            library = library.filter(i => i.id !== id);
            saveLibrary(library);

            if (appState.activeId === id) {
                newSet();
            } else {
                renderLibrary();
            }
            showToast("List deleted", "info");
        }

        // UI Updates
        function updateUI() {
            updateActiveIndicator();
            renderCards();
            renderCardList();
            updateCount();
            
            document.getElementById("mode-spread").classList.toggle("active", appState.data.viewMode === "spread");
            document.getElementById("mode-stack").classList.toggle("active", appState.data.viewMode === "stack");
            document.getElementById("draw-random-btn").classList.toggle("hidden", appState.data.viewMode === "spread");
        }

        function updateActiveIndicator() {
            const indicator = document.getElementById("active-indicator");
            const nameEl = document.getElementById("active-set-name");
            
            if (appState.activeId) {
                indicator.classList.remove("hidden");
                nameEl.textContent = appState.data.name;
            } else {
                indicator.classList.add("hidden");
            }
        }

        function renderLibrary() {
            const list = document.getElementById("library-list");
            const sortBy = document.getElementById("library-sort").value;
            let library = getLibrary();

            if (library.length === 0) {
                list.innerHTML = '<p class="text-[10px] text-slate-400 text-center py-4 italic uppercase tracking-widest">Library is empty</p>';
                return;
            }

            if (sortBy === "recent") library.sort((a, b) => b.lastUsed - a.lastUsed);
            else if (sortBy === "alpha") library.sort((a, b) => a.name.localeCompare(b.name));
            else if (sortBy === "popular") library.sort((a, b) => (b.usageCount || 0) - (a.usageCount || 0));

            list.innerHTML = library.map(item => `
                <div onclick="loadSet(${item.id})" class="group flex items-center justify-between p-2 rounded-xl border-[1px] cursor-pointer transition-all ${appState.activeId === item.id ? 'bg-blue/10 border-blue/30' : 'border-transparent hover:bg-slate-100 dark:hover:bg-slate-800'}">
                    <div class="flex items-center gap-2 overflow-hidden">
                        <div class="w-7 h-7 rounded-lg bg-slate-200 dark:bg-slate-700 flex items-center justify-center text-xs font-black text-slate-500 shrink-0">
                            ${item.name.charAt(0).toUpperCase()}
                        </div>
                        <div class="flex flex-col overflow-hidden">
                            <span class="text-xs font-bold truncate text-dark dark:text-slate-200">${item.name}</span>
                            <span class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">${item.cards.length} Items</span>
                        </div>
                    </div>
                    <button onclick="deleteLibraryItem(${item.id}, event)" class="p-1.5 text-slate-300 hover:text-pink opacity-0 group-hover:opacity-100 transition-all">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                    </button>
                </div>
            `).join("");
            
            lucide.createIcons();
        }

        // View Mode
        function setViewMode(mode) {
            appState.data.viewMode = mode;
            unfocusCard();
            updateUI();
            onContentChange();
        }

        // Card Rendering
        function renderCards() {
            const container = document.getElementById("cards-container");
            const emptyState = document.getElementById("empty-state");
            container.innerHTML = "";

            if (appState.data.cards.length === 0) {
                emptyState.classList.remove("hidden");
                updateCount();
                lucide.createIcons();
                return;
            }

            emptyState.classList.add("hidden");

            if (appState.data.viewMode === "stack") renderStackView(container);
            else renderSpreadView(container);

            updateCount();
            lucide.createIcons();
        }

        function renderSpreadView(container) {
            const wrapper = document.createElement("div");
            wrapper.className = "absolute inset-0";
            const containerRect = container.getBoundingClientRect();
            const padding = 80;
            const cardWidth = 120;
            const cardHeight = 170;
            const usedPositions = [];

            appState.data.cards.forEach((card, i) => {
                const cardEl = createCardElement(card, i);
                let position = findValidPosition(containerRect.width - padding * 2, containerRect.height - padding * 2, cardWidth, cardHeight, usedPositions, padding);
                usedPositions.push(position);
                const rotation = (Math.random() - 0.5) * 20;
                cardEl.style.left = position.x + "px";
                cardEl.style.top = position.y + "px";
                cardEl.style.setProperty("--rotation", `${rotation}deg`);
                cardEl.style.transform = `rotate(${rotation}deg)`;
                wrapper.appendChild(cardEl);
            });
            container.appendChild(wrapper);
        }

        function findValidPosition(width, height, cardW, cardH, used, padding) {
            const maxAttempts = 50;
            for (let attempt = 0; attempt < maxAttempts; attempt++) {
                const x = padding + Math.random() * (width - cardW);
                const y = padding + Math.random() * (height - cardH);
                const newPos = { x, y, w: cardW, h: cardH };
                let collision = false;
                for (const pos of used) {
                    if (rectsOverlap(newPos, pos)) { collision = true; break; }
                }
                if (!collision) return newPos;
            }
            const cols = Math.floor(width / (cardW + 20));
            const index = used.length;
            const col = index % (cols || 1);
            const row = Math.floor(index / (cols || 1));
            return { x: padding + col * (cardW + 20), y: padding + row * (cardH + 20), w: cardW, h: cardH };
        }

        function rectsOverlap(a, b) {
            const margin = 10;
            return !(a.x + a.w + margin < b.x || b.x + b.w + margin < a.x || a.y + a.h + margin < b.y || b.y + b.h + margin < a.y);
        }

        function renderStackView(container) {
            const wrapper = document.createElement("div");
            wrapper.className = "absolute inset-0 flex items-center justify-center";
            const stackContainer = document.createElement("div");
            stackContainer.className = "stack-container relative";
            const availableIndices = appState.data.cards.map((_, i) => i).filter(i => !appState.data.eliminatedIndices.includes(i));
            const displayCount = Math.min(5, availableIndices.length);

            for (let i = 0; i < displayCount; i++) {
                const cardIndex = availableIndices[availableIndices.length - 1 - i];
                const cardEl = createCardElement(appState.data.cards[cardIndex], cardIndex);
                cardEl.classList.add("stack-card");
                cardEl.style.zIndex = displayCount - i;
                if (i === 0) cardEl.onclick = (e) => { e.stopPropagation(); drawRandomCard(); };
                stackContainer.appendChild(cardEl);
            }

            if (availableIndices.length > 0) {
                const hint = document.createElement("div");
                hint.className = "draw-hint font-heading font-bold text-slate-400 text-sm";
                hint.textContent = "Click to draw";
                stackContainer.appendChild(hint);
            } else {
                const hint = document.createElement("div");
                hint.className = "draw-hint font-heading font-bold text-pink text-sm";
                hint.textContent = "Deck finished!";
                stackContainer.appendChild(hint);
            }
            wrapper.appendChild(stackContainer);
            container.appendChild(wrapper);
        }

        function createCardElement(cardData, index) {
            const cardText = optText(cardData);
            const cardImg  = optImg(cardData);
            const wrapper = document.createElement("div");
            wrapper.id = `card-${index}`;
            const isEliminated = appState.data.eliminatedIndices.includes(index);
            wrapper.className = `playing-card card-3d ${isEliminated ? 'opacity-20 pointer-events-none' : ''}`;
            wrapper.dataset.index = index;
            const fontSize = cardText.length > 12 ? "text-sm" : cardText.length > 8 ? "text-base" : "text-lg";

            const cardBackContent = cardImg
                ? `<img src="${cardImg}" class="absolute inset-0 w-full h-full object-cover rounded-[inherit]" />
                   <div class="absolute bottom-0 left-0 right-0 bg-black/50 backdrop-blur-sm px-2 py-1 text-center font-heading font-bold text-white text-xs break-words leading-tight rounded-b-[inherit]">${cardText}</div>`
                : `<div class="text-center font-heading font-bold text-dark dark:text-white break-words w-full leading-tight ${fontSize}">${cardText}</div>`;

            wrapper.innerHTML = `
                <div class="card-inner">
                    <div class="card-face card-front"></div>
                    <div class="card-face card-back relative overflow-hidden">
                        ${cardBackContent}
                    </div>
                </div>
            `;
            wrapper.addEventListener("mouseenter", () => { if (focusedCardIndex === -1 && !isShuffling) playSound("hover"); });
            wrapper.addEventListener("click", (e) => {
                e.stopPropagation();
                if (appState.data.viewMode === "spread" && focusedCardIndex === -1) focusCard(index);
            });
            return wrapper;
        }

        function renderCardList() {
            const list = document.getElementById("card-list");
            list.innerHTML = appState.data.cards.map((c, i) => {
                const text = optText(c);
                const img  = optImg(c);
                return `
                <div class="flex items-center gap-1.5 bg-white dark:bg-slate-700 border-[1px] border-slate-300 dark:border-white/10 rounded-lg px-2 py-1 shadow-neo-sm">
                    ${img
                        ? `<img src="${img}" class="w-6 h-6 rounded object-cover shrink-0" />`
                        : `<div class="w-6 h-6 rounded bg-orange/20 flex items-center justify-center text-[9px] font-black text-orange shrink-0">${text.charAt(0).toUpperCase()}</div>`}
                    <span class="text-[10px] font-black text-dark dark:text-slate-200 truncate max-w-[100px] uppercase">${text}</span>
                    <button onclick="removeCard(${i})" class="ml-auto text-slate-400 hover:text-pink">
                        <i data-lucide="x" class="w-3 h-3"></i>
                    </button>
                </div>`;
            }).join("");
            lucide.createIcons();
        }

        function updateCount() { document.getElementById("total-cards").textContent = appState.data.cards.length - appState.data.eliminatedIndices.length; }

        // Card Interactions
        async function focusCard(index) {
            if (focusedCardIndex !== -1 || isShuffling) return;
            focusedCardIndex = index;
            await initAudio();
            playSound("flip");
            const cardEl = document.getElementById(`card-${index}`);
            cardEl.classList.add("flipped", "focused");
            const rect = cardEl.getBoundingClientRect();
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const deltaX = centerX - rect.left - rect.width / 2;
            const deltaY = centerY - rect.top - rect.height / 2;
            cardEl.style.transform = `translate(${deltaX}px, ${deltaY}px) scale(1.5)`;
            document.querySelectorAll(".playing-card").forEach((c) => { if (c !== cardEl) c.classList.add("dimmed"); });
            document.getElementById("focus-actions").classList.add("visible");
            confetti({ particleCount: 50, spread: 60, origin: { y: 0.6 }, colors: ["#FF6B95", "#FF8C42", "#00E676", "#2979FF"] });
            playSound("win");
        }

        function unfocusCard() {
            if (focusedCardIndex === -1) return;
            playSound("flip");
            const cardEl = document.getElementById(`card-${focusedCardIndex}`);
            if (!cardEl) return;
            cardEl.classList.remove("focused");
            if (appState.data.viewMode === "spread") cardEl.style.transform = `rotate(${cardEl.style.getPropertyValue('--rotation')})`;
            else cardEl.style.transform = "";
            setTimeout(() => { if (cardEl) cardEl.classList.remove("flipped"); }, 300);
            document.querySelectorAll(".playing-card").forEach((c) => { c.classList.remove("dimmed"); });
            document.getElementById("focus-actions").classList.remove("visible");
            focusedCardIndex = -1;
        }

        function eliminateFocusedCard() {
            if (focusedCardIndex === -1) return;
            const index = focusedCardIndex;
            const cardEl = document.getElementById(`card-${index}`);
            cardEl.classList.add("removing");
            setTimeout(() => {
                appState.data.eliminatedIndices.push(index);
                unfocusCard();
                renderCards();
                onContentChange();
                showToast("Item eliminated", "info");
            }, 400);
        }

        async function shuffleCards() {
            if (isShuffling || appState.data.cards.length < 2) return;
            isShuffling = true;
            await initAudio();
            const loadingToast = document.getElementById("loading-toast");
            loadingToast.classList.add("visible");
            for (let i = 0; i < 8; i++) setTimeout(() => playSound("riffle"), i * 100);
            await new Promise(r => setTimeout(r, 800));
            for (let i = appState.data.cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [appState.data.cards[i], appState.data.cards[j]] = [appState.data.cards[j], appState.data.cards[i]];
            }
            loadingToast.classList.remove("visible");
            isShuffling = false;
            appState.data.eliminatedIndices = [];
            onContentChange();
            renderCards();
            playSound("win");
            showToast("Deck shuffled!", "success");
        }

        async function drawRandomCard() {
            if (appState.data.cards.length === 0 || isShuffling) return;
            await initAudio();
            const available = appState.data.cards.map((_, i) => i).filter(i => !appState.data.eliminatedIndices.includes(i));
            if (available.length === 0) { showToast("All cards eliminated!", "warning"); return; }
            const randomIndex = available[Math.floor(Math.random() * available.length)];
            const stack = document.querySelector(".stack-container");
            if (stack) {
                stack.style.transform = "translateY(-10px)";
                await new Promise(r => setTimeout(r, 150));
                stack.style.transform = "";
                await new Promise(r => setTimeout(r, 100));
            }
            focusCard(randomIndex);
        }

        function resetSession() {
            appState.data.eliminatedIndices = [];
            onContentChange();
            renderCards();
            showToast("Session reset", "info");
        }

        // Sidebar Actions
        function addCard() {
            const input = document.getElementById("card-input");
            const val = input.value.trim();
            if (!val) return;
            appState.data.cards.push({ text: val, img: null });
            input.value = "";
            onContentChange();
            renderCards();
            renderCardList();
        }

        function removeCard(index) {
            appState.data.cards.splice(index, 1);
            appState.data.eliminatedIndices = appState.data.eliminatedIndices
                .filter(i => i !== index)
                .map(i => i > index ? i - 1 : i);
            onContentChange();
            renderCards();
            renderCardList();
        }

        function toggleBatch() {
            const container = document.getElementById("batch-container");
            const input = document.getElementById("batch-input");
            if (container.classList.contains("hidden")) {
                input.value = appState.data.cards.map(c => optText(c)).join("\n");
                container.classList.remove("hidden");
            } else container.classList.add("hidden");
        }

        function saveBatch() {
            const input = document.getElementById("batch-input");
            appState.data.cards = input.value.split(/[\n,]+/).map(s => s.trim()).filter(s => s.length > 0).map(t => ({ text: t, img: null }));
            appState.data.eliminatedIndices = [];
            onContentChange();
            toggleBatch();
            renderCards();
            renderCardList();
            showToast("List updated", "success");
        }

        function clearAll() {
            if (!confirm("Clear current deck?")) return;
            appState.data.cards = [];
            appState.data.eliminatedIndices = [];
            onContentChange();
            renderCards();
            renderCardList();
        }

        // Audio
        async function initAudio() {
            if (audioInitialized || isMuted) return;
            await Tone.start();
            synth = new Tone.MembraneSynth({ pitchDecay: 0.05, octaves: 2, oscillator: { type: "sine" }, envelope: { attack: 0.001, decay: 0.05, sustain: 0, release: 0.01 }, volume: -10 }).toDestination();
            noiseSynth = new Tone.NoiseSynth({ noise: { type: "white" }, envelope: { attack: 0.005, decay: 0.1, sustain: 0 } }).toDestination();
            winSynth = new Tone.PolySynth(Tone.Synth, { volume: -5, oscillator: { type: "triangle" }, envelope: { attack: 0.01, decay: 0.1, sustain: 0.1, release: 1 } }).toDestination();
            audioInitialized = true;
        }

        function playSound(type) {
            if (isMuted || !audioInitialized) return;
            try {
                const now = Tone.now();
                if (type === "tick" && synth) synth.triggerAttackRelease("C2", "64n", now);
                if (type === "hover" && synth) synth.triggerAttackRelease("G2", "128n", now, 0.3);
                if (type === "flip" && synth) synth.triggerAttackRelease("C3", "32n", now);
                if (type === "riffle" && noiseSynth) noiseSynth.triggerAttackRelease("32n", now);
                if (type === "win" && winSynth) {
                    const n = Tone.now() + 0.05; // Small offset for complex sequences
                    winSynth.triggerAttackRelease(["C4", "E4", "G4"], "8n", n);
                    winSynth.triggerAttackRelease(["E4", "G4", "C5"], "8n", n + 0.1);
                    winSynth.triggerAttackRelease(["G4", "C5", "E5"], "4n", n + 0.2);
                }
            } catch (e) {
                console.warn("Audio scheduling error:", e);
            }
        }

        function toggleMute() {
            isMuted = !isMuted;
            const icon = document.getElementById("mute-icon");
            icon.setAttribute("data-lucide", isMuted ? "volume-x" : "volume-2");
            if (!isMuted && !audioInitialized) initAudio();
            lucide.createIcons();
        }

        // Theme & Panel
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle("dark");
            localStorage.setItem("theme_spin-the-wheel", isDark ? "dark" : "light");
            lucide.createIcons();
        }

        function loadTheme() {
            const saved = localStorage.getItem("theme_spin-the-wheel");
            if (saved === "dark" || (!saved && window.matchMedia("(prefers-color-scheme: dark)").matches))
                document.documentElement.classList.add("dark");
        }


        function showToast(message, type = "info") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            const colors = { success: "bg-green text-dark border-green", error: "bg-pink text-white border-pink", info: "bg-blue text-white border-blue", warning: "bg-orange text-dark border-orange" };
            toast.className = `${colors[type]} px-4 py-3 rounded-xl shadow-neo border-[1px] font-bold text-sm flex items-center gap-2 pointer-events-auto transform transition-all duration-300 translate-y-[-20px] opacity-0`;
            toast.innerHTML = `<i data-lucide="${type === "success" ? "check-circle" : type === "error" ? "x-circle" : "info"}" class="w-4 h-4"></i> ${message}`;
            container.appendChild(toast);
            lucide.createIcons();
            requestAnimationFrame(() => toast.classList.remove("translate-y-[-20px]", "opacity-0"));
            setTimeout(() => { toast.classList.add("translate-y-[-20px]", "opacity-0"); setTimeout(() => toast.remove(), 300); }, 2500);
        }

        // Migration
        async function migrateLegacyData() {
            const MIGRATED_KEY = 'cardpicker_migrated_v2';
            if (localStorage.getItem(MIGRATED_KEY)) return;

            const DB_NAME = "MysteryDeckDB_v3";
            const STORE_NAME = "decks";

            // Local Migration
            try {
                const request = indexedDB.open(DB_NAME);
                request.onsuccess = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.close();
                        checkCloudMigration();
                        return;
                    }

                    const transaction = db.transaction(STORE_NAME, 'readonly');
                    const store = transaction.objectStore(STORE_NAME);
                    const getAll = store.getAll();

                    getAll.onsuccess = () => {
                        const legacyData = getAll.result;
                        if (legacyData && legacyData.length > 0) {
                            const library = getLibrary();
                            legacyData.forEach(item => {
                                if (!library.some(l => l.name === item.name)) {
                                    library.push({
                                        id: Date.now() + Math.random(),
                                        name: item.name || 'Legacy Set',
                                        cards: item.cards || [],
                                        createdAt: item.updatedAt || Date.now(),
                                        lastUsed: item.updatedAt || Date.now(),
                                        usageCount: 1
                                    });
                                }
                            });
                            saveLibrary(library);
                            renderLibrary();
                        }
                        db.close();
                        checkCloudMigration();
                    };
                };
                request.onerror = () => checkCloudMigration();
            } catch (e) {
                checkCloudMigration();
            }

            async function checkCloudMigration() {
                try {
                    const cloudData = await loadProgress('cardpicker_data');
                    if (cloudData && Array.isArray(cloudData.decks)) {
                        const library = getLibrary();
                        cloudData.decks.forEach(item => {
                            if (!library.some(l => l.name === item.name)) {
                                library.push({
                                    id: Date.now() + Math.random(),
                                    name: item.name || 'Cloud Deck',
                                    cards: item.cards || [],
                                    createdAt: item.updatedAt || Date.now(),
                                    lastUsed: item.updatedAt || Date.now(),
                                    usageCount: 1
                                });
                            }
                        });
                        saveLibrary(library);
                        renderLibrary();
                    }
                } catch (e) {}
                localStorage.setItem(MIGRATED_KEY, 'true');
            }
        }

        // Init
        async function init() {
            await requireAuth();
            loadTheme();

            // Initial Cloud Sync
            if (getLibrary().length === 0) {
                const cloudLibrary = await loadProgress(STORAGE_KEY);
                if (cloudLibrary) {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(cloudLibrary));
                }
            }

            await migrateLegacyData();
            const savedActiveId = localStorage.getItem('cardpicker_activeId');
            if (savedActiveId && savedActiveId !== "null") loadSet(parseInt(savedActiveId));
            else {
                const session = localStorage.getItem('cardpicker_session');
                if (session) { appState.data = JSON.parse(session); updateUI(); }
                else updateUI();
            }
            renderLibrary();
            document.addEventListener("click", (e) => {
                if (focusedCardIndex !== -1 && !e.target.closest(".playing-card") && !e.target.closest("#focus-actions")) unfocusCard();
            });
            window.addEventListener("resize", () => {
                const controls = document.getElementById("controls");
                if (window.innerWidth >= 768) controls.classList.remove("hidden-panel-mobile");
                else controls.classList.remove("hidden-panel-desktop");
                if (appState.data.viewMode === "spread") renderCards();
            });
        }

        window.onload = init;
    </script>
</body>
