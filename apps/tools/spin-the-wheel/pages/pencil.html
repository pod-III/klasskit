<!doctype html>
<html lang="en">

<head>
    <!-- Supabase Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4"></script>
    <script src="/supabase.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Classroom Spinner - KlassKit</title>
    <link rel="icon" type="image/x-icon" href="../../../../media/icon.ico" />
    <link rel="icon" type="image/webp" href="../../../../media/icon.webp" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet" />

    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@1.16.0"></script>

    <!-- Theme Configuration -->
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        pink: "#FF6B95",
                        orange: "#FF8C42",
                        green: "#00E676",
                        blue: "#2979FF",
                        purple: "#7C4DFF",
                        dark: "#0f172a",
                        chalk: "#f8fafc",
                        surface: "rgba(255, 255, 255, 0.85)",
                        border: "rgba(203, 213, 225, 0.6)",
                    },
                    fontFamily: {
                        heading: ["Fredoka", "sans-serif"],
                        body: ["Nunito", "sans-serif"],
                        mono: ["JetBrains Mono", "monospace"],
                    },
                    boxShadow: {
                        neo: "4px 4px 0px 0px rgba(51, 65, 85, 0.15)",
                        "neo-sm": "2px 2px 0px 0px rgba(51, 65, 85, 0.15)",
                        "neo-lg": "8px 8px 0px 0px rgba(51, 65, 85, 0.15)",
                    },
                    animation: {
                        pop: "pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)",
                        "bounce-in":
                            "bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55)",
                    },
                    keyframes: {
                        pop: {
                            "0%": { transform: "scale(0)" },
                            "80%": { transform: "scale(1.1)" },
                            "100%": { transform: "scale(1)" },
                        },
                        bounceIn: {
                            "0%": { transform: "scale(0.3)", opacity: "0" },
                            "50%": { transform: "scale(1.05)" },
                            "70%": { transform: "scale(0.9)" },
                            "100%": { transform: "scale(1)", opacity: "1" },
                        },
                    },
                },
            },
        };
    </script>

    <!-- Shared CSS -->
    <link rel="stylesheet" href="../../../../css/base.css" />
    <link rel="stylesheet" href="../../../../css/components.css" />

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        body {
            font-family: "Nunito", sans-serif;
            background-color: #f8fafc;
            background-image:
                linear-gradient(#e2e8f0 1.5px, transparent 1.5px),
                linear-gradient(90deg, #e2e8f0 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            color: #1e293b;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
            transition:
                background-color 0.3s,
                color 0.3s;
        }

        html.dark body {
            background-color: #020617;
            background-image:
                linear-gradient(#0f172a 1.5px, transparent 1.5px),
                linear-gradient(90deg, #0f172a 1.5px, transparent 1.5px);
            color: #e2e8f0;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        html.dark .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .console-frame {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(203, 213, 225, 0.6);
            border-radius: 1.5rem;
            box-shadow: 8px 8px 0px rgba(51, 65, 85, 0.15);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        html.dark .console-frame {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.4);
        }

        .btn-chunky {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(0);
            position: relative;
            border: 1px solid rgba(203, 213, 225, 0.6);
            box-shadow: 4px 4px 0 rgba(51, 65, 85, 0.15);
            font-family: "Fredoka", sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        html.dark .btn-chunky {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.4);
            background-color: rgba(30, 41, 59, 0.8);
            color: #e2e8f0;
        }

        .btn-chunky:hover:not(:disabled) {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 rgba(51, 65, 85, 0.15);
            filter: brightness(105%);
        }

        html.dark .btn-chunky:hover:not(:disabled) {
            box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.4);
        }

        .btn-chunky:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 rgba(51, 65, 85, 0.15) !important;
        }

        html.dark .btn-chunky:active:not(:disabled) {
            box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.4) !important;
        }

        .btn-chunky:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translateY(2px);
            box-shadow: 0 0 0 rgba(51, 65, 85, 0.15);
            filter: grayscale(100%);
        }

        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(203, 213, 225, 0.6);
            border-radius: 10px;
            border: 2px solid transparent;
            background-clip: content-box;
        }

        html.dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
        }

        #spinner-wrapper {
            transform-origin: center center;
            will-change: transform;
            filter: drop-shadow(8px 8px 0px rgba(51, 65, 85, 0.2));
        }

        html.dark #spinner-wrapper {
            filter: drop-shadow(8px 8px 0px rgba(0, 0, 0, 0.5));
        }

        .player-bubble {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .player-bubble:hover {
            transform: scale(1.05);
        }

        .player-bubble.winner {
            animation: winnerPulse 1s infinite;
        }

        @keyframes winnerPulse {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.4);
            }

            50% {
                transform: scale(1.1);
                box-shadow: 0 0 20px 10px rgba(0, 230, 118, 0);
            }
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(203, 213, 225, 0.6);
            border: 1px solid rgba(203, 213, 225, 0.8);
            transition: 0.3s;
            border-radius: 34px;
        }

        html.dark .slider {
            background-color: rgba(30, 41, 59, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            box-shadow: 2px 2px 0px rgba(51, 65, 85, 0.15);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 50%;
        }

        html.dark .slider:before {
            background-color: #94a3b8;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.4);
        }

        input:checked+.slider {
            background-color: rgba(0, 230, 118, 0.3);
            border-color: #00e676;
        }

        html.dark input:checked+.slider {
            background-color: rgba(0, 230, 118, 0.2);
            border-color: #00e676;
        }

        input:checked+.slider:before {
            transform: translateX(24px);
            background-color: #00e676;
        }

        .history-item {
            transition: all 0.2s ease;
        }

        .history-item:hover {
            transform: translateX(4px);
        }

        /* Panel animations */
        #controls, #config-panel {
            transition:
                transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #controls.collapsed {
            transform: translateX(-100%);
            width: 0; min-width: 0; padding: 0; margin: 0; border: none; overflow: hidden;
        }

        #config-panel.collapsed {
            transform: translateX(100%);
            width: 0; min-width: 0; padding: 0; margin: 0; border: none; overflow: hidden;
        }

        @media (max-width: 768px) {
            #controls {
                position: fixed; top: 0; left: 0; height: 100vh; z-index: 100;
                transform: translateX(-100%);
            }
            #controls.mobile-open { transform: translateX(0); }
            #controls.collapsed { transform: translateX(-100%); width: 85%; min-width: 300px; }

            #config-panel {
                position: fixed; top: 0; right: 0; height: 100vh; z-index: 100;
                transform: translateX(100%);
            }
            #config-panel.mobile-open { transform: translateX(0); }
            #config-panel.collapsed { transform: translateX(100%); width: 85%; min-width: 300px; }
        }

        /* History flex grow */
        .history-flex {
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .history-list-container {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
        }

        /* Spinner selector */
        .spinner-option {
            transition: all 0.2s ease;
        }

        .spinner-option.active {
            border-color: #2979ff;
            background: rgba(41, 121, 255, 0.1);
        }

        html.dark .spinner-option.active {
            border-color: #7c4dff;
            background: rgba(124, 77, 255, 0.1);
        }

        .spinner-preview {
            width: 60px;
            height: 60px;
        }

        /* Class selector */
        .class-item {
            transition: all 0.2s ease;
        }

        .class-item:hover {
            background: rgba(41, 121, 255, 0.1);
        }

        .class-item.active {
            background: rgba(41, 121, 255, 0.15);
            border-color: #2979ff;
        }

        html.dark .class-item.active {
            background: rgba(124, 77, 255, 0.15);
            border-color: #7c4dff;
        }
    </style>
</head>

<body class="h-screen w-screen overflow-hidden">
    <div id="toast-container"
        class="fixed top-4 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none"></div>

    <div class="console-frame w-full h-full relative flex z-10 rounded-none md:rounded-2xl">
        <!-- LEFT PANEL: LIBRARY + SPIN + SETTINGS + HISTORY -->
        <aside id="controls"
            class="w-72 glass-panel border-r-[1px] border-slate-300 dark:border-white/10 flex flex-col z-50 h-full shrink-0">
            <!-- Header -->
            <div
                class="p-4 border-b-[1px] border-slate-300 dark:border-white/10 bg-slate-50/50 dark:bg-slate-800/50 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-3 flex-1 min-w-0">
                    <a href="../index.html"
                        class="p-2 bg-white dark:bg-slate-700 border-[1px] border-slate-300 dark:border-white/10 rounded-lg text-slate-400 hover:text-blue transition-colors shadow-sm"
                        title="Back to Home">
                        <i data-lucide="home" class="w-4 h-4"></i>
                    </a>
                    <div class="flex-1 min-w-0">
                        <h1
                            class="text-xl font-heading text-dark dark:text-slate-100 tracking-wide leading-none truncate">
                            CLASS<span class="text-pink">SPIN</span><span class="text-blue">NER</span>
                        </h1>
                        <div class="flex items-center gap-2 mt-1">
                            <button onclick="toggleTheme()"
                                class="px-2 py-1 bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 text-[10px] font-bold rounded flex items-center gap-1 hover:bg-slate-300 dark:hover:bg-slate-600 transition-colors">
                                <i data-lucide="moon" class="w-3 h-3 hidden dark:block"></i>
                                <i data-lucide="sun" class="w-3 h-3 block dark:hidden"></i>
                            </button>
                            <span
                                class="text-[10px] text-slate-400 font-bold uppercase tracking-widest truncate">Classroom
                                Tool</span>
                        </div>
                    </div>
                </div>
                <button onclick="toggleLeftPanel()"
                    class="p-2 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors md:hidden">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- ACTIVE INDICATOR (Pattern 4.1) -->
            <div id="active-indicator" class="px-4 py-2 bg-blue/10 border-b-[1px] border-slate-300 dark:border-white/10 hidden">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2 overflow-hidden">
                        <div class="w-2 h-2 rounded-full bg-blue animate-pulse"></div>
                        <span id="active-set-name" class="text-[10px] font-black text-blue uppercase tracking-wider truncate">Editing: Unsaved</span>
                    </div>
                    <span class="text-[9px] font-bold text-slate-400 italic">Auto-saving...</span>
                </div>
            </div>

            <!-- Content -->
            <div class="flex-1 flex flex-col p-4 overflow-y-auto custom-scrollbar bg-transparent relative gap-4">
                
                <!-- ACTION GRID (Pattern 4.2) -->
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="newSet()" class="btn-chunky bg-white dark:bg-slate-700 text-dark dark:text-white py-2 rounded-xl text-xs flex items-center justify-center gap-2">
                        <i data-lucide="plus-circle" class="w-4 h-4"></i> NEW
                    </button>
                    <button onclick="openSaveAsModal()" class="btn-chunky bg-green text-dark py-2 rounded-xl text-xs flex items-center justify-center gap-2">
                        <i data-lucide="save" class="w-4 h-4"></i> SAVE AS
                    </button>
                </div>

                <!-- LIBRARY & SORTING (Pattern 4.3) -->
                <div class="shrink-0 p-3 bg-slate-50/50 dark:bg-slate-800/50 border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-sm">
                    <div class="flex justify-between items-center border-b-[1px] border-slate-200 dark:border-white/10 pb-2 mb-2">
                        <label class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="library" class="w-4 h-4 text-blue"></i>
                            Library
                        </label>
                        <select id="library-sort" onchange="renderLibrary()" class="bg-transparent text-[10px] font-bold text-blue outline-none cursor-pointer">
                            <option value="recent">Recent</option>
                            <option value="alpha">Alpha</option>
                            <option value="popular">Popular</option>
                        </select>
                    </div>

                    <!-- Library List -->
                    <div id="library-list" class="space-y-1 max-h-40 overflow-y-auto custom-scrollbar">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- SPIN SETTINGS -->
                <div class="shrink-0 p-3 bg-slate-50/50 dark:bg-slate-800/50 border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-sm space-y-2">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2 border-b-[1px] border-slate-200 dark:border-white/10 pb-2">
                        <i data-lucide="settings" class="w-4 h-4 text-orange"></i>
                        Settings
                    </label>
                    <div class="space-y-1">
                        <div class="flex justify-between">
                            <span class="text-sm font-bold text-dark dark:text-slate-200">Duration</span>
                            <span id="duration-display" class="text-xs font-mono font-bold text-blue bg-blue/10 px-2 py-0.5 rounded">4s</span>
                        </div>
                        <input type="range" id="duration-slider" min="2" max="8" step="0.5" value="4" oninput="updateDuration(this.value)" class="w-full accent-blue h-2 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer" />
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-sm font-bold text-dark dark:text-slate-200">Sound</span>
                        <label class="switch"><input type="checkbox" id="sound-toggle" checked /><span class="slider"></span></label>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-sm font-bold text-dark dark:text-slate-200">Remove Winner</span>
                        <label class="switch"><input type="checkbox" id="remove-winner-toggle" /><span class="slider"></span></label>
                    </div>
                </div>

                <!-- SPINNER TYPE -->
                <div class="shrink-0 p-3 bg-slate-50/50 dark:bg-slate-800/50 border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-sm">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2 border-b-[1px] border-slate-200 dark:border-white/10 pb-2 mb-2">
                        <i data-lucide="pen-tool" class="w-4 h-4 text-orange"></i>
                        Spinner Type
                    </label>
                    <div class="flex justify-between items-center border-b-[1px] border-slate-200 dark:border-white/10 pb-2 mb-2"><!-- spacer --></div>
                    <div class="flex gap-2">
                        <button onclick="setSpinnerType('pencil')" id="spinner-pencil"
                            class="spinner-option active flex-1 p-2 border-[1px] border-slate-300 dark:border-white/10 rounded-xl flex flex-col items-center gap-1">
                            <svg viewBox="0 0 400 400" class="spinner-preview">
                                <defs>
                                    <linearGradient id="pencilGrad" x1="0" y1="0" x2="1" y2="0">
                                        <stop offset="0%" stop-color="#FFB300" />
                                        <stop offset="50%" stop-color="#FFD54F" />
                                        <stop offset="100%" stop-color="#FFB300" />
                                    </linearGradient>
                                </defs>
                                <rect x="175" y="80" width="50" height="240" fill="url(#pencilGrad)" stroke="#1E293B" stroke-width="3" />
                                <path d="M175 80 L200 30 L225 80 Z" fill="#D7CCC8" stroke="#1E293B" stroke-width="3" />
                                <rect x="173" y="300" width="54" height="40" fill="#90A4AE" stroke="#1E293B" stroke-width="3" />
                                <path d="M175 340 H225 V360 C225 375 175 375 175 360 V340 Z" fill="#FF6B95" stroke="#1E293B" stroke-width="3" />
                            </svg>
                            <span class="text-[10px] font-bold">Pencil</span>
                        </button>
                        <button onclick="setSpinnerType('marker')" id="spinner-marker"
                            class="spinner-option flex-1 p-2 border-[1px] border-slate-300 dark:border-white/10 rounded-xl flex flex-col items-center gap-1">
                            <svg viewBox="0 0 400 400" class="spinner-preview">
                                <defs>
                                    <linearGradient id="markerGrad" x1="0" y1="0" x2="1" y2="0">
                                        <stop offset="0%" stop-color="#2979FF" />
                                        <stop offset="50%" stop-color="#64B5F6" />
                                        <stop offset="100%" stop-color="#2979FF" />
                                    </linearGradient>
                                </defs>
                                <rect x="170" y="60" width="60" height="280" rx="8" fill="url(#markerGrad)" stroke="#1E293B" stroke-width="3" />
                                <rect x="175" y="340" width="50" height="40" rx="4" fill="#37474F" stroke="#1E293B" stroke-width="3" />
                            </svg>
                            <span class="text-[10px] font-bold">Marker</span>
                        </button>
                        <button onclick="setSpinnerType('ruler')" id="spinner-ruler"
                            class="spinner-option flex-1 p-2 border-[1px] border-slate-300 dark:border-white/10 rounded-xl flex flex-col items-center gap-1">
                            <svg viewBox="0 0 400 400" class="spinner-preview">
                                <defs>
                                    <linearGradient id="rulerGrad" x1="0" y1="0" x2="0" y2="1">
                                        <stop offset="0%" stop-color="#ECEFF1" />
                                        <stop offset="100%" stop-color="#CFD8DC" />
                                    </linearGradient>
                                </defs>
                                <rect x="120" y="100" width="160" height="200" fill="url(#rulerGrad)" stroke="#1E293B" stroke-width="3" />
                                <circle cx="200" cy="200" r="12" fill="none" stroke="#1E293B" stroke-width="2" />
                            </svg>
                            <span class="text-[10px] font-bold">Ruler</span>
                        </button>
                    </div>
                </div>

                <!-- HISTORY -->
                <div class="p-3 bg-slate-50/50 dark:bg-slate-800/50 border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-sm">
                    <div class="flex justify-between items-center border-b-[1px] border-slate-200 dark:border-white/10 pb-2 mb-3">
                        <label class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="history" class="w-4 h-4 text-purple"></i>
                            History
                        </label>
                        <span id="history-count" class="text-[10px] font-bold text-slate-400">0 spins</span>
                    </div>
                    <button onclick="openHistoryModal()"
                        class="btn-chunky w-full bg-purple/10 hover:bg-purple/20 border-[1px] border-purple/30 text-purple py-2.5 rounded-xl text-xs font-black flex items-center justify-center gap-2 transition-colors">
                        <i data-lucide="list-ordered" class="w-4 h-4"></i>
                        VIEW FULL HISTORY
                        <span id="history-badge" class="hidden bg-purple text-white text-[9px] font-black px-1.5 py-0.5 rounded-full">0</span>
                    </button>
                </div>

            </div>

            <!-- Footer -->
            <div class="p-3 border-t-[1px] border-slate-300 dark:border-white/10 bg-slate-50/50 dark:bg-slate-800/50 flex justify-between items-center shrink-0">
                <button onclick="resetSession()"
                    class="p-2 bg-white dark:bg-slate-700 border-[1px] border-slate-300 dark:border-white/10 rounded-lg text-slate-400 hover:text-orange transition-colors" title="Reset Session">
                    <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                </button>
                <div class="font-heading font-black text-slate-400 text-xs uppercase tracking-wider">
                    SPINS: <span id="total-spins-footer" class="text-blue">0</span>
                </div>
            </div>

    <script>
        // Universal Slides/Sets Management Pattern Implementation
        const appState = {
            data: {
                name: "",
                players: [],
                history: [],
                totalSpins: 0,
            },
            activeId: null
        };

        const STORAGE_KEY = "class_spinner_library_v2";
        const SESSION_KEY = "class_spinner_session_state";

        // Persistence Helpers
        function getLibrary() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        function saveLibrary(library) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(library));
            saveProgress(STORAGE_KEY, library).catch(err => {
                console.error('[Cloud Sync] Failed to save library:', err);
                showToast('Cloud sync failed - data saved locally', 'warning');
            });
        }

        function onContentChange() {
            // Auto-save logic (Pattern 3.A)
            updateSessionPersistence();
            
            if (appState.activeId) {
                const library = getLibrary();
                const index = library.findIndex(item => item.id === appState.activeId);
                if (index !== -1) {
                    library[index] = {
                        ...library[index],
                        name: appState.data.name,
                        players: [...appState.data.players],
                        history: [...appState.data.history],
                        totalSpins: appState.data.totalSpins,
                        lastUsed: Date.now()
                    };
                    saveLibrary(library);
                }
            }
        }

        function updateSessionPersistence() {
            const sessionState = {
                data: appState.data,
                activeId: appState.activeId,
                spinnerType: localStorage.getItem('class_spinner_type') || 'pencil',
                spinDuration: spinDuration
            };
            localStorage.setItem('class_spinner_session', JSON.stringify(appState.data));
            localStorage.setItem('class_spinner_activeId', appState.activeId);
            saveProgress(SESSION_KEY, sessionState).catch(err => {
                console.error('[Cloud Sync] Failed to save session:', err);
            });
        }

        // Lifecycle Workflows
        function newSet() {
            // (Pattern 3.D)
            appState.data = {
                name: "",
                players: [],
                history: [],
                totalSpins: 0
            };
            appState.activeId = null;
            eliminatedIndices.clear();
            updateUI();
            renderLibrary();
            showToast("New workspace ready", "info");
        }

        function openSaveAsModal() {
            const name = prompt("Enter a name for this class:", appState.data.name || "");
            if (name === null) return;
            if (!name.trim()) {
                showToast("Name is required", "error");
                return;
            }
            saveAsNew(name.trim());
        }

        function saveAsNew(name) {
            // (Pattern 3.B)
            const library = getLibrary();
            const newId = Date.now();
            const newEntry = {
                id: newId,
                name: name,
                players: [...appState.data.players],
                history: [...appState.data.history],
                totalSpins: appState.data.totalSpins,
                createdAt: Date.now(),
                lastUsed: Date.now(),
                usageCount: 1
            };
            library.push(newEntry);
            saveLibrary(library);
            
            appState.activeId = newId;
            appState.data.name = name;
            
            renderLibrary();
            updateActiveIndicator();
            showToast(`Saved as "${name}"`, "success");
        }

        function loadSet(id) {
            // (Pattern 3.C)
            const library = getLibrary();
            const item = library.find(i => i.id === id);
            if (!item) return;

            // Backward compatibility (Pattern 5)
            if (!item.lastUsed) item.lastUsed = item.createdAt || Date.now();
            if (!item.usageCount) item.usageCount = 0;

            item.usageCount++;
            item.lastUsed = Date.now();
            saveLibrary(library);

            appState.activeId = id;
            appState.data = {
                name: item.name,
                players: [...item.players],
                history: [...(item.history || [])],
                totalSpins: item.totalSpins || 0
            };

            eliminatedIndices.clear();
            updateUI();
            renderLibrary();
            showToast(`Loaded ${item.name}`, "info");
        }

        function deleteLibraryItem(id, event) {
            if (event) event.stopPropagation();
            if (!confirm("Are you sure you want to delete this class?")) return;

            let library = getLibrary();
            library = library.filter(i => i.id !== id);
            saveLibrary(library);

            if (appState.activeId === id) {
                newSet();
            } else {
                renderLibrary();
            }
            showToast("Class deleted", "info");
        }

        // UI Updates
        function updateUI() {
            renderPlayers();
            renderPlayerChips();
            updateActiveIndicator();
            updateHistoryDisplay();
            updateStats();
            
            document.getElementById("duration-display").textContent = spinDuration + "s";
            document.getElementById("duration-slider").value = spinDuration;
        }

        function updateActiveIndicator() {
            const indicator = document.getElementById("active-indicator");
            const nameEl = document.getElementById("active-set-name");
            
            if (appState.activeId) {
                indicator.classList.remove("hidden");
                nameEl.textContent = `Editing: ${appState.data.name}`;
            } else {
                indicator.classList.add("hidden");
            }
        }

        function renderLibrary() {
            const list = document.getElementById("library-list");
            const sortBy = document.getElementById("library-sort").value;
            let library = getLibrary();

            if (library.length === 0) {
                list.innerHTML = '<p class="text-[10px] text-slate-400 text-center py-4 italic">Library is empty</p>';
                return;
            }

            // Sorting logic (Pattern 4.3)
            if (sortBy === "recent") {
                library.sort((a, b) => b.lastUsed - a.lastUsed);
            } else if (sortBy === "alpha") {
                library.sort((a, b) => a.name.localeCompare(b.name));
            } else if (sortBy === "popular") {
                library.sort((a, b) => (b.usageCount || 0) - (a.usageCount || 0));
            }

            list.innerHTML = library.map(item => `
                <div onclick="loadSet(${item.id})" class="group flex items-center justify-between p-2 rounded-xl border-[1px] cursor-pointer transition-all ${appState.activeId === item.id ? 'bg-blue/10 border-blue/30' : 'border-transparent hover:bg-slate-100 dark:hover:bg-slate-800'}">
                    <div class="flex items-center gap-2 overflow-hidden">
                        <div class="w-7 h-7 rounded-lg bg-slate-200 dark:bg-slate-700 flex items-center justify-center text-xs font-black text-slate-500 shrink-0">
                            ${item.name.charAt(0).toUpperCase()}
                        </div>
                        <div class="flex flex-col overflow-hidden">
                            <span class="text-xs font-bold truncate text-dark dark:text-slate-200">${item.name}</span>
                            <span class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">${item.players.length} Students</span>
                        </div>
                    </div>
                    <button onclick="deleteLibraryItem(${item.id}, event)" class="p-1.5 text-slate-300 hover:text-pink opacity-0 group-hover:opacity-100 transition-all">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                    </button>
                </div>
            `).join("");
            
            lucide.createIcons();
        }

        // Theme
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle("dark");
            localStorage.setItem("theme_spin-the-wheel", isDark ? "dark" : "light");
            lucide.createIcons();
        }

        function loadTheme() {
            const saved = localStorage.getItem("theme_spin-the-wheel");
            if (saved === "dark" || (!saved && window.matchMedia("(prefers-color-scheme: dark)").matches))
                document.documentElement.classList.add("dark");
        }

        // Toast
        function showToast(message, type = "info") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");

            const colors = {
                success: "bg-green text-dark border-green",
                error: "bg-pink text-white border-pink",
                info: "bg-blue text-white border-blue",
                warning: "bg-orange text-dark border-orange",
            };

            toast.className = `${colors[type]} px-4 py-3 rounded-xl shadow-neo border-[1px] font-bold text-sm flex items-center gap-2 pointer-events-auto transform transition-all duration-300 translate-y-[-20px] opacity-0`;
            toast.innerHTML = `<i data-lucide="${type === "success" ? "check-circle" : type === "error" ? "x-circle" : "info"}" class="w-4 h-4"></i> ${message}`;

            container.appendChild(toast);
            lucide.createIcons();

            requestAnimationFrame(() =>
                toast.classList.remove("translate-y-[-20px]", "opacity-0"),
            );
            setTimeout(() => {
                toast.classList.add("translate-y-[-20px]", "opacity-0");
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        // Data model helpers (backward-compat with plain strings)
        const optText = p => (typeof p === 'object' && p !== null) ? (p.name || '') : (p || '');
        const optImg  = p => (typeof p === 'object' && p !== null) ? (p.img  || null) : null;

        let leftPanelOpen = true, rightPanelOpen = true;

        function toggleLeftPanel() {
            const panel = document.getElementById("controls");
            const icon = document.getElementById("left-toggle-icon");
            leftPanelOpen = !leftPanelOpen;
            if (window.innerWidth < 768) panel.classList.toggle("mobile-open", leftPanelOpen);
            else panel.classList.toggle("collapsed", !leftPanelOpen);
            icon.setAttribute("data-lucide", leftPanelOpen ? "panel-left-close" : "panel-left-open");
            lucide.createIcons();
            setTimeout(renderPlayers, 350);
        }

        function toggleRightPanel() {
            const panel = document.getElementById("config-panel");
            const icon = document.getElementById("right-toggle-icon");
            rightPanelOpen = !rightPanelOpen;
            if (window.innerWidth < 768) panel.classList.toggle("mobile-open", rightPanelOpen);
            else panel.classList.toggle("collapsed", !rightPanelOpen);

            const files = Array.from(fileInput.files);
            if (!files.length) return;
            fileInput.value = '';
            showToast(`Adding ${files.length} image${files.length > 1 ? 's' : ''}...`, 'info');
            const promises = files.map(file => new Promise(resolve => {
                const name = file.name.replace(/\.[^.]+$/, '');
                const readLocal = () => { const r = new FileReader(); r.onload = e => resolve({ name, img: e.target.result }); r.readAsDataURL(file); };
                if (typeof isSandbox === 'function' && !isSandbox() && typeof uploadMedia === 'function') {
                    uploadMedia(file, 'classspin', 'players').then(url => resolve({ name, img: url })).catch(readLocal);
                } else { readLocal(); }
            }));
            const newItems = await Promise.all(promises);
            newItems.forEach(item => appState.data.players.push({ name: item.name, img: item.img }));
            onContentChange();
            renderPlayers();
            renderPlayerChips();
            showToast(`Added ${files.length} image${files.length > 1 ? 's' : ''}`, 'success');

        let currentSpinnerType = "pencil";

        function setSpinnerType(type) {
            currentSpinnerType = type;
            document.getElementById("spinner-wrapper").innerHTML =
                spinnerSVGs[type];

            // Update active state
            document
                .querySelectorAll(".spinner-option")
                .forEach((el) => el.classList.remove("active"));
            document
                .getElementById(`spinner-${type}`)
                .classList.add("active");

            localStorage.setItem("class_spinner_type", type);
            updateSessionPersistence();
        }

        // Game State
        const palette = ["bg-pink", "bg-orange", "bg-green", "bg-blue"];
        let eliminatedIndices = new Set(); // Session-based elimination
        let currentRotation = 0;
        let isSpinning = false;
        let lastWinner = null;
        let spinDuration = 4;

        // Elements
        const spinnerWrapper = document.getElementById("spinner-wrapper");
        const board = document.getElementById("game-board");
        const container = document.getElementById("players-container");

        // Initialize
        async function init() {
            await requireAuth();
            loadTheme();

            // Initial Cloud Sync
            if (getLibrary().length === 0) {
                const cloudLibrary = await loadProgress(STORAGE_KEY);
                if (cloudLibrary) {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(cloudLibrary));
                }
            }

            // Load session state from cloud
            const cloudSession = await loadProgress(SESSION_KEY);
            if (cloudSession) {
                if (cloudSession.spinnerType) {
                    localStorage.setItem('class_spinner_type', cloudSession.spinnerType);
                }
                if (cloudSession.spinDuration) {
                    spinDuration = cloudSession.spinDuration;
                }
                if (cloudSession.activeId) {
                    localStorage.setItem('class_spinner_activeId', cloudSession.activeId);
                }
                if (cloudSession.data) {
                    localStorage.setItem('class_spinner_session', JSON.stringify(cloudSession.data));
                }
            }

            // Load saved spinner type
            const savedType = localStorage.getItem("class_spinner_type") || "pencil";
            setSpinnerType(savedType);

            // Restore session or load last active
            const savedActiveId = localStorage.getItem('class_spinner_activeId');
            
            if (savedActiveId && savedActiveId !== "null" && savedActiveId !== "undefined") {
                loadSet(parseInt(savedActiveId));
            } else {
                const sessionData = localStorage.getItem('class_spinner_session');
                if (sessionData) {
                    appState.data = JSON.parse(sessionData);
                    appState.activeId = null;
                    updateUI();
                } else {
                    newSet();
                }
            }

            renderLibrary();

            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }

            if (window.innerWidth < 768) {
                panelOpen = false;
                document.getElementById("controls").classList.remove("mobile-open");
            }
        }

        // Player Management Inline
        let isBatchMode = false;

        function toggleBatch() {
            isBatchMode = !isBatchMode;
            document.getElementById("batch-container").classList.toggle("hidden", !isBatchMode);
            document.getElementById("player-input-inline").parentElement.classList.toggle("hidden", isBatchMode);
            if (isBatchMode) {
                document.getElementById("batch-input").value = appState.data.players.map(p => optText(p)).join("\n");
            }
        }

        function addPlayer() {
            const input = document.getElementById("player-input-inline");
            const name = input.value.trim();
            if (!name) return;
            appState.data.players.push({ name, img: null });
            input.value = "";
            onContentChange();
            updateUI();
            showToast(`Added ${name}`, "info");
        }

        function removePlayer(index) {
            const removed = appState.data.players[index];
            appState.data.players.splice(index, 1);
            onContentChange();
            updateUI();
            showToast(`Removed ${optText(removed)}`, "info");
        }

        function saveBatch() {
            const input = document.getElementById("batch-input").value;
            const newPlayers = input
                .split(/[\n,]/)
                .map((s) => s.trim())
                .filter((s) => s.length > 0);

            if (newPlayers.length < 1) {
                showToast("Need at least 1 item!", "error");
                return;
            }

            appState.data.players = newPlayers.map(n => ({ name: n, img: null }));
            toggleBatch();
            onContentChange();
            updateUI();
            showToast(`Updated ${appState.data.players.length} items`, "success");
        }

        function renderPlayerChips() {
            const list = document.getElementById("player-list-chips");
            list.innerHTML = appState.data.players.map((p, i) => {
                const text = optText(p);
                const img  = optImg(p);
                return `
                <div class="flex items-center gap-1.5 bg-white dark:bg-slate-700 border-[1px] border-slate-300 dark:border-white/10 rounded-lg px-2 py-1 shadow-neo-sm">
                    ${img
                        ? `<img src="${img}" class="w-6 h-6 rounded object-cover shrink-0" />`
                        : `<div class="w-6 h-6 rounded bg-pink/20 flex items-center justify-center text-[9px] font-black text-pink shrink-0">${text.charAt(0).toUpperCase()}</div>`}
                    <span class="text-xs font-bold text-dark dark:text-slate-200 truncate max-w-[100px]">${text}</span>
                    <button onclick="removePlayer(${i})" class="text-slate-400 hover:text-pink ml-auto">
                        <i data-lucide="x" class="w-3 h-3"></i>
                    </button>
                </div>`;
            }).join("");
            lucide.createIcons();
        }

        function renderPlayers() {
            container.innerHTML = "";

            const activePlayers = appState.data.players.map((p, i) => ({ raw: p, name: optText(p), originalIndex: i }))
                .filter(p => !eliminatedIndices.has(p.originalIndex));

            const count = activePlayers.length;
            if (count < 1) {
                container.innerHTML =
                    '<div class="absolute inset-0 flex items-center justify-center text-slate-400 font-bold text-sm md:text-base">Need at least 1 active student</div>';
                return;
            }

            const boardSize = board.clientWidth;
            const radius = (boardSize / 2) * 0.82;

            activePlayers.forEach((player, index) => {
                const angleDeg = (360 / count) * index;
                const angleRad = (angleDeg - 90) * (Math.PI / 180);
                const x = Math.cos(angleRad) * radius;
                const y = Math.sin(angleRad) * radius;
                const colorClass = palette[player.originalIndex % palette.length];
                const text = optText(player.raw);
                const img  = optImg(player.raw);

                const label = document.createElement("div");
                label.className = `player-bubble absolute flex flex-col items-center justify-center transform -translate-x-1/2 -translate-y-1/2`;
                label.style.left = `calc(50% + ${x}px)`;
                label.style.top = `calc(50% + ${y}px)`;
                label.dataset.index = player.originalIndex;

                const isMobile = window.innerWidth < 640;
                const bubbleSize = isMobile ? 'w-10 h-10' : 'w-14 h-14';
                const fontSize   = isMobile ? 'text-[9px]' : 'text-[10px]';

                label.innerHTML = img ? `
                    <div class="${bubbleSize} rounded-full overflow-hidden border-2 border-white shadow-neo">
                        <img src="${img}" class="w-full h-full object-cover" />
                    </div>
                    <div class="mt-1 ${fontSize} font-black text-dark dark:text-white bg-white/80 dark:bg-slate-800/80 px-1.5 py-0.5 rounded-md truncate max-w-[80px] text-center">${text}</div>
                    <div class="mt-0.5 w-2 h-2 rounded-full bg-slate-300 dark:bg-slate-600"></div>
                ` : `
                    <div class="${colorClass} ${isMobile ? 'text-xs px-2 py-1 max-w-[90px]' : 'text-sm px-4 py-2 max-w-[140px]'} text-white border-[1px] border-slate-300 dark:border-white/20 rounded-xl shadow-neo font-bold truncate">${text}</div>
                    <div class="mt-1 w-2 h-2 rounded-full bg-slate-300 dark:bg-slate-600"></div>
                `;
                container.appendChild(label);
            });
        }

        function updateDuration(val) {
            spinDuration = parseFloat(val);
            document.getElementById("duration-display").textContent =
                spinDuration + "s";
        }

        // Sound
        const audioCtx = new (
            window.AudioContext || window.webkitAudioContext
        )();

        function playSound(type) {
            if (!document.getElementById("sound-toggle").checked) return;

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === "spin") {
                oscillator.frequency.setValueAtTime(
                    200,
                    audioCtx.currentTime,
                );
                oscillator.frequency.exponentialRampToValueAtTime(
                    800,
                    audioCtx.currentTime + 0.1,
                );
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(
                    0.01,
                    audioCtx.currentTime + 0.1,
                );
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } else if (type === "win") {
                [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(
                        0.15,
                        audioCtx.currentTime + i * 0.1,
                    );
                    gain.gain.exponentialRampToValueAtTime(
                        0.01,
                        audioCtx.currentTime + i * 0.1 + 0.3,
                    );
                    osc.start(audioCtx.currentTime + i * 0.1);
                    osc.stop(audioCtx.currentTime + i * 0.1 + 0.3);
                });
            }
        }

        function spin() {
            const activePlayersCount = appState.data.players.filter((_, i) => !eliminatedIndices.has(i)).length;
            if (isSpinning || activePlayersCount < 1) {
                if (activePlayersCount < 1)
                    showToast("Need at least 1 active student!", "error");
                return;
            }

            if (audioCtx.state === "suspended") audioCtx.resume();

            isSpinning = true;
            document.getElementById("spin-btn").disabled = true;
            document.getElementById("spin-btn").classList.add("opacity-50");
            closeWinnerModal();

            document
                .querySelectorAll(".player-bubble")
                .forEach((el) => el.classList.remove("winner"));

            const extraSpins = 3 + Math.floor(Math.random() * 3);
            const randomAngle = Math.random() * 360;
            const totalDegrees = extraSpins * 360 + randomAngle;

            currentRotation += totalDegrees;

            spinnerWrapper.style.transition = `transform ${spinDuration}s cubic-bezier(0.1, 0.7, 0.1, 1)`;
            spinnerWrapper.style.transform = `rotate(${currentRotation}deg)`;

            let tickCount = 0;
            const tickInterval = setInterval(() => {
                tickCount++;
                if (tickCount < spinDuration * 8) playSound("spin");
            }, 125);

            setTimeout(() => {
                clearInterval(tickInterval);
                determineWinner(currentRotation % 360);
                isSpinning = false;
                document.getElementById("spin-btn").disabled = false;
                document
                    .getElementById("spin-btn")
                    .classList.remove("opacity-50");
            }, spinDuration * 1000);
        }

        function determineWinner(angle) {
            const activePlayers = appState.data.players.map((p, i) => ({ raw: p, name: optText(p), img: optImg(p), originalIndex: i }))
                .filter(p => !eliminatedIndices.has(p.originalIndex));
            const count = activePlayers.length;
            const segmentSize = 360 / count;
            let winningIndex = Math.round(angle / segmentSize) % count;

            const winner = activePlayers[winningIndex];
            lastWinner = {
                name: winner.name,
                img: winner.img || null,
                index: winner.originalIndex,
                angle: angle,
                timestamp: new Date(),
            };

            const bubbles = document.querySelectorAll(".player-bubble");
            bubbles.forEach(b => {
                if (parseInt(b.dataset.index) === winner.originalIndex) {
                    b.classList.add("winner");
                }
            });

            appState.data.totalSpins++;
            appState.data.history.unshift(lastWinner);

            onContentChange();
            updateHistoryDisplay();
            updateStats();
            playSound("win");

            setTimeout(() => showWinnerModal(lastWinner), 300);
        }

        function showWinnerModal(winner) {
            const modal = document.getElementById("winner-modal");
            const backdrop = document.getElementById("winner-backdrop");

            document.getElementById("winner-name").textContent = winner.name;
            const avatarEl = document.getElementById("winner-avatar");
            if (winner.img) {
                avatarEl.innerHTML = `<img src="${winner.img}" class="w-full h-full object-cover rounded-full" />`;
            } else {
                avatarEl.textContent = winner.name.charAt(0).toUpperCase();
            }
            document.getElementById("winner-class").textContent = appState.data.name || "Unsaved Class";

            const removeBtn = document.getElementById("remove-btn");
            removeBtn.classList.toggle(
                "hidden",
                !document.getElementById("remove-winner-toggle").checked,
            );

            modal.classList.remove("hidden");
            modal.classList.add("flex");
            backdrop.classList.remove("opacity-0");
        }

        function closeWinnerModal() {
            const modal = document.getElementById("winner-modal");
            const backdrop = document.getElementById("winner-backdrop");

            backdrop.classList.add("opacity-0");
            setTimeout(() => {
                modal.classList.add("hidden");
                modal.classList.remove("flex");
            }, 300);

            document
                .querySelectorAll(".player-bubble")
                .forEach((el) => el.classList.remove("winner"));
        }

        function resetSession() {
            eliminatedIndices.clear();
            renderPlayers();
            showToast("Session reset", "info");
        }

        function removeWinnerAndContinue() {
            if (lastWinner) {
                eliminatedIndices.add(lastWinner.index);
                renderPlayers();
                showToast(`Eliminated ${lastWinner.name}`, "info");
            }
            closeWinnerModal();
        }

        // History
        function updateHistoryDisplay() {
            const count = appState.data.history.length;
            document.getElementById("history-count").textContent =
                `${count} spin${count !== 1 ? "s" : ""}`;
            const badge = document.getElementById("history-badge");
            if (count > 0) {
                badge.textContent = count;
                badge.classList.remove("hidden");
            } else {
                badge.classList.add("hidden");
            }
        }

        function openHistoryModal() {
            const history = appState.data.history;
            const modal = document.getElementById("history-modal");

            // Stats
            const total = history.length;
            const unique = new Set(history.map(h => h.name)).size;
            const freq = {};
            history.forEach(h => { freq[h.name] = (freq[h.name] || 0) + 1; });
            const top = total > 0 ? Object.entries(freq).sort((a,b) => b[1]-a[1])[0][0] : "—";
            document.getElementById("hm-total").textContent = total;
            document.getElementById("hm-unique").textContent = unique;
            document.getElementById("hm-top").textContent = top;
            document.getElementById("history-modal-count").textContent = total;

            // List
            const list = document.getElementById("history-modal-list");
            if (total === 0) {
                list.innerHTML = '<p class="text-sm text-slate-400 text-center py-8 italic">No spins yet...</p>';
            } else {
                list.innerHTML = history.map((item, i) => {
                    const img = item.img || null;
                    const spinNum = total - i;
                    return `
                    <div class="flex items-center gap-3 p-3 bg-white/60 dark:bg-slate-800/60 rounded-xl border-[1px] border-slate-200 dark:border-white/10 hover:border-purple/40 transition-colors group">
                        <div class="text-[10px] font-black text-slate-400 w-6 text-right shrink-0">#${spinNum}</div>
                        ${img
                            ? `<img src="${img}" class="w-10 h-10 rounded-full object-cover border-2 border-white shadow-neo-sm shrink-0" />`
                            : `<div class="w-10 h-10 rounded-full ${palette[item.index % palette.length]} text-white flex items-center justify-center text-base font-black shadow-neo-sm shrink-0">${item.name.charAt(0).toUpperCase()}</div>`}
                        <div class="flex-1 min-w-0">
                            <p class="font-black text-sm text-dark dark:text-slate-100 truncate">${item.name}</p>
                            <p class="text-[10px] text-slate-400 font-bold">${new Date(item.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'})}</p>
                        </div>
                        <div class="shrink-0 text-[10px] font-black text-slate-400 bg-slate-100 dark:bg-slate-700 px-2 py-1 rounded-lg">
                            ${freq[item.name]}× picked
                        </div>
                        <button onclick="deleteHistoryEntry(${i})" class="p-1 text-slate-300 hover:text-pink opacity-0 group-hover:opacity-100 transition-all" title="Delete">
                            <i data-lucide="x" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>`;
                }).join("");
            }

            modal.classList.remove("hidden");
            modal.classList.add("flex");
            lucide.createIcons();
        }

        function closeHistoryModal() {
            const modal = document.getElementById("history-modal");
            modal.classList.add("hidden");
            modal.classList.remove("flex");
        }

        function deleteHistoryEntry(index) {
            appState.data.history.splice(index, 1);
            appState.data.totalSpins = Math.max(0, appState.data.totalSpins - 1);
            onContentChange();
            updateHistoryDisplay();
            updateStats();
            openHistoryModal();
        }

        function updateStats() {
            const el = document.getElementById("total-spins");
            if (el) el.textContent = appState.data.totalSpins;
        }

        function clearHistory() {
            if (!confirm("Clear history for this class?")) return;
            appState.data.history = [];
            appState.data.totalSpins = 0;
            onContentChange();
            updateHistoryDisplay();
            updateStats();
            showToast("History cleared", "info");
            const modal = document.getElementById("history-modal");
            if (!modal.classList.contains("hidden")) openHistoryModal();
        }

        // Resize
        let resizeTimeout;
        window.addEventListener("resize", () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                renderPlayers();

                const controls = document.getElementById("controls");
                const isMobile = window.innerWidth < 768;

                if (!isMobile) {
                    controls.classList.remove("mobile-open");
                    if (!leftPanelOpen) {
                        controls.classList.add("collapsed");
                    }
                } else {
                    controls.classList.remove("collapsed");
                    if (!leftPanelOpen) {
                        controls.classList.remove("mobile-open");
                    }
                }
            }, 100);
        });


        // Initialization
        window.onload = init;
    </script>
</body>

</html>
