    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        pink: '#FF6B95',
                        orange: '#FF8C42',
                        green: '#00E676',
                        blue: '#2979FF',
                        dark: '#0f172a',
                        chalk: '#f8fafc',
                        surface: 'rgba(255, 255, 255, 0.85)',
                        border: 'rgba(203, 213, 225, 0.6)',
                    },
                    fontFamily: {
                        heading: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    boxShadow: {
                        'neo': '4px 4px 0px 0px rgba(51, 65, 85, 0.15)',
                        'neo-sm': '2px 2px 0px 0px rgba(51, 65, 85, 0.15)',
                        'neo-lg': '8px 8px 0px 0px rgba(51, 65, 85, 0.15)',
                    },
                    animation: {
                        'pop': 'pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)',
                        'shake': 'shake 0.4s cubic-bezier(.36,.07,.19,.97) both',
                        'float-1': 'float-icon-1 20s infinite linear',
                        'float-2': 'float-icon-2 25s infinite linear reverse',
                        'float-3': 'float-icon-3 15s infinite linear',
                    },
                    keyframes: {
                        pop: {
                            '0%': { transform: 'scale(0.8)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        },
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
                        },
                        'float-icon-1': {
                            '0%': { transform: 'translate(0, 0) rotate(0deg)' },
                            '33%': { transform: 'translate(30px, -50px) rotate(120deg)' },
                            '66%': { transform: 'translate(-20px, 20px) rotate(240deg)' },
                            '100%': { transform: 'translate(0, 0) rotate(360deg)' },
                        },
                        'float-icon-2': {
                            '0%': { transform: 'translate(0, 0) rotate(0deg)' },
                            '50%': { transform: 'translate(-40px, -30px) rotate(-180deg)' },
                            '100%': { transform: 'translate(0, 0) rotate(-360deg)' },
                        },
                        'float-icon-3': {
                            '0%': { transform: 'translate(0, 0) scale(1)' },
                            '50%': { transform: 'translate(20px, 40px) scale(1.2)' },
                            '100%': { transform: 'translate(0, 0) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        .bg-float-icon {
            color: rgba(203, 213, 225, 0.4);
            opacity: 0.3;
            position: fixed;
            z-index: 0;
            pointer-events: none;
        }
        html.dark .bg-float-icon {
            opacity: 0.15;
            color: white;
        }

        body {
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            background-color: #f8fafc;
            background-image:
                linear-gradient(#e2e8f0 1.5px, transparent 1.5px),
                linear-gradient(90deg, #e2e8f0 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            color: #1e293b;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s, color 0.3s;
        }

        html.dark body {
            background-color: #020617;
            background-image:
                linear-gradient(#0f172a 1.5px, transparent 1.5px),
                linear-gradient(90deg, #0f172a 1.5px, transparent 1.5px);
            color: #e2e8f0;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        html.dark .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .console-frame {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(203, 213, 225, 0.6);
            border-radius: 1.5rem;
            box-shadow: 8px 8px 0px rgba(51, 65, 85, 0.15);
            display: flex;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        html.dark .console-frame {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.4);
        }

        .btn-chunky {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(0);
            position: relative;
            border: 1px solid rgba(203, 213, 225, 0.6);
            box-shadow: 4px 4px 0 rgba(51, 65, 85, 0.15);
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        html.dark .btn-chunky {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.4);
            background-color: rgba(30, 41, 59, 0.8);
            color: #e2e8f0;
        }

        .btn-chunky:hover:not(:disabled) {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 rgba(51, 65, 85, 0.15);
            filter: brightness(105%);
        }

        html.dark .btn-chunky:hover:not(:disabled) {
            box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.4);
        }

        .btn-chunky:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 rgba(51, 65, 85, 0.15) !important;
        }

        html.dark .btn-chunky:active:not(:disabled) {
            box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.4) !important;
        }

        .custom-scrollbar::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(203, 213, 225, 0.6);
            border-radius: 10px;
            border: 2px solid transparent;
            background-clip: content-box;
        }
        html.dark .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); }

        textarea.input-styled {
            background-image: radial-gradient(rgba(203, 213, 225, 0.6) 1px, transparent 1px);
            background-size: 10px 10px;
            border: 1px solid rgba(203, 213, 225, 0.6);
            transition: all 0.3s;
        }
        html.dark textarea.input-styled {
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(203, 213, 225, 0.6);
            border: 1px solid rgba(203, 213, 225, 0.8);
            transition: .3s;
            border-radius: 34px;
        }
        html.dark .slider {
            background-color: rgba(30, 41, 59, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            box-shadow: 2px 2px 0px rgba(51, 65, 85, 0.15);
            transition: .3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 50%;
        }
        input:checked + .slider { background-color: rgba(0, 230, 118, 0.3); border-color: #00E676; }
        input:checked + .slider:before { transform: translateX(24px); background-color: #00E676; }

        .hidden-panel-desktop { margin-left: -24rem; }
    </style>

    <script>
        // --- CONSTANTS & CONFIG ---
        const DB_NAME = 'TaskAssignerDB';
        const DB_VERSION = 1;
        const STORE_PRESETS = 'presets';
        const STORE_SETTINGS = 'settings';
        const LS_KEY_THEME = 'theme_task-assigner';

        let idb = null;
        let currentPresetId = null;
        let currentGroupSize = 1;
        let audioEnabled = true;

        // --- THEME & UI ---
        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem(LS_KEY_THEME, 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem(LS_KEY_THEME, 'dark');
            }
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem(LS_KEY_THEME) || 'light';
            if (savedTheme === 'dark') document.documentElement.classList.add('dark');
        }

        function toggleControlPanel() {
            const controls = document.getElementById('controls');
            const isHidden = controls.classList.contains('hidden-panel-desktop') || controls.classList.contains('hidden-panel-mobile');
            
            if (isHidden) {
                controls.classList.remove('hidden-panel-desktop', 'hidden-panel-mobile');
            } else {
                controls.classList.add('hidden-panel-mobile', 'hidden-panel-desktop');
            }
            // Trigger a resize event to refresh layout if needed
            setTimeout(() => window.dispatchEvent(new Event('resize')), 350);
        }

        // --- TOAST NOTIFICATIONS ---
        // Uses shared modal-toast.js library (showToast, showConfirm)

        // --- AUDIO ---
        const AudioEngine = {
            init: async () => { try{ await Tone.start(); }catch(e){} },
            playClick: () => {
                if(!audioEnabled) return;
                const synth = new Tone.MembraneSynth().toDestination();
                synth.triggerAttackRelease("C2", "32n");
            },
            playSuccess: () => {
                if(!audioEnabled) return;
                const synth = new Tone.PolySynth().toDestination();
                synth.triggerAttackRelease(["C4", "E4", "A4"], "16n");
            },
            playError: () => {
                if(!audioEnabled) return;
                const synth = new Tone.PluckSynth().toDestination();
                synth.triggerAttackRelease("E2", "16n");
            }
        };

        // --- FUNCTIONS ---
        function initIcons() { lucide.createIcons(); }

        // ========== INDEXEDDB ==========
        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result);
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    if (!database.objectStoreNames.contains(STORE_PRESETS)) {
                        const presetsStore = database.createObjectStore(STORE_PRESETS, { keyPath: 'id', autoIncrement: true });
                        presetsStore.createIndex('name', 'name', { unique: false });
                        presetsStore.createIndex('updatedAt', 'updatedAt', { unique: false });
                    }
                    if (!database.objectStoreNames.contains(STORE_SETTINGS)) {
                        database.createObjectStore(STORE_SETTINGS, { keyPath: 'key' });
                    }
                };
            });
        }

        async function initDB() {
            try {
                idb = await openDB();
                await migrateFromLocalStorage();
                await loadFromCloud();
            } catch (e) {
                console.error('Failed to initialize IndexedDB:', e);
            }
        }

        // --- CLOUD SYNC ---
        async function saveToCloud() {
            try {
                const presets = await getAllPresets();
                await saveProgress('task_assigner_presets', { presets });
            } catch (e) {
                console.error("Cloud save failed", e);
            }
        }

        async function loadFromCloud() {
            try {
                const data = await loadProgress('task_assigner_presets');
                if (data && data.presets) {
                    for (const p of data.presets) {
                        const local = await getPreset(p.id);
                        if (!local || p.updatedAt > local.updatedAt) {
                            await savePreset(p.name, p.content, p.id);
                        }
                    }
                    await renderPresetSelector();
                }
            } catch (e) {
                console.error("Cloud load failed", e);
            }
        }

        async function migrateFromLocalStorage() {
            const savedPeople = localStorage.getItem('taskAssignerPeople_v2');
            const savedTasks = localStorage.getItem('taskAssignerTasks_v2');
            if (savedPeople || savedTasks) {
                const content = JSON.stringify({ people: savedPeople || '', tasks: savedTasks || '' });
                await savePreset('My Class Setup', content);
                localStorage.removeItem('taskAssignerPeople_v2');
                localStorage.removeItem('taskAssignerTasks_v2');
            }
        }

        async function savePreset(name, content, id = null) {
            if (!idb) return;
            return new Promise((resolve, reject) => {
                const tx = idb.transaction(STORE_PRESETS, 'readwrite');
                const store = tx.objectStore(STORE_PRESETS);
                const data = { name, content, updatedAt: Date.now() };
                if (id) data.id = id;
                const request = id ? store.put(data) : store.add(data);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function getAllPresets() {
            if (!idb) return [];
            return new Promise((resolve, reject) => {
                const tx = idb.transaction(STORE_PRESETS, 'readonly');
                const store = tx.objectStore(STORE_PRESETS);
                const index = store.index('updatedAt');
                const request = index.getAll();
                request.onsuccess = () => resolve(request.result.reverse());
                request.onerror = () => reject(request.error);
            });
        }

        async function getPreset(id) {
            if (!idb) return null;
            return new Promise((resolve, reject) => {
                const tx = idb.transaction(STORE_PRESETS, 'readonly');
                const store = tx.objectStore(STORE_PRESETS);
                const request = store.get(id);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function deletePreset(id) {
            if (!idb) return;
            return new Promise((resolve, reject) => {
                const tx = idb.transaction(STORE_PRESETS, 'readwrite');
                const store = tx.objectStore(STORE_PRESETS);
                const request = store.delete(id);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        async function saveCurrentPresetId(id) {
            if (!idb) return;
            return new Promise((resolve, reject) => {
                const tx = idb.transaction(STORE_SETTINGS, 'readwrite');
                const store = tx.objectStore(STORE_SETTINGS);
                const request = store.put({ key: 'currentPresetId', value: id });
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        async function getCurrentPresetId() {
            if (!idb) return null;
            return new Promise((resolve, reject) => {
                const tx = idb.transaction(STORE_SETTINGS, 'readonly');
                const store = tx.objectStore(STORE_SETTINGS);
                const request = store.get('currentPresetId');
                request.onsuccess = () => resolve(request.result?.value || null);
                request.onerror = () => reject(request.error);
            });
        }

        async function renderPresetSelector() {
            const presets = await getAllPresets();
            const select = document.getElementById('preset-select');
            select.innerHTML = '<option value="">-- Select a Preset --</option>';
            presets.forEach(p => {
                const option = document.createElement('option');
                option.value = p.id;
                option.textContent = p.name;
                if (p.id === currentPresetId) option.selected = true;
                select.appendChild(option);
            });
        }

        async function onPresetSelect() {
            const select = document.getElementById('preset-select');
            const id = parseInt(select.value);
            if (!id) return;
            const preset = await getPreset(id);
            if (preset) {
                currentPresetId = id;
                const data = JSON.parse(preset.content);
                document.getElementById('peopleInput').value = data.people || '';
                document.getElementById('taskInput').value = data.tasks || '';
                document.getElementById('preset-name').value = preset.name;
                if (data.isRandom !== undefined) {
                    document.getElementById('sort-mode-toggle').checked = data.isRandom;
                    updateSortIcon();
                }
                await saveCurrentPresetId(id);
                await renderPresetSelector();
                updateCounts();
            }
        }

        async function saveCurrentPreset() {
            const name = document.getElementById('preset-name').value.trim() || 'Untitled';
            const content = JSON.stringify({
                people: document.getElementById('peopleInput').value,
                tasks: document.getElementById('taskInput').value,
                isRandom: document.getElementById('sort-mode-toggle').checked
            });
            const id = await savePreset(name, content, currentPresetId);
            currentPresetId = id;
            await saveCurrentPresetId(id);
            await saveToCloud();
            await renderPresetSelector();
            showToast('Preset saved!', 'success');
        }

        async function createNewPreset() {
            document.getElementById('preset-name').value = 'New Preset';
            document.getElementById('peopleInput').value = '';
            document.getElementById('taskInput').value = '';
            currentPresetId = null;
            await saveCurrentPresetId(null);
            await renderPresetSelector();
            document.getElementById('preset-select').value = '';
            updateCounts();
        }

        async function deleteCurrentPreset() {
            if (!currentPresetId) {
                showToast('No preset selected', 'error');
                return;
            }
            const confirmed = await showConfirm('Delete this preset?', 'This action cannot be undone.');
            if (confirmed) {
                await deletePreset(currentPresetId);
                currentPresetId = null;
                document.getElementById('preset-name').value = '';
                document.getElementById('peopleInput').value = '';
                document.getElementById('taskInput').value = '';
                await saveCurrentPresetId(null);
                await saveToCloud();
                await renderPresetSelector();
                updateCounts();
                showToast('Preset deleted', 'success');
            }
        }

        // --- DATA LOGIC ---
        function updateCounts() {
            const p = document.getElementById('peopleInput').value.split(/[\n,;]/).map(s => s.trim()).filter(s => s.length > 0).length;
            const t = document.getElementById('taskInput').value.split(/[\n,;]/).map(s => s.trim()).filter(s => s.length > 0).length;
            document.getElementById('peopleCount').textContent = p;
            document.getElementById('taskCount').textContent = t;
        }

        function setGroupSize(size) {
            currentGroupSize = size;
            [1, 2, 3, 4].forEach(id => {
                const btn = document.getElementById(`btnSize${id}`);
                if (btn) {
                    if (id === size) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                }
            });
            AudioEngine.playClick();
        }

        function shuffle(array) {
            const arrayCopy = [...array];
            for (let i = arrayCopy.length - 1; i > 0; i--) {
                const randomValue = new Uint32Array(1);
                window.crypto.getRandomValues(randomValue);
                const j = randomValue[0] % (i + 1);
                [arrayCopy[i], arrayCopy[j]] = [arrayCopy[j], arrayCopy[i]];
            }
            return arrayCopy;
        }

        function showModal() {
            document.getElementById('errorModal').classList.remove('hidden');
            document.getElementById('errorModal').style.display = 'flex';
            AudioEngine.playError();
        }

        function hideModal() {
            document.getElementById('errorModal').classList.add('hidden');
            document.getElementById('errorModal').style.display = 'none';
            AudioEngine.playClick();
        }

        function assignTasks() {
            AudioEngine.init();
            
            let peopleInput = document.getElementById('peopleInput');
            let taskInput = document.getElementById('taskInput');
            let people = peopleInput.value.split(/[\n,;]/).map(s => s.trim()).filter(s => s.length > 0);
            let tasks = taskInput.value.split(/[\n,;]/).map(s => s.trim()).filter(s => s.length > 0);

            if (people.length === 0 || tasks.length === 0) {
                showModal();
                return;
            }

            // Handle Sorting Mode
            const isRandom = document.getElementById('sort-mode-toggle').checked;
            if (isRandom) {
                people = shuffle(people);
            } else {
                people.sort((a, b) => a.localeCompare(b, undefined, {numeric: true, sensitivity: 'base'}));
            }

            // tasks = shuffle(tasks); // Now handled by refilling bucket in renderGrid

            let groups = [];
            if (currentGroupSize === 1) {
                groups = people.map(p => [p]);
            } else {
                for (let i = 0; i < people.length; i += currentGroupSize) {
                    groups.push(people.slice(i, i + currentGroupSize));
                }
            }

            renderGrid(groups, tasks);
            AudioEngine.playSuccess();
            
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#FF6B95', '#FF8C42', '#00E676', '#2979FF']
            });
        }

        function renderGrid(groups, tasks) {
            const cardsGrid = document.getElementById('cardsGrid');
            const resultsArea = document.getElementById('resultsArea');
            const emptyState = document.getElementById('emptyState');
            
            cardsGrid.innerHTML = '';
            emptyState.classList.add('hidden');
            resultsArea.classList.remove('hidden');

            const cardColors = [
                { accent: 'bg-pink', text: 'text-dark' },
                { accent: 'bg-orange', text: 'text-dark' },
                { accent: 'bg-green', text: 'text-dark' },
                { accent: 'bg-blue', text: 'text-dark' },
            ];

            let currentTaskBucket = [];
            groups.forEach((groupArray, index) => {
                if (currentTaskBucket.length === 0) {
                    currentTaskBucket = shuffle(tasks);
                }
                const task = currentTaskBucket.pop();
                const colorTheme = cardColors[index % cardColors.length];
                const isGroup = groupArray.length > 1;
                const label = isGroup ? 'TEAM' : 'STUDENT';
                
                // --- Text Fitting Logic ---
                const taskWords = task.split(/\s+/).filter(w => w.length > 0);
                const isMultiWordTask = taskWords.length >= 2;
                
                let namesHtml = '';
                if (isGroup) {
                    namesHtml = `<div class="flex flex-wrap gap-2 mt-2">${groupArray.map(n => `<span class="bg-white/50 dark:bg-slate-800/50 border-[1px] border-dark/20 dark:border-white/20 px-3 py-1 rounded-xl text-lg font-black text-dark dark:text-white shadow-neo-sm">${n}</span>`).join('')}</div>`;
                } else {
                    const studentName = groupArray[0];
                    const nameWords = studentName.split(/\s+/).filter(w => w.length > 0);
                    const isMultiWordName = nameWords.length >= 2;
                    namesHtml = `<div class="fit-text text-3xl md:text-5xl font-black text-dark dark:text-white mt-2 leading-none ${isMultiWordName ? 'break-words' : 'whitespace-nowrap'}" style="max-height: 100px; display: flex; align-items: center; justify-content: center;">${studentName}</div>`;
                }

                const card = document.createElement('div');
                card.className = `w-full min-h-[14rem] glass-panel border-[1px] border-slate-300 dark:border-white/10 rounded-2xl flex shadow-neo animate-pop overflow-hidden`;
                card.style.animationDelay = `${index * 0.1}s`;

                card.innerHTML = `
                    <div class="w-1/2 p-4 flex flex-col justify-center border-r-[1px] border-slate-300 dark:border-white/10 border-dashed relative z-10 overflow-hidden">
                        <div class="flex items-center gap-2 mb-2 shrink-0">
                            <div class="w-10 h-10 ${colorTheme.accent} rounded-xl border-[1px] border-dark/20 flex items-center justify-center text-dark shadow-neo-sm">
                                <i data-lucide="${isGroup ? 'users' : 'user'}" class="w-5 h-5"></i>
                            </div>
                            <span class="text-xs font-bold text-slate-400 tracking-widest uppercase">${label}</span>
                        </div>
                        <div class="flex-grow flex items-center justify-center overflow-hidden">
                            ${namesHtml}
                        </div>
                    </div>

                    <div class="w-1/2 p-4 ${colorTheme.accent} flex flex-col justify-center items-center text-center relative overflow-hidden">
                        <div class="bg-white/50 dark:bg-slate-900/40 border-[1px] border-dark/20 px-3 py-1 rounded-lg text-[10px] font-black text-dark dark:text-white mb-3 tracking-widest uppercase shadow-neo-sm shrink-0">MISSION</div>
                        <div class="flex-grow flex items-center justify-center w-full overflow-hidden">
                            <div class="fit-text font-heading text-2xl md:text-4xl font-black leading-tight text-dark dark:text-white z-10 w-full ${isMultiWordTask ? 'break-words' : 'whitespace-nowrap'}">
                                ${task}
                            </div>
                        </div>
                        <i data-lucide="target" class="absolute -bottom-6 -right-6 w-32 h-32 text-dark/10 z-0"></i>
                    </div>
                `;

                cardsGrid.appendChild(card);
            });
            
            // Apply text fitting after cards are in the DOM
            document.querySelectorAll('.fit-text').forEach(el => fitText(el));
            lucide.createIcons();
        }

        function fitText(el) {
            const container = el.parentElement;
            let fontSize = parseInt(window.getComputedStyle(el).fontSize);
            const maxFontSize = fontSize;
            const minFontSize = 12;

            function isOverflowing() {
                return el.scrollWidth > container.clientWidth || el.scrollHeight > container.clientHeight;
            }

            while (isOverflowing() && fontSize > minFontSize) {
                fontSize--;
                el.style.fontSize = fontSize + 'px';
            }
        }

        async function clearAll() {
            const confirmed = await showConfirm('Clear everything?', 'This action cannot be undone.');
            if (confirmed) {
                document.getElementById('peopleInput').value = '';
                document.getElementById('taskInput').value = '';
                updateCounts();
                document.getElementById('cardsGrid').innerHTML = '';
                document.getElementById('resultsArea').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
                AudioEngine.playClick();
                showToast('Cleared!', 'info');
            }
        }

        function updateSortIcon() {
            const isRandom = document.getElementById('sort-mode-toggle').checked;
            const iconEl = document.getElementById('sort-icon-ui');
            if (isRandom) {
                iconEl.setAttribute('data-lucide', 'shuffle');
            } else {
                iconEl.setAttribute('data-lucide', 'arrow-down-az');
            }
            lucide.createIcons();
        }

        // --- INIT ---
        async function initializeApp() {
            loadTheme();
            await initDB();
            currentPresetId = await getCurrentPresetId();
            if (currentPresetId) {
                const preset = await getPreset(currentPresetId);
                if (preset) {
                    const data = JSON.parse(preset.content);
                    document.getElementById('peopleInput').value = data.people || '';
                    document.getElementById('taskInput').value = data.tasks || '';
                    if (data.isRandom !== undefined) document.getElementById('sort-mode-toggle').checked = data.isRandom;
                    document.getElementById('preset-name').value = preset.name;
                }
            }
            updateSortIcon();
            await renderPresetSelector();
            updateCounts();
            lucide.createIcons();

            // Listeners
            document.getElementById('peopleInput').addEventListener('input', updateCounts);
            document.getElementById('taskInput').addEventListener('input', updateCounts);
            
            document.getElementById('sound-toggle').addEventListener('click', (e) => {
                audioEnabled = !audioEnabled;
                const icon = audioEnabled ? 'volume-2' : 'volume-x';
                const button = e.currentTarget;
                button.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5"></i>`;
                lucide.createIcons();
            });
        }

        window.onload = async () => {
            await requireAuth();
            await initializeApp();
        };
    </script>

    <!-- Custom Confirm Modal -->
    <div id="confirmModal" class="hidden fixed inset-0 bg-brand-dark/60 backdrop-blur-md z-[500] items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-800 w-full max-w-sm rounded-[2rem] border-4 border-brand-dark dark:border-slate-500 shadow-neo animate-pop-in overflow-hidden">
            <div class="p-6 text-center">
                <div class="w-16 h-16 rounded-2xl bg-brand-pink/10 flex items-center justify-center border-[3px] border-brand-dark mx-auto mb-4">
                    <i data-lucide="alert-triangle" class="w-8 h-8 text-brand-pink"></i>
                </div>
                <h3 id="confirmTitle" class="text-xl font-heading font-bold text-brand-dark dark:text-white mb-2">Are you sure?</h3>
                <p id="confirmMessage" class="text-sm text-slate-500 dark:text-slate-400 mb-6">This action cannot be undone.</p>
                <div class="flex gap-3">
                    <button id="confirmBtnYes" class="flex-1 btn-chunky bg-brand-pink text-white py-3 rounded-2xl font-bold">
                        Yes, Delete
                    </button>
                    <button id="confirmBtnNo" class="flex-1 btn-chunky bg-white dark:bg-slate-700 dark:text-white py-3 rounded-2xl font-bold">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../../js/modal-toast.js"></script>
</body>
</html>
