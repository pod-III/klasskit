<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Supabase Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <script src="/supabase.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notes</title>
    <link rel="icon" type="image/x-icon" href="../../../media/icon.ico" />
    <link rel="icon" type="image/webp" href="../../../media/icon.webp" />
  <script>if(localStorage.getItem("theme_lesson-note")==="dark"||(!localStorage.getItem("theme_lesson-note")&&window.matchMedia("(prefers-color-scheme:dark)").matches)){document.documentElement.classList.add("dark")}</script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@1.16.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        pink: '#FF6B95',
                        orange: '#FF8C42',
                        green: '#00E676',
                        blue: '#2979FF',
                        dark: '#0f172a',
                        chalk: '#f8fafc',
                        surface: 'rgba(255, 255, 255, 0.85)',
                        border: 'rgba(203, 213, 225, 0.6)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        'neo': '4px 4px 0px 0px rgba(51, 65, 85, 0.15)',
                        'neo-sm': '2px 2px 0px 0px rgba(51, 65, 85, 0.15)',
                        'neo-lg': '8px 8px 0px 0px rgba(51, 65, 85, 0.15)',
                        'inner-neo': 'inset 3px 3px 0px 0px rgba(203, 213, 225, 0.3)',
                    },
                    animation: {
                        'pop': 'pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)',
                        'float-1': 'float-icon-1 20s infinite linear',
                        'float-2': 'float-icon-2 25s infinite linear reverse',
                        'float-3': 'float-icon-3 15s infinite linear',
                    },
                    keyframes: {
                        pop: { '0%': { transform: 'scale(0.8)', opacity: '0.8' }, '100%': { transform: 'scale(1)', opacity: '1' } },
                        'float-icon-1': {
                            '0%': { transform: 'translate(0, 0) rotate(0deg)' },
                            '33%': { transform: 'translate(30px, -50px) rotate(120deg)' },
                            '66%': { transform: 'translate(-20px, 20px) rotate(240deg)' },
                            '100%': { transform: 'translate(0, 0) rotate(360deg)' },
                        },
                        'float-icon-2': {
                            '0%': { transform: 'translate(0, 0) rotate(0deg)' },
                            '50%': { transform: 'translate(-40px, -30px) rotate(-180deg)' },
                            '100%': { transform: 'translate(0, 0) rotate(-360deg)' },
                        },
                        'float-icon-3': {
                            '0%': { transform: 'translate(0, 0) scale(1)' },
                            '50%': { transform: 'translate(20px, 40px) scale(1.2)' },
                            '100%': { transform: 'translate(0, 0) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>

    <link rel="stylesheet" href="../../../css/base.css" />
    <link rel="stylesheet" href="../../../css/components.css" />
    <link rel="stylesheet" href="styles.css">
  
</head>

<body class="h-screen flex flex-col text-dark relative bg-chalk">

    <input type="file" id="importInput" accept=".json" class="hidden" onchange="processImport(this)">
    <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="processImageInput(this)">

    <header class="bg-white dark:bg-[#0f172a] border-b border-slate-200 dark:border-slate-800 z-40 flex-none h-12 flex items-center px-4">
        <div class="flex items-center justify-between w-full">
            <!-- Left: breadcrumbs / nav -->
            <div class="flex items-center gap-2 text-sm text-slate-500 dark:text-slate-400">
                <button onclick="toggleSidebar()" class="md:hidden p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md transition-colors" data-tooltip="Toggle sidebar">
                    <i data-lucide="panel-left" class="w-4 h-4"></i>
                </button>
                <span class="font-medium text-slate-700 dark:text-slate-300 hidden sm:inline">Notes</span>
                <span class="hidden sm:inline text-slate-300">/</span>
                <span id="headerNoteTitle" class="truncate max-w-[200px] md:max-w-xs text-slate-900 dark:text-slate-100 font-medium">Untitled</span>
            </div>
            <!-- Right: icon-only actions -->
            <div class="flex items-center gap-1">
                <button onclick="toggleDarkMode()" class="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md transition-colors" data-tooltip="Toggle theme" data-tooltip-shortcut="Ctrl+Shift+L">
                    <i id="darkModeIcon" data-lucide="moon" class="w-4 h-4"></i>
                </button>
                <button onclick="toggleZenMode()" class="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md transition-colors" data-tooltip="Zen mode" data-tooltip-shortcut="Ctrl+Shift+Z">
                    <i id="zenModeIcon" data-lucide="maximize-2" class="w-4 h-4"></i>
                </button>
                <button onclick="toggleOutline()" class="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md transition-colors" data-tooltip="Toggle outline" data-tooltip-shortcut="Ctrl+Shift+O">
                    <i data-lucide="list-tree" class="w-4 h-4"></i>
                </button>
                <div class="w-px h-4 bg-slate-200 dark:bg-slate-700 mx-1"></div>
                <button onclick="exportJSON()" class="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md transition-colors" data-tooltip="Backup notes">
                    <i data-lucide="save" class="w-4 h-4"></i>
                </button>
                <button onclick="triggerImport()" class="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md transition-colors" data-tooltip="Restore backup">
                    <i data-lucide="upload-cloud" class="w-4 h-4"></i>
                </button>
                <button onclick="exportPDF()" class="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md transition-colors" data-tooltip="Export PDF">
                    <i data-lucide="download" class="w-4 h-4"></i>
                </button>
                <button onclick="exportMarkdown()" class="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md transition-colors" data-tooltip="Export Markdown">
                    <i data-lucide="file-text" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </header>

    <div class="flex-grow flex overflow-hidden w-full mx-auto relative z-10">

        <aside id="sidebar"
            class="w-72 bg-[#fbfbfa] dark:bg-[#0f172a] border-r border-slate-200 dark:border-slate-800 flex flex-col transition-all duration-200 absolute z-30 h-full md:relative transform md:transform-none -translate-x-full md:translate-x-0 overflow-hidden">

            <div class="min-w-[18rem] h-full flex flex-col">
                <div class="px-3 py-3 flex items-center gap-2 border-b border-slate-100 dark:border-slate-800">
                    <button id="newNoteBtn" onclick="createNewNote()"
                        class="flex-1 flex items-center justify-center gap-1.5 bg-blue hover:bg-blue-600 text-white py-1.5 px-3 rounded-md text-sm font-medium transition-colors"
                        data-tooltip="New page" data-tooltip-shortcut="Ctrl+N">
                        <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                        New page
                    </button>
                    <button onclick="createFolder()"
                        class="p-1.5 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md transition-colors"
                        data-tooltip="New folder">
                        <i data-lucide="folder-plus" class="w-4 h-4"></i>
                    </button>
                    <button id="trashToggleBtn" onclick="toggleTrashMode()"
                        class="p-1.5 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md transition-colors"
                        data-tooltip="Trash">
                        <i data-lucide="trash" class="w-4 h-4"></i>
                    </button>
                </div>

                <div class="px-3 py-2">
                    <div class="relative flex items-center gap-2">
                        <div class="relative flex-1">
                            <i data-lucide="search" class="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400 w-3.5 h-3.5"></i>
                            <input type="text" id="searchInput" placeholder="Search or jump to..."
                                class="w-full pl-8 pr-3 py-1.5 text-sm bg-slate-100 dark:bg-slate-800 border border-transparent rounded-md text-slate-700 dark:text-slate-200 placeholder-slate-400 focus:outline-none focus:bg-white dark:focus:bg-slate-900 focus:ring-1 focus:ring-blue-500/30 transition-all"
                                data-tooltip="Search notes" data-tooltip-shortcut="Ctrl+K">
                        </div>
                        <button id="sortBtn" onclick="toggleSortDropdown()"
                            class="p-1.5 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md transition-colors"
                            data-tooltip="Sort notes">
                            <i data-lucide="arrow-up-down" class="w-3.5 h-3.5"></i>
                        </button>
                        <div id="sortDropdown" class="sort-dropdown hidden">
                            <button onclick="setSortMode('date-desc')" data-sort="date-desc" class="text-dark dark:text-slate-200">
                                <i data-lucide="clock" class="w-3.5 h-3.5 flex-none"></i> Newest First
                            </button>
                            <button onclick="setSortMode('date-asc')" data-sort="date-asc" class="text-dark dark:text-slate-200">
                                <i data-lucide="history" class="w-3.5 h-3.5 flex-none"></i> Oldest First
                            </button>
                            <button onclick="setSortMode('title-asc')" data-sort="title-asc" class="text-dark dark:text-slate-200">
                                <i data-lucide="arrow-down-a-z" class="w-3.5 h-3.5 flex-none"></i> Title A → Z
                            </button>
                            <button onclick="setSortMode('title-desc')" data-sort="title-desc" class="text-dark dark:text-slate-200">
                                <i data-lucide="arrow-up-z-a" class="w-3.5 h-3.5 flex-none"></i> Title Z → A
                            </button>
                            <button onclick="setSortMode('manual')" data-sort="manual" class="text-dark dark:text-slate-200">
                                <i data-lucide="hand" class="w-3.5 h-3.5 flex-none"></i> Manual Order
                            </button>
                        </div>
                    </div>
                </div>

                <div id="trashHeader"
                    class="hidden bg-pink/10 text-pink dark:text-pink-400 px-3 py-2 text-xs font-semibold border-b border-pink/10 flex items-center justify-between">
                    <div class="flex items-center gap-1.5">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> Trash
                    </div>
                    <button onclick="emptyTrash()"
                        class="text-pink/70 hover:text-pink text-xs font-medium transition-colors"
                        data-tooltip="Empty trash">
                        Empty
                    </button>
                </div>

                <div id="notesList" class="flex-grow overflow-y-auto py-1 custom-scrollbar">
                </div>
            </div>
        </aside>

        <main class="flex-grow overflow-y-auto relative custom-scrollbar bg-white dark:bg-[#0f172a]">
            <!-- Toolbar & Actions -->
            <div id="toolbar-container" class="sticky top-0 z-30 bg-white/95 dark:bg-[#0f172a]/95 backdrop-blur-sm border-b border-slate-100 dark:border-slate-800 px-4 py-2 flex items-center justify-between">
                <div id="note-toolbar" class="flex-grow !border-none !bg-transparent"></div>
                <div id="actionButtons" class="flex items-center gap-1 pl-3 border-l border-slate-100 dark:border-slate-800">
                    <button id="softDeleteBtn" onclick="softDeleteCurrentNote()"
                        class="p-2 text-slate-400 hover:text-red-500 transition-colors rounded-md hover:bg-slate-100 dark:hover:bg-slate-800" data-tooltip="Move to trash" data-tooltip-shortcut="Ctrl+Shift+Delete">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                    <div id="trashButtons" class="hidden flex gap-1">
                        <button onclick="restoreCurrentNote()"
                            class="px-2.5 py-1.5 text-xs font-medium text-green-700 dark:text-green-400 bg-green-50 dark:bg-green-900/20 hover:bg-green-100 dark:hover:bg-green-900/30 rounded-md transition-colors flex items-center gap-1"
                            data-tooltip="Restore note">
                            <i data-lucide="refresh-ccw" class="w-3 h-3"></i> Restore
                        </button>
                        <button onclick="permanentDeleteCurrentNote()"
                            class="px-2.5 py-1.5 text-xs font-medium text-red-700 dark:text-red-400 bg-red-50 dark:bg-red-900/20 hover:bg-red-100 dark:hover:bg-red-900/30 rounded-md transition-colors flex items-center gap-1"
                            data-tooltip="Delete forever">
                            <i data-lucide="x" class="w-3 h-3"></i> Delete
                        </button>
                    </div>
                </div>
            </div>

            <!-- Document Area -->
            <div class="p-8 md:p-12 lg:p-16 relative">
                <div class="w-full max-w-[900px] mx-auto">
                    <input type="text" id="noteTitle" placeholder="Untitled"
                        class="w-full bg-transparent text-[40px] font-bold text-slate-900 dark:text-slate-100 mb-4 focus:outline-none placeholder-slate-300 dark:placeholder-slate-700 leading-tight">
                    <div id="editor-container" class="!border-none !p-0 min-h-[60vh]"></div>
                </div>

                <!-- Floating Table Toolbar -->
                <div id="table-toolbar" class="hidden fixed z-40 bg-white dark:bg-[#1e293b] border border-slate-200 dark:border-slate-700 rounded-lg shadow-lg p-1 flex items-center gap-0.5">
                    <button onclick="tableAction('insertRowAbove')" class="p-1.5 text-slate-500 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 rounded transition-colors" data-tooltip="Insert row above">
                        <i data-lucide="arrow-up" class="w-3.5 h-3.5"></i>
                    </button>
                    <button onclick="tableAction('insertRowBelow')" class="p-1.5 text-slate-500 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 rounded transition-colors" data-tooltip="Insert row below">
                        <i data-lucide="arrow-down" class="w-3.5 h-3.5"></i>
                    </button>
                    <div class="w-px h-4 bg-slate-200 dark:bg-slate-700 mx-0.5"></div>
                    <button onclick="tableAction('insertColumnLeft')" class="p-1.5 text-slate-500 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 rounded transition-colors" data-tooltip="Insert column left">
                        <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i>
                    </button>
                    <button onclick="tableAction('insertColumnRight')" class="p-1.5 text-slate-500 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 rounded transition-colors" data-tooltip="Insert column right">
                        <i data-lucide="arrow-right" class="w-3.5 h-3.5"></i>
                    </button>
                    <div class="w-px h-4 bg-slate-200 dark:bg-slate-700 mx-0.5"></div>
                    <button onclick="tableAction('deleteRow')" class="p-1.5 text-slate-500 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded transition-colors" data-tooltip="Delete row">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                    </button>
                    <button onclick="tableAction('deleteColumn')" class="p-1.5 text-slate-500 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded transition-colors" data-tooltip="Delete column">
                        <i data-lucide="columns" class="w-3.5 h-3.5"></i>
                    </button>
                    <div class="w-px h-4 bg-slate-200 dark:bg-slate-700 mx-0.5"></div>
                    <button onclick="tableAction('deleteTable')" class="p-1.5 text-slate-500 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded transition-colors" data-tooltip="Delete table">
                        <i data-lucide="x" class="w-3.5 h-3.5"></i>
                    </button>
                </div>
            </div>

            <!-- Footer Status -->
            <div class="flex items-center justify-center gap-1.5 py-2 border-t border-slate-100 dark:border-slate-800 text-slate-400 text-[11px]">
                <div id="statusIndicator" class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
                <span id="statusText" class="font-medium">Auto-saved</span>
            </div>
        </main>

        <aside id="outlineSidebar"
            class="w-0 opacity-0 bg-[#fbfbfa] dark:bg-[#0f172a] border-l border-slate-200 dark:border-slate-800 flex flex-col transition-all duration-200 overflow-hidden relative z-30">
            <div class="min-w-[16rem] h-full flex flex-col">
                <div class="px-4 py-3 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
                    <h3 class="font-semibold text-sm text-slate-700 dark:text-slate-200 flex items-center gap-2">
                        <i data-lucide="list-tree" class="w-4 h-4 text-slate-400"></i> Outline
                    </h3>
                    <button onclick="toggleOutline()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 p-1 rounded-md hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                <div id="outlineList" class="flex-grow overflow-y-auto p-2 custom-scrollbar">
                    <div class="flex flex-col items-center justify-center h-32 text-center px-4">
                        <i data-lucide="text" class="w-6 h-6 text-slate-300 dark:text-slate-600 mb-2"></i>
                        <p class="text-slate-400 dark:text-slate-500 text-xs font-medium">Use headings to generate an outline.</p>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <div id="print-container" class="hidden">
        <div id="print-header" class="print-header">
            <h1 id="print-title"></h1>
            <p id="print-date"></p>
        </div>
        <div id="print-body" class="print-body"></div>
    </div>

    <!-- Shared cursor tooltip -->
    <div id="tooltip" class=""></div>

    <div id="customModal"
        class="hidden fixed inset-0 z-[500] flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm animate-pop">
        <div class="max-w-md w-full p-6 flex flex-col items-center text-center bg-white dark:bg-[#1e293b] rounded-lg border border-slate-200 dark:border-slate-700 shadow-lg">
            <div class="w-12 h-12 rounded-full flex items-center justify-center mb-4 bg-pink/10 text-pink">
                <i id="modalIcon" data-lucide="trash-2" class="w-6 h-6"></i>
            </div>
            <h3 id="modalTitle" class="text-xl font-bold text-slate-900 dark:text-slate-100 mb-1">Move to Trash?</h3>
            <p id="modalDesc" class="text-slate-500 dark:text-slate-400 text-sm mb-6">You can restore this note later from the Trash bin.</p>
            <div class="flex gap-3 w-full">
                <button id="modalCancel" class="flex-1 py-2.5 rounded-md text-sm font-medium bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                    Cancel
                </button>
                <button id="modalConfirm" class="flex-1 py-2.5 rounded-md text-sm font-medium bg-pink text-white hover:bg-pink-600 transition-colors">
                    Trash It
                </button>
            </div>
        </div>
    </div>

    <!-- Custom Prompt Modal -->
    <div id="promptModal" class="hidden fixed inset-0 z-[500] flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm animate-pop">
        <div class="max-w-sm w-full p-6 flex flex-col items-center bg-white dark:bg-[#1e293b] rounded-lg border border-slate-200 dark:border-slate-700 shadow-lg">
            <div class="w-10 h-10 rounded-lg bg-blue/10 flex items-center justify-center mb-4">
                <i id="promptIcon" data-lucide="folder-plus" class="w-5 h-5 text-blue"></i>
            </div>
            <h3 id="promptTitle" class="text-lg font-bold text-slate-900 dark:text-slate-100 mb-1">Folder Name</h3>
            <p id="promptDesc" class="text-sm text-slate-500 dark:text-slate-400 mb-4">Enter a name for your workspace</p>
            <input type="text" id="promptInput" class="w-full px-3 py-2 mb-6 text-center text-sm font-medium bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-md text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:border-blue-400 transition-colors" placeholder="Type here...">
            <div class="flex gap-3 w-full">
                <button id="promptCancel" class="flex-1 py-2 rounded-md text-sm font-medium bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                    Cancel
                </button>
                <button id="promptConfirm" class="flex-1 py-2 rounded-md text-sm font-medium bg-blue text-white hover:bg-blue-600 transition-colors">
                    Confirm
                </button>
            </div>
        </div>
    </div>

    <!-- Table Insert Dialog -->
    <div id="tableDialog"
        class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm animate-pop">
        <div class="max-w-sm w-full p-6 flex flex-col items-center text-center bg-white dark:bg-[#1e293b] rounded-lg border border-slate-200 dark:border-slate-700 shadow-lg">
            <div class="w-10 h-10 rounded-lg flex items-center justify-center mb-4 bg-blue/10 text-blue">
                <i data-lucide="table" class="w-5 h-5"></i>
            </div>
            <h3 class="text-lg font-bold text-slate-900 dark:text-slate-100 mb-4">Insert Table</h3>
            <div class="flex gap-4 mb-5">
                <div class="text-center">
                    <label class="block text-[11px] font-medium text-slate-500 mb-1.5 uppercase tracking-wide">Rows</label>
                    <input type="number" id="tableRows" value="3" min="1" max="20" class="table-dialog-input">
                </div>
                <div class="text-center">
                    <label class="block text-[11px] font-medium text-slate-500 mb-1.5 uppercase tracking-wide">Columns</label>
                    <input type="number" id="tableCols" value="3" min="1" max="10" class="table-dialog-input">
                </div>
            </div>
            <div class="flex gap-3 w-full">
                <button onclick="closeTableDialog()"
                    class="flex-1 py-2 rounded-md text-sm font-medium bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">Cancel</button>
                <button onclick="confirmInsertTable()"
                    class="flex-1 py-2 rounded-md text-sm font-medium bg-blue text-white hover:bg-blue-600 transition-colors">Insert</button>
            </div>
        </div>
    </div>

    <!-- Toast notifications -->
