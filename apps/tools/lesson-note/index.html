<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Supabase Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <script src="/supabase.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notes</title>
    <link rel="icon" type="image/x-icon" href="../../../media/icon.ico" />
    <link rel="icon" type="image/webp" href="../../../media/icon.webp" />
  <script>if(localStorage.getItem("theme_lesson-note")==="dark"||(!localStorage.getItem("theme_lesson-note")&&window.matchMedia("(prefers-color-scheme:dark)").matches)){document.documentElement.classList.add("dark")}</script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@1.16.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        pink: '#FF6B95',
                        orange: '#FF8C42',
                        green: '#00E676',
                        blue: '#2979FF',
                        dark: '#0f172a',
                        chalk: '#f8fafc',
                        surface: 'rgba(255, 255, 255, 0.85)',
                        border: 'rgba(203, 213, 225, 0.6)',
                    },
                    fontFamily: {
                        heading: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    boxShadow: {
                        'neo': '4px 4px 0px 0px rgba(51, 65, 85, 0.15)',
                        'neo-sm': '2px 2px 0px 0px rgba(51, 65, 85, 0.15)',
                        'neo-lg': '8px 8px 0px 0px rgba(51, 65, 85, 0.15)',
                        'inner-neo': 'inset 3px 3px 0px 0px rgba(203, 213, 225, 0.3)',
                    },
                    animation: {
                        'pop': 'pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)',
                        'float-1': 'float-icon-1 20s infinite linear',
                        'float-2': 'float-icon-2 25s infinite linear reverse',
                        'float-3': 'float-icon-3 15s infinite linear',
                    },
                    keyframes: {
                        pop: { '0%': { transform: 'scale(0.8)', opacity: '0.8' }, '100%': { transform: 'scale(1)', opacity: '1' } },
                        'float-icon-1': {
                            '0%': { transform: 'translate(0, 0) rotate(0deg)' },
                            '33%': { transform: 'translate(30px, -50px) rotate(120deg)' },
                            '66%': { transform: 'translate(-20px, 20px) rotate(240deg)' },
                            '100%': { transform: 'translate(0, 0) rotate(360deg)' },
                        },
                        'float-icon-2': {
                            '0%': { transform: 'translate(0, 0) rotate(0deg)' },
                            '50%': { transform: 'translate(-40px, -30px) rotate(-180deg)' },
                            '100%': { transform: 'translate(0, 0) rotate(-360deg)' },
                        },
                        'float-icon-3': {
                            '0%': { transform: 'translate(0, 0) scale(1)' },
                            '50%': { transform: 'translate(20px, 40px) scale(1.2)' },
                            '100%': { transform: 'translate(0, 0) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .bg-float-icon {
            color: rgba(203, 213, 225, 0.4);
            opacity: 0.3;
            position: fixed;
            z-index: 0;
            pointer-events: none;
        }

        .dark .bg-float-icon {
            opacity: 0.15;
            color: white;
        }
    </style>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../../../css/base.css" />
    <link rel="stylesheet" href="../../../css/components.css" />
  
</head>

<body class="h-screen flex flex-col text-dark relative bg-chalk">

    <!-- Floating Background Layer -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <i data-lucide="sparkles" class="bg-float-icon w-32 h-32 top-[10%] left-[15%]"></i>
        <i data-lucide="book-open" class="bg-float-icon w-40 h-40 top-[60%] left-[5%]"></i>
        <i data-lucide="pen-tool" class="bg-float-icon w-48 h-48 top-[20%] right-[10%]"></i>
        <i data-lucide="edit-3" class="bg-float-icon w-24 h-24 top-[70%] right-[20%]"
            style="animation-direction: reverse;"></i>
    </div>

    <input type="file" id="importInput" accept=".json" class="hidden" onchange="processImport(this)">
    <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="processImageInput(this)">

    <header
        class="bg-white/80 backdrop-blur-xl border-b-[1px] border-slate-200/60 dark:border-white/10 dark:bg-slate-900/80 z-40 flex-none sticky top-0 relative">
        <div class="w-full mx-auto px-6 h-12 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div
                    class="w-8 h-8 bg-orange rounded-lg border-[1px] border-white/40 flex items-center justify-center text-white shadow-neo-sm">
                    <i data-lucide="book-open" class="w-5 h-5 stroke-[2.5px]"></i>
                </div>
                <div>
                    <h1 class="font-heading text-xl md:text-3xl tracking-wide text-brand-dark dark:text-white">Notes</h1>
                    <p class="text-[8px] text-gray-400 font-extrabold tracking-widest uppercase">KlassKit
                    </p>
                </div>
            </div>

            <div class="flex items-center gap-2">
                <button onclick="toggleDarkMode()"
                    class="neo-btn-sm bg-white text-dark px-2 py-1.5 rounded-lg text-xs flex items-center gap-2"
                    title="Toggle Dark Mode">
                    <i id="darkModeIcon" data-lucide="moon" class="w-3.5 h-3.5"></i>
                    <span id="darkModeText" class="hidden xl:inline">Dark</span>
                </button>
                <button onclick="toggleZenMode()"
                    class="neo-btn-sm bg-white text-dark px-2 py-1.5 rounded-lg text-xs flex items-center gap-2"
                    title="Toggle Zen Mode">
                    <i id="zenModeIcon" data-lucide="maximize-2" class="w-3.5 h-3.5"></i>
                    <span id="zenModeText" class="hidden xl:inline">Zen</span>
                </button>
                <button onclick="toggleOutline()"
                    class="neo-btn-sm bg-white text-dark px-2 py-1.5 rounded-lg text-xs flex items-center gap-2"
                    title="Toggle Outline">
                    <i data-lucide="list-tree" class="w-3.5 h-3.5"></i>
                    <span class="hidden xl:inline">Outline</span>
                </button>

                <button onclick="exportJSON()"
                    class="neo-btn-sm bg-blue text-white px-2 py-1.5 rounded-lg text-xs flex items-center gap-2"
                    title="Backup Notes">
                    <i data-lucide="save" class="w-3.5 h-3.5"></i>
                    <span class="hidden lg:inline">Backup</span>
                </button>
                <button onclick="triggerImport()"
                    class="neo-btn-sm bg-orange text-white px-2 py-1.5 rounded-lg text-xs flex items-center gap-2"
                    title="Restore Notes">
                    <i data-lucide="upload-cloud" class="w-3.5 h-3.5"></i>
                    <span class="hidden lg:inline">Restore</span>
                </button>

                <button onclick="exportPDF()"
                    class="neo-btn-sm bg-pink text-white px-2 py-1.5 rounded-lg text-xs flex items-center gap-2">
                    <i data-lucide="download" class="w-3.5 h-3.5"></i>
                    <span class="hidden lg:inline">PDF</span>
                </button>
            </div>
        </div>
    </header>

    <div class="flex-grow flex overflow-hidden w-full mx-auto relative z-10">

        <aside id="sidebar"
            class="w-80 bg-white/60 dark:bg-slate-900/60 backdrop-blur-md border-r-[1px] border-slate-200/60 dark:border-white/10 flex flex-col transition-all duration-300 absolute z-30 h-full md:relative transform md:transform-none -translate-x-full md:translate-x-0 overflow-hidden">

            <div class="min-w-[20rem] h-full flex flex-col">
                <div class="p-5 border-b-[1px] border-slate-200/60 dark:border-white/10 bg-white/40 dark:bg-slate-800/40"
                    id="sidebarHeader">
                    <div class="flex gap-2 mb-4">
                        <button id="newNoteBtn" onclick="createNewNote()"
                            class="flex-grow neo-btn bg-blue text-white py-3 rounded-xl font-heading text-lg flex items-center justify-center gap-2 shadow-neo-sm hover:shadow-neo border-[1px] border-white/40">
                            <i data-lucide="plus" class="w-5 h-5"></i>
                            NEW NOTE
                        </button>
                        <button onclick="createFolder()"
                            class="w-14 neo-btn bg-white/80 dark:bg-slate-800/80 text-dark py-3 rounded-xl flex items-center justify-center transition-colors shadow-neo-sm hover:shadow-neo border-[1px] border-slate-200 dark:border-slate-700"
                            title="New Folder">
                            <i data-lucide="folder-plus" class="w-5 h-5"></i>
                        </button>
                        <button id="trashToggleBtn" onclick="toggleTrashMode()"
                            class="w-14 neo-btn bg-white/80 dark:bg-slate-800/80 text-dark py-3 rounded-xl flex items-center justify-center transition-colors shadow-neo-sm hover:shadow-neo border-[1px] border-slate-200 dark:border-slate-700"
                            title="View Trash">
                            <i data-lucide="trash" class="w-5 h-5"></i>
                        </button>
                    </div>

                    <div class="relative group flex gap-2">
                        <div class="relative flex-1">
                            <i data-lucide="search"
                                class="absolute left-3 top-1/2 transform -translate-y-1/2 text-dark w-4 h-4"></i>
                            <input type="text" id="searchInput" placeholder="Search notes..."
                                class="neo-input w-full pl-10 pr-4 py-2 text-sm font-bold text-dark bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm border-[1px] border-slate-200 dark:border-slate-700 focus:shadow-neo focus:border-blue">
                        </div>
                        <div class="relative">
                            <button id="sortBtn" onclick="toggleSortDropdown()"
                                class="neo-btn-sm bg-white/80 dark:bg-slate-800/80 text-dark dark:text-slate-200 p-2 rounded-xl border-[1px] border-slate-200 dark:border-slate-700 flex items-center justify-center"
                                title="Sort Notes">
                                <i data-lucide="arrow-up-down" class="w-4 h-4"></i>
                            </button>
                            <div id="sortDropdown" class="sort-dropdown hidden">
                                <button onclick="setSortMode('date-desc')" data-sort="date-desc" class="text-dark dark:text-slate-200">
                                    <i data-lucide="clock" class="w-3.5 h-3.5 flex-none"></i> Newest First
                                </button>
                                <button onclick="setSortMode('date-asc')" data-sort="date-asc" class="text-dark dark:text-slate-200">
                                    <i data-lucide="history" class="w-3.5 h-3.5 flex-none"></i> Oldest First
                                </button>
                                <button onclick="setSortMode('title-asc')" data-sort="title-asc" class="text-dark dark:text-slate-200">
                                    <i data-lucide="arrow-down-a-z" class="w-3.5 h-3.5 flex-none"></i> Title A → Z
                                </button>
                                <button onclick="setSortMode('title-desc')" data-sort="title-desc" class="text-dark dark:text-slate-200">
                                    <i data-lucide="arrow-up-z-a" class="w-3.5 h-3.5 flex-none"></i> Title Z → A
                                </button>
                                <button onclick="setSortMode('manual')" data-sort="manual" class="text-dark dark:text-slate-200">
                                    <i data-lucide="hand" class="w-3.5 h-3.5 flex-none"></i> Manual Order
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="trashHeader"
                    class="hidden bg-pink text-white p-3 font-heading font-bold text-sm border-b-[1px] border-pink/30 flex items-center justify-between gap-2 px-5">
                    <div class="flex items-center gap-2">
                        <i data-lucide="trash-2" class="w-4 h-4"></i> TRASH BIN
                    </div>
                    <button onclick="emptyTrash()"
                        class="neo-btn-sm bg-white/20 hover:bg-white/30 text-white px-3 py-1 rounded-lg text-xs font-bold flex items-center gap-1 border border-white/30 transition-colors"
                        title="Permanently delete all trashed notes">
                        <i data-lucide="flame" class="w-3 h-3"></i> Empty Trash
                    </button>
                </div>

                <div id="notesList" class="flex-grow overflow-y-auto p-4 space-y-3 custom-scrollbar">
                </div>
            </div>
        </aside>

        <main class="flex-grow p-4 md:p-8 overflow-y-auto relative flex flex-col items-center custom-scrollbar">

            <button onclick="toggleSidebar()"
                class="md:hidden absolute left-4 top-4 neo-btn-sm bg-white p-2 rounded-lg z-20">
                <i data-lucide="menu" class="w-6 h-6"></i>
            </button>

            <div class="w-full max-w-5xl flex-grow flex flex-col overflow-hidden neo-card relative z-10 bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl">
                
                <!-- External Quill Toolbar -->
                <div id="toolbar-container" class="flex-none border-b-[1px] border-slate-200 dark:border-white/10 bg-slate-50/50 dark:bg-slate-800/50 backdrop-blur-md p-2 flex items-center justify-between sticky top-0 z-30">
                    <div id="note-toolbar" class="flex-grow !border-none !bg-transparent">
                        <!-- Quill will inject toolbar here -->
                    </div>
                    
                    <div id="actionButtons" class="flex items-center gap-2 px-4 border-l border-slate-200 dark:border-white/10">
                        <button id="softDeleteBtn" onclick="softDeleteCurrentNote()"
                            class="text-gray-400 hover:text-pink transition-colors p-2" title="Move to Trash">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>

                        <div id="trashButtons" class="hidden flex gap-2">
                            <button onclick="restoreCurrentNote()"
                                class="neo-btn-sm bg-green text-dark px-3 py-1 rounded-lg text-xs font-bold flex items-center gap-1"
                                title="Restore Note">
                                <i data-lucide="refresh-ccw" class="w-3 h-3"></i> Restore
                            </button>
                            <button onclick="permanentDeleteCurrentNote()"
                                class="neo-btn-sm bg-pink text-white px-3 py-1 rounded-lg text-xs font-bold flex items-center gap-1"
                                title="Delete Forever">
                                <i data-lucide="x" class="w-3 h-3"></i> Delete
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Seamless Document Area -->
                <div class="flex-grow overflow-y-auto custom-scrollbar relative p-6 md:p-8 lg:p-12">
                    <div class="w-full max-w-4xl mx-auto">
                        <input type="text" id="noteTitle" placeholder="Untitled Lesson"
                            class="w-full bg-transparent text-4xl font-heading font-bold text-dark mb-8 focus:outline-none placeholder-gray-200 dark:placeholder-slate-800 transition-all border-b-2 border-slate-100 dark:border-white/5 focus:border-blue/20 pb-4">
                        
                        <div id="editor-container" class="!border-none !p-0"></div>
                    </div>
                </div>

                <!-- Footer Status -->
                <div class="flex items-center justify-center gap-2 py-3 px-6 bg-slate-50/30 dark:bg-slate-800/30 border-t border-slate-100 dark:border-white/5 opacity-60 flex-none">
                    <div id="statusIndicator" class="w-2.5 h-2.5 rounded-full bg-green border-[1px] border-slate-300 dark:border-white/10"></div>
                    <span id="statusText"
                        class="text-[10px] text-dark font-bold tracking-widest uppercase">Auto-saved</span>
                </div>
            </div>
        </main>

        <aside id="outlineSidebar"
            class="w-0 opacity-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-l-[1px] border-slate-200/60 dark:border-slate-700 flex flex-col transition-all duration-300 overflow-hidden relative z-30">
            <div class="min-w-[18rem] h-full flex flex-col">
                <div
                    class="p-6 border-b-[1px] border-slate-200/60 dark:border-slate-700 flex items-center justify-between bg-white/40 dark:bg-slate-800/40">
                    <h3 class="font-heading font-bold text-xl text-dark flex items-center gap-2">
                        <i data-lucide="compass" class="w-6 h-6 text-orange"></i> Outline
                    </h3>
                    <button onclick="toggleOutline()" class="text-dark hover:bg-gray-200 p-1 rounded transition-colors">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                </div>
                <div id="outlineList" class="flex-grow overflow-y-auto p-4 space-y-2 custom-scrollbar">
                    <div class="flex flex-col items-center justify-center h-40 text-center px-6">
                        <p class="text-gray-400 text-sm font-bold">Use H1 or H2 headings to generate an outline.</p>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <div id="print-container" class="hidden">
        <div id="print-header" class="text-center mb-8 border-b-2 border-black pb-4">
            <h1 id="print-title" class="text-3xl font-bold mb-2"></h1>
            <p class="text-gray-500" id="print-date"></p>
        </div>
        <div id="print-body" class="prose max-w-none"></div>
    </div>

    <div id="customModal"
        class="hidden fixed inset-0 z-[500] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm animate-pop">
        <div
            class="neo-card max-w-md w-full p-8 flex flex-col items-center text-center border-[1px] border-pink/50 glass-panel shadow-neo-lg bg-white/95 dark:bg-slate-900/95">
            <div
                class="w-20 h-20 rounded-full flex items-center justify-center mb-6 bg-pink/20 text-pink border-[1px] border-pink/40">
                <i id="modalIcon" data-lucide="trash-2" class="w-10 h-10"></i>
            </div>
            <h3 id="modalTitle" class="text-3xl font-heading font-bold text-dark mb-2">Move to Trash?</h3>
            <p id="modalDesc" class="text-gray-600 font-bold mb-8">You can restore this note later from the Trash bin.
            </p>
            <div class="flex gap-4 w-full">
                <button id="modalCancel" class="flex-1 neo-btn bg-white text-dark py-3 rounded-xl text-lg">
                    Cancel
                </button>
                <button id="modalConfirm" class="flex-1 neo-btn bg-pink text-white py-3 rounded-xl text-lg">
                    Trash It
                </button>
            </div>
        </div>
    </div>

    <!-- Custom Prompt Modal -->
    <div id="promptModal" class="hidden fixed inset-0 z-[500] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-md animate-pop">
        <div class="neo-card max-w-sm w-full p-8 flex flex-col items-center border-[1px] border-blue/50 glass-panel shadow-neo-lg bg-white/95 dark:bg-slate-900/95">
            <div class="w-16 h-16 rounded-2xl bg-blue/10 flex items-center justify-center border-[3px] border-blue/40 mb-6">
                <i id="promptIcon" data-lucide="folder-plus" class="w-8 h-8 text-blue"></i>
            </div>
            <h3 id="promptTitle" class="text-2xl font-heading font-bold text-dark mb-2">Folder Name</h3>
            <p id="promptDesc" class="text-sm text-slate-500 font-bold mb-6">Enter a name for your workspace</p>
            
            <input type="text" id="promptInput" class="w-full neo-input px-4 py-3 mb-8 text-center text-lg font-bold" placeholder="Type here...">

            <div class="flex gap-4 w-full">
                <button id="promptCancel" class="flex-1 neo-btn bg-white text-dark py-3 rounded-xl">
                    Cancel
                </button>
                <button id="promptConfirm" class="flex-1 neo-btn bg-blue text-white py-3 rounded-xl">
                    Confirm
                </button>
            </div>
        </div>
    </div>

    <!-- Table Insert Dialog -->
    <div id="tableDialog"
        class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm animate-pop">
        <div
            class="neo-card max-w-sm w-full p-8 flex flex-col items-center text-center border-[1px] border-blue/50 glass-panel shadow-neo-lg bg-white/95 dark:bg-slate-900/95">
            <div
                class="w-16 h-16 rounded-full flex items-center justify-center mb-5 bg-blue/20 text-blue border-[1px] border-blue/40">
                <i data-lucide="table" class="w-8 h-8"></i>
            </div>
            <h3 class="text-2xl font-heading font-bold text-dark mb-5">Insert Table</h3>
            <div class="flex gap-6 mb-6">
                <div class="text-center">
                    <label class="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider">Rows</label>
                    <input type="number" id="tableRows" value="3" min="1" max="20" class="table-dialog-input">
                </div>
                <div class="text-center">
                    <label class="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider">Columns</label>
                    <input type="number" id="tableCols" value="3" min="1" max="10" class="table-dialog-input">
                </div>
            </div>
            <div class="flex gap-4 w-full">
                <button onclick="closeTableDialog()"
                    class="flex-1 neo-btn bg-white text-dark py-3 rounded-xl text-lg">Cancel</button>
                <button onclick="confirmInsertTable()"
                    class="flex-1 neo-btn bg-blue text-white py-3 rounded-xl text-lg">Insert</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[400] flex flex-col gap-3 pointer-events-none"></div>

    <!-- Custom Confirm Modal -->
    <div id="confirmModal" class="hidden fixed inset-0 bg-brand-dark/60 backdrop-blur-md z-[500] items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-800 w-full max-w-sm rounded-[2rem] border-4 border-brand-dark dark:border-slate-500 shadow-neo animate-pop-in overflow-hidden">
            <div class="p-6 text-center">
                <div class="w-16 h-16 rounded-2xl bg-brand-pink/10 flex items-center justify-center border-[3px] border-brand-dark mx-auto mb-4">
                    <i data-lucide="alert-triangle" class="w-8 h-8 text-brand-pink"></i>
                </div>
                <h3 id="confirmTitle" class="text-xl font-heading font-bold text-brand-dark dark:text-white mb-2">Are you sure?</h3>
                <p id="confirmMessage" class="text-sm text-slate-500 dark:text-slate-400 mb-6">This action cannot be undone.</p>
                <div class="flex gap-3">
                    <button id="confirmBtnYes" class="flex-1 btn-chunky bg-brand-pink text-white py-3 rounded-2xl font-bold">
                        Yes, Delete
                    </button>
                    <button id="confirmBtnNo" class="flex-1 btn-chunky bg-white dark:bg-slate-700 dark:text-white py-3 rounded-2xl font-bold">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../../js/modal-toast.js"></script>
    <script src="script.js"></script>
</body>

</html>
