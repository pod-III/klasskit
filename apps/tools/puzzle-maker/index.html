<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puzzle Maker — KlassKit</title>
  <link rel="icon" type="image/x-icon" href="../../../media/icon.ico" />
  <link rel="icon" type="image/webp" href="../../../media/icon.webp" />

  <!-- Supabase Auth -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4"></script>
  <script src="/supabase.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <!-- Libraries -->
  <script src="https://unpkg.com/lucide@1.16.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            pink:   '#ff4785',
            orange: '#ff7e33',
            green:  '#00d063',
            blue:   '#1ea7fd',
            dark:   '#1e293b',
            chalk:  '#f8fafc',
          },
          fontFamily: {
            heading: ['"Fredoka"', 'sans-serif'],
            body:    ['"Nunito"',  'sans-serif'],
          },
          boxShadow: {
            'neo-sm': '2px 2px 0px 0px var(--border-primary)',
            'neo':    '4px 4px 0px 0px var(--border-primary)',
            'neo-lg': '8px 8px 0px 0px var(--border-primary)',
          }
        }
      }
    }
  </script>

  <!-- Theme sync: tool-specific → hub → system -->
  <script>
    (function () {
      function sync() {
        const t = localStorage.getItem('theme_puzzle-maker');
        const h = localStorage.getItem('theme_hub');
        if (t === 'dark' || (!t && h === 'dark') || (!t && !h && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }
      sync();
      window.addEventListener('storage', (e) => {
        if (e.key === 'theme_hub' || e.key === 'theme_puzzle-maker') sync();
      });
    })();
  </script>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="../../../css/base.css" />
  <link rel="stylesheet" href="../../../css/components.css" />
</head>

<body class="flex min-h-screen text-dark dark:text-white font-body" style="height:100vh;overflow:hidden">

  <!-- ── SIDEBAR ─────────────────────────────────────────────────────────── -->
  <aside class="sidebar no-print flex flex-col p-5">

    <!-- Header -->
    <div class="mb-6 border-b-2 border-slate-100 dark:border-slate-700 pb-5 flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-heading text-dark dark:text-white tracking-tight leading-none">
          PUZZLE<span class="text-pink">MAKER</span>
        </h1>
        <div class="flex items-center gap-2 mt-2">
          <span class="px-2 py-0.5 rounded bg-dark text-white text-[10px] font-bold uppercase tracking-widest">KlassKit</span>
          <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Edition</span>
        </div>
      </div>
      <button id="darkToggle"
        class="bg-white dark:bg-slate-800 text-dark dark:text-white p-2 rounded-full border-2 border-dark dark:border-slate-500 shadow-neo-sm hover:-translate-y-1 transition-all focus:outline-none">
        <i data-lucide="moon" id="darkIcon" class="w-4 h-4"></i>
      </button>
    </div>

    <!-- Scrollable Controls -->
    <div class="space-y-6 flex-1 overflow-y-auto pr-1 custom-scrollbar">

      <!-- Upload -->
      <section>
        <label class="section-label"><i data-lucide="image-plus" class="inline w-3.5 h-3.5 mr-1 text-pink"></i>Upload Image</label>
        <div id="dropZone"
          class="drop-zone border-[3px] border-dashed border-dark dark:border-slate-600 rounded-2xl p-5 text-center cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
          <i data-lucide="upload-cloud" class="w-8 h-8 text-blue mx-auto mb-2"></i>
          <p class="text-xs font-bold text-slate-500 dark:text-slate-400"><span class="text-pink">Click</span> or drag image</p>
          <p class="text-[10px] text-slate-400 mt-0.5 font-bold">PNG · JPG · GIF · WebP</p>
          <input type="file" id="fileIn" accept="image/*" class="hidden">
        </div>
        <p id="imgInfo" class="mt-2 text-[10px] text-slate-400 font-bold truncate hidden"></p>
      </section>

      <!-- Pages -->
      <section id="pagesSection" class="hidden border-t-2 border-slate-100 dark:border-slate-700 pt-4">
        <div class="flex items-center justify-between mb-3">
          <label class="section-label mb-0"><i data-lucide="layers" class="inline w-3.5 h-3.5 mr-1 text-blue"></i>Pages</label>
          <button id="addPageBtn" class="btn-chunky bg-blue text-white px-3 py-1.5 rounded-xl text-[11px] flex items-center gap-1">
            <i data-lucide="plus" class="w-3.5 h-3.5"></i> Add Page
          </button>
        </div>
        <div id="pagesList" class="flex flex-wrap gap-2"></div>
      </section>

      <!-- Library / Sets -->
      <section class="border-t-2 border-slate-100 dark:border-slate-700 pt-4">
        <div class="flex items-center justify-between mb-3">
          <label class="section-label mb-0"><i data-lucide="library" class="inline w-3.5 h-3.5 mr-1 text-green"></i>Saved Puzzles</label>
          <select id="sets-sort" onchange="changeSetsSort()" class="text-[10px] bg-slate-100 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded px-2 py-1">
            <option value="recent">Recent</option>
            <option value="alpha">A-Z</option>
            <option value="popular">Popular</option>
          </select>
        </div>

        <!-- Active Set Indicator -->
        <div id="active-set-indicator" class="hidden mb-3 p-2 bg-blue/10 border border-blue/30 rounded-lg">
          <div class="flex items-center justify-between">
            <span class="text-xs font-bold text-blue">Editing: <span id="active-set-name"></span></span>
            <button onclick="closeActiveSet()" class="text-blue/60 hover:text-blue"><i data-lucide="x" class="w-3 h-3"></i></button>
          </div>
        </div>

        <!-- Save Form -->
        <div class="flex gap-2 mb-3">
          <input type="text" id="set-name-input" placeholder="Puzzle set name..." class="flex-1 text-xs px-3 py-2 rounded-lg border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-blue focus:outline-none">
          <button id="save-btn" onclick="saveCurrentSet()" class="btn-chunky bg-green text-white px-3 py-2 rounded-lg text-xs flex items-center gap-1">
            <i data-lucide="save" class="w-3 h-3"></i> SAVE
          </button>
        </div>

        <!-- New Button -->
        <button onclick="createNewSet()" class="btn-chunky w-full bg-white dark:bg-slate-700 text-dark dark:text-white py-2 rounded-lg text-xs flex items-center justify-center gap-2 mb-3 border-2 border-slate-200 dark:border-slate-600">
          <i data-lucide="plus-circle" class="w-3.5 h-3.5"></i> New Puzzle Set
        </button>

        <!-- Sets List -->
        <div id="sets-list" class="space-y-2 max-h-48 overflow-y-auto pr-1">
          <p class="text-slate-400 text-[10px] italic p-2">No saved puzzle sets yet.</p>
        </div>
      </section>

      <!-- Grid Size -->
      <section class="border-t-2 border-slate-100 dark:border-slate-700 pt-4">
        <label class="section-label"><i data-lucide="grid-3x3" class="inline w-3.5 h-3.5 mr-1 text-blue"></i>Grid Size</label>
        <div class="space-y-3">
          <div>
            <div class="flex justify-between mb-1">
              <span class="text-xs font-bold text-dark dark:text-slate-300">Rows</span>
              <span id="rowsLbl" class="font-heading text-sm font-bold text-pink">4</span>
            </div>
            <input type="range" id="rowsR" min="2" max="20" value="4">
          </div>
          <div>
            <div class="flex justify-between mb-1">
              <span class="text-xs font-bold text-dark dark:text-slate-300">Columns</span>
              <span id="colsLbl" class="font-heading text-sm font-bold text-pink">4</span>
            </div>
            <input type="range" id="colsR" min="2" max="20" value="4">
          </div>
        </div>
      </section>

      <!-- Cut Style -->
      <section class="border-t-2 border-slate-100 dark:border-slate-700 pt-4">
        <label class="section-label"><i data-lucide="pen-tool" class="inline w-3.5 h-3.5 mr-1 text-orange"></i>Cut Style</label>
        <div class="grid grid-cols-2 gap-2">
          <button class="btn-chunky style-btn active bg-white dark:bg-slate-700 dark:text-white py-2 px-3 rounded-xl text-xs flex items-center gap-2" data-style="straight">
            <svg width="30" height="12" viewBox="0 0 44 18" fill="none"><line x1="2" y1="9" x2="42" y2="9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Straight
          </button>
          <button class="btn-chunky style-btn bg-white dark:bg-slate-700 dark:text-white py-2 px-3 rounded-xl text-xs flex items-center gap-2" data-style="jigsaw">
            <svg width="30" height="12" viewBox="0 0 44 18" fill="none"><path d="M2,9 L14,9 Q15,5 17,4 Q19,3 22,4 Q25,5 26,9 L42,9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Jigsaw
          </button>
          <button class="btn-chunky style-btn bg-white dark:bg-slate-700 dark:text-white py-2 px-3 rounded-xl text-xs flex items-center gap-2" data-style="jagged">
            <svg width="30" height="12" viewBox="0 0 44 18" fill="none"><path d="M2,9 L8,3 L14,15 L20,3 L26,15 L32,3 L38,15 L42,9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Zigzag
          </button>
          <button class="btn-chunky style-btn bg-white dark:bg-slate-700 dark:text-white py-2 px-3 rounded-xl text-xs flex items-center gap-2" data-style="wavy">
            <svg width="30" height="12" viewBox="0 0 44 18" fill="none"><path d="M2,9 C8,2 14,16 22,9 C30,2 36,16 42,9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Wavy
          </button>
          <button class="btn-chunky style-btn bg-white dark:bg-slate-700 dark:text-white py-2 px-3 rounded-xl text-xs flex items-center gap-2" data-style="curved">
            <svg width="30" height="12" viewBox="0 0 44 18" fill="none"><path d="M2,9 C14,1 30,17 42,9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            S-Curve
          </button>
          <button class="btn-chunky style-btn bg-white dark:bg-slate-700 dark:text-white py-2 px-3 rounded-xl text-xs flex items-center gap-2" data-style="bumpy">
            <svg width="30" height="12" viewBox="0 0 44 18" fill="none"><path d="M2,9 Q7,4 11,9 Q16,14 20,9 Q25,4 29,9 Q34,14 38,9 L42,9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Bumpy
          </button>
        </div>
      </section>

      <!-- Line Appearance -->
      <section class="border-t-2 border-slate-100 dark:border-slate-700 pt-4">
        <label class="section-label"><i data-lucide="palette" class="inline w-3.5 h-3.5 mr-1 text-green"></i>Line Appearance</label>
        <div class="space-y-3">

          <div>
            <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2 block">Color</span>
            <div class="flex flex-wrap gap-2 items-center">
              <div class="swatch sel" style="background:#ffffff" data-color="#ffffff" title="White"></div>
              <div class="swatch" style="background:#000000" data-color="#000000" title="Black"></div>
              <div class="swatch" style="background:#ff4785" data-color="#ff4785" title="Pink"></div>
              <div class="swatch" style="background:#1ea7fd" data-color="#1ea7fd" title="Blue"></div>
              <div class="swatch" style="background:#00d063" data-color="#00d063" title="Green"></div>
              <div class="swatch" style="background:#ff7e33" data-color="#ff7e33" title="Orange"></div>
              <div class="swatch" style="background:#FFEB3B" data-color="#FFEB3B" title="Yellow"></div>
              <input type="color" id="colorPick" value="#ffffff" class="swatch" style="padding:2px" title="Custom">
            </div>
          </div>

          <div>
            <div class="flex justify-between mb-1">
              <span class="text-xs font-bold text-dark dark:text-slate-300">Line Width</span>
              <span id="widthLbl" class="font-heading text-sm font-bold text-orange">2px</span>
            </div>
            <input type="range" id="widthR" min="1" max="12" value="2">
          </div>

          <div>
            <div class="flex justify-between mb-1">
              <span class="text-xs font-bold text-dark dark:text-slate-300">Opacity</span>
              <span id="opacLbl" class="font-heading text-sm font-bold text-orange">100%</span>
            </div>
            <input type="range" id="opacR" min="5" max="100" value="100">
          </div>

          <div>
            <div class="flex justify-between mb-1">
              <span class="text-xs font-bold text-dark dark:text-slate-300">Cut Depth</span>
              <span id="depthLbl" class="font-heading text-sm font-bold text-orange">50%</span>
            </div>
            <input type="range" id="depthR" min="10" max="100" value="50">
          </div>

          <div id="freqRow">
            <div class="flex justify-between mb-1">
              <span class="text-xs font-bold text-dark dark:text-slate-300">Frequency</span>
              <span id="freqLbl" class="font-heading text-sm font-bold text-orange">3</span>
            </div>
            <input type="range" id="freqR" min="1" max="8" value="3">
          </div>
        </div>
      </section>

      <!-- Print Settings -->
      <section class="border-t-2 border-slate-100 dark:border-slate-700 pt-4">
        <label class="section-label"><i data-lucide="printer" class="inline w-3.5 h-3.5 mr-1 text-blue"></i>Orientation</label>
        <div class="flex gap-2">
          <button id="orientPortrait" data-orient="portrait"
            class="btn-chunky flex-1 bg-white dark:bg-slate-700 dark:text-white py-2 rounded-xl text-xs flex items-center justify-center gap-2 active">
            <svg width="14" height="18" viewBox="0 0 18 24" fill="none" style="flex-shrink:0"><rect x="1" y="1" width="16" height="22" rx="2" stroke="currentColor" stroke-width="2"/></svg>
            Portrait
          </button>
          <button id="orientLandscape" data-orient="landscape"
            class="btn-chunky flex-1 bg-white dark:bg-slate-700 dark:text-white py-2 rounded-xl text-xs flex items-center justify-center gap-2">
            <svg width="18" height="14" viewBox="0 0 24 18" fill="none" style="flex-shrink:0"><rect x="1" y="1" width="22" height="16" rx="2" stroke="currentColor" stroke-width="2"/></svg>
            Landscape
          </button>
        </div>
      </section>

    </div><!-- /scrollable -->

    <!-- Bottom Actions -->
    <div class="mt-4 pt-4 border-t-2 border-dark dark:border-slate-700 space-y-2">
      <button id="shuffleBtn"
        class="btn-chunky w-full bg-orange text-dark py-3 rounded-xl text-sm flex items-center justify-center gap-2">
        <i data-lucide="shuffle" class="w-4 h-4"></i> Shuffle Tabs
      </button>
      <div class="grid grid-cols-2 gap-2">
        <button id="downloadBtn"
          class="btn-chunky bg-green text-dark py-3 rounded-xl text-sm flex items-center justify-center gap-1">
          <i data-lucide="image" class="w-4 h-4"></i> PNG
        </button>
        <button id="printBtn"
          class="btn-chunky bg-blue text-white py-3 rounded-xl text-sm flex items-center justify-center gap-1">
          <i data-lucide="printer" class="w-4 h-4"></i> Print
        </button>
      </div>
    </div>

  </aside>

  <!-- ── PREVIEW AREA ────────────────────────────────────────────────────── -->
  <main class="preview-area">

    <!-- Empty state -->
    <div id="empty" class="flex flex-col items-center justify-center text-center p-10">
      <div class="w-28 h-28 rounded-3xl border-4 border-slate-200 dark:border-slate-700 bg-slate-100 dark:bg-slate-800/50 flex items-center justify-center mb-6">
        <i data-lucide="image" class="w-14 h-14 text-slate-300 dark:text-slate-600"></i>
      </div>
      <p class="font-heading text-3xl text-slate-400 dark:text-slate-500 uppercase tracking-tight">Upload an image</p>
      <p class="text-sm text-slate-400 dark:text-slate-600 mt-2 font-bold">Your puzzle template will appear here</p>
    </div>

    <!-- Canvas -->
    <div id="canvasWrap" class="hidden items-center justify-center" style="padding:24px;width:100%;height:100%">
      <canvas id="canvas"></canvas>
    </div>

    <!-- Size label -->
    <span id="sizeLbl" class="absolute bottom-3 right-4 text-[10px] font-bold text-slate-400 font-mono pointer-events-none"></span>

  </main>

  <script src="./script.js"></script>
</body>
</html>
