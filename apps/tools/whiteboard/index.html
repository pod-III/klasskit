<!doctype html>
<html lang="en">

<head>
    <script>
        if (localStorage.getItem("theme_whiteboard") === "dark" || (!localStorage.getItem("theme_whiteboard") && window.matchMedia("(prefers-color-scheme:dark)").matches)) {
            document.documentElement.classList.add("dark")
        }
    </script>
    <!-- Supabase Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4"></script>
    <script src="/supabase.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Whiteboard</title>
    <link rel="icon" type="image/x-icon" href="../../../media/icon.ico" />
    <link rel="icon" type="image/webp" href="../../../media/icon.webp" />

    <script src="https://unpkg.com/lucide@1.16.0"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        pink: "#ff4785",
                        orange: "#ff7e33",
                        green: "#00d063",
                        blue: "#1ea7fd",
                        dark: "#1e293b",
                        chalk: "#f8fafc",
                        yellow: "#FACC15",
                    },
                    fontFamily: {
                        heading: ["Fredoka", "sans-serif"],
                        body: ["Nunito", "sans-serif"],
                    },
                    borderWidth: {
                        3: "3px",
                    },
                    boxShadow: {
                        hard: "0 4px 0 var(--border-primary)",
                        "hard-hover": "0 6px 0 var(--border-primary)",
                        "hard-sm": "0 2px 0 var(--border-primary)",
                        neo: "4px 5px 0px 0px var(--border-primary)",
                        "neo-sm": "2px 3px 0px 0px var(--border-primary)",
                        "neo-hover":
                            "6px 7px 0px 0px var(--border-primary)",
                        none: "0px 0px 0px 0px rgba(0,0,0,0)",
                    },
                    cursor: {
                        crosshair: "crosshair",
                        grab: "grab",
                        grabbing: "grabbing",
                    },
                    animation: {
                        "pop-in":
                            "pop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)",
                        "float-icon":
                            "float-icon-1 4s ease-in-out infinite",
                    },
                },
            },
        };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="../../../css/base.css" />
    <link rel="stylesheet" href="../../../css/components.css" />
    
</head>

<body class="flex h-screen w-screen bg-grid" id="body-bg">
    <textarea id="text-input" wrap="off" rows="1"></textarea>

    <aside class="sidebar">
        <div class="mb-8 group">
            <div
                class="w-12 h-12 bg-dark rounded-xl border-3 border-dark flex items-center justify-center shadow-neo-sm group-hover:shadow-neo group-hover:-translate-y-0.5 transition-all">
                <span class="font-heading font-bold text-white text-xl">KK</span>
            </div>
        </div>

        <button class="btn-tool active" onclick="setTool('pen')" id="tool-pen" data-tool="pen" title="Freehand Pen">
            <i data-lucide="pencil" class="w-6 h-6"></i>
        </button>

        <div class="w-10 h-[2px] bg-slate-200 dark:bg-slate-600 my-2"></div>

        <button class="btn-tool" onclick="setTool('line')" id="tool-line" data-type="shape" title="Straight Line">
            <i data-lucide="minus" class="w-6 h-6 transform -rotate-45"></i>
        </button>
        <button class="btn-tool" onclick="setTool('rect')" id="tool-rect" data-type="shape" title="Rectangle">
            <i data-lucide="square" class="w-6 h-6"></i>
        </button>
        <button class="btn-tool" onclick="setTool('circle')" id="tool-circle" data-type="shape" title="Circle">
            <i data-lucide="circle" class="w-6 h-6"></i>
        </button>

        <div class="w-10 h-[2px] bg-slate-200 dark:bg-slate-600 my-2"></div>

        <button class="btn-tool" onclick="setTool('text')" id="tool-text" data-tool="text" title="Type Text">
            <i data-lucide="type" class="w-6 h-6"></i>
        </button>
        <button class="btn-tool" onclick="setTool('eraser')" id="tool-eraser" data-tool="eraser" title="Eraser">
            <i data-lucide="eraser" class="w-6 h-6"></i>
        </button>

        <div class="mt-auto flex flex-col items-center w-full gap-2">
            <button class="btn-tool" onclick="setTool('hand')" id="tool-hand" data-tool="hand"
                title="Pan / Move (Space)">
                <i data-lucide="hand" class="w-6 h-6"></i>
            </button>
            <button
                class="btn-tool text-slate-400 border-slate-300 shadow-none hover:shadow-none hover:bg-slate-50 hover:border-slate-400"
                onclick="undo()" title="Undo (Ctrl+Z)">
                <i data-lucide="undo-2" class="w-6 h-6"></i>
            </button>
        </div>
    </aside>

    <div class="flex flex-col flex-grow h-full relative">
        <header class="top-bar">
            <div class="flex items-center gap-8">
                <div class="flex flex-col gap-1">
                    <span
                        class="text-[10px] font-heading font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Ink
                        Color</span>
                    <div class="flex items-center gap-3 px-2 py-1 rounded-xl">
                        <div class="color-dot bg-dark dark:bg-white selected" id="dot-dark"
                            onclick="setDarkLightColor(this)"></div>
                        <div class="color-dot bg-blue" data-color="#1ea7fd" onclick="setColor('#1ea7fd', this)"></div>
                        <div class="color-dot bg-green" data-color="#00d063" onclick="setColor('#00d063', this)"></div>
                        <div class="color-dot bg-orange" data-color="#ff7e33" onclick="setColor('#ff7e33', this)"></div>
                        <div class="color-dot bg-pink" data-color="#ff4785" onclick="setColor('#ff4785', this)"></div>
                    </div>
                </div>

                <div class="w-[2px] h-10 bg-slate-200 dark:bg-slate-600 rounded-full"></div>

                <div class="flex flex-col gap-1">
                    <span
                        class="text-[10px] font-heading font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Stroke
                        Width</span>
                    <div class="flex items-center gap-3">
                        <i data-lucide="circle" class="w-2 h-2 fill-slate-300 text-slate-300"></i>
                        <input type="range" id="size-slider" min="2" max="40" value="4"
                            oninput="updateSize(this.value)" />
                        <i data-lucide="circle" class="w-5 h-5 fill-slate-800 text-slate-800"></i>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" id="theme-toggle"
                    class="group flex items-center justify-center w-12 h-12 rounded-xl font-heading font-bold text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 border-3 border-transparent hover:border-slate-200 dark:hover:border-slate-600 transition-all active:scale-95"
                    title="Toggle Dark Mode">
                    <i data-lucide="sun" id="theme-icon-sun" class="w-5 h-5 hidden dark:block"></i>
                    <i data-lucide="moon" id="theme-icon-moon" class="w-5 h-5 block dark:hidden"></i>
                </button>

                <div id="cloud-status"
                    class="hidden items-center gap-2 px-3 py-1.5 rounded-xl bg-green/10 border border-green/30 text-green text-xs font-heading font-bold">
                    <span class="w-2 h-2 bg-green rounded-full animate-pulse"></span>
                    <span id="cloud-status-text">Synced</span>
                </div>

                <div class="flex items-center gap-1 bg-slate-100 dark:bg-slate-700 border-3 border-slate-200 dark:border-slate-600 p-1 rounded-xl">
                    <button onclick="changeZoom(-0.1)"
                        class="p-2 hover:bg-white dark:hover:bg-slate-600 rounded-lg transition-colors active:bg-slate-200 dark:active:bg-slate-500"
                        title="Zoom Out">
                        <i data-lucide="minus" class="w-4 h-4 text-slate-600 dark:text-slate-300"></i>
                    </button>
                    <span id="zoom-display" class="w-12 text-center font-heading font-bold text-sm text-slate-700 dark:text-slate-200">100%</span>
                    <button onclick="changeZoom(0.1)"
                        class="p-2 hover:bg-white dark:hover:bg-slate-600 rounded-lg transition-colors active:bg-slate-200 dark:active:bg-slate-500"
                        title="Zoom In">
                        <i data-lucide="plus" class="w-4 h-4 text-slate-600 dark:text-slate-300"></i>
                    </button>
                </div>

                <button onclick="toggleGrid()"
                    class="group flex items-center gap-2 px-4 py-2 rounded-xl font-heading font-bold text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 border-3 border-transparent hover:border-slate-200 dark:hover:border-slate-600 transition-all active:scale-95">
                    <i data-lucide="grid-3x3" class="w-5 h-5 group-hover:text-blue transition-colors"></i>
                    <span>Grid</span>
                </button>

                <button onclick="showClearModal()"
                    class="flex items-center justify-center w-12 h-12 rounded-xl border-3 border-red-200 dark:border-red-400/30 text-red-400 hover:bg-red-50 dark:hover:bg-red-500/10 hover:text-red-500 hover:border-red-300 dark:hover:border-red-400/50 transition-all active:translate-y-1"
                    title="Clear Board">
                    <i data-lucide="trash-2" class="w-6 h-6"></i>
                </button>

                <button onclick="saveBoardCloud()"
                    class="flex items-center gap-2 px-6 h-12 bg-blue text-white rounded-xl border-3 border-blue shadow-hard hover:shadow-hard-hover hover:-translate-y-0.5 transition-all active:translate-y-1 active:shadow-none font-heading font-bold">
                    <i data-lucide="upload-cloud" class="w-5 h-5"></i>
                    <span>Sync</span>
                </button>
                <button onclick="downloadBoard()"
                    class="flex items-center gap-2 px-6 h-12 bg-brand-green text-brand-dark rounded-xl border-3 border-brand-dark shadow-hard hover:shadow-hard-hover hover:-translate-y-0.5 transition-all active:translate-y-1 active:shadow-none font-heading font-bold">
                    <i data-lucide="download" class="w-5 h-5"></i>
                    <span>Export</span>
                </button>
            </div>
        </header>

        <main id="canvas-wrapper">
            <canvas id="canvas-main" width="3000" height="3000"></canvas>
            <canvas id="canvas-temp" width="3000" height="3000"></canvas>
        </main>

    </div>

    <div id="clear-modal"
        class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 dark:bg-black/70 backdrop-blur-sm opacity-0 transition-opacity duration-200">
        <div class="bg-white dark:bg-slate-800 border-3 border-slate-300 dark:border-slate-600 p-8 rounded-3xl shadow-neo text-center max-w-sm w-full mx-4 transform scale-90 transition-transform duration-200"
            id="modal-box">
            <div
                class="w-20 h-20 bg-red-50 dark:bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-6 border-3 border-red-100 dark:border-red-400/30">
                <i data-lucide="eraser" class="w-10 h-10 text-red-500"></i>
            </div>
            <h2 class="font-heading font-bold text-3xl mb-3">
                Wipe it clean?
            </h2>
            <p class="font-body text-lg text-slate-500 dark:text-slate-400 mb-8 leading-tight">
                You're about to delete everything. This cannot be undone!
            </p>
            <div class="flex gap-4">
                <button onclick="closeClearModal()"
                    class="flex-1 py-3 rounded-xl border-3 border-slate-200 dark:border-slate-600 font-heading font-bold text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 hover:border-slate-300 dark:hover:border-slate-500 transition-all">
                    No, Keep
                </button>
                <button onclick="confirmClear()"
                    class="flex-1 py-3 rounded-xl border-3 border-pink bg-pink text-white font-heading font-bold shadow-hard hover:shadow-hard-hover hover:-translate-y-0.5 active:translate-y-1 active:shadow-none transition-all">
                    Yes, Wipe
                </button>
            </div>
        </div>
    </div>

    <div id="auth-overlay"
        class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-[var(--bg-primary)] transition-opacity duration-300">
        <div class="flex flex-col items-center gap-4">
            <div class="w-16 h-16 border-4 border-[var(--color-blue)] border-t-transparent rounded-full animate-spin"></div>
            <p class="font-heading font-bold text-xl text-[var(--text-primary)]">Loading Whiteboard...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
