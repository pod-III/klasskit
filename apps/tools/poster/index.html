<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Supabase Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4"></script>
    <script src="/supabase.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster Display</title>
    <link rel="icon" type="image/x-icon" href="../../../media/icon.ico" />
    <link rel="icon" type="image/webp" href="../../../media/icon.webp" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@1.16.0"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'kk-pink': '#FF6B95', 'kk-orange': '#FF8C42',
                        'kk-green': '#00E676', 'kk-blue': '#2979FF',
                        'kk-dark': '#1e293b', 'kk-chalk': '#f8fafc',
                    },
                    fontFamily: {
                        heading: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    boxShadow: {
                        'neo': '4px 4px 0px 0px rgba(30, 41, 59, 1)',
                        'neo-sm': '2px 2px 0px 0px rgba(30, 41, 59, 1)',
                        'neo-lg': '8px 8px 0px 0px rgba(30, 41, 59, 1)',
                        'neo-xl': '12px 12px 0px 0px rgba(30, 41, 59, 1)',
                    }
                }
            }
        }
    </script>

    <style>
        /* Base Settings */
        body {
            background-color: #f8fafc;
            background-image:
                linear-gradient(rgba(30, 41, 59, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30, 41, 59, 0.05) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-left: 2px solid #1e293b;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border: 2px solid #1e293b;
            border-radius: 6px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Utilities */
        .btn-neo {
            transition: all 0.1s ease;
        }

        .btn-neo:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px rgba(30, 41, 59, 1) !important;
        }

        .input-neo {
            transition: all 0.2s ease;
        }

        .input-neo:focus {
            box-shadow: 4px 4px 0px 0px #2979FF;
            transform: translate(-2px, -2px);
            border-color: #1e293b;
        }

        /* Animations */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-card {
            animation: fadeUp 0.3s ease-out forwards;
        }

        @keyframes popIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .animate-pop {
            animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
    <link rel="stylesheet" href="../../../css/base.css" />
    <link rel="stylesheet" href="../../../css/components.css" />
    
</head>

<body
    class="text-kk-dark font-body min-h-screen flex flex-col overflow-hidden selection:bg-kk-pink selection:text-white">

    <nav
        class="bg-white border-b-4 border-kk-dark px-6 py-4 flex justify-between items-center z-30 shadow-sm sticky top-0">
        <div class="flex items-center gap-4">
            <div
                class="bg-kk-pink p-2.5 rounded-xl border-2 border-kk-dark shadow-neo-sm rotate-3 hover:rotate-6 transition-transform">
                <i data-lucide="library" class="w-7 h-7 text-white"></i>
            </div>
            <div>
                <h1 class="text-3xl font-heading font-bold text-kk-dark leading-none">
                    Poster <span class="text-kk-blue">Display</span>
                </h1>
                <p class="text-xs font-bold text-slate-400 tracking-wider uppercase mt-1">Teacher Dashboard</p>
            </div>
        </div>

        <div class="flex gap-4 absolute left-1/2 -translate-x-1/2">
            <button onclick="switchTab('wordbank')" id="tab-wordbank"

                <i data-lucide="layers" class="w-5 h-5"></i> Topic Decks

            <button onclick="switchTab('posters')" id="tab-posters"

    <script>
        // ==========================================
        // SYSTEM MODAL LOGIC (New!)
        // ==========================================
        let confirmCallback = null;

        function showDialog(type, title, msg, onConfirm = null) {
            const modal = document.getElementById('system-modal');
            const header = document.getElementById('sys-header');
            const titleEl = document.getElementById('sys-title');
            const msgEl = document.getElementById('sys-msg');
            const icon = document.getElementById('sys-icon');
            const cancelBtn = document.getElementById('sys-btn-cancel');
            const confirmBtn = document.getElementById('sys-btn-confirm');

            // Reset Styles
            header.className = "border-b-4 border-kk-dark px-6 py-4 flex items-center gap-3";
            confirmBtn.className = "btn-neo text-white px-6 py-2 rounded-xl border-2 border-kk-dark font-heading font-bold text-lg shadow-neo";
            confirmCallback = onConfirm;

            titleEl.innerText = title;
            msgEl.innerText = msg;

            if (type === 'error' || type === 'delete') {
                header.classList.add('bg-red-500');
                confirmBtn.classList.add('bg-red-500');
                icon.innerHTML = '<path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>'; // Alert Triangle
            } else if (type === 'alert') {
                header.classList.add('bg-kk-orange');
                confirmBtn.classList.add('bg-kk-orange');
                icon.innerHTML = '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'; // Info
            } else {
                header.classList.add('bg-kk-blue');
                confirmBtn.classList.add('bg-kk-blue');
                icon.innerHTML = '<circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/>'; // Question
            }

            if (onConfirm) {
                // Confirm Mode
                cancelBtn.classList.remove('hidden');
                confirmBtn.innerText = type === 'delete' ? 'Delete' : 'Yes';
                confirmBtn.onclick = () => { if (confirmCallback) confirmCallback(); closeSystemModal(); };
            } else {
                // Alert Mode
                cancelBtn.classList.add('hidden');
                confirmBtn.innerText = "OK";
                confirmBtn.onclick = closeSystemModal;
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeSystemModal() {
            document.getElementById('system-modal').classList.add('hidden');
            document.getElementById('system-modal').classList.remove('flex');
            confirmCallback = null;
        }

        // ==========================================
        // INDEXED DB SETUP
        // ==========================================
        const DB_NAME = 'KlassKit_Resources';
        const DB_VERSION = 1;
        let dataBase;

        const initDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (event) => {
                    const dataBase = event.target.result;
                    if (!dataBase.objectStoreNames.contains('posters')) dataBase.createObjectStore('posters', { keyPath: 'id', autoIncrement: true });
                };
                request.onsuccess = (event) => { dataBase = event.target.result; resolve(dataBase); };
                request.onerror = () => reject('Error opening DB');
            });
        };

        const dbAction = (storeName, mode, callback) => {
            const transaction = dataBase.transaction([storeName], mode);
            const store = transaction.objectStore(storeName);
            return callback(store);
        };

        // ==========================================
        // APP LOGIC
        // ==========================================
        let wordSets = [];
        let editingId = null;

        async function initApp() {
            const user = await requireAuth();
            if (!user) return;

            try {
                const cloudData = await loadProgress('poster_data');
                if (cloudData && cloudData.wordSets) {
                    wordSets = cloudData.wordSets;
                } else {
                    const stored = localStorage.getItem('e1_wordSets');
                    wordSets = stored ? JSON.parse(stored) : [{ id: 1, title: "Demo Deck", color: "bg-kk-blue", icon: "star", words: [{ text: "Welcome", type: "Noun" }] }];
                }
            } catch (e) {
                console.warn("Cloud load failed, using local fallback", e);
                const stored = localStorage.getItem('e1_wordSets');
                wordSets = stored ? JSON.parse(stored) : [{ id: 1, title: "Demo Deck", color: "bg-kk-blue", icon: "star", words: [{ text: "Welcome", type: "Noun" }] }];
            }

            renderTopics(wordSets);
            await initDB();
            loadPosters();
            lucide.createIcons();
        }

        let cloudSaveTimeout = null;
        async function syncToCloud() {
            clearTimeout(cloudSaveTimeout);
            cloudSaveTimeout = setTimeout(async () => {
                await saveProgress('poster_data', { wordSets });
            }, 1000);
        }

        // --- POSTER LOGIC ---
        function handlePosterUpload(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                const posterData = { title: file.name.split('.')[0], file: file, date: new Date() };
                const request = dbAction('posters', 'readwrite', (store) => store.add(posterData));
                request.onsuccess = () => { loadPosters(); input.value = ''; };
            };
            reader.readAsArrayBuffer(file);
        }

        function loadPosters() {
            const request = dbAction('posters', 'readonly', (store) => store.getAll());
            request.onsuccess = () => { renderPosters(request.result); };
        }

        function renderPosters(posters) {
            const grid = document.getElementById('poster-grid');
            const uploadBtn = grid.firstElementChild; grid.innerHTML = ''; grid.appendChild(uploadBtn);
            posters.forEach(poster => {
                const imgUrl = URL.createObjectURL(poster.file);
                const card = document.createElement('div');
                card.className = "animate-card bg-white p-3 rounded-3xl border-4 border-kk-dark shadow-neo hover:-translate-y-2 hover:shadow-neo-lg transition-all relative group";
                card.innerHTML = `
                    <div onclick="openPosterModal('${imgUrl}', '${poster.title}')" class="bg-slate-100 rounded-2xl overflow-hidden border-2 border-kk-dark cursor-pointer aspect-[3/4] relative">
                        <img src="${imgUrl}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors flex items-center justify-center">
                            <i data-lucide="maximize-2" class="w-10 h-10 text-white opacity-0 group-hover:opacity-100 drop-shadow-md"></i>
                        </div>
                    </div>
                    <div class="mt-3 flex justify-between items-center px-1">
                        <h3 class="font-heading font-bold text-xl text-kk-dark truncate max-w-[70%]">${poster.title}</h3>
                        <button onclick="deletePoster(${poster.id})" class="text-slate-300 hover:text-red-500 transition-colors">
                            <i data-lucide="trash-2" class="w-6 h-6 stroke-[2.5]"></i>
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        function deletePoster(id) {
            // Updated to use System Modal
            showDialog('delete', 'Delete Poster?', 'Are you sure you want to permanently delete this poster?', () => {
                const request = dbAction('posters', 'readwrite', (store) => store.delete(id));
                request.onsuccess = () => loadPosters();
            });
        }

        function openPosterModal(url, title) {
            document.getElementById('poster-focus-img').src = url;
            document.getElementById('poster-focus-title').innerText = title;
            document.getElementById('poster-modal').classList.remove('hidden');
            document.getElementById('poster-modal').classList.add('flex');
        }

        // --- WORD BANK LOGIC ---
        function renderTopics(data) {
            const grid = document.getElementById('topic-grid');
            grid.innerHTML = '';
            const addCard = `
            <div onclick="openCreateModal()" class="group h-64 bg-slate-100/50 rounded-3xl border-4 border-dashed border-slate-300 hover:border-kk-green hover:bg-green-50 transition-all cursor-pointer flex flex-col items-center justify-center gap-4 relative">
                 <div class="bg-white p-5 rounded-2xl border-2 border-slate-300 group-hover:border-kk-green group-hover:scale-110 group-hover:shadow-neo-sm transition-all"><i data-lucide="plus" class="w-10 h-10 text-slate-300 group-hover:text-kk-green stroke-[3]"></i></div>
                <span class="font-heading font-bold text-xl text-slate-400 group-hover:text-kk-green">Create Deck</span>
            </div>`;
            grid.innerHTML += addCard;

            data.forEach((set) => {
                const card = `
                <div onclick="openSetModal(${set.id})" class="animate-card group h-64 bg-white rounded-3xl border-4 border-kk-dark shadow-neo hover:-translate-y-2 hover:shadow-neo-lg transition-all cursor-pointer flex flex-col justify-between p-6 relative overflow-hidden">
                    <div class="absolute top-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity z-10">
                        <button onclick="editDeck(event, ${set.id})" class="p-2 rounded-lg bg-white border-2 border-kk-dark hover:bg-kk-blue hover:text-white shadow-sm"><i data-lucide="pencil" class="w-4 h-4 stroke-[3]"></i></button>
                        <button onclick="deleteDeck(event, ${set.id})" class="p-2 rounded-lg bg-white border-2 border-kk-dark hover:bg-red-500 hover:text-white shadow-sm"><i data-lucide="trash-2" class="w-4 h-4 stroke-[3]"></i></button>
                    </div>
                    <div class="flex justify-between items-start">
                        <div class="${set.color} w-16 h-16 rounded-2xl border-2 border-kk-dark flex items-center justify-center text-white shadow-neo-sm transform group-hover:rotate-6 transition-transform"><i data-lucide="${set.icon}" class="w-8 h-8 stroke-[2.5]"></i></div>
                        <span class="bg-slate-100 text-kk-dark text-xs font-black uppercase tracking-wider px-3 py-1.5 rounded-lg border-2 border-kk-dark mt-1">${set.words.length} Items</span>
                    </div>
                    <div class="mt-4"><h3 class="font-heading font-bold text-3xl text-kk-dark leading-tight truncate pr-2 group-hover:text-kk-blue transition-colors">${set.title}</h3><p class="text-slate-400 font-bold text-sm mt-1 truncate">${set.description || 'No description'}</p></div>
                    <div class="absolute bottom-0 left-0 w-full h-2 ${set.color}"></div>
                </div>`;
                grid.innerHTML += card;
            });
            lucide.createIcons();
        }

        function switchTab(tab) {
            document.getElementById('view-wordbank').classList.toggle('hidden', tab !== 'wordbank');
            document.getElementById('view-wordbank').classList.toggle('flex', tab === 'wordbank');
            document.getElementById('view-posters').classList.toggle('hidden', tab !== 'posters');
            document.getElementById('view-posters').classList.toggle('flex', tab === 'posters');
            const btnW = document.getElementById('tab-wordbank');
            const btnP = document.getElementById('tab-posters');
            const addBtn = document.getElementById('add-btn');
            if (tab === 'posters') addBtn.classList.add('invisible'); else addBtn.classList.remove('invisible');
            if (tab === 'wordbank') { btnW.classList.replace('bg-white', 'bg-kk-orange'); btnW.classList.replace('text-kk-dark', 'text-white'); btnP.classList.replace('bg-kk-blue', 'bg-white'); btnP.classList.replace('text-white', 'text-kk-dark'); }
            else { btnP.classList.replace('bg-white', 'bg-kk-blue'); btnP.classList.replace('text-kk-dark', 'text-white'); btnW.classList.replace('bg-kk-orange', 'bg-white'); btnW.classList.replace('text-white', 'text-kk-dark'); loadPosters(); }
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); }
        function openSetModal(id) {
            const set = wordSets.find(s => s.id === id); if (!set) return;
            document.getElementById('modal-set-title').innerText = set.title; document.getElementById('modal-set-desc').innerText = `${set.words.length} Cards in this deck`;
            const iconContainer = document.getElementById('modal-icon'); iconContainer.className = `w-16 h-16 rounded-2xl border-2 border-kk-dark ${set.color} shadow-neo flex items-center justify-center`; iconContainer.innerHTML = `<i data-lucide="${set.icon}" class="w-8 h-8 text-white stroke-[3]"></i>`;
            const grid = document.getElementById('modal-word-grid'); grid.innerHTML = '';
            set.words.forEach((word) => { let tagColor = word.type === 'Verb' ? 'bg-kk-orange' : word.type === 'Noun' ? 'bg-kk-pink' : word.type === 'Adj' ? 'bg-kk-blue' : 'bg-kk-green'; grid.innerHTML += `<div class="animate-card bg-white p-6 rounded-2xl border-2 border-kk-dark shadow-neo hover:-translate-y-1 transition-transform flex flex-col justify-between h-40"><div class="flex justify-between items-start"><span class="${tagColor} text-white text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded border border-kk-dark shadow-sm">${word.type}</span></div><div><h4 class="font-heading font-bold text-3xl text-kk-dark leading-none break-words">${word.text}</h4><p class="text-slate-400 text-sm font-bold mt-2 leading-tight">${word.sub || ''}</p></div></div>`; });
            document.getElementById('set-modal').classList.remove('hidden'); document.getElementById('set-modal').classList.add('flex'); lucide.createIcons();
        }

        function openCreateModal() { editingId = null; document.getElementById('form-title').innerText = "Create New Deck"; document.getElementById('create-modal').classList.remove('hidden'); document.getElementById('create-modal').classList.add('flex'); document.getElementById('new-deck-title').value = ''; document.getElementById('quick-input-text').value = ''; document.getElementById('word-input-container').innerHTML = ''; addWordRow(); addWordRow(); }
        function editDeck(e, id) { e.stopPropagation(); editingId = id; const set = wordSets.find(s => s.id === id); document.getElementById('form-title').innerText = "Edit Deck"; document.getElementById('new-deck-title').value = set.title; document.getElementById('new-deck-color').value = set.color; document.getElementById('new-deck-icon').value = set.icon; document.getElementById('word-input-container').innerHTML = ''; set.words.forEach(w => addWordRow(w.text, w.type, w.sub)); document.getElementById('create-modal').classList.remove('hidden'); document.getElementById('create-modal').classList.add('flex'); }

        // Updated Delete with Modal
        function deleteDeck(e, id) {
            e.stopPropagation();
            showDialog('delete', 'Delete Deck?', 'Are you sure you want to delete this deck? This cannot be undone.', () => {
                wordSets = wordSets.filter(s => s.id !== id);
                localStorage.setItem('e1_wordSets', JSON.stringify(wordSets));
                syncToCloud();
                renderTopics(wordSets);
            });
        }

        // Updated Save with Modal
        function saveDeck() {
            const title = document.getElementById('new-deck-title').value;
            if (!title) return showDialog('alert', 'Missing Title', 'Please give your deck a title before saving.');

            const words = [];
            document.querySelectorAll('.word-row').forEach(row => {
                const text = row.querySelector('.inp-word').value;
                if (text) words.push({ text, type: row.querySelector('.inp-type').value, sub: row.querySelector('.inp-sub').value });
            });

            if (!words.length) return showDialog('alert', 'Empty Deck', 'Please add at least one word to your deck.');

            const deck = { title, color: document.getElementById('new-deck-color').value, icon: document.getElementById('new-deck-icon').value, words, description: `${words.length} items` };
            if (editingId) { wordSets[wordSets.findIndex(s => s.id === editingId)] = { id: editingId, ...deck }; }
            else { wordSets.push({ id: Date.now(), ...deck }); }

            localStorage.setItem('e1_wordSets', JSON.stringify(wordSets));
            syncToCloud();
            renderTopics(wordSets);
            closeModal('create-modal');
        }

        function addWordRow(t = '', ty = 'Noun', s = '') { const div = document.createElement('div'); div.className = "grid grid-cols-12 gap-3 word-row animate-card"; div.innerHTML = `<div class="col-span-5"><input value="${t}" class="inp-word input-neo w-full border-2 border-kk-dark rounded-xl px-3 py-2 font-bold text-lg outline-none"></div><div class="col-span-3"><select class="inp-type input-neo w-full border-2 border-kk-dark rounded-xl px-3 py-2 font-bold bg-white outline-none"><option value="Noun" ${ty === 'Noun' ? 'selected' : ''}>Noun</option><option value="Verb" ${ty === 'Verb' ? 'selected' : ''}>Verb</option><option value="Adj" ${ty === 'Adj' ? 'selected' : ''}>Adj</option><option value="Other" ${ty === 'Other' ? 'selected' : ''}>Other</option></select></div><div class="col-span-4 flex gap-2"><input value="${s}" class="inp-sub input-neo w-full border-2 border-kk-dark rounded-xl px-3 py-2 font-bold outline-none text-slate-500"><button onclick="this.closest('.word-row').remove()" class="text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-6 h-6"></i></button></div>`; document.getElementById('word-input-container').appendChild(div); lucide.createIcons(); }
        function processQuickInput() { const raw = document.getElementById('quick-input-text').value; document.getElementById('word-input-container').innerHTML = ''; raw.split(/[\n,]+/).map(s => s.trim()).filter(s => s).forEach(w => addWordRow(w)); document.getElementById('quick-input-text').value = ''; }
        function filterTopics() { const q = document.getElementById('topic-search').value.toLowerCase(); renderTopics(wordSets.filter(s => s.title.toLowerCase().includes(q))); }

        initApp();
    </script>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[400] flex flex-col gap-3 pointer-events-none"></div>

    <!-- Custom Confirm Modal -->
    <div id="confirmModal" class="hidden fixed inset-0 bg-brand-dark/60 backdrop-blur-md z-[500] items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-800 w-full max-w-sm rounded-[2rem] border-4 border-brand-dark dark:border-slate-500 shadow-neo animate-pop-in overflow-hidden">
            <div class="p-6 text-center">
                <div class="w-16 h-16 rounded-2xl bg-brand-pink/10 flex items-center justify-center border-[3px] border-brand-dark mx-auto mb-4">
                    <i data-lucide="alert-triangle" class="w-8 h-8 text-brand-pink"></i>
                </div>
                <h3 id="confirmTitle" class="text-xl font-heading font-bold text-brand-dark dark:text-white mb-2">Are you sure?</h3>
                <p id="confirmMessage" class="text-sm text-slate-500 dark:text-slate-400 mb-6">This action cannot be undone.</p>
                <div class="flex gap-3">
                    <button id="confirmBtnYes" class="flex-1 btn-chunky bg-brand-pink text-white py-3 rounded-2xl font-bold">
                        Yes, Delete
                    </button>
                    <button id="confirmBtnNo" class="flex-1 btn-chunky bg-white dark:bg-slate-700 dark:text-white py-3 rounded-2xl font-bold">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../../js/modal-toast.js"></script>
</body>

</html>
