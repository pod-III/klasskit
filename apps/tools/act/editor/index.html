<!doctype html>
<html lang="en">
    <head>
    <!-- Supabase Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4"></script>
    <script src="/supabase.js"></script>
    <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Activity Manager | KlassKit</title>
    <link rel="icon" type="image/x-icon" href="../../../../media/icon.ico" />
    <link rel="icon" type="image/webp" href="../../../../media/icon.webp" />

        <script src="https://cdn.tailwindcss.com"></script>

        <link
            href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />

        <script src="https://unpkg.com/lucide@1.16.0"></script>
        <script src="../../../../components/input-modal.js"></script>

        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            brand: {
                                pink: "#FF6B95",
                                orange: "#FF8C42",
                                green: "#00E676",
                                blue: "#2979FF",
                                dark: "#1e293b",
                                chalk: "#f8fafc",
                                yellow: "#FACC15",
                            },
                        },
                        fontFamily: {
                            heading: ["Fredoka", "sans-serif"],
                            body: ["Nunito", "sans-serif"],
                        },
                    },
                },
            };
        </script>

        <style>
            body {
                background-color: #f8fafc;
                background-image:
                    linear-gradient(
                        rgba(30, 41, 59, 0.05) 1px,
                        transparent 1px
                    ),
                    linear-gradient(
                        90deg,
                        rgba(30, 41, 59, 0.05) 1px,
                        transparent 1px
                    );
                background-size: 24px 24px;
            }

            .neo-border {
                border: 3px solid #1e293b;
            }
            .neo-shadow {
                box-shadow: 4px 4px 0px 0px rgba(30, 41, 59, 1);
            }
            .neo-shadow-sm {
                box-shadow: 2px 2px 0px 0px rgba(30, 41, 59, 1);
            }

            .neo-btn {
                transition: all 0.1s ease;
            }
            .neo-btn:hover {
                transform: translate(-1px, -1px);
                box-shadow: 6px 6px 0px 0px rgba(30, 41, 59, 1);
            }
            .neo-btn:active {
                transform: translate(2px, 2px);
                box-shadow: 0px 0px 0px 0px rgba(30, 41, 59, 1);
            }

            input[type="text"],
            input[type="number"],
            select,
            textarea {
                border: 2px solid #1e293b !important;
                box-shadow: 2px 2px 0px 0px rgba(30, 41, 59, 1);
            }
            input[type="text"]:focus,
            input[type="number"]:focus,
            select:focus,
            textarea:focus {
                outline: none;
                box-shadow: 4px 4px 0px 0px rgba(30, 41, 59, 1);
                transform: translate(-1px, -1px);
            }

            input[type="checkbox"] {
                appearance: none;
                width: 1.5rem;
                height: 1.5rem;
                border: 2px solid #1e293b;
                border-radius: 0.375rem;
                background-color: white;
                cursor: pointer;
                position: relative;
            }
            input[type="checkbox"]:checked {
                background-color: #00e676;
            }
            input[type="checkbox"]:checked::after {
                content: "✓";
                position: absolute;
                color: #1e293b;
                font-weight: 900;
                font-size: 1.1rem;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }

            .custom-scrollbar::-webkit-scrollbar {
                width: 10px;
            }
            .custom-scrollbar::-webkit-scrollbar-track {
                background: transparent;
            }
            .custom-scrollbar::-webkit-scrollbar-thumb {
                background: #1e293b;
                border-radius: 10px;
                border: 2px solid #f8fafc;
            }

            dialog::backdrop {
                background: rgba(30, 41, 59, 0.7);
                backdrop-filter: blur(4px);
            }
        </style>
        <link rel="stylesheet" href="../../../../css/base.css" />
    <link rel="stylesheet" href="../../../../css/components.css" />
  
</head>
    <body class="text-brand-dark font-body min-h-screen flex flex-col">
        <nav
            class="bg-brand-orange border-b-4 border-brand-dark p-4 sticky top-0 z-40 neo-shadow"
        >
            <div
                class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4"
            >
                <div
                    class="flex items-center gap-3 bg-brand-chalk border-2 border-brand-dark rounded-xl px-4 py-2 neo-shadow-sm"
                >
                    <i data-lucide="zap" class="w-6 h-6 text-brand-orange"></i>
                    <h1 class="font-heading text-xl font-bold">
                        Activity Bank Manager
                    </h1>
                </div>
                <div class="flex flex-wrap gap-3 justify-center">
                    <button
                        onclick="copyJson()"
                        class="bg-brand-blue text-white border-2 border-brand-dark rounded-xl px-4 py-2 font-heading font-bold neo-shadow-sm neo-btn flex items-center gap-2"
                    >
                        <i data-lucide="copy" class="w-4 h-4"></i> Copy JSON
                    </button>
                    <button
                        onclick="exportJson()"
                        class="bg-brand-green border-2 border-brand-dark rounded-xl px-4 py-2 font-heading font-bold neo-shadow-sm neo-btn flex items-center gap-2"
                    >
                        <i data-lucide="download" class="w-4 h-4"></i> Export
                        activities.json
                    </button>
                </div>
            </div>
        </nav>

        <main class="flex-grow p-4 md:p-8">
            <div
                class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8"
            >
                <div class="lg:col-span-4 space-y-6">
                    <button
                        onclick="resetForm()"
                        class="w-full bg-brand-yellow border-4 border-brand-dark rounded-2xl py-4 font-heading text-xl font-bold neo-shadow neo-btn flex justify-center items-center gap-3"
                    >
                        <i data-lucide="plus-circle" class="w-6 h-6"></i> Add
                        New Activity
                    </button>

                    <div
                        class="bg-brand-blue border-4 border-brand-dark rounded-2xl p-5 neo-shadow text-white"
                    >
                        <p
                            class="text-sm font-bold opacity-80 mb-3 uppercase tracking-widest"
                        >
                            Workspace Actions
                        </p>
                        <input
                            type="file"
                            id="importFile"
                            accept=".json"
                            class="hidden"
                        />
                        <button
                            onclick="
                                document.getElementById('importFile').click()
                            "
                            class="w-full bg-brand-chalk text-brand-dark border-2 border-brand-dark rounded-xl py-3 font-heading font-bold neo-shadow-sm neo-btn flex justify-center items-center gap-2"
                        >
                            <i data-lucide="file-up" class="w-5 h-5"></i> Import
                            JSON
                        </button>
                    </div>

                    <button
                        onclick="
                            document.getElementById('pasteModal').showModal()
                        "
                        class="w-full mt-3 bg-brand-pink text-brand-dark border-2 border-brand-dark rounded-xl py-3 font-heading font-bold neo-shadow-sm neo-btn flex justify-center items-center gap-2"
                    >
                        <i data-lucide="clipboard-paste" class="w-5 h-5"></i>
                        Paste JSON
                    </button>

                    <button
                        onclick="reindexIds()"
                        class="w-full mt-3 bg-brand-yellow text-brand-dark border-2 border-brand-dark rounded-xl py-3 font-heading font-bold neo-shadow-sm neo-btn flex justify-center items-center gap-2"
                    >
                        <i data-lucide="list-ordered" class="w-5 h-5"></i>
                        Re-index IDs
                    </button>

                    <div
                        class="bg-white border-4 border-brand-dark rounded-2xl neo-shadow flex flex-col h-[550px]"
                    >
                        <div
                            class="p-4 border-b-4 border-brand-dark bg-brand-chalk font-heading font-bold flex justify-between items-center"
                        >
                            <span>Stored Activities</span>
                            <span
                                id="activityCount"
                                class="bg-brand-dark text-white px-2 py-1 rounded-lg text-xs"
                                >0</span
                            >
                        </div>
                        <div
                            id="activityList"
                            class="flex-grow overflow-y-auto p-4 space-y-3 custom-scrollbar"
                        ></div>
                    </div>
                </div>

                <div class="lg:col-span-8">
                    <div
                        class="bg-white border-4 border-brand-dark rounded-2xl neo-shadow overflow-hidden"
                    >
                        <div
                            id="formHeader"
                            class="bg-brand-pink border-b-4 border-brand-dark p-6 flex justify-between items-center transition-colors"
                        >
                            <h2
                                id="formTitle"
                                class="font-heading text-2xl font-bold flex items-center gap-3 text-brand-dark"
                            >
                                <i data-lucide="pen-tool"></i> Adding New

                            </h2>
                            <span
                                id="idBadge"
                                class="text-xs font-black bg-brand-dark/10 text-brand-dark px-3 py-1 rounded-lg border-2 border-brand-dark"
                                >NEW</span
                            >
                        </div>

                        <form
                            id="activityForm"
                            class="p-6 md:p-8 space-y-8"
                            onsubmit="saveActivity(event)"
                        >
                            <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                                <div class="space-y-2 md:col-span-2">
                                    <label class="font-bold text-sm uppercase"
                                        >JSON ID</label
                                    >
                                    <input
                                        type="number"

                                    />
                                </div>
                                <div class="space-y-2 md:col-span-6">
                                    <label class="font-bold text-sm uppercase"
                                        >Activity Title</label
                                    >
                                    <input
                                        type="text"
                                        id="title"
                                        required
                                        placeholder="e.g. Back-to-Back Drawing"
                                        class="w-full px-4 py-3 rounded-xl font-bold"
                                    />
                                </div>
                                <div class="space-y-2 md:col-span-4">
                                    <label class="font-bold text-sm uppercase"
                                        >Icon</label

                                    <div class="flex gap-2">
                                        <input

                                        <button

                                        >

                                    </div>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div class="space-y-2">
                                    <label class="font-bold text-sm uppercase"
                                        >Energy Type</label

                                    <select
                                        id="type"
                                        class="w-full px-4 py-3 rounded-xl font-bold appearance-none bg-white"
                                    >

                                            Stirrer (High Energy)
                                        </option>
                                        <option value="Settler">
                                            Settler (Focus)
                                        </option>
                                    </select>
                                </div>
                                <div class="space-y-2">
                                    <label class="font-bold text-sm uppercase"
                                        >Difficulty</label
                                    >
                                    <select
                                        id="difficulty"
                                        class="w-full px-4 py-3 rounded-xl font-bold appearance-none bg-white"
                                    >
                                        <option value="Easy">Easy</option>
                                        <option value="Medium">Medium</option>
                                        <option value="Hard">Hard</option>
                                    </select>
                                </div>
                                <div class="space-y-2">

                            </div>

                            <div

                            >
                                <div class="space-y-2">
                                    <label class="font-bold text-sm uppercase"

                                    >
                                    <select
                                        id="grouping"

                                    >

                                        <option value="Teams">Teams</option>
                                        <option value="Small Groups">
                                            Small Groups
                                        </option>
                                        <option value="Pairs">Pairs</option>
                                        <option value="Individual">
                                            Individual
                                        </option>
                                        <option value="Individual / Pairs">
                                            Individual / Pairs
                                        </option>
                                    </select>
                                </div>
                                <div class="space-y-2">
                                    <label class="font-bold text-sm uppercase"
                                        >Prep Time</label
                                    >
                                    <input
                                        type="text"
                                        id="prep_time"
                                        required
                                        placeholder="e.g. Zero Prep, 5 mins"
                                        class="w-full px-4 py-3 rounded-xl font-bold"
                                    />
                                </div>
                                <div class="space-y-2">
                                    <label class="font-bold text-sm uppercase"
                                        >Target Ages</label
                                    >
                                    <div
                                        class="flex gap-4 pt-2"
                                        id="targetAgesContainer"
                                    >
                                        <label
                                            class="flex items-center gap-2 cursor-pointer font-bold select-none"
                                        >
                                            <input
                                                type="checkbox"
                                                value="3-6"
                                            />
                                            3-6
                                        </label>
                                        <label
                                            class="flex items-center gap-2 cursor-pointer font-bold select-none"
                                        >
                                            <input
                                                type="checkbox"
                                                value="7-12"
                                            />
                                            7-12
                                        </label>
                                        <label
                                            class="flex items-center gap-2 cursor-pointer font-bold select-none"
                                        >
                                            <input
                                                type="checkbox"
                                                value="13-18"
                                            />
                                            13-18
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <div class="space-y-2">
                                <label class="font-bold text-sm uppercase"

                                <textarea
                                    id="desc"
                                    required
                                    rows="2"
                                    class="w-full px-4 py-3 rounded-xl font-bold resize-none"

                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="space-y-2">

                                        id="skills"

                                <div class="space-y-2">

                                    <input
                                        type="text"

                                        placeholder="e.g. Whiteboard, Ball, Timer"

                                        Step-by-Step Guide

        <dialog
            id="iconModal"
            class="p-0 rounded-2xl border-4 border-brand-dark neo-shadow m-auto w-[90%] max-w-2xl bg-white"
        >
            <div class="flex flex-col h-full max-h-[80vh]">
                <div
                    class="p-4 border-b-4 border-brand-dark bg-brand-chalk flex justify-between items-center shrink-0"
                >
                    <h3 class="font-heading text-xl font-bold">
                        Select an Icon
                    </h3>
                    <button
                        onclick="document.getElementById('iconModal').close()"
                        class="p-2 border-2 border-brand-dark rounded-lg hover:bg-brand-pink hover:text-white transition-colors"
                    >
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <div class="p-6 overflow-y-auto custom-scrollbar">
                    <div
                        id="iconGrid"
                        class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-4"
                    ></div>
                </div>
            </div>
        </dialog>

        <dialog
            id="pasteModal"
            class="p-0 rounded-2xl border-4 border-brand-dark neo-shadow m-auto w-[90%] max-w-2xl bg-white"
        >
            <div class="flex flex-col h-full max-h-[80vh]">
                <div
                    class="p-4 border-b-4 border-brand-dark bg-brand-chalk flex justify-between items-center shrink-0"
                >
                    <h3
                        class="font-heading text-xl font-bold flex items-center gap-2"
                    >
                        <i data-lucide="clipboard-paste"></i> Paste JSON Data
                    </h3>
                    <button
                        onclick="document.getElementById('pasteModal').close()"
                        class="p-2 border-2 border-brand-dark rounded-lg hover:bg-brand-pink hover:text-white transition-colors"
                    >
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <div
                    class="p-6 overflow-y-auto custom-scrollbar flex flex-col gap-4"
                >
                    <p class="font-bold text-sm text-slate-600">
                        Paste a single activity object or an array of activities
                        here. New IDs will be assigned automatically.
                    </p>
                    <textarea
                        id="pasteArea"
                        rows="10"
                        class="w-full px-4 py-3 rounded-xl font-bold resize-y font-mono text-sm bg-brand-chalk border-2 border-brand-dark neo-shadow-sm focus:outline-none focus:ring-0"
                        placeholder='[{ "title": "New Activity", "type": "Stirrer"... }]'
                    ></textarea>
                    <button
                        onclick="processPastedJson()"
                        class="w-full bg-brand-green border-4 border-brand-dark rounded-xl py-4 font-heading text-xl font-bold neo-shadow neo-btn mt-2"
                    >
                        Add to Workspace
                    </button>
                </div>
            </div>
        </dialog>

        <div
            id="toast"
            class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 transform translate-y-32 opacity-0 transition-all duration-300"
        >
            <div
                class="bg-brand-dark text-white neo-border rounded-2xl px-8 py-4 neo-shadow font-bold text-lg flex items-center gap-4"
            >
                <i data-lucide="check-circle" class="text-brand-green"></i>
                <span id="toastMsg">Activity Saved!</span>
            </div>
        </div>

        <script>
            let activities = [];
            let originalEditingId = null; // Tracks the ID we started editing, in case user changes it

            const commonIcons = [
                "activity",
                "anchor",
                "arrow-left-right",
                "book",
                "book-open",
                "bus",
                "check",
                "clock",
                "edit",
                "eye",
                "eye-off",
                "flag",
                "flame",
                "headphones",
                "help-circle",
                "image",
                "lightbulb",
                "message-square",
                "mic",
                "music",
                "pen-tool",
                "play",
                "scissors",
                "smile",
                "star",
                "users",
                "video",
                "zap",
                "hash",
                "list",
            ];

            lucide.createIcons();
            let syncTimeout;

            async function saveToCloud() {
                if (syncTimeout) clearTimeout(syncTimeout);
                syncTimeout = setTimeout(async () => {
                    try {
                        await saveProgress('act_custom_workspace', { activities, updatedAt: Date.now() });
                        console.log("Cloud sync complete");
                    } catch (e) {
                        console.error("Cloud sync failed", e);
                    }
                }, 2000);
            }

            async function loadFromCloud() {
                try {
                    const data = await loadProgress('act_custom_workspace');
                    if (data && data.activities) {
                        activities = data.activities;
                        updateActivityList();
                        setNextAvailableId();
                    }
                } catch (e) {
                    console.error("Cloud load failed", e);
                }
            }

            // --- FILE & DATA HANDLING ---
            document
                .getElementById("importFile")
                .addEventListener("change", function (e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            activities = JSON.parse(event.target.result);
                            updateActivityList();
                            setNextAvailableId();
                            showToast("Data Imported Successfully!");
                        } catch (err) {
                            showToast("Error: Invalid JSON format!", true);
                        }
                    };
                    reader.readAsText(file);
                });

            function exportJson() {
                if (activities.length === 0)
                    return showToast("Nothing to export!", true);
                const blob = new Blob([JSON.stringify(activities, null, 2)], {
                    type: "application/json",
                });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "activities.json";
                a.click();
                URL.revokeObjectURL(url);
                showToast("Exporting File...");
            }

            async function copyJson() {
                if (activities.length === 0)
                    return showToast("Nothing to copy!", true);
                const jsonString = JSON.stringify(activities, null, 2);
                try {
                    await navigator.clipboard.writeText(jsonString);
                    showToast("JSON Copied to Clipboard!");
                } catch (err) {
                    const textarea = document.createElement("textarea");
                    textarea.value = jsonString;
                    textarea.style.position = "fixed";
                    textarea.style.left = "-9999px";
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand("copy");
                    document.body.removeChild(textarea);
                    showToast("JSON Copied to Clipboard!");
                }
            }

            function processPastedJson() {
                const raw = document.getElementById("pasteArea").value.trim();
                if (!raw)
                    return showToast("Please paste some JSON first!", true);

                try {
                    let parsed = JSON.parse(raw);

                    // If they pasted a single object, wrap it in an array
                    if (!Array.isArray(parsed)) {
                        parsed = [parsed];
                    }

                    let addedCount = 0;
                    // Find the current highest ID to prevent collisions
                    let maxId =
                        activities.length > 0
                            ? Math.max(...activities.map((a) => a.id))
                            : 0;

                    parsed.forEach((act) => {
                        if (typeof act === "object" && act !== null) {
                            maxId++;
                            act.id = maxId; // Assign a fresh ID
                            activities.push(act);
                            addedCount++;
                        }
                    });

                    if (addedCount > 0) {
                        updateActivityList();
                        setNextAvailableId();
                        saveToCloud();

                        // Clean up and close
                        document.getElementById("pasteArea").value = "";
                        document.getElementById("pasteModal").close();

                        // Re-render icons since we added new elements to the DOM
                        lucide.createIcons();

                        showToast(
                            `Successfully added ${addedCount} activities!`,
                        );
                    } else {
                        showToast("No valid activity objects found.", true);
                    }
                } catch (err) {
                    showToast("Invalid JSON format!", true);
                }
            }

            // --- LIST MANAGEMENT ---
            function updateActivityList() {
                const list = document.getElementById("activityList");
                document.getElementById("activityCount").innerText =
                    activities.length;

                if (activities.length === 0) {
                    list.innerHTML = `<div class="text-center py-20 text-slate-400 font-bold italic">No activities found.</div>`;
                    return;
                }

                list.innerHTML = activities
                    .sort((a, b) => a.id - b.id)
                    .map(
                        (act) => `
                    <div class="bg-white border-2 border-brand-dark rounded-xl p-3 neo-shadow-sm flex justify-between items-center group ${originalEditingId === act.id ? "ring-4 ring-brand-blue/30 border-brand-blue bg-brand-blue/5" : ""}">
                        <div class="truncate pr-4 flex items-center gap-3">
                            <span class="bg-brand-dark text-white text-xs font-bold px-2 py-1 rounded border border-brand-dark">#${act.id}</span>
                            <div>
                                <p class="font-bold text-sm truncate">${act.title}</p>
                                <p class="text-[10px] font-black uppercase text-brand-blue">${act.type}</p>
                            </div>
                        </div>
                        <div class="flex gap-2 shrink-0">
                            <button type="button" onclick="editActivity(${act.id})" class="p-2 border-2 border-brand-dark rounded-lg hover:bg-brand-blue hover:text-white transition-colors">
                                <i data-lucide="edit-3" class="w-4 h-4"></i>
                            </button>
                            <button type="button" onclick="deleteActivity(${act.id})" class="p-2 border-2 border-brand-dark rounded-lg hover:bg-brand-pink hover:text-white transition-colors">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                `,
                    )
                    .join("");
                lucide.createIcons();
            }

            // --- FORM LOGIC ---
            function setNextAvailableId() {
                if (originalEditingId !== null) return;
                let maxId = 0;
                activities.forEach((a) => {
                    if (a.id > maxId) maxId = a.id;
                });
                document.getElementById("activityId").value = maxId + 1;
            }

            function addStep(val = "") {
                const container = document.getElementById("stepsContainer");
                const stepDiv = document.createElement("div");
                stepDiv.className = "flex gap-2 group items-center step-item";
                stepDiv.innerHTML = `
                    <div class="flex flex-col gap-1 shrink-0">
                        <button type="button" onclick="moveStep(this, -1)" class="p-1 hover:bg-brand-chalk rounded text-slate-400 hover:text-brand-dark transition-colors"><i data-lucide="chevron-up" class="w-4 h-4"></i></button>
                        <button type="button" onclick="moveStep(this, 1)" class="p-1 hover:bg-brand-chalk rounded text-slate-400 hover:text-brand-dark transition-colors"><i data-lucide="chevron-down" class="w-4 h-4"></i></button>
                    </div>
                    <div class="step-num flex-shrink-0 w-8 h-8 bg-brand-dark text-white rounded-lg flex items-center justify-center font-bold neo-shadow-sm border-2 border-brand-dark">
                        ${container.children.length + 1}
                    </div>
                    <input type="text" required value="${val.replace(/"/g, "&quot;")}" class="flex-grow px-4 py-2 rounded-xl font-bold text-sm" placeholder="Actionable step description...">
                    <button type="button" onclick="this.parentElement.remove(); reorderSteps();" class="shrink-0 p-2 text-brand-pink hover:bg-brand-pink/10 rounded-lg transition-colors border-2 border-transparent hover:border-brand-pink">
                        <i data-lucide="x-circle" class="w-5 h-5"></i>
                    </button>
                `;
                container.appendChild(stepDiv);
                lucide.createIcons();
                reorderSteps();
            }

            function moveStep(btn, direction) {
                const stepDiv = btn.closest(".step-item");
                const container = document.getElementById("stepsContainer");
                if (direction === -1 && stepDiv.previousElementSibling) {
                    container.insertBefore(
                        stepDiv,
                        stepDiv.previousElementSibling,
                    );
                } else if (direction === 1 && stepDiv.nextElementSibling) {
                    container.insertBefore(stepDiv.nextElementSibling, stepDiv);
                }
                reorderSteps();
            }

            function reorderSteps() {
                const steps = document.querySelectorAll(
                    "#stepsContainer > .step-item",
                );
                steps.forEach((s, i) => {
                    s.querySelector(".step-num").innerText = i + 1;
                    // Disable up button on first, down button on last
                    const btns = s.querySelectorAll("button");
                    btns[0].style.opacity = i === 0 ? "0.2" : "1";
                    btns[1].style.opacity =
                        i === steps.length - 1 ? "0.2" : "1";
                });
            }

            function saveActivity(e) {
                e.preventDefault();

                const inputId = parseInt(
                    document.getElementById("activityId").value,
                );
                if (isNaN(inputId))
                    return showToast("ID must be a number!", true);

                // ID Duplication check
                const isDuplicate = activities.some(
                    (a) => a.id === inputId && a.id !== originalEditingId,
                );
                if (isDuplicate)
                    return showToast(`ID #${inputId} is already in use!`, true);

                const stepInputs = document.querySelectorAll(
                    '#stepsContainer input[type="text"]',
                );
                const steps = Array.from(stepInputs)
                    .map((i) => i.value.trim())
                    .filter((val) => val !== "");
                if (steps.length === 0)
                    return showToast("Add at least one step!", true);

                const checkedAges = Array.from(
                    document.querySelectorAll(
                        "#targetAgesContainer input:checked",
                    ),
                ).map((cb) => cb.value);
                if (checkedAges.length === 0)
                    return showToast(
                        "Select at least one Target Age group!",
                        true,
                    );

                const data = {
                    id: inputId,
                    title: document.getElementById("title").value.trim(),
                    type: document.getElementById("type").value,
                    difficulty: document.getElementById("difficulty").value,
                    time: document.getElementById("time").value.trim(),
                    target_ages: checkedAges,
                    grouping: document.getElementById("grouping").value,
                    prep_time: document
                        .getElementById("prep_time")
                        .value.trim(),
                    materials: document
                        .getElementById("materials")
                        .value.split(",")
                        .map((m) => m.trim())
                        .filter((m) => m),
                    desc: document.getElementById("desc").value.trim(),
                    skills: document
                        .getElementById("skills")
                        .value.split(",")
                        .map((s) => s.trim())
                        .filter((s) => s),
                    icon:
                        document.getElementById("icon").value.trim() ||
                        "activity",
                    steps: steps,
                    variation: document
                        .getElementById("variation")
                        .value.trim(),
                };

                if (originalEditingId !== null) {
                    const idx = activities.findIndex(
                        (a) => a.id === originalEditingId,
                    );
                    if (idx > -1) activities[idx] = data;
                    showToast(`Activity #${inputId} Updated!`);
                } else {
                    activities.push(data);
                    showToast(`Activity #${inputId} Added!`);
                }

                resetForm();
                updateActivityList();
                saveToCloud();
            }

            function editActivity(id) {
                const act = activities.find((a) => a.id === id);
                if (!act) return;

                originalEditingId = id;
                document.getElementById("formTitle").innerHTML =
                    `<i data-lucide="edit"></i> Editing Activity`;
                document
                    .getElementById("formHeader")
                    .classList.replace("bg-brand-pink", "bg-brand-blue");
                document
                    .getElementById("formHeader")
                    .classList.replace("text-brand-dark", "text-white");

                document.getElementById("idBadge").innerText = "EDITING";
                document.getElementById("idBadge").className =
                    "text-xs font-black bg-white text-brand-blue px-3 py-1 rounded-lg border-2 border-white";

                document.getElementById("activityId").value = act.id;
                document.getElementById("title").value = act.title || "";
                document.getElementById("icon").value = act.icon || "";
                document.getElementById("type").value = act.type || "Stirrer";
                document.getElementById("difficulty").value =
                    act.difficulty || "Medium";
                document.getElementById("time").value = act.time || "";
                document.getElementById("desc").value = act.desc || "";
                document.getElementById("variation").value =
                    act.variation || "";
                document.getElementById("grouping").value =
                    act.grouping || "Whole Class";
                document.getElementById("prep_time").value =
                    act.prep_time || "";
                document.getElementById("skills").value = (
                    act.skills || []
                ).join(", ");
                document.getElementById("materials").value = (
                    act.materials || []
                ).join(", ");

                const ageCheckboxes = document.querySelectorAll(
                    "#targetAgesContainer input",
                );
                ageCheckboxes.forEach((cb) => {
                    cb.checked = act.target_ages
                        ? act.target_ages.includes(cb.value)
                        : false;
                });

                const container = document.getElementById("stepsContainer");
                container.innerHTML = "";
                (act.steps || []).forEach((s) => addStep(s));

                window.scrollTo({ top: 0, behavior: "smooth" });
                updateActivityList();
                lucide.createIcons();
            }

            async function deleteActivity(id) {
                const confirmed = await showConfirmModal("Remove this activity forever?", {
                    title: "Delete Activity?",
                    confirmText: "Remove",
                    cancelText: "Keep",
                    icon: "trash-2",
                    iconColor: "red"
                });
                if (!confirmed) return;
                activities = activities.filter((a) => a.id !== id);
                if (originalEditingId === id) resetForm();
                updateActivityList();
                saveToCloud();
                showToast(`Activity #${id} Deleted.`, true);
            }

            function reindexIds() {
                if (activities.length === 0)
                    return showToast("No activities to re-index!", true);

                // Sort activities by their current ID first to maintain logical order
                activities.sort((a, b) => a.id - b.id);

                let wasEditing = originalEditingId !== null;
                let newEditingId = null;

                // Loop through and reassign IDs starting from 1
                activities.forEach((act, index) => {
                    const newId = index + 1;

                    // If we are currently editing an activity, update its ID tracker
                    if (wasEditing && act.id === originalEditingId) {
                        newEditingId = newId;
                    }

                    act.id = newId;
                });

                // Update the form if the user was in the middle of editing
                if (wasEditing) {
                    originalEditingId = newEditingId;
                    document.getElementById("activityId").value = newEditingId;
                } else {
                    setNextAvailableId();
                }

                updateActivityList();
                saveToCloud();
                showToast("All IDs successfully re-indexed!");
            }

            function resetForm() {
                originalEditingId = null;
                document.getElementById("activityForm").reset();

                document.getElementById("stepsContainer").innerHTML = "";
                document.getElementById("formTitle").innerHTML =
                    `<i data-lucide="pen-tool"></i> Adding New Activity`;

                const header = document.getElementById("formHeader");
                header.classList.remove("bg-brand-blue", "text-white");
                header.classList.add("bg-brand-pink", "text-brand-dark");

                const badge = document.getElementById("idBadge");
                badge.innerText = "NEW";
                badge.className =
                    "text-xs font-black bg-brand-dark/10 text-brand-dark px-3 py-1 rounded-lg border-2 border-brand-dark";

                setNextAvailableId();
                addStep();
                updateActivityList();
                lucide.createIcons();
            }

            // --- ICON PICKER LOGIC ---
            function openIconPicker() {
                const grid = document.getElementById("iconGrid");
                grid.innerHTML = commonIcons
                    .map(
                        (iconName) => `
                    <button type="button" onclick="selectIcon('${iconName}')" class="flex flex-col items-center justify-center p-4 gap-2 border-2 border-transparent hover:border-brand-dark hover:bg-brand-chalk rounded-xl transition-colors group">
                        <i data-lucide="${iconName}" class="w-8 h-8 text-brand-dark group-hover:text-brand-pink transition-colors"></i>
                        <span class="text-[10px] font-bold text-slate-500 truncate w-full text-center">${iconName}</span>
                    </button>
                `,
                    )
                    .join("");

                document.getElementById("iconModal").showModal();
                lucide.createIcons();
            }

            function selectIcon(iconName) {
                document.getElementById("icon").value = iconName;
                document.getElementById("iconModal").close();
            }

            // --- TOAST UI ---
            function showToast(msg, isError = false) {
                const toast = document.getElementById("toast");
                document.getElementById("toastMsg").innerText = msg;

                const icon = toast.querySelector("i");
                if (isError) {
                    icon.classList.replace(
                        "text-brand-green",
                        "text-brand-pink",
                    );
                    icon.setAttribute("data-lucide", "alert-triangle");
                } else {
                    icon.classList.replace(
                        "text-brand-pink",
                        "text-brand-green",
                    );
                    icon.setAttribute("data-lucide", "check-circle");
                }
                lucide.createIcons();

                toast.classList.remove("translate-y-32", "opacity-0");
                setTimeout(() => {
                    toast.classList.add("translate-y-32", "opacity-0");
                }, 3000);
            }

            window.onload = async () => {
                await requireAuth();
                await loadFromCloud();
                setNextAvailableId();
                if (activities.length === 0) addStep();
                updateActivityList();
            };
        </script>
    </body>
</html>
