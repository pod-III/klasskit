<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Supabase Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <script src="/supabase.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedy Slides</title>
    <link rel="icon" type="image/x-icon" href="../../../../media/icon.ico" />
    <link rel="icon" type="image/webp" href="../../../../media/icon.webp" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/lucide@1.16.0"></script>
    <script src="../../../../components/input-modal.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        pink: '#ff4785',
                        orange: '#ff7e33',
                        green: '#00d063',
                        blue: '#1ea7fd',
                        dark: '#0f172a',
                        chalk: '#f8fafc',
                        oled: '#020617'
                    },
                    fontFamily: {
                        fredoka: ['Fredoka', 'sans-serif'],
                        nunito: ['Nunito', 'sans-serif'],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px 0px #0f172a',
                        'hard-white': '4px 4px 0px 0px rgba(255, 255, 255, 0.2)',
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="../../../../css/base.css" />
    <link rel="stylesheet" href="../../../../css/components.css" />
  
</head>

<body class="bg-grid min-h-screen flex flex-col items-center justify-center text-dark dark:text-chalk p-4 overflow-hidden">

    <div class="max-w-[1400px] w-full flex flex-col lg:flex-row gap-6 items-stretch app-container animate-pop-in">
        
        <!-- Left Section: Input & Strip -->
        <div class="flex-[2.5] bg-chalk dark:bg-slate-800 border-4 border-dark dark:border-slate-600 rounded-2xl shadow-hard dark:shadow-hard-white overflow-hidden flex flex-col">
            
            <div class="bg-pink border-b-4 border-dark dark:border-slate-600 p-3 flex items-center justify-between shrink-0">
                <div class="flex items-center gap-3 text-dark">
                    <div class="bg-white/30 p-1.5 rounded-lg border border-dark/10">
                        <i data-lucide="monitor-play" class="w-5 h-5"></i>
                    </div>
                    <h1 class="text-lg font-bold font-title tracking-wide uppercase">Speedy Slides</h1>
                </div>
                <div class="flex items-center gap-3">
                    <div class="bg-white/40 dark:bg-slate-900/40 border-2 border-dark/10 dark:border-slate-600/40 px-2.5 py-1 rounded-lg">
                        <span id="item-count" class="font-black text-dark dark:text-chalk text-[9px] uppercase">0 items</span>
                    </div>
                    <button onclick="app.toggleDarkMode()"
                        class="p-2 bg-chalk dark:bg-slate-900 border-2 border-dark dark:border-slate-600 rounded-lg shadow-hard dark:shadow-hard-white hover:scale-105 active:scale-95 transition-all text-dark dark:text-chalk">
                        <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
                        <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
                    </button>
                </div>
            </div>

            <div class="p-4 flex flex-col flex-1 overflow-hidden gap-4">
                <!-- Input Form -->
                <div class="flex-1 flex flex-col min-h-0">
                    <label class="block font-title font-bold mb-1 text-sm flex items-center gap-2">
                        <i data-lucide="type" class="w-4 h-4 text-pink"></i>
                        Content Input (Slides)
                    </label>
                    
                    <textarea id="word-input"
                        class="w-full flex-1 p-4 bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-600 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue/50 text-base font-medium resize-none text-dark dark:text-chalk placeholder-dark/30 dark:placeholder-chalk/30 shadow-[inset_0px_4px_0px_0px_rgba(0,0,0,0.05)]"
                        placeholder="Type each slide on a new line..."></textarea>
                </div>

                <!-- Bottom Section: Controls & Strip -->
                <div class="shrink-0 flex flex-col gap-3">
                    <div class="flex items-center justify-between gap-4">
                        <div id="image-upload-area" class="flex-1 p-2.5 border-4 border-dashed border-dark/20 dark:border-slate-600 rounded-xl flex items-center justify-between bg-white dark:bg-slate-900 transition-colors gap-2">
                            <div class="flex items-center gap-2">
                                <div class="bg-blue/10 p-1.5 rounded-lg border border-blue/20">
                                    <i data-lucide="image" class="w-4 h-4 text-blue"></i>
                                </div>
                                <span id="image-count-text" class="font-bold text-dark/70 dark:text-chalk/70 font-title text-xs transition-colors">0 images</span>
                            </div>
                            <div class="flex gap-2">
                                <input type="file" id="image-input" class="hidden" multiple accept="image/*" onchange="app.handleImages(event)">
                                <button onclick="app.openImageManager()" class="btn-chunky bg-blue/10 text-blue font-title font-bold py-1.5 px-3 border-2 border-blue/50 rounded-lg shadow-hard dark:shadow-hard-white text-[10px] hidden" id="manage-images-btn">
                                    Manage
                                </button>
                                <button onclick="document.getElementById('image-input').click()" class="btn-chunky bg-chalk dark:bg-slate-800 text-dark dark:text-chalk font-title font-bold py-1.5 px-3 border-2 border-dark dark:border-slate-600 rounded-lg shadow-hard dark:shadow-hard-white text-[10px] flex items-center gap-1">
                                    <i data-lucide="plus" class="w-3 h-3"></i> Add Images
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col gap-1">
                        <div class="flex justify-between items-center px-1">
                            <label class="text-[9px] font-black uppercase tracking-widest text-dark/30 dark:text-chalk/30">Slide Strip Overview</label>
                            <span id="preview-count" class="text-[9px] font-black text-blue uppercase tracking-tighter bg-blue/5 px-2 rounded">0 Slides</span>
                        </div>
                        <div id="slide-strip" class="flex gap-4 overflow-x-auto py-3 px-3 custom-scrollbar min-h-[105px] items-center bg-dark/[0.03] dark:bg-white/[0.03] rounded-2xl border-2 border-dark/5 dark:border-white/5 shadow-inner">
                            <div class="text-[10px] italic opacity-20 px-2 font-bold font-title uppercase tracking-widest">Workspace is empty</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Section: Sidebar -->
        <div class="flex-1 flex flex-col gap-4 min-w-[300px]">
            <!-- Sets Saver Card -->
            <div class="flex-1 bg-chalk dark:bg-slate-800 border-4 border-dark dark:border-slate-600 rounded-2xl shadow-hard dark:shadow-hard-white flex flex-col overflow-hidden">
                <div class="bg-orange border-b-4 border-dark dark:border-slate-600 p-3 shrink-0 flex items-center justify-between">
                    <h2 class="text-base font-bold font-title flex items-center gap-2 text-dark uppercase tracking-tight">
                        <i data-lucide="library" class="w-4 h-4 text-dark"></i> Saved Slides
                    </h2>
                    <div class="flex items-center gap-2">
                        <label class="text-[8px] font-black text-dark/40 uppercase tracking-tighter">Sort By:</label>
                        <select id="sets-sort" onchange="app.renderSets()" class="bg-white/20 border border-dark/20 rounded-md text-[9px] font-bold py-1 px-1.5 outline-none text-dark cursor-pointer">
                            <option value="recent">RECENT</option>
                            <option value="alpha">A-Z</option>
                            <option value="used">POPULAR</option>
                        </select>
                    </div>
                </div>
                <div class="p-3.5 flex-1 flex flex-col overflow-hidden">
                    <div id="active-set-indicator" class="hidden mb-2 p-2 bg-orange/10 border-2 border-orange/20 rounded-lg flex items-center justify-between">
                        <div class="flex items-center gap-2 overflow-hidden">
                            <i data-lucide="pen-tool" class="w-3 h-3 text-orange shrink-0"></i>
                            <span id="active-set-name" class="text-[10px] font-bold text-orange uppercase truncate">Editing: Slide Name</span>
                        </div>
                        <span class="text-[8px] font-bold text-orange/60 bg-orange/5 px-1 rounded">AUTO-SAVING</span>
                    </div>

                    <div class="flex flex-col gap-2 mb-4 shrink-0">
                        <div class="relative w-full">
                            <input id="set-name-input" type="text" placeholder="Slide name..."
                                class="w-full px-3 py-2 bg-white dark:bg-slate-900 text-dark dark:text-chalk font-bold text-xs border-2 border-dark/20 dark:border-slate-600 rounded-lg focus:border-orange outline-none transition-all" />
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="app.newSet()"
                                class="btn-chunky bg-chalk dark:bg-slate-700 text-dark dark:text-chalk font-title font-bold py-2 px-3 border-2 border-dark dark:border-slate-600 rounded-xl shadow-hard dark:shadow-hard-white text-[10px] flex items-center justify-center gap-1.5">
                                <i data-lucide="plus-circle" class="w-3.5 h-3.5"></i> NEW SLIDES
                            </button>
                            <button onclick="app.saveCurrentSet()"
                                class="btn-chunky bg-orange text-dark font-title font-bold py-2 px-3 border-2 border-dark dark:border-slate-600 rounded-xl shadow-hard dark:shadow-hard-white text-[10px] flex items-center justify-center gap-1.5">
                                <i data-lucide="save" class="w-3.5 h-3.5"></i> SAVE AS
                            </button>
                        </div>
                    </div>
                    
                    <div id="sets-list" class="flex-1 space-y-2 overflow-y-auto pr-1 custom-scrollbar">
                        <div class="flex flex-col items-center justify-center h-full text-dark/30 dark:text-chalk/30 gap-1.5 py-2">
                            <i data-lucide="folder-search" class="w-5 h-5 opacity-50"></i>
                            <p class="text-[10px] font-bold font-title italic">No sets.</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Actions Card -->
            <div class="bg-chalk dark:bg-slate-800 border-4 border-dark dark:border-slate-600 rounded-2xl shadow-hard dark:shadow-hard-white p-4 space-y-3 shrink-0">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="app.startPresentation(false)"
                        class="btn-chunky bg-green text-dark font-title font-bold text-base py-3 px-3 border-3 border-dark dark:border-slate-600 rounded-xl shadow-hard dark:shadow-hard-white flex items-center justify-center gap-2">
                        <i data-lucide="play" class="w-5 h-5 fill-dark/20"></i> START
                    </button>

                    <button onclick="app.startPresentation(true)"
                        class="btn-chunky bg-blue text-dark font-title font-bold text-base py-3 px-3 border-3 border-dark dark:border-slate-600 rounded-xl shadow-hard dark:shadow-hard-white flex items-center justify-center gap-2">
                        <i data-lucide="shuffle" class="w-5 h-5"></i> SHUFFLE
                    </button>
                </div>

                <button onclick="app.openClearModal()"
                    class="btn-chunky w-full bg-chalk dark:bg-slate-700 text-dark dark:text-chalk font-title font-bold text-xs py-2 px-4 border-2 border-dark dark:border-slate-600 rounded-xl shadow-hard dark:shadow-hard-white flex items-center justify-center gap-2 opacity-80 hover:opacity-100 transition-opacity">
                    <i data-lucide="trash-2" class="w-3.5 h-3.5 text-pink"></i> CLEAR WORKSPACE
                </button>
            </div>
        </div>
    </div>

    <div id="presentation-mode" tabindex="0">
        <div id="slide-content" class="text-center p-10 max-w-[90vw] flex flex-col items-center justify-center">
            <h1 id="display-word" class="text-chalk font-title slide-text break-words leading-tight"
                style="font-size: 10vw;">
                Word
            </h1>
            <img id="display-image" class="max-w-full max-h-[80vh] object-contain hidden slide-text rounded-2xl shadow-hard-white border-4 border-chalk transition-all duration-300" />
        </div>

        <div class="absolute bottom-8 left-0 w-full text-center pointer-events-none">
            <div
                class="inline-block bg-dark text-chalk border-4 border-dark dark:border-slate-600 px-6 py-3 rounded-2xl text-lg font-bold shadow-hard">
                <span>Slide <span id="slide-number">1</span> / <span id="total-slides">1</span></span>
                <span class="mx-3 opacity-50">|</span>
                <span><i data-lucide="arrow-left-right" class="inline w-5 h-5 mb-1"></i> Use Arrows or Click</span>
            </div>
        </div>

        <button onclick="app.stopPresentation()"
            class="btn-chunky absolute top-6 right-6 bg-pink text-dark border-4 border-dark dark:border-slate-600 rounded-xl p-3 shadow-hard z-50 pointer-events-auto">
            <i data-lucide="x" class="w-8 h-8"></i>
        </button>

        <button onclick="app.toggleImageFullscreen()" id="img-fullscreen-btn"
            class="btn-chunky absolute top-6 left-6 bg-chalk text-dark border-4 border-dark dark:border-slate-600 dark:text-chalk dark:bg-slate-800 rounded-xl p-3 shadow-hard z-50 pointer-events-auto hidden"
            title="Toggle Fullscreen Image">
            <i data-lucide="maximize" class="w-6 h-6" id="img-fullscreen-icon"></i>
        </button>
    </div>

    <div id="clear-modal" class="fixed inset-0 bg-dark/80 backdrop-blur-md z-50 hidden items-center justify-center p-4">
        <div
            class="bg-chalk dark:bg-slate-800 border-4 border-dark dark:border-slate-600 rounded-2xl shadow-hard dark:shadow-hard-white max-w-sm w-full p-6 transform scale-100 transition-all">
            <div class="flex items-center gap-3 mb-4">
                <div class="bg-pink p-3 rounded-xl border-2 border-dark dark:border-slate-600">
                    <i data-lucide="alert-triangle" class="w-6 h-6 text-dark"></i>
                </div>
                <h2 class="text-2xl font-title font-bold text-dark dark:text-chalk">Clear Text?</h2>
            </div>
            <p class="mb-8 text-dark/70 dark:text-chalk/70 font-medium">Are you sure you want to delete all entered
                content? This cannot be undone.</p>
            <div class="flex gap-4">
                <button onclick="app.closeClearModal()"
                    class="btn-chunky flex-1 bg-chalk dark:bg-slate-700 text-dark dark:text-chalk font-title font-bold py-3 px-4 border-4 border-dark dark:border-slate-600 rounded-xl shadow-hard dark:shadow-hard-white">
                    Cancel
                </button>
                <button onclick="app.confirmClear()"
                    class="btn-chunky flex-1 bg-pink text-dark font-title font-bold py-3 px-4 border-4 border-dark dark:border-slate-600 rounded-xl shadow-hard">
                    Yes, Clear
                </button>
            </div>
        </div>
    </div>

    <!-- Image Manager Modal -->
    <div id="image-manager-modal" class="fixed inset-0 bg-dark/80 backdrop-blur-md z-[60] hidden items-center justify-center p-4">
        <div class="bg-chalk dark:bg-slate-800 border-4 border-dark dark:border-slate-600 rounded-2xl shadow-hard dark:shadow-hard-white max-w-4xl w-full p-6 flex flex-col max-h-[85vh] transform scale-100 transition-all">
            <div class="flex justify-between items-center mb-6 shrink-0">
                <div class="flex items-center gap-3">
                    <div class="bg-blue/10 p-3 rounded-xl border-2 border-blue">
                        <i data-lucide="images" class="w-6 h-6 text-blue"></i>
                    </div>
                    <h2 class="text-2xl font-title font-bold text-dark dark:text-chalk">Manage Images</h2>
                </div>
                <button onclick="app.closeImageManager()" class="p-2 bg-chalk dark:bg-slate-700 text-dark dark:text-chalk rounded-lg hover:bg-dark/10 dark:hover:bg-chalk/10 transition-colors border-2 border-transparent hover:border-dark/20 dark:hover:border-chalk/20">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            
            <div id="image-manager-list" class="flex-1 overflow-y-auto grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 p-2 mb-4 bg-white dark:bg-slate-900 rounded-xl border-2 border-dark/10 dark:border-slate-700">
                <!-- Images injected here -->
            </div>
            
            <div class="pt-4 border-t-2 border-dark/10 dark:border-slate-700 shrink-0 flex justify-between items-center">
                <span class="text-sm font-bold font-title text-dark/50 dark:text-chalk/50" id="image-manager-count">0 Images</span>
                <button onclick="app.clearImages()" class="btn-chunky bg-pink/20 text-pink font-title font-bold py-2 px-6 border-2 border-pink rounded-xl shadow-hard dark:shadow-hard-white flex items-center gap-2">
                    <i data-lucide="trash-2" class="w-5 h-5"></i> CLEAR ALL
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <script src="script.js"></script>
</body>

</html>
