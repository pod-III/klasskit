    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        pink: '#FF6B95',
                        orange: '#FF8C42',
                        green: '#00E676',
                        blue: '#2979FF',
                        dark: '#1e293b',
                        surface: '#FFFFFF'
                    },
                    fontFamily: {
                        heading: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px 0px rgba(30, 41, 59, 1)',
                        'hard-sm': '2px 2px 0px 0px rgba(30, 41, 59, 1)',
                    },
                    animation: {
                        'pop': 'pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
                        'pulse-glow': 'pulse-glow 2s infinite',
                    },
                    keyframes: {
                        pop: { '0%': { transform: 'scale(0.9)', opacity: '0' }, '100%': { transform: 'scale(1)', opacity: '1' } },
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
                        },
                        'pulse-glow': {
                            '0%, 100%': { boxShadow: '0 0 0 0px rgba(255, 140, 66, 0.7)' },
                            '50%': { boxShadow: '0 0 0 10px rgba(255, 140, 66, 0)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Fallback Grid Background */
        body {
            background-color: #F8FAFC;
            background-image:
                linear-gradient(#E2E8F0 1px, transparent 1px),
                linear-gradient(90deg, #E2E8F0 1px, transparent 1px);
            background-size: 24px 24px;
            color: #1e293b;
            transition: background-color 0.3s, color 0.3s;
        }
        .dark body, html.dark body {
            background-color: #0f172a;
            background-image:
                linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
            color: #f1f5f9;
        }

        /* Chunky UI Elements */
        .panel-chunky {
            background: white;
            border: 4px solid #1e293b;
            border-radius: 1.5rem;
            box-shadow: 6px 6px 0px #1e293b;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .dark .panel-chunky {
            background: #1e293b;
            border-color: #475569;
            box-shadow: 6px 6px 0px #000;
        }

        .btn-chunky {
            border: 3px solid #1e293b;
            box-shadow: 0 4px 0 #1e293b;
            transition: all 0.1s;
        }
        .dark .btn-chunky {
            border-color: #475569;
            box-shadow: 0 4px 0 #000;
        }
        .btn-chunky:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #1e293b;
        }
        .dark .btn-chunky:active {
            box-shadow: 0 0 0 #000;
        }
        .btn-chunky:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translateY(4px);
            box-shadow: none;
        }

        /* Lined Paper for Textarea */
        .lined-paper {
            background-image: linear-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 100% 2rem;
            line-height: 2rem;
            background-attachment: local;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }
        .dark .lined-paper {
            background-image: linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
            background-color: #0f172a;
            color: #f1f5f9;
            border-color: #475569;
        }

        /* Dark mode overrides for game elements */
        .dark .bg-white { background-color: #1e293b; }
        .dark .bg-slate-100 { background-color: #0f172a; }
        .dark .bg-slate-200 { background-color: #334155; }
        .dark .text-dark { color: #f1f5f9; }
        .dark .text-slate-400 { color: #94a3b8; }
        .dark .text-slate-500 { color: #64748b; }
        .dark .border-dark { border-color: #475569; }
        .dark .border-slate-200 { border-color: #334155; }
        .dark .border-slate-300 { border-color: #475569; }
        .dark .shadow-hard { box-shadow: 4px 4px 0px 0px #000; }
        .dark .shadow-hard-sm { box-shadow: 2px 2px 0px 0px #000; }

        /* Word set items */
        .set-item { transition: all 0.2s; }
        .set-item:hover { border-color: #2979FF !important; }
    </style>

    <script>
        // --- THEME ---
        function initTheme() {
            const saved = localStorage.getItem('theme_hangman') || 'light';
            if (saved === 'dark') document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
            updateThemeIcon();
        }
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme_hangman', isDark ? 'dark' : 'light');
            updateThemeIcon();
            AudioEngine.click();
        }
        function updateThemeIcon() {
            const btn = document.getElementById('themeBtn');
            if (!btn) return;
            const isDark = document.documentElement.classList.contains('dark');
            btn.innerHTML = isDark
                ? '<i data-lucide="sun" class="w-5 h-5"></i>'
                : '<i data-lucide="moon" class="w-5 h-5"></i>';
            lucide.createIcons();
        }

        // --- IndexedDB PERSISTENCE ---
        const DB_NAME = 'HangmanDB';
        const DB_VERSION = 1;
        const STATE_STORE = 'game_state';
        const SETS_STORE = 'word_sets';

        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STATE_STORE)) db.createObjectStore(STATE_STORE);
                    if (!db.objectStoreNames.contains(SETS_STORE)) db.createObjectStore(SETS_STORE, { keyPath: 'id', autoIncrement: true });
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }
        async function dbPut(key, data) {
            try { 
                const db = await initDB(); 
                const tx = db.transaction(STATE_STORE, 'readwrite'); 
                tx.objectStore(STATE_STORE).put(data, key);
                await new Promise(r => { tx.oncomplete = r; });
                await syncToCloud();
            } catch(e) { console.error(e); }
        }
        async function dbGet(key) {
            try {
                const db = await initDB();
                return new Promise((res, rej) => { const r = db.transaction(STATE_STORE, 'readonly').objectStore(STATE_STORE).get(key); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); });
            } catch(e) { return null; }
        }

        // Word Sets CRUD
        async function saveWordSet(name, content) {
            const db = await initDB();
            const tx = db.transaction(SETS_STORE, 'readwrite');
            tx.objectStore(SETS_STORE).put({ name, content, createdAt: Date.now() });
            await new Promise(r => { tx.oncomplete = r; });
            await syncToCloud();
        }
        async function getAllWordSets() {
            try {
                const db = await initDB();
                return new Promise((res) => { const r = db.transaction(SETS_STORE, 'readonly').objectStore(SETS_STORE).getAll(); r.onsuccess = () => res(r.result || []); r.onerror = () => res([]); });
            } catch(e) { return []; }
        }
        async function deleteWordSet(id) {
            const db = await initDB();
            const tx = db.transaction(SETS_STORE, 'readwrite');
            tx.objectStore(SETS_STORE).delete(id);
            await new Promise(r => { tx.oncomplete = r; });
            await syncToCloud();
        }

        // --- CLOUD SYNC HELPERS ---
        let cloudSyncTimeout = null;
        async function syncToCloud() {
            if (cloudSyncTimeout) clearTimeout(cloudSyncTimeout);
            cloudSyncTimeout = setTimeout(async () => {
                const words = await dbGet('words');
                const word_sets = await getAllWordSets();
                await saveProgress('hangman', { words, word_sets });
            }, 1000);
        }

        async function renderWordSets() {
            const list = document.getElementById('sets-list');
            if (!list) return;
            const sets = await getAllWordSets();
            if (sets.length === 0) { list.innerHTML = '<p class="text-slate-400 text-xs italic">No saved sets yet.</p>'; return; }
            list.innerHTML = '';
            sets.forEach(set => {
                const item = document.createElement('div');
                item.className = 'set-item flex items-center gap-2 p-2 bg-white border-2 border-slate-200 rounded-lg';
                item.innerHTML = `
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-bold text-dark truncate">${set.name}</p>
                        <p class="text-[10px] text-slate-400 truncate">${set.content.split(',').filter(w => w.trim()).length} words</p>
                    </div>
                    <button class="set-load p-1.5 bg-blue/10 text-blue rounded-md border border-blue/20 hover:bg-blue hover:text-white transition-all" title="Load">
                        <i data-lucide="upload" class="w-3.5 h-3.5 pointer-events-none"></i>
                    </button>
                    <button class="set-del p-1.5 bg-pink/10 text-pink rounded-md border border-pink/20 hover:bg-pink hover:text-white transition-all" title="Delete">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5 pointer-events-none"></i>
                    </button>`;
                item.querySelector('.set-load').onclick = () => { wordListInput.value = set.content; dbPut('words', set.content); AudioEngine.click(); };
                item.querySelector('.set-del').onclick = async () => { await deleteWordSet(set.id); AudioEngine.click(); renderWordSets(); };
                list.appendChild(item);
            });
            lucide.createIcons();
        }

        async function saveCurrentSet() {
            const nameInput = document.getElementById('set-name-input');
            const name = nameInput.value.trim();
            const content = wordListInput.value.trim();
            if (!name || !content) { AudioEngine.wrong(); return; }
            await saveWordSet(name, content);
            nameInput.value = '';
            AudioEngine.correct();
            renderWordSets();
        }

        // --- AUDIO ENGINE ---
        const AudioEngine = {
            ctx: new (window.AudioContext || window.webkitAudioContext)(),
            enabled: true,
            playTone: function(freq, type, duration, vol=0.1) {
                if (!this.enabled) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, this.ctx.currentTime + duration);
                osc.stop(this.ctx.currentTime + duration);
            },
            click: function() { this.playTone(600, 'sine', 0.05, 0.05); },
            correct: function() { 
                this.playTone(600, 'sine', 0.1);
                setTimeout(() => this.playTone(900, 'sine', 0.2), 100);
            },
            wrong: function() { 
                this.playTone(200, 'sawtooth', 0.2);
                setTimeout(() => this.playTone(150, 'sawtooth', 0.2), 100);
            },
            win: function() {
                [440, 554, 659, 880].forEach((f, i) => setTimeout(() => this.playTone(f, 'triangle', 0.3), i * 100));
            },
            lose: function() {
                [400, 300, 200, 100].forEach((f, i) => setTimeout(() => this.playTone(f, 'sawtooth', 0.4), i * 150));
            }
        };

        function toggleSound() {
            AudioEngine.enabled = !AudioEngine.enabled;
            const btn = document.getElementById('soundBtn');
            if(AudioEngine.enabled) {
                btn.innerHTML = '<i data-lucide="volume-2" class="w-5 h-5"></i>';
                btn.classList.remove('text-red-500');
            } else {
                btn.innerHTML = '<i data-lucide="volume-x" class="w-5 h-5"></i>';
                btn.classList.add('text-red-500');
            }
            lucide.createIcons();
        }

        // --- GAME STATE ---
        let words = [];
        let currentWordIndex = 0;
        let wordToGuess = "";
        let guessedLetters = new Set();
        let players = [];
        let currentPlayerIndex = 0;
        let gameActive = false;
        let turnMode = 'auto';
        
        // --- DOM Elements ---
        const teacherConsole = document.getElementById('teacher-console');
        const wordListInput = document.getElementById('word-list-input');
        const gameSection = document.getElementById('game-section');

        // --- FUNCTIONS ---
        
        async function saveWords(wordsString) {
            await dbPut('words', wordsString);
        }
        
        async function loadWords() {
            const saved = await dbGet('words');
            if (saved) wordListInput.value = saved;
        }

        function selectPlayers(count) {
            document.getElementById('player-count').value = count;
            document.querySelectorAll('.player-select-btn').forEach(btn => {
                if(parseInt(btn.dataset.count) === count) {
                    btn.classList.add('bg-white', 'text-dark', 'border-dark', 'shadow-hard-sm');
                    btn.classList.remove('border-transparent', 'text-slate-400', 'hover:bg-white');
                } else {
                    btn.classList.remove('bg-white', 'text-dark', 'border-dark', 'shadow-hard-sm');
                    btn.classList.add('border-transparent', 'text-slate-400', 'hover:bg-white');
                }
            });
            AudioEngine.click();
        }

        function selectLives(count) {
            document.getElementById('max-lives').value = count;
            document.querySelectorAll('.life-select-btn').forEach(btn => {
                if(parseInt(btn.dataset.count) === count) {
                    btn.classList.add('bg-white', 'text-dark', 'border-dark', 'shadow-hard-sm');
                    btn.classList.remove('border-transparent', 'text-slate-400', 'hover:bg-white');
                } else {
                    btn.classList.remove('bg-white', 'text-dark', 'border-dark', 'shadow-hard-sm');
                    btn.classList.add('border-transparent', 'text-slate-400', 'hover:bg-white');
                }
            });
            AudioEngine.click();
        }

        function setTurnMode(mode) {
            document.getElementById('turn-mode').value = mode;
            if(mode === 'auto') {
                document.getElementById('mode-auto').className = "flex-1 py-2 rounded-lg font-heading text-lg font-bold transition-all border-2 border-transparent bg-white text-dark border-dark shadow-hard-sm";
                document.getElementById('mode-manual').className = "flex-1 py-2 rounded-lg font-heading text-lg font-bold transition-all border-2 border-transparent text-slate-400 hover:bg-white";
            } else {
                document.getElementById('mode-manual').className = "flex-1 py-2 rounded-lg font-heading text-lg font-bold transition-all border-2 border-transparent bg-white text-dark border-dark shadow-hard-sm";
                document.getElementById('mode-auto').className = "flex-1 py-2 rounded-lg font-heading text-lg font-bold transition-all border-2 border-transparent text-slate-400 hover:bg-white";
            }
            AudioEngine.click();
        }

        async function startGame() {
            const rawInput = wordListInput.value;
            await saveWords(rawInput); 

            words = rawInput.split(',').map(w => w.trim().toUpperCase()).filter(w => w.length > 0);
            
            if (words.length === 0) {
                const err = document.getElementById('error-msg');
                err.classList.remove('hidden');
                AudioEngine.wrong();
                return;
            }

            const playerCount = parseInt(document.getElementById('player-count').value);
            const livesCount = parseInt(document.getElementById('max-lives').value);
            turnMode = document.getElementById('turn-mode').value;
            players = Array.from({ length: playerCount }, (_, i) => ({
                id: i,
                name: `Team ${i + 1}`,
                health: livesCount,
                maxHealth: livesCount,
                score: 0,
                eliminated: false
            }));

            teacherConsole.classList.add('hidden');
            gameSection.classList.remove('hidden');
            gameSection.classList.add('flex');

            currentWordIndex = 0;
            initRound();
        }

        function initRound() {
            if (currentWordIndex >= words.length) {
                document.getElementById('message-box').innerHTML = "<span class='text-green text-3xl'>🎉 LESSON COMPLETE! 🎉</span>";
                document.getElementById('word-display').innerHTML = "";
                AudioEngine.win();
                confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
                return;
            }

            wordToGuess = words[currentWordIndex];
            guessedLetters.clear();
            gameActive = true;
            
            // Revive everyone for the new round
            players.forEach(p => {
                p.health = p.maxHealth;
                p.eliminated = false;
            });
            currentPlayerIndex = 0;

            renderUI();
            renderKeyboard();
            updateMessage(`Round ${currentWordIndex + 1}: Start!`, 'text-dark');
            document.getElementById('next-round-btn').classList.add('hidden');
        }

        function renderUI() {
            const container = document.getElementById('health-container');
            const playerCount = players.length;
            container.className = `w-full grid gap-4 mb-6 ${playerCount <= 2 ? 'grid-cols-2' : playerCount === 3 ? 'grid-cols-3' : 'grid-cols-4'}`;
            container.innerHTML = '';

            players.forEach((p, idx) => {
                const isCurrent = idx === currentPlayerIndex && !p.eliminated;
                
                const card = document.createElement('div');
                card.id = `team-card-${idx}`;
                card.className = `bg-white p-3 md:p-4 rounded-2xl border-4 transition-all duration-300 relative overflow-hidden flex flex-col justify-between cursor-pointer group ${isCurrent ? 'border-orange shadow-hard scale-105 z-10 ring-4 ring-orange/20' : 'border-dark shadow-sm opacity-90 hover:scale-[1.02]'}`;
                if(p.eliminated) card.classList.add('opacity-50', 'grayscale');
                card.onclick = () => setCurrentTeam(idx);

                let healthRatio = p.health / p.maxHealth;
                let barColor = 'bg-green';
                let icon = 'heart';
                if(healthRatio <= 0.5) barColor = 'bg-orange';
                if(healthRatio <= 0.2) { barColor = 'bg-pink'; icon = 'alert-triangle'; }

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4 relative z-10">
                        <div class="flex flex-col w-[calc(100%-40px)]">
                            <input type="text" class="font-heading font-bold text-xl md:text-2xl leading-none bg-transparent border-b-2 border-transparent hover:border-slate-200 focus:border-dark outline-none w-full transition-colors ${isCurrent ? 'text-orange' : 'text-dark'} truncate pb-1" value="${p.name}" onchange="updateTeamName(${idx}, this.value)" title="Rename Team" onclick="event.stopPropagation()">
                        </div>
                        
                        <button onclick="claimWin(${idx}); event.stopPropagation();" class="w-8 h-8 rounded-lg bg-green/10 hover:bg-green text-green hover:text-white border-2 border-green/20 hover:border-green flex items-center justify-center transition-all shrink-0 mt-0.5 shadow-sm hover:shadow-hard-sm group/btn" title="Reveal & Win">
                            <i data-lucide="award" class="w-4 h-4 group-hover/btn:scale-110 transition-transform"></i>
                        </button>
                    </div>

                    <div class="grid grid-cols-2 gap-2 mb-4 relative z-10">
                        <!-- Score Block -->
                        <div class="bg-slate-50 border-2 border-slate-200 rounded-xl py-1 px-1 md:px-2 flex items-center justify-between shadow-[inset_0_2px_4px_rgba(0,0,0,0.05)]" onclick="event.stopPropagation()">
                            <button onclick="adjScore(${idx}, -1)" class="w-6 h-6 rounded flex items-center justify-center hover:bg-white border-2 border-transparent hover:border-slate-300 text-slate-400 hover:text-pink hover:shadow-sm transition-all font-bold text-lg leading-none">-</button>
                            
                            <div class="flex flex-col items-center">
                                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-0.5 -mt-0.5" style="font-family: 'Fredoka'">Score</span>
                                <div class="font-heading font-bold text-lg md:text-xl text-dark flex items-center gap-1 leading-none">
                                    <i data-lucide="trophy" class="w-3.5 h-3.5 text-orange"></i> ${p.score}
                                </div>
                            </div>

                            <button onclick="adjScore(${idx}, 1)" class="w-6 h-6 rounded flex items-center justify-center hover:bg-white border-2 border-transparent hover:border-slate-300 text-slate-400 hover:text-green hover:shadow-sm transition-all font-bold text-lg leading-none">+</button>
                        </div>

                        <!-- Lives Block -->
                        <div class="bg-slate-50 border-2 border-slate-200 rounded-xl py-1 px-1 md:px-2 flex items-center justify-between shadow-[inset_0_2px_4px_rgba(0,0,0,0.05)]" onclick="event.stopPropagation()">
                            <button onclick="adjLives(${idx}, -1)" class="w-6 h-6 rounded flex items-center justify-center hover:bg-white border-2 border-transparent hover:border-slate-300 text-slate-400 hover:text-pink hover:shadow-sm transition-all font-bold text-lg leading-none">-</button>
                            
                            <div class="flex flex-col items-center">
                                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-0.5 -mt-0.5" style="font-family: 'Fredoka'">Lives</span>
                                <div class="font-heading font-bold text-lg md:text-xl text-dark flex items-center gap-1 leading-none">
                                    <i data-lucide="heart" class="w-3.5 h-3.5 ${p.health > 0 ? 'fill-pink text-pink' : 'text-slate-300'}"></i> ${p.health}
                                </div>
                            </div>

                            <button onclick="adjLives(${idx}, 1)" class="w-6 h-6 rounded flex items-center justify-center hover:bg-white border-2 border-transparent hover:border-slate-300 text-slate-400 hover:text-green hover:shadow-sm transition-all font-bold text-lg leading-none">+</button>
                        </div>
                    </div>
                    
                    <div class="mt-auto relative z-10 w-full" onclick="event.stopPropagation()">
                        <div class="w-full h-3 bg-slate-100 rounded-full overflow-hidden border-2 border-slate-200 shadow-[inset_0_1px_3px_rgba(0,0,0,0.1)]">
                            <div class="h-full ${barColor} transition-all duration-500 rounded-full" style="width: ${Math.max(0, Math.min(100, healthRatio * 100))}%"></div>
                        </div>
                    </div>
                    
                    ${!isCurrent && turnMode === 'manual' && !p.eliminated ? `<div class="absolute top-0 left-1/2 -translate-x-1/2 bg-dark text-white text-[9px] tracking-widest font-bold px-3 py-1 rounded-b-md opacity-0 group-hover:opacity-100 transition-opacity z-0 pointer-events-none uppercase shadow-sm">Set Active</div>` : ''}
                    <div class="absolute inset-0 bg-transparent hover:bg-slate-900/5 transition-colors z-0 pointer-events-none rounded-2xl"></div>
                `;
                container.appendChild(card);
            });

            // Adjust manual turn controls
            const manualControls = document.getElementById('manual-turn-controls');
            const manualBtns = document.getElementById('manual-turn-btns');
            
            if (turnMode === 'manual') {
                manualControls.classList.remove('hidden');
                manualControls.classList.add('flex');
                manualBtns.innerHTML = '';
                players.forEach((p, idx) => {
                    if(!p.eliminated) {
                        const isCurrent = idx === currentPlayerIndex;
                        const btn = document.createElement('button');
                        btn.className = `btn-chunky px-4 py-2 rounded-xl font-heading font-bold text-sm transition-all ${isCurrent ? 'bg-orange text-white' : 'bg-white text-dark hover:bg-slate-100'}`;
                        btn.innerText = p.name;
                        btn.onclick = () => setCurrentTeam(idx);
                        manualBtns.appendChild(btn);
                    }
                });
            } else {
                manualControls.classList.add('hidden');
                manualControls.classList.remove('flex');
            }

            lucide.createIcons();

            // Render Word (Non-Flip Logic)
            const wordDisplay = document.getElementById('word-display');
            wordDisplay.innerHTML = '';
            
            [...wordToGuess].forEach(char => {
                if (char === ' ') {
                    const space = document.createElement('div');
                    space.className = 'w-4 md:w-8';
                    wordDisplay.appendChild(space);
                } else {
                    const isRevealed = guessedLetters.has(char) || !char.match(/[A-Z]/);
                    const box = document.createElement('div');
                    
                    // Standard tile styling
                    box.className = `w-12 h-14 md:w-16 md:h-20 flex items-center justify-center text-3xl md:text-4xl font-heading font-bold rounded-xl border-b-8 transition-all duration-300`;
                    
                    if (isRevealed) {
                        // Revealed: white background, dark text
                        box.classList.add('bg-white', 'text-dark', 'border-slate-200', 'shadow-sm');
                        box.textContent = char;
                    } else {
                        // Hidden: light gray background, transparent text (for spacing)
                        box.classList.add('bg-slate-200', 'text-transparent', 'border-slate-300');
                        box.innerHTML = '&nbsp;';
                    }
                    
                    wordDisplay.appendChild(box);
                }
            });
        }

        function renderKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

            [...alphabet].forEach(letter => {
                const btn = document.createElement('button');
                btn.textContent = letter;
                
                const isGuessed = guessedLetters.has(letter);
                let stateClass = 'bg-white text-dark hover:bg-blue hover:text-white hover:border-dark'; // Default
                
                if (isGuessed) {
                    if (wordToGuess.includes(letter)) {
                        stateClass = 'bg-green text-white border-green border-opacity-50 shadow-none translate-y-1'; // Correct
                    } else {
                        stateClass = 'bg-slate-200 text-slate-400 border-slate-300 shadow-none translate-y-1'; // Wrong
                    }
                }

                btn.className = `btn-chunky h-12 rounded-xl font-heading font-bold text-lg transition-all ${stateClass}`;
                if(isGuessed) btn.disabled = true;
                
                btn.onclick = () => handleGuess(letter);
                kb.appendChild(btn);
            });
        }

        function handleGuess(letter) {
            if (!gameActive || guessedLetters.has(letter)) return;

            guessedLetters.add(letter);
            const isCorrect = wordToGuess.includes(letter);
            
            if (isCorrect) {
                AudioEngine.correct();
                updateMessage("Correct! " + (turnMode === 'auto' ? "Next team's turn." : ""), "text-green");
                checkWin();
            } else {
                AudioEngine.wrong();
                updateMessage("Oops! Lost a life. " + (turnMode === 'auto' ? "Next team's turn." : ""), "text-pink");
                damageCurrentPlayer();
            }

            if (gameActive && turnMode === 'auto') advanceTurn();
            renderUI();
            renderKeyboard();
        }

        function damageCurrentPlayer() {
            const p = players[currentPlayerIndex];
            p.health -= 1;
            
            // Shake Effect on Card
            const card = document.getElementById(`team-card-${currentPlayerIndex}`);
            if(card) {
                card.classList.remove('animate-shake');
                void card.offsetWidth;
                card.classList.add('animate-shake');
            }

            if (p.health <= 0) {
                p.health = 0;
                p.eliminated = true;
                updateMessage(`${p.name} is eliminated!`, "text-pink");
            }
        }

        function setCurrentTeam(idx) {
            if (!gameActive) return;
            if (players[idx].eliminated) return;
            currentPlayerIndex = idx;
            AudioEngine.click();
            updateMessage(`${players[idx].name}'s Turn`, "text-dark");
            renderUI();
        }

        function updateTeamName(idx, name) {
            players[idx].name = name;
            renderUI();
        }

        function adjScore(idx, delta) {
            players[idx].score += delta;
            if (players[idx].score < 0) players[idx].score = 0;
            AudioEngine.click();
            renderUI();
        }

        function adjLives(idx, delta) {
            players[idx].health += delta;
            if (players[idx].health > players[idx].maxHealth) {
                players[idx].maxHealth = players[idx].health;
            }
            if (players[idx].health <= 0) {
                players[idx].health = 0;
                players[idx].eliminated = true;
            } else {
                players[idx].eliminated = false;
            }
            AudioEngine.click();
            renderUI();
        }

        function claimWin(playerIndex) {
            if (!gameActive) return;
            players[playerIndex].score++;
            [...wordToGuess].forEach(l => guessedLetters.add(l));
            gameActive = false;
            AudioEngine.win();
            updateMessage(`🎉 ${players[playerIndex].name} wins the round!`, "text-green");
            document.getElementById('next-round-btn').classList.remove('hidden');
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            renderUI();
        }

        function advanceTurn() {
            let attempts = 0;
            do {
                currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
                attempts++;
            } while (players[currentPlayerIndex].eliminated && attempts < players.length);

            if (players.every(p => p.eliminated)) {
                gameActive = false;
                updateMessage(`GAME OVER! The word was ${wordToGuess}`, "text-pink");
                document.getElementById('next-round-btn').classList.remove('hidden');
                AudioEngine.lose();
                [...wordToGuess].forEach(l => guessedLetters.add(l));
                renderUI();
            }
        }

        function checkWin() {
            const remainingLetters = [...wordToGuess].filter(char => char.match(/[A-Z]/) && !guessedLetters.has(char));
            if (remainingLetters.length === 0) {
                gameActive = false;
                updateMessage("🎉 VICTORY! Well done!", "text-green");
                document.getElementById('next-round-btn').classList.remove('hidden');
                AudioEngine.win();
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            }
        }

        function updateMessage(msg, colorClass) {
            const box = document.getElementById('message-box');
            box.textContent = msg;
            box.className = `h-8 font-heading font-bold text-2xl mb-8 animate-pop ${colorClass}`;
        }

        function nextRound() {
            currentWordIndex++;
            initRound();
        }

        function returnToConsole() {
            gameSection.classList.add('hidden');
            teacherConsole.classList.remove('hidden');
        }

        // Init
        window.onload = async () => {
            await requireAuth();
            
            initTheme();

            // Load Cloud Progress
            const cloudData = await loadProgress('hangman');
            if (cloudData) {
                if (cloudData.words) {
                    const db = await initDB();
                    const tx = db.transaction(STATE_STORE, 'readwrite');
                    tx.objectStore(STATE_STORE).put(cloudData.words, 'words');
                }
                if (cloudData.word_sets) {
                    const db = await initDB();
                    const tx = db.transaction(SETS_STORE, 'readwrite');
                    const store = tx.objectStore(SETS_STORE);
                    store.clear(); // Re-sync from cloud
                    for (const set of cloudData.word_sets) {
                        store.put(set);
                    }
                }
            }

            await loadWords();
            await renderWordSets();
            selectPlayers(2);
            lucide.createIcons();
            teacherConsole.classList.remove('hidden');
        };

        // Keyboard Listener
        document.addEventListener('keydown', (e) => {
            if(!gameActive) return;
            const key = e.key.toUpperCase();
            if (key.match(/^[A-Z]$/)) handleGuess(key);
        });
        
        // Auto Save
        wordListInput.addEventListener('input', (e) => saveWords(e.target.value));

    </script>
</body>
</html>
