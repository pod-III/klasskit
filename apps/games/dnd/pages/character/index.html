<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E1 Batam - Character Roster</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4"></script>
    <script src="/supabase.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        stone: { 900: '#1c1917', 950: '#0c0a09' },
                        amber: { 500: '#f59e0b', 600: '#d97706', 700: '#b45309', 900: '#78350f' }
                    }
                }

    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Lora', serif;
            background-color: #0c0a09;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            color: #d6d3d1;
        }

        h1,
        h2,
        h3,
        button,
        .font-title {
            font-family: 'Cinzel', serif;
        }

        .neo-card {
            background-color: #1c1917;
            border: 1px solid rgba(120, 53, 15, 0.5);
            box-shadow: 0 10px 15px -3px rgba(120, 53, 15, 0.2), 0 4px 6px -2px rgba(120, 53, 15, 0.1);
            transition: all 0.2s ease;

        .neo-button {
            transition: all 0.2s ease;

            background-color: #d97706;
        }

        }

        .stat-box {
            border: 1px solid rgba(120, 53, 15, 0.5);
            border-radius: 0.75rem;
            padding: 0.5rem;
            text-align: center;
            background-color: #1c1917;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        .editable-input {
            background: transparent;
            border-bottom: 2px dashed rgba(217, 119, 6, 0.5);
            width: 100%;
            outline: none;
            color: #d6d3d1;
        }

        .editable-input:focus {
            border-bottom-color: #d97706;
        }
    </style>
</head>

<body class="p-4 md:p-8 bg-stone-950 text-stone-300 transition-colors duration-300">

                </div>

                        <option value="alpha">Sort: A-Z</option>

                    <button onclick="createCampaign()"

                    <button onclick="document.getElementById('campaign-import').click()"

    <!-- Empty State -->

    <!-- Custom Modal -->
    <div id="custom-modal"
        class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div
            class="neo-card bg-stone-900 border border-amber-900/50 rounded-2xl p-6 max-w-sm w-full transform scale-95 transition-transform duration-300">
            <h3 id="modal-title" class="text-xl font-bold font-title text-amber-500 mb-2">Notice</h3>
            <p id="modal-message" class="text-stone-300 mb-4 font-medium"></p>
            <input type="text" id="modal-input"
                class="hidden w-full bg-stone-950 border border-amber-900/50 rounded-xl px-4 py-2 text-stone-300 mb-4 outline-none focus:ring-2 focus:ring-amber-500">
            <div class="flex justify-end gap-3 font-title font-bold">
                <button id="modal-cancel-btn"
                    class="neo-button neo-card px-4 py-2 bg-stone-800 hover:bg-stone-700 text-stone-300 border border-stone-700 rounded-xl transition-colors hidden">
                    Cancel
                </button>
                <button id="modal-confirm-btn"
                    class="neo-button neo-card px-4 py-2 bg-amber-700 hover:bg-amber-600 text-stone-100 border border-amber-900/50 rounded-xl transition-colors">
                    Confirm
                </button>
            </div>
        </div>

    <script>
        let campaigns = [];

        let currentCampaignId = '';
        let currentCharIndex = 0;
        let isEditMode = false;
        let characters = [];

        function showModal(title, message, type = 'alert', onConfirm = null, onCancel = null) {
            const modal = document.getElementById('custom-modal');
            const modalBox = modal.querySelector('.neo-card');
            const titleEl = document.getElementById('modal-title');
            const messageEl = document.getElementById('modal-message');
            const cancelBtn = document.getElementById('modal-cancel-btn');
            const confirmBtn = document.getElementById('modal-confirm-btn');
            const inputEl = document.getElementById('modal-input');

            titleEl.innerText = title;
            messageEl.innerText = message;

            if (type === 'confirm') {
                cancelBtn.classList.remove('hidden');
                confirmBtn.innerText = 'Confirm';
                confirmBtn.classList.replace('bg-amber-700', 'bg-red-600');
                confirmBtn.classList.replace('hover:bg-amber-600', 'hover:bg-red-500');
                inputEl.classList.add('hidden');
            } else if (type === 'prompt') {
                cancelBtn.classList.remove('hidden');
                confirmBtn.innerText = 'Create';
                confirmBtn.classList.replace('bg-red-600', 'bg-amber-700');
                confirmBtn.classList.replace('hover:bg-red-500', 'hover:bg-amber-600');
                inputEl.classList.remove('hidden');
                inputEl.value = '';
                setTimeout(() => inputEl.focus(), 100);
            } else {
                cancelBtn.classList.add('hidden');
                confirmBtn.innerText = 'OK';
                confirmBtn.classList.replace('bg-red-600', 'bg-amber-700');
                confirmBtn.classList.replace('hover:bg-red-500', 'hover:bg-amber-600');
                inputEl.classList.add('hidden');
            }

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalBox.classList.remove('scale-95');
                modalBox.classList.add('scale-100');
            }, 10);

            const closeModal = () => {
                modal.classList.add('opacity-0');
                modalBox.classList.remove('scale-100');
                modalBox.classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300);
            };

            confirmBtn.onclick = () => {
                const value = type === 'prompt' ? inputEl.value.trim() : null;
                closeModal();
                if (onConfirm) onConfirm(value);
            };

            cancelBtn.onclick = () => {
                closeModal();
                if (onCancel) onCancel();
            };

            inputEl.onkeydown = (e) => {
                if (e.key === 'Enter') confirmBtn.click();
            };
        }

        function ensureCampaignMeta(campaign) {
            const now = Date.now();
            if (!campaign.createdAt) campaign.createdAt = now;
            if (!campaign.lastUsed) campaign.lastUsed = campaign.createdAt || now;
            if (typeof campaign.usageCount !== 'number') campaign.usageCount = 0;
            return campaign;
        }

        async function initApp() {
            if (typeof requirePro === 'function') await requirePro();

            let dndSaves = [];
            if (typeof loadDndSaves === 'function') {
                dndSaves = await loadDndSaves('character');
            }

            if (dndSaves && dndSaves.length > 0) {
                campaigns = dndSaves.map(s => ensureCampaignMeta({
                    id: s.id,
                    name: s.name,
                    characters: s.state_data?.characters || []
                }));
                console.log('Campaigns loaded from tools_dnd');
            } else {
                const saved = localStorage.getItem('kk_dnd_campaigns');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (Array.isArray(parsed) && parsed.length > 0) {
                            campaigns = parsed.map(ensureCampaignMeta);
                            console.log('Campaigns loaded from localStorage');
                        }
                    } catch (e) {
                        console.warn('Failed to parse localStorage data', e);
                    }
                } else {
                    // Legacy fallback: old flat characters array
                    const oldSaved = localStorage.getItem('characters');
                    if (oldSaved) {
                        try {
                            const parsed = JSON.parse(oldSaved);
                            if (Array.isArray(parsed) && parsed.length > 0) {
                                campaigns = [ensureCampaignMeta({ id: 'local', name: 'Local Campaign', characters: parsed })];
                                console.log('Legacy campaigns loaded from localStorage');
                            }
                        } catch (e) {
                            console.warn('Failed to parse legacy localStorage data', e);
                        }
                    }
                }
            }

            renderCampaignLibrary();
            if (campaigns.length > 0) {
                currentCampaignId = campaigns[0].id;
                loadCampaignCharacters();
            } else {
                showEmptyState();
            }
        }

        function formatTimeAgo(timestamp) {
            if (!timestamp) return 'never';
            const diff = Date.now() - timestamp;
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return `${mins}m ago`;
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return `${hrs}h ago`;
            const days = Math.floor(hrs / 24);
            return `${days}d ago`;
        }

        function renderCampaignLibrary() {
            const container = document.getElementById('campaign-library');
            container.innerHTML = '';

            const sortMode = document.getElementById('campaign-sort')?.value || 'recent';
            const sorted = [...campaigns].sort((a, b) => {
                if (sortMode === 'alpha') return (a.name || '').localeCompare(b.name || '');
                if (sortMode === 'popular') return (b.usageCount || 0) - (a.usageCount || 0);
                return (b.lastUsed || 0) - (a.lastUsed || 0);
            });

            const badge = document.getElementById('active-campaign-badge');
            const activeCampaign = campaigns.find(c => c.id === currentCampaignId);
            if (activeCampaign && badge) {
                badge.classList.remove('hidden');
                badge.textContent = `Editing: ${activeCampaign.name}`;
            } else if (badge) {
                badge.classList.add('hidden');
            }

            sorted.forEach(c => {
                const isActive = c.id === currentCampaignId;
                const card = document.createElement('div');
                card.className = `neo-card cursor-pointer rounded-xl p-3 border transition-all relative ${
                    isActive
                        ? 'bg-stone-800 border-amber-500 ring-1 ring-amber-500/50'
                        : 'bg-stone-900 border-amber-900/30 hover:border-amber-900/60'
                }`;
                card.onclick = (e) => {
                    if (e.target.closest('.campaign-actions')) return;
                    changeCampaign(c.id);
                };

                const charCount = (c.characters || []).length;
                const timeAgo = formatTimeAgo(c.lastUsed);

                card.innerHTML = `
                    <div class="flex items-start justify-between">
                        <div class="min-w-0 flex-1">
                            <h3 class="font-bold font-title text-stone-200 text-sm truncate" title="${c.name}">${c.name}</h3>
                            <p class="text-xs text-stone-500 mt-0.5">${charCount} character${charCount !== 1 ? 's' : ''}</p>
                        </div>
                        <div class="campaign-actions flex gap-1 ml-2">
                            <button class="p-1 text-stone-500 hover:text-amber-500 transition-colors" title="Duplicate"
                                onclick="event.stopPropagation(); duplicateCampaign('${c.id}')">
                                <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                            </button>
                            <button class="p-1 text-stone-500 hover:text-red-500 transition-colors" title="Delete"
                                onclick="event.stopPropagation(); deleteCampaign('${c.id}')">
                                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center justify-between mt-2 pt-2 border-t border-stone-800">
                        <span class="text-[10px] text-stone-600">${timeAgo}</span>
                        ${isActive ? '<span class="text-[10px] font-bold text-amber-500 bg-amber-900/30 px-1.5 py-0.5 rounded">ACTIVE</span>' : ''}
                    </div>
                `;
                container.appendChild(card);
            });

            lucide.createIcons();
        }

        function showEmptyState() {
            document.getElementById('character-sheet').classList.add('hidden');
            document.getElementById('empty-state').classList.remove('hidden');
            lucide.createIcons();
        }

        function hideEmptyState() {
            document.getElementById('empty-state').classList.add('hidden');
        }

        function createCampaign() {
            showModal('New Campaign', 'Enter campaign name:', 'prompt',
                (name) => {
                    if (!name || !name.trim()) return;
                    const now = Date.now();
                    const newCampaign = ensureCampaignMeta({
                        id: `local_${now}`,
                        name: name.trim(),
                        characters: [{
                            name: "New Hero", class: "Adventurer", level: 1, color: "#1e293b", customImg: null,
                            vitals: { ac: 10, init: "+0", speed: "30ft", hp: 10, maxHp: 10 },
                            stats: { STR: [10, "+0"], DEX: [10, "+0"], CON: [10, "+0"], INT: [10, "+0"], WIS: [10, "+0"], CHA: [10, "+0"] },
                            resources: [], features: [], actions: "Add actions here..."
                        }],
                        usageCount: 0
                    });
                    campaigns.push(newCampaign);
                    currentCampaignId = newCampaign.id;
                    renderCampaignLibrary();
                    hideEmptyState();
                    loadCampaignCharacters();
                    saveToStorage();
                }
            );
        }

        function duplicateCampaign(sourceId) {
            const source = campaigns.find(c => c.id === (sourceId || currentCampaignId));
            if (!source) return;
            showModal('Save As New', 'Enter name for the copy:', 'prompt',
                (name) => {
                    if (!name || !name.trim()) return;
                    const now = Date.now();
                    const copy = ensureCampaignMeta({
                        id: `local_${now}`,
                        name: name.trim(),
                        characters: JSON.parse(JSON.stringify(source.characters || [])),
                        usageCount: 0
                    });
                    campaigns.push(copy);
                    currentCampaignId = copy.id;
                    renderCampaignLibrary();
                    hideEmptyState();
                    loadCampaignCharacters();
                    saveToStorage();
                }
            );
        }

        function deleteCampaign(id) {
            const campaign = campaigns.find(c => c.id === id);
            if (!campaign) return;
            showModal('Delete Campaign', `Are you sure you want to delete "${campaign.name}"?`, 'confirm',
                async () => {
                    campaigns = campaigns.filter(c => c.id !== id);
                    if (typeof deleteDndSave === 'function' && typeof isValidUuid === 'function' && isValidUuid(id)) {
                        await deleteDndSave(id);
                    }
                    if (campaigns.length === 0) {
                        currentCampaignId = '';
                        showEmptyState();
                    } else if (currentCampaignId === id) {
                        currentCampaignId = campaigns[0].id;
                        loadCampaignCharacters();
                    }
                    renderCampaignLibrary();
                    saveToStorage();
                }
            );
        }

        function normalizeCharacter(raw) {
            // Ensure stats are in the [score, mod] array format
            const normalizeStats = (stats) => {
                const result = {};
                const keyMap = { str: 'STR', dex: 'DEX', con: 'CON', int: 'INT', wis: 'WIS', cha: 'CHA' };
                for (const [key, val] of Object.entries(stats || {})) {
                    const upperKey = keyMap[key.toLowerCase()] || key.toUpperCase();
                    if (Array.isArray(val)) {
                        result[upperKey] = val;
                    } else {
                        const score = parseInt(val) || 10;
                        const mod = Math.floor((score - 10) / 2);
                        const modStr = mod >= 0 ? `+${mod}` : mod.toString();
                        result[upperKey] = [score, modStr];
                    }
                }
                // Fill missing stats
                ['STR', 'DEX', 'CON', 'INT', 'WIS', 'CHA'].forEach(k => {
                    if (!result[k]) result[k] = [10, "+0"];
                });
                return result;
            };

            return {
                name: raw.name || 'Unnamed',
                class: raw.class || 'Adventurer',
                subclass: raw.subclass || '',
                level: parseInt(raw.level) || 1,
                color: raw.color || '#1e293b',
                customImg: raw.customImg || null,
                vitals: {
                    ac: parseInt(raw.vitals?.ac) || 10,
                    hp: parseInt(raw.vitals?.hp) || 10,
                    maxHp: parseInt(raw.vitals?.maxHp) || parseInt(raw.vitals?.hp) || 10,
                    init: raw.vitals?.init || '+0',
                    speed: raw.vitals?.speed || '30ft'
                },
                stats: normalizeStats(raw.stats),
                resources: Array.isArray(raw.resources) ? raw.resources.map(r =>
                    typeof r === 'string' ? { label: r, max: 1, used: 0 } : r
                ) : [],
                features: Array.isArray(raw.features) ? raw.features : [],
                quote: raw.quote || '',
                gear: raw.gear || '',
                actions: raw.actions || ''
            };
        }

        async function importCampaign(event) {
            const file = event.target.files[0];
            if (!file) return;
            event.target.value = ''; // reset input

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    let importedCampaigns = [];

                    if (data.campaigns && Array.isArray(data.campaigns)) {
                        importedCampaigns = data.campaigns;
                    } else if (Array.isArray(data)) {
                        // Legacy flat array of characters -> wrap in one campaign
                        importedCampaigns = [{ id: `import_${Date.now()}`, name: 'Imported Campaign', characters: data }];
                    } else if (data.characters && Array.isArray(data.characters)) {
                        // Single campaign object without wrapper
                        importedCampaigns = [{ id: data.id || `import_${Date.now()}`, name: data.name || 'Imported Campaign', characters: data.characters }];
                    } else {
                        showModal('Import Failed', 'Unrecognized JSON format. Expected { campaigns: [...] } or an array of characters.');
                        return;
                    }

                    for (const camp of importedCampaigns) {
                        const normalized = ensureCampaignMeta({
                            id: camp.id || `import_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`,
                            name: camp.name || 'Imported Campaign',
                            characters: (camp.characters || []).map(normalizeCharacter),
                            usageCount: 0
                        });
                        campaigns.push(normalized);

                        // Save each imported campaign to cloud
                        if (typeof saveDndSave === 'function') {
                            const result = await saveDndSave('character', normalized.name, { characters: normalized.characters });
                            if (result.id) normalized.id = result.id;
                        }
                    }

                    renderCampaignLibrary();
                    if (campaigns.length > 0) {
                        currentCampaignId = campaigns[0].id;
                        hideEmptyState();
                        loadCampaignCharacters();
                    }
                    showModal('Import Complete', `${importedCampaigns.length} campaign(s) imported successfully.`);
                } catch (err) {
                    console.error('Import error:', err);
                    showModal('Import Failed', 'Could not parse JSON file. Make sure it is valid.');
                }
            };
            reader.readAsText(file);
        }

        function loadCampaignCharacters() {
            const campaign = campaigns.find(c => c.id === currentCampaignId);
            if (campaign) {
                campaign.lastUsed = Date.now();
                campaign.usageCount = (campaign.usageCount || 0) + 1;
                characters = campaign.characters;
                if (characters.length === 0) {
                    // Auto-add a default character if campaign is empty
                    characters.push({
                        name: "New Hero", class: "Adventurer", level: 1, color: "#1e293b", customImg: null,
                        vitals: { ac: 10, init: "+0", speed: "30ft", hp: 10, maxHp: 10 },
                        stats: { STR: [10, "+0"], DEX: [10, "+0"], CON: [10, "+0"], INT: [10, "+0"], WIS: [10, "+0"], CHA: [10, "+0"] },
                        resources: [], features: [], actions: "Add actions here..."
                    });
                    saveToStorage();
                }
                currentCharIndex = 0;
                document.getElementById('character-sheet').classList.remove('hidden');
                renderCampaignLibrary();
                renderCharacter(0);
            }
        }

        function changeCampaign(id) {
            if (isEditMode) {
                showModal(
                    "Unsaved Changes",
                    "You have unsaved changes. Discard them?",
                    "confirm",
                    () => { // onConfirm: proceed with changing campaign
                        toggleEditMode();
                        currentCampaignId = id;
                        loadCampaignCharacters();
                    },
                    () => { // onCancel: just re-render library to restore highlight
                        renderCampaignLibrary();
                    }
                );
                return;
            }
            currentCampaignId = id;
            loadCampaignCharacters();
        }



        async function saveToStorage() {
            const currentCampaign = campaigns.find(c => c.id === currentCampaignId);
            if (currentCampaign) {
                currentCampaign.lastUsed = Date.now();
            }
            localStorage.setItem('kk_dnd_campaigns', JSON.stringify(campaigns));

            // Show auto-save indicator
            const statusEl = document.getElementById('auto-save-status');
            if (statusEl) {
                statusEl.classList.remove('hidden');
                statusEl.textContent = 'Saving...';
            }

            if (typeof saveDndSave !== 'function') {
                if (statusEl) {
                    statusEl.textContent = 'Saved locally';
                    setTimeout(() => statusEl.classList.add('hidden'), 2000);
                }
                return;
            }

            for (const campaign of campaigns) {
                const result = await saveDndSave('character', campaign.name, { characters: campaign.characters }, campaign.id);
                if (result.id && typeof isValidUuid === 'function' && !isValidUuid(campaign.id)) {
                    const oldId = campaign.id;
                    campaign.id = result.id;
                    if (currentCampaignId === oldId) currentCampaignId = result.id;
                    localStorage.removeItem(`dnd_character_${oldId}`);
                }
            }

            if (statusEl) {
                statusEl.textContent = 'Saved to cloud';
                setTimeout(() => statusEl.classList.add('hidden'), 2000);
            }
            renderCampaignLibrary();
        }

        function renderSelector() {
            const selector = document.getElementById('selector-container');
            selector.innerHTML = '';
            characters.forEach((char, i) => {
                const btn = document.createElement('button');
                btn.className = `neo-button neo-card px-5 py-2 border border-amber-900/50 rounded-xl font-bold font-title transition-colors ${i === currentCharIndex ? 'bg-stone-900 text-stone-100' : 'bg-stone-900 text-stone-300 hover:bg-stone-950:bg-stone-900'}`;
                btn.innerText = char.name;
                btn.onclick = () => {
                    if (isEditMode) {
                        showModal(
                            "Unsaved Changes",
                            "You have unsaved changes. Discard them?",
                            "confirm",
                            () => { // onConfirm: proceed with switching character
                                toggleEditMode();
                                renderCharacter(i);
                            }
                        );
                        return;
                    }
                    renderCharacter(i);
                };
                selector.appendChild(btn);
            });
        }

        function renderCharacter(index) {
            currentCharIndex = index;
            const char = characters[index];
            const sheet = document.getElementById('character-sheet');
            sheet.classList.remove('hidden');

            renderSelector();

            document.getElementById('char-name').innerText = char.name;
            document.getElementById('char-label').innerText = `LV ${char.level} ${char.class}`;

            const colorMap = {
                'orange': '#FF8C42',
                'green': '#00E676',
                'blue': '#2979FF',
                'pink': '#FF6B95',
                'dark': '#1e293b',
                'purple': '#9333ea'
            };
            const charColor = colorMap[char.color] || char.color;
            document.getElementById('char-label').style.backgroundColor = charColor;

            const imgEl = document.getElementById('char-img');
            const placeholder = document.getElementById('upload-placeholder');
            if (char.customImg) {
                if (typeof resolveMediaUrl === 'function' && char.customImg.includes('klasskit-media')) {
                    resolveMediaUrl(char.customImg).then(url => { imgEl.src = url; });
                } else {
                    imgEl.src = char.customImg;
                }
                imgEl.classList.remove('hidden');
                placeholder.classList.add('hidden');
            } else {
                imgEl.classList.add('hidden');
                placeholder.classList.remove('hidden');
            }

            document.getElementById('char-ac').innerText = char.vitals.ac;
            document.getElementById('char-init').innerText = char.vitals.init;
            document.getElementById('char-speed').innerText = char.vitals.speed;
            updateHPDisplay();

            const statsGrid = document.getElementById('stats-grid');
            statsGrid.innerHTML = '';
            for (const [key, val] of Object.entries(char.stats)) {
                const score = Array.isArray(val) ? val[0] : val;
                const mod = Array.isArray(val) ? val[1] : (score >= 10 ? `+${Math.floor((score - 10) / 2)}` : Math.floor((score - 10) / 2));
                statsGrid.innerHTML += `
                    <div class="stat-box transition-transform hover:-translate-y-1">
                        <p class="text-[10px] font-bold text-amber-600 uppercase">${key}</p>
                        <input type="number" value="${score}" class="edit-stat-input hidden w-full text-center bg-transparent text-xl font-bold font-title text-stone-300 outline-none">
                        <p class="view-stat-val text-xl font-bold font-title text-stone-300">${score}</p>
                        <p class="text-xs font-bold text-amber-500">${mod}</p>
                    </div>
                `;
            }

            document.getElementById('view-resources').innerHTML = char.resources.map(r => {
                const label = typeof r === 'string' ? r : r.label;
                return `<span class="border border-amber-900/50 bg-stone-900 px-3 py-1 rounded-xl text-sm text-stone-300 font-bold">${label}</span>`;
            }).join('');

            document.getElementById('view-features').innerHTML = char.features.length ? char.features.map(f =>
                `<div class="flex items-start gap-2"><i data-lucide="check-circle-2" class="w-5 h-5 text-amber-500 shrink-0 mt-0.5"></i> <span>${f}</span></div>`
            ).join('') : '<p class="text-stone-400 italic">No features listed</p>';

            if (char.quote) {
                document.getElementById('section-quote').classList.remove('hidden');
                document.getElementById('view-quote').innerText = `"${char.quote}"`;
            } else {
                document.getElementById('section-quote').classList.add('hidden');
            }

            if (char.gear) {
                document.getElementById('section-gear').classList.remove('hidden');
                document.getElementById('view-gear').innerText = char.gear;
            } else {
                document.getElementById('section-gear').classList.add('hidden');
            }

            const formatActions = (text) => {
                if (!text) return '<p class="text-stone-400 italic">No actions listed</p>';
                // Convert **bold** to <strong> and handle newlines if not HTML
                if (!text.includes('<')) {
                    text = text.replace(/\n/g, '<br>');
                }
                return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            };

            document.getElementById('view-actions').innerHTML = formatActions(char.actions);

            // UI State Management: Update visibility based on isEditMode
            const viewElements = [
                'view-header', 'char-ac', 'char-init', 'char-speed', 'hp-max-display',
                'view-resources', 'view-features', 'view-actions'
            ];

            const editElements = [
                'edit-header', 'save-btn', 'edit-ac', 'edit-init', 'edit-speed', 'edit-max-hp',
                'edit-resources', 'edit-features', 'edit-actions'
            ];

            viewElements.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.toggle('hidden', isEditMode);
            });

            editElements.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.toggle('hidden', !isEditMode);
            });

            document.querySelectorAll('.view-stat-val').forEach(el => el.classList.toggle('hidden', isEditMode));
            document.querySelectorAll('.edit-stat-input').forEach(el => el.classList.toggle('hidden', !isEditMode));

            const editBtn = document.getElementById('edit-btn');
            editBtn.classList.toggle('text-amber-500', isEditMode);
            const editIcon = document.getElementById('edit-icon');
            if (editIcon) {
                editIcon.setAttribute('data-lucide', isEditMode ? 'check-circle' : 'edit-3');
            }

            if (isEditMode) {
                document.getElementById('edit-name').value = char.name;
                document.getElementById('edit-level').value = char.level;
                document.getElementById('edit-class').value = char.class;
                document.getElementById('edit-color').value = char.color || '#1e293b';
                document.getElementById('edit-ac').value = char.vitals.ac;
                document.getElementById('edit-init').value = char.vitals.init;
                document.getElementById('edit-speed').value = char.vitals.speed;
                document.getElementById('edit-max-hp').value = char.vitals.maxHp;

                document.getElementById('edit-resources').value = (char.resources || []).map(r => typeof r === 'string' ? r : r.label).join(', ');
                document.getElementById('edit-features').value = (char.features || []).join('\n');
                document.getElementById('edit-actions').value = char.actions || '';
            }

            lucide.createIcons();
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            renderCharacter(currentCharIndex);
        }

        function saveChanges() {
            const char = characters[currentCharIndex];
            char.name = document.getElementById('edit-name').value;
            char.level = parseInt(document.getElementById('edit-level').value) || char.level;
            char.class = document.getElementById('edit-class').value;
            char.color = document.getElementById('edit-color').value;
            char.vitals.ac = parseInt(document.getElementById('edit-ac').value) || char.vitals.ac;
            char.vitals.init = document.getElementById('edit-init').value;
            char.vitals.speed = document.getElementById('edit-speed').value;
            char.vitals.maxHp = parseInt(document.getElementById('edit-max-hp').value) || char.vitals.maxHp;

            if (char.vitals.hp > char.vitals.maxHp) char.vitals.hp = char.vitals.maxHp;

            char.resources = document.getElementById('edit-resources').value.split(',').map(s => s.trim()).filter(s => s !== '');
            char.features = document.getElementById('edit-features').value.split('\n').map(s => s.trim()).filter(s => s !== '');
            char.actions = document.getElementById('edit-actions').value;

            document.querySelectorAll('.edit-stat-input').forEach((input, i) => {
                const statKeys = Object.keys(char.stats);
                const key = statKeys[i];
                const score = parseInt(input.value);
                const mod = Math.floor((score - 10) / 2);
                const modStr = mod >= 0 ? `+${mod}` : mod.toString();
                char.stats[key] = [score, modStr];
            });

            saveToStorage();
            isEditMode = false;
            renderCharacter(currentCharIndex);
        }

        function addCharacter() {
            if (campaigns.length === 0) {
                const defaultCampaign = ensureCampaignMeta({
                    id: `local_${Date.now()}`,
                    name: 'My Campaign',
                    characters: []
                });
                campaigns.push(defaultCampaign);
                currentCampaignId = defaultCampaign.id;
                characters = defaultCampaign.characters;
                renderCampaignLibrary();
                hideEmptyState();
            }
            const newChar = {
                name: "New Hero", class: "Adventurer", level: 1, color: "#1e293b", customImg: null,
                vitals: { ac: 10, init: "+0", speed: "30ft", hp: 10, maxHp: 10 },
                stats: { STR: [10, "+0"], DEX: [10, "+0"], CON: [10, "+0"], INT: [10, "+0"], WIS: [10, "+0"], CHA: [10, "+0"] },
                resources: [], features: [], actions: "Add actions here..."
            };
            characters.push(newChar);
            currentCharIndex = characters.length - 1;
            saveToStorage();
            isEditMode = true;
            renderCharacter(currentCharIndex);
        }

        function deleteCharacter() {
            if (characters.length <= 1) {
                showModal("Cannot Delete", "Cannot delete the last character!");
                return;
            }

            showModal(
                "Delete Character",
                `Are you sure you want to delete ${characters[currentCharIndex].name}?`,
                "confirm",
                async () => { // onConfirm: proceed with deletion
                    const deletedChar = characters[currentCharIndex];
                    if (deletedChar.customImg && deletedChar.customImg.includes('klasskit-media')) {
                        await deleteMediaFromUrl(deletedChar.customImg).catch(() => {});
                    }
                    characters.splice(currentCharIndex, 1);
                    currentCharIndex = Math.max(0, currentCharIndex - 1);
                    await saveToStorage();
                    isEditMode = false;
                    renderCharacter(currentCharIndex);
                }
            );
        }

        function updateHP(amount) {
            const char = characters[currentCharIndex];
            char.vitals.hp += amount;
            if (char.vitals.hp > char.vitals.maxHp) char.vitals.hp = char.vitals.maxHp;
            if (char.vitals.hp < 0) char.vitals.hp = 0;
            saveToStorage();
            updateHPDisplay();
        }

        function updateHPDisplay() {
            const char = characters[currentCharIndex];
            document.getElementById('hp-current').innerText = char.vitals.hp;
            document.getElementById('hp-max-display').innerText = char.vitals.maxHp;

            const hpPercentage = (char.vitals.hp / char.vitals.maxHp) * 100;
            const hpBar = document.getElementById('hp-bar');
            hpBar.style.width = `${hpPercentage}%`;

            if (hpPercentage > 50) {
                hpBar.className = "h-full transition-all duration-300 bg-amber-700 hover:bg-amber-600";
            } else if (hpPercentage > 20) {
                hpBar.className = "h-full transition-all duration-300 bg-[#FF8C42]";
            } else {
                hpBar.className = "h-full transition-all duration-300 bg-stone-800 hover:bg-stone-700";
            }
        }

        function takeLongRest() {
            const char = characters[currentCharIndex];
            char.vitals.hp = char.vitals.maxHp;
            saveToStorage();
            updateHPDisplay();
        }

        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (typeof uploadMedia === 'function') {
                try {
                    const oldUrl = characters[currentCharIndex].customImg;
                    const signedUrl = await uploadMedia(file, 'dnd-character');
                    characters[currentCharIndex].customImg = signedUrl;
                    if (oldUrl && oldUrl.includes('klasskit-media')) {
                        await deleteMediaFromUrl(oldUrl).catch(() => {});
                    }
                    await saveToStorage();
                    renderCharacter(currentCharIndex);
                    return;
                } catch (e) {
                    console.warn('[Cloud] Image upload failed, falling back to local:', e);
                }
            }

            const reader = new FileReader();
            reader.onload = function (e) {
                characters[currentCharIndex].customImg = e.target.result;
                saveToStorage();
                renderCharacter(currentCharIndex);
            };
            reader.readAsDataURL(file);
        }

        initApp();
    </script>
