            100% {

    <script>
        // --- IndexedDB Wrapper ---
        const DB_NAME = "KKThisOrThatDB";
        const DB_VERSION = 3; // Bumped for image_cache store
        const STORE_NAME = "gameData";
        const STORE_PRESETS = "userPresets";
        const STORE_IMAGES = "imageHashes"; // For deduplication
        const STORE_CACHE = "image_cache"; // For cloud caching

        let currentPresetId = "states";

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: "id" });
                    }
                    if (!db.objectStoreNames.contains(STORE_PRESETS)) {
                        const presetStore = db.createObjectStore(STORE_PRESETS, { keyPath: "id", autoIncrement: true });
                        presetStore.createIndex("name", "name", { unique: false });
                        presetStore.createIndex("updatedAt", "updatedAt", { unique: false });
                    }
                    if (!db.objectStoreNames.contains(STORE_IMAGES)) {
                        db.createObjectStore(STORE_IMAGES, { keyPath: "hash" });
                    }
                    if (!db.objectStoreNames.contains(STORE_CACHE)) {
                        db.createObjectStore(STORE_CACHE);
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function getCacheImg(url) {
            try {
                const db = await openDB();
                return new Promise((res) => {
                    const r = db.transaction(STORE_CACHE, "readonly").objectStore(STORE_CACHE).get(url);
                    r.onsuccess = () => res(r.result);
                    r.onerror = () => res(null);
                });
            } catch(e) { return null; }
        }

        async function putCacheImg(url, blob) {
            try {
                const db = await openDB();
                db.transaction(STORE_CACHE, "readwrite").objectStore(STORE_CACHE).put(blob, url);
            } catch(e) { }
        }

        const blobCache = new Map();

        async function resolveAndCache(url) {
            if (!url || !url.includes('klasskit-media')) return url;
            if (blobCache.has(url)) return blobCache.get(url);

            const cachedBlob = await getCacheImg(url);
            if (cachedBlob) {
                const bUrl = URL.createObjectURL(cachedBlob);
                blobCache.set(url, bUrl);
                return bUrl;
            }

            try {
                const signedUrl = await resolveMediaUrl(url);
                const resp = await fetch(signedUrl);
                const blob = await resp.blob();
                
                await putCacheImg(url, blob);
                const bUrl = URL.createObjectURL(blob);
                blobCache.set(url, bUrl);
                return bUrl;

        async function getAllPresets() {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_PRESETS, "readonly");
                const store = tx.objectStore(STORE_PRESETS);
                const index = store.index("updatedAt");
                const request = index.getAll();
                request.onsuccess = () => resolve(request.result.reverse());
                request.onerror = () => reject(request.error);
            });
        }

        async function saveUserPreset(name, data, id = null) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_PRESETS, "readwrite");
                const store = tx.objectStore(STORE_PRESETS);
                const preset = { name, data, updatedAt: Date.now() };
                if (id) preset.id = id;
                const request = id ? store.put(preset) : store.add(preset);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function deleteUserPreset(id) {
            // Cloud Cleanup
            const { data: { user } } = await db.auth.getUser();
            if (!isSandbox() && user) {
                deleteFolder(`${user.id}/this_or_that/${id}`).catch(e => console.warn("Cloud folder delete failed", e));
            }

            const localDb = await openDB();
            return new Promise((resolve, reject) => {
                const tx = localDb.transaction(STORE_PRESETS, "readwrite");
                const store = tx.objectStore(STORE_PRESETS);
                const request = store.delete(id);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, "readwrite");

                const request = store.put({ id: "currentPresetId", value: id });
                request.onsuccess = () => resolve();

        async function renderPresetSelector() {
            const presets = await getAllPresets();
            const select = document.getElementById("userPresetSelect");
            if (!select) return;
            select.innerHTML = '<option value="">-- Select a Custom Preset --</option>';
            presets.forEach(p => {

                option.value = p.id;
                option.textContent = p.name;
                if (p.id === currentPresetId) option.selected = true;
                select.appendChild(option);
            });
            syncToCloud();

        async function syncToCloud() {
            if (syncTimeout) clearTimeout(syncTimeout);
            syncTimeout = setTimeout(async () => {
                const presets = await getAllPresets();
                // Strip local DataURLs from cloud sync, but keep Supabase URLs
                const cleanPresets = presets.map(p => ({
                    ...p,
                    data: p.data.map(slide => ({
                        ...slide,
                        images: (slide.images || []).map(img => (img && img.startsWith('http')) ? img : "")
                    }))
                }));
                const cleanQuestions = questions.map(s => ({
                    ...s,
                    images: (s.images || []).map(img => (img && img.startsWith('http')) ? img : "")
                }));

                await saveProgress('this_or_that', {
                    questions: cleanQuestions,
                    presets: cleanPresets,
                    currentPresetId
                });
            }, 2000);
        }

        async function loadFromCloud() {
            const cloudData = await loadProgress('this_or_that');
            if (cloudData) {
                // Merge presets (cloud prioritized)
                const db = await openDB();
                if (cloudData.presets) {
                    for (const p of cloudData.presets) {
                        const tx = db.transaction(STORE_PRESETS, "readwrite");
                        const store = tx.objectStore(STORE_PRESETS);
                        // We use name as a weak unique identifier for cloud merge
                        const existing = await new Promise(r => {
                            const req = store.index("name").get(p.name);
                            req.onsuccess = () => r(req.result);
                        });
                        if (!existing) {
                            delete p.id; // Let local DB assign new ID
                            store.add(p);
                        }
                    }
                }
                if (cloudData.questions && questions.length === 0) {
                    questions = cloudData.questions;
                    await saveGameData(questions);
                }
                currentPresetId = cloudData.currentPresetId ?? currentPresetId;
                await renderPresetSelector();
            }
        }

        async function saveCurrentUserPreset() {
            const name = document.getElementById("userPresetNameInput").value.trim() || "Untitled";
            const oldId = currentPresetId;
            const id = await saveUserPreset(name, editorData, (typeof oldId === 'number') ? oldId : null);
            
            // Migration Logic: If we saved from "states" or "custom" to a real ID
            if (oldId === "states" || oldId === "custom") {
                const { data: { user } } = await db.auth.getUser();
                if (!isSandbox() && user) {
                    console.log("Finalizing cloud folder...");
                    
                    const oldDir = `${user.id}/this_or_that/${oldId}`;
                    const newDir = `${user.id}/this_or_that/${id}`;

                    // 1. List files in old dir
                    const { data: files } = await db.storage.from(STORAGE_CONFIG.bucket).list(oldDir);
                    if (files && files.length > 0) {
                        for (const file of files) {
                            if (file.name === '.emptyFolderPlaceholder') continue;
                            const oldPath = `${oldDir}/${file.name}`;
                            const newPath = `${newDir}/${file.name}`;
                            await copyMedia(oldPath, newPath).catch(e => console.warn("Copy failed", e));
                        }
                        
                        // 2. Update editorData URLs to point to new ID
                        const oldDirUrl = `/this_or_that/${oldId}/`;
                        const newDirUrl = `/this_or_that/${id}/`;
                        editorData.forEach(slide => {
                            if (slide.images) {
                                slide.images = slide.images.map(img => (img && img.includes(oldDirUrl)) ? img.replace(oldDirUrl, newDirUrl) : img);
                            }
                        });
                        
                        // 3. Save again with updated URLs
                        await saveUserPreset(name, editorData, id);
                        
                        // 4. Delete old folder
                        await deleteFolder(oldDir).catch(e => console.warn(e));
                    }
                }
            }

            currentPresetId = id;
            await saveCurrentPresetId(id);
            await renderPresetSelector();
            renderBuilder();
            customAlert("Preset saved successfully!");
        }

        // --- IMAGE DEDUPLICATION ---
        async function hashImage(dataUrl) {
            // Simple hash based on first 100 chars + length
            return dataUrl.slice(0, 100) + "_" + dataUrl.length;
        }

        async function storeImageHash(hash, dataUrl) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_IMAGES, "readwrite");
                const store = tx.objectStore(STORE_IMAGES);
                const request = store.put({ hash, dataUrl });
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        async function getImageByHash(hash) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_IMAGES, "readonly");
                const store = tx.objectStore(STORE_IMAGES);
                const request = store.get(hash);
                request.onsuccess = () => resolve(request.result?.dataUrl || null);
                request.onerror = () => reject(request.error);
            });
        }

        async function deduplicateImagesInEditorData() {
            for (const slide of editorData) {
                if (slide.images) {
                    for (let i = 0; i < slide.images.length; i++) {
                        const img = slide.images[i];
                        if (img) {
                            const hash = await hashImage(img);
                            const existing = await getImageByHash(hash);
                            if (existing) {
                                // Use existing image
                                slide.images[i] = existing;
                            } else {
                                // Store new image
                                await storeImageHash(hash, img);
                            }
                        }
                    }
                }
            }
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (isMuted) return;
            if (audioCtx.state === "suspended") audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const t = audioCtx.currentTime;

            if (type === "click") {
                osc.type = "sine";
                osc.frequency.setValueAtTime(400, t);
                osc.frequency.exponentialRampToValueAtTime(100, t + 0.1);
                gain.gain.setValueAtTime(0.1, t);
                gain.gain.linearRampToValueAtTime(0, t + 0.1);
                osc.start(t); osc.stop(t + 0.1);
            } else if (type === "pop") {
                osc.type = "triangle";
                osc.frequency.setValueAtTime(200, t);
                osc.frequency.linearRampToValueAtTime(400, t + 0.1);
                gain.gain.setValueAtTime(0.1, t);
                gain.gain.linearRampToValueAtTime(0, t + 0.15);
                osc.start(t); osc.stop(t + 0.15);
            }
        }

            const blob = new Blob([dataStr], { type: "application/json" });

            const a = document.createElement("a");
            a.href = url;
            a.download = "this-or-that-klasskit.json";
            document.body.appendChild(a);
            a.click();

            document.body.removeChild(a);
            URL.revokeObjectURL(url);

        function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const importedData = JSON.parse(e.target.result);

                    if (Array.isArray(importedData) && importedData[0].hasOwnProperty("options")) {
                        editorData = importedData;

                        editorData.forEach(slide => {
                            if (!slide.images) slide.images = [];
                        });

                        renderBuilder();
                        customAlert("Game imported successfully!");
                    } else {
                        customAlert("Invalid game file. Please select a correct This or That .json file.");
                    }
                } catch (err) {
                    customAlert("Error reading the file. Make sure it is a valid JSON game file.");
                }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

                    imgSource = await uploadMedia(file, 'this_or_that', currentPresetId);
                } else {
                    imgSource = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve(e.target.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(file);
                    });

            });

            if (editorData.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 bg-white rounded-3xl border-4 border-dashed border-gray-200 animate-pulse">
                        <i data-lucide="layout" class="w-16 h-16 mx-auto mb-4 text-gray-200"></i>
                        <p class="text-gray-400 font-display text-xl">Create your first slide to start!</p>
                    </div>`;
            }
            lucide.createIcons();

            // Resolve cloud images in builder
            const imgs = container.querySelectorAll('img[data-src]');
            for (const img of imgs) {
                const src = img.getAttribute('data-src');
                if (src && src.includes('klasskit-media')) {
                    resolveAndCache(src).then(url => { img.src = url; });
                } else {
                    img.src = src;
                }
            }
        }

        function updateQuestion(sIdx, val) { editorData[sIdx].question = val; }
        function updateOption(sIdx, oIdx, val) { editorData[sIdx].options[oIdx] = val; }

        function removeImage(sIdx, oIdx) {
            playSound("click");
            if (editorData[sIdx].images) {
                const url = editorData[sIdx].images[oIdx];
                if (url && url.includes('klasskit-media')) {
                    deleteMediaFromUrl(url).catch(e => console.error("Cloud delete failed", e));
                }
                editorData[sIdx].images[oIdx] = null;
                renderBuilder();
            }
        }

        function addOption(sIdx) {
            if (editorData[sIdx].options.length < 5) {
                editorData[sIdx].options.push("");
                renderBuilder();
            }
        }

        function addNewSlide() {
            editorData.push({ question: "", options: ["", ""], images: [] });
            renderBuilder();
            const scrollContainer = document.getElementById("builderScrollArea");
            setTimeout(() => { scrollContainer.scrollTo({ top: scrollContainer.scrollHeight, behavior: "smooth" }); }, 50);
        }

        function deleteOption(sIdx, oIdx) {
            if (editorData[sIdx].options.length > 2) {
                editorData[sIdx].options.splice(oIdx, 1);
                editorData[sIdx].images.splice(oIdx, 1);
                renderBuilder();
            }
        }

        function duplicateSlide(sIdx) {
            playSound("click");
            const slideToDuplicate = JSON.parse(JSON.stringify(editorData[sIdx]));
            editorData.splice(sIdx + 1, 0, slideToDuplicate);
            renderBuilder();
        }

        function deleteSlide(sIdx) {
            customConfirm("Are you sure you want to delete this slide?", () => {
                editorData.splice(sIdx, 1);
                renderBuilder();
            });
        }

        async function saveAndStart() {
            const validData = editorData.filter(
                (s) => s.question.trim() !== "" && s.options.every((o) => o.trim() !== "")
            );
            if (validData.length === 0) {
                customAlert("Please add at least one valid slide with completed options before saving.");
                return;
            }
            questions = validData;

            try {
                await saveGameData(questions);
            } catch (error) {
                console.warn("Failed to save to local database (might be out of storage or in private mode):", error);
            }
            
            syncToCloud();
            closeSetupModal();
            startGame();
        }

        function startGame() {
            if (questions.length === 0) {
                customAlert("Your game is empty! Let's build one first.");
                openSetupModal();
                return;
            }
            currentIndex = 0;
            document.getElementById("startScreen").classList.add("hidden");
            document.getElementById("endScreen").classList.add("hidden");
            document.getElementById("gameScreen").classList.remove("hidden");
            renderSlide();
        }

        function renderSlide() {
            const container = document.getElementById("optionsContainer");
            container.innerHTML = "";
            const data = questions[currentIndex];
            if (!data) { endGame(); return; }

            document.getElementById("questionText").innerText = data.question;
            document.getElementById("slideCounter").innerText = `${currentIndex + 1}/${questions.length}`;

            data.options.forEach((optText, idx) => {
                const colorClass = COLORS[idx % COLORS.length];
                const iconClass = getIcon(optText);
                const imgSrc = data.images && data.images[idx];

                const panel = document.createElement("div");
                let borderClass = "border-b-4 md:border-b-0 md:border-r-4 border-kkdark";
                if (idx === data.options.length - 1) borderClass = "";

                panel.className = `${colorClass} ${borderClass} option-panel flex-1 relative flex flex-col items-center justify-center p-2 md:p-6 overflow-hidden cursor-pointer`;
                panel.style.animation = `slideUp 0.6s cubic-bezier(0.2, 1, 0.3, 1) forwards`;
                panel.style.animationDelay = `${idx * 0.1}s`;
                panel.style.opacity = "0";

                let backgroundLayer = '';
                let contentLayer = '';

                if (imgSrc) {
                    // IMAGE MODE: Duotone Background (Gray Image + Color Mix Blend)
                    backgroundLayer = `
                            <div class="absolute inset-0 z-0 overflow-hidden">
                                <img src="${imgSrc}" class="bg-image-layer w-full h-full object-cover opacity-60 mix-blend-multiply grayscale transition-transform duration-700 pointer-events-none">
                            </div>
                            <div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-black/10 z-0 pointer-events-none"></div> 
                        `;

                    // Text Only (No Circle)
                    contentLayer = `
                            <div class="relative z-10 flex flex-col items-center justify-center h-full px-4">
                                <h2 class="font-display font-bold text-4xl md:text-7xl text-white drop-shadow-[4px_4px_0_rgba(30,41,59,1)] uppercase tracking-wide text-center leading-tight">
                                    ${optText}
                                </h2>
                            </div>
                        `;
                } else {
                    // ICON MODE: Classic Circle Design
                    backgroundLayer = `<div class="absolute inset-0 bg-dots opacity-20 pointer-events-none"></div>`;
                    contentLayer = `
                            <div class="relative z-10 flex flex-row md:flex-col items-center gap-4 md:gap-6 panel-icon transition-transform duration-300">
                                <div class="w-24 h-24 md:w-32 md:h-32 bg-white/20 rounded-full border-4 border-white/40 shadow-lg flex items-center justify-center backdrop-blur-sm flex-shrink-0 overflow-hidden">
                                    <i data-lucide="${iconClass}" class="w-12 h-12 md:w-16 md:h-16 text-white drop-shadow-md"></i>
                                </div>
                                <h2 class="font-display font-bold text-2xl md:text-5xl text-white drop-shadow-[4px_4px_0_rgba(0,0,0,0.3)] uppercase tracking-wide text-center leading-tight">
                                    ${optText}
                                </h2>
                            </div>
                        `;
                }

                panel.innerHTML = backgroundLayer + contentLayer;

                // Resolve cloud images in slide
                if (imgSrc && imgSrc.includes('klasskit-media')) {
                    const bgImg = panel.querySelector('.bg-image-layer');
                    resolveAndCache(imgSrc).then(url => { if (bgImg) bgImg.src = url; });
                }

                panel.onclick = () => { playSound("pop"); };
                container.appendChild(panel);
            });

            hydrateImages();
            lucide.createIcons();
            playSound("pop");
        }

        function nextSlide() {
            if (currentIndex < questions.length - 1) { currentIndex++; renderSlide(); }
            else { endGame(); }
        }

        function prevSlide() {
            if (currentIndex > 0) { currentIndex--; renderSlide(); }
            else { playSound("click"); }
        }

        function endGame() {
            playSound("pop");
            document.getElementById("gameScreen").classList.add("hidden");
            document.getElementById("endScreen").classList.remove("hidden");
        }

        function resetGame() {
            playSound("click");
            document.getElementById("endScreen").classList.add("hidden");
            startGame();
        }

        document.addEventListener("keydown", (e) => {
            if (document.getElementById("gameScreen").classList.contains("hidden")) return;
            if (e.key === "ArrowRight" || e.key === " " || e.key === "Enter") nextSlide();
            if (e.key === "ArrowLeft") prevSlide();
        });

        init();
    </script>
</body>

</html>
