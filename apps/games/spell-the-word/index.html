<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Supabase Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4"></script>
    <script src="/supabase.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spell It</title>
    <link rel="icon" type="image/x-icon" href="../../../media/icon.ico" />
    <link rel="icon" type="image/webp" href="../../../media/icon.webp" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@1.16.0"></script>
    <script src="../../../components/input-modal.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        pink: '#FF6B95',
                        orange: '#FF8C42',
                        green: '#00E676',
                        blue: '#2979FF',
                        dark: '#1e293b',
                        chalk: '#f8fafc'
                    },
                    fontFamily: {
                        heading: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif']
                    },
                    boxShadow: {
                        brutal: '4px 4px 0px 0px rgba(30, 41, 59, 1)',
                        brutal_dark: '4px 4px 0px 0px rgba(148, 163, 184, 1)',
                        brutal_inset: 'inset 4px 4px 0px 0px rgba(30, 41, 59, 0.1)',
                        brutal_inset_dark: 'inset 4px 4px 0px 0px rgba(0, 0, 0, 0.3)'
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Grid Pattern Background */
        body {
            background-color: #f8fafc;
            background-image: 
                linear-gradient(to right, rgba(30, 41, 59, 0.05) 2px, transparent 2px),
                linear-gradient(to bottom, rgba(30, 41, 59, 0.05) 2px, transparent 2px);
            background-size: 40px 40px;
        }
        
        .dark body {
            background-color: #0f172a;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 2px, transparent 2px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 2px, transparent 2px);
        }

        /* Neo-brutalist interaction classes */
        .btn-brutal {
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-brutal:hover {
            transform: translateY(-2px) rotate(1deg);
        }
        .btn-brutal:active {
            transform: translateY(4px);
            box-shadow: 0px 0px 0px 0px rgba(30, 41, 59, 1) !important;
        }
        .dark .btn-brutal:active {
            box-shadow: 0px 0px 0px 0px rgba(148, 163, 184, 1) !important;
        }

        /* Custom Animations */
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-12px); }
            40%, 80% { transform: translateX(12px); }
        }
        .animate-shake {
            animation: shake 0.4s ease-in-out;
        }
    </style>
    <link rel="stylesheet" href="../../../css/base.css" />
    <link rel="stylesheet" href="../../../css/components.css" />
  
</head>
<body class="font-body text-dark dark:text-white min-h-screen flex flex-col transition-colors duration-300 overflow-x-hidden">

    <div class="fixed top-4 right-4 flex gap-3 z-20">
        <button onclick="toggleReachMode()" class="btn-brutal bg-pink text-dark p-2 md:p-3 rounded-xl border-4 border-dark shadow-brutal dark:shadow-brutal_dark dark:border-slate-400 flex items-center justify-center group" aria-label="Toggle Reach Mode">
            <i data-lucide="arrow-down" id="reach-icon" class="w-5 h-5 md:w-6 md:h-6 stroke-[3] transition-transform group-hover:scale-110"></i>
        </button>
        <button onclick="openSettings()" class="btn-brutal bg-blue text-white p-2 md:p-3 rounded-xl border-4 border-dark shadow-brutal dark:shadow-brutal_dark dark:border-slate-400 flex items-center justify-center group" aria-label="Settings">
            <i data-lucide="settings" class="w-5 h-5 md:w-6 md:h-6 stroke-[3] transition-transform group-hover:rotate-45"></i>
        </button>
        <button onclick="toggleDarkMode()" class="btn-brutal bg-orange text-white p-2 md:p-3 rounded-xl border-4 border-dark shadow-brutal dark:shadow-brutal_dark dark:border-slate-400 flex items-center justify-center group" aria-label="Toggle Dark Mode">
            <i data-lucide="moon" id="theme-icon" class="w-5 h-5 md:w-6 md:h-6 stroke-[3] transition-transform group-hover:-rotate-12"></i>
        </button>
    </div>

    <div id="main-wrapper" class="flex flex-col flex-grow w-full items-center justify-center p-4 md:p-8 transition-all duration-500 ease-in-out">
        
        <div id="game-board" class="w-11/12 max-w-6xl bg-white dark:bg-slate-800 border-4 border-dark dark:border-slate-400 rounded-3xl shadow-brutal dark:shadow-brutal_dark p-6 md:p-10 flex flex-col items-center gap-6 md:gap-8 relative transition-transform">
            
            <div class="w-full flex flex-col items-center mt-2 relative">
                <div id="progress-badge" class="md:absolute md:left-0 md:top-2 bg-pink text-dark font-heading font-bold px-4 py-2 rounded-xl border-4 border-dark shadow-brutal dark:shadow-brutal_dark dark:border-slate-400 mb-2 md:mb-0 transform -rotate-2 text-sm md:text-base">
                    Word 1 of 3
                </div>

                <div class="flex flex-col md:flex-row items-center gap-4 z-10">
                    <h1 class="font-heading text-4xl md:text-5xl font-bold text-center text-blue tracking-wide drop-shadow-sm">
                        Spell It
                    </h1>
                    <button onclick="playTargetWordAudio()" class="btn-brutal bg-blue text-white p-3 md:p-4 rounded-2xl border-4 border-dark shadow-brutal dark:shadow-brutal_dark dark:border-slate-400 flex items-center justify-center hover:bg-blue/90" aria-label="Listen to word">
                        <i data-lucide="play" class="w-6 h-6 md:w-8 md:h-8 stroke-[3] ml-1"></i>
                    </button>
                </div>
            </div>
            
            <div class="w-full bg-chalk dark:bg-slate-900 rounded-2xl p-6 md:p-8 border-4 border-dark dark:border-slate-500 shadow-brutal_inset dark:shadow-brutal_inset_dark flex items-center justify-center min-h-[140px]">
                <div id="slots-container" class="flex flex-wrap gap-4 md:gap-6 justify-center">
                    </div>
            </div>

            <div class="w-full bg-slate-100 dark:bg-slate-700 rounded-2xl p-6 md:p-8 border-4 border-dark/20 dark:border-slate-500/30 flex flex-col items-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-2 bg-dark/5 dark:bg-black/20"></div>
                <p class="font-heading font-bold opacity-50 text-center mb-6 text-base md:text-lg uppercase tracking-widest text-dark dark:text-white">Letter Pool</p>
                <div id="letters-container" class="flex flex-wrap gap-4 md:gap-6 justify-center min-h-[100px] z-10">
                    </div>
            </div>
            
        </div>
    </div>

    <div id="alert-modal" class="hidden fixed inset-0 bg-dark/60 backdrop-blur-md flex items-center justify-center z-50 p-4">
        <div class="bg-chalk dark:bg-slate-800 border-4 border-dark dark:border-slate-400 rounded-3xl shadow-[8px_8px_0px_0px_rgba(30,41,59,1)] dark:shadow-[8px_8px_0px_0px_rgba(148,163,184,1)] p-8 md:p-10 max-w-md w-full text-center animate-pop">
            <h2 id="alert-title" class="font-heading text-4xl md:text-5xl font-bold text-green mb-4 transform -rotate-2 inline-block">Awesome!</h2>
            <p id="alert-message" class="text-xl md:text-2xl font-bold mb-8 md:mb-10 dark:text-white text-dark opacity-80">You spelled it right.</p>
            <button id="alert-btn" onclick="handleAlertAction()" class="btn-brutal bg-green text-dark font-heading font-bold text-2xl md:text-3xl py-3 md:py-4 px-8 rounded-2xl border-4 border-dark shadow-brutal w-full focus:outline-none">
                Next Word
            </button>
        </div>
    </div>

    <div id="settings-modal" class="hidden fixed inset-0 bg-dark/60 backdrop-blur-md flex items-center justify-center z-50 p-4">
        <div class="bg-chalk dark:bg-slate-800 border-4 border-dark dark:border-slate-400 rounded-3xl shadow-[8px_8px_0px_0px_rgba(30,41,59,1)] dark:shadow-[8px_8px_0px_0px_rgba(148,163,184,1)] p-8 md:p-10 max-w-lg w-full animate-pop">
            <div class="flex items-center gap-3 mb-4">
                <i data-lucide="settings" class="w-6 h-6 md:w-8 md:h-8 stroke-[3] text-blue"></i>
                <h2 class="font-heading text-3xl md:text-4xl font-bold text-blue">Settings</h2>
            </div>
            <p class="mb-6 md:mb-8 font-bold opacity-70 text-base md:text-lg">Enter word list separated by commas.</p>
            
            <textarea id="words-input" rows="4" class="w-full bg-white dark:bg-slate-700 border-4 border-dark dark:border-slate-400 rounded-2xl p-4 md:p-6 font-heading text-xl md:text-2xl uppercase font-bold text-left mb-6 md:mb-8 focus:outline-none focus:border-pink transition-colors resize-none shadow-brutal_inset dark:shadow-brutal_inset_dark" placeholder="e.g. ENGLISH, KLASSKIT, CODING"></textarea>
            
            <div class="flex gap-4">
                <button onclick="closeSettings()" class="btn-brutal bg-slate-200 dark:bg-slate-600 text-dark dark:text-white font-heading font-bold text-xl md:text-2xl py-3 md:py-4 px-4 rounded-2xl border-4 border-dark dark:border-slate-400 shadow-brutal dark:shadow-brutal_dark flex-1">
                    Cancel
                </button>
                <button onclick="saveWords()" class="btn-brutal bg-blue text-white font-heading font-bold text-xl md:text-2xl py-3 md:py-4 px-4 rounded-2xl border-4 border-dark dark:border-slate-400 shadow-brutal dark:shadow-brutal_dark flex-1">
                    Save List
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Game State
        let wordList = [];
        let currentWordIndex = 0;
        let targetWord = "";
        let letterTiles = []; 
        let placedLetters = []; 
        let currentAlertAction = "close";
        let isReachMode = false;

        // DOM Elements
        const mainWrapper = document.getElementById('main-wrapper');
        const gameBoard = document.getElementById('game-board');
        const slotsContainer = document.getElementById('slots-container');
        const lettersContainer = document.getElementById('letters-container');
        const progressBadge = document.getElementById('progress-badge');
        const alertModal = document.getElementById('alert-modal');
        const alertTitle = document.getElementById('alert-title');
        const alertMessage = document.getElementById('alert-message');
        const alertBtn = document.getElementById('alert-btn');
        const settingsModal = document.getElementById('settings-modal');
        const wordsInput = document.getElementById('words-input');
        const reachIcon = document.getElementById('reach-icon');

        // Natural Audio via Free Dictionary API
        async function playTargetWordAudio() {
            try {
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${targetWord.toLowerCase()}`);
                const data = await response.json();
                
                let audioUrl = "";
                if (data[0] && data[0].phonetics) {
                    for (let phonetic of data[0].phonetics) {
                        if (phonetic.audio) {
                            audioUrl = phonetic.audio;
                            break;
                        }
                    }
                }

                if (audioUrl) {
                    const audio = new Audio(audioUrl);
                    audio.play();
                }
            } catch (error) {
                console.log("Audio not found for word.");
            }
        }

        async function loadPreferences() {
            await requireAuth();

            const savedState = await loadProgress('spell_word');
            if (savedState) {
                // Theme
                if (savedState.theme === 'dark') {
                    document.documentElement.classList.add('dark');
                    document.getElementById('theme-icon').setAttribute('data-lucide', 'sun');
                } else {
                    document.documentElement.classList.remove('dark');
                    document.getElementById('theme-icon').setAttribute('data-lucide', 'moon');
                }

                // Reach Mode
                isReachMode = !!savedState.reachMode;
                applyReachMode();

                // Word List
                if (savedState.wordList && savedState.wordList.length > 0) {
                    wordList = savedState.wordList;
                } else {
                    wordList = ["ENGLISH", "KLASSKIT", "CODING"];
                }
            } else {
                // Fallback to legacy localStorage for migration
                if (localStorage.getItem('theme_spell-the-word') === 'dark') {
                    document.documentElement.classList.add('dark');
                    document.getElementById('theme-icon').setAttribute('data-lucide', 'sun');
                }
                
                const savedReach = localStorage.getItem('spellingReachMode');
                if (savedReach !== null) {
                    isReachMode = savedReach === 'true';
                }
                
                const savedWords = localStorage.getItem('spellingWordList');
                if (savedWords) {
                    wordList = JSON.parse(savedWords);
                } else {
                    wordList = ["ENGLISH", "KLASSKIT", "CODING"];
                }
                
                applyReachMode();
                // Trigger initial save to cloud
                saveToCloud();
            }
            
            lucide.createIcons();
        }

        // --- CLOUD PERSISTENCE ---
        let saveTimeout;
        function saveToCloud() {
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                saveProgress('spell_word', {
                    theme: document.documentElement.classList.contains('dark') ? 'dark' : 'light',
                    reachMode: isReachMode,
                    wordList: wordList
                });
            }, 1000);
        }

        // Initialize Game
        async function initGame() {
            await loadPreferences();
            
            if (wordList.length === 0) wordList = ["ENGLISH", "KLASSKIT", "CODING"];
            
            currentWordIndex = 0;
            loadCurrentWord();
        }

        function loadCurrentWord() {
            targetWord = wordList[currentWordIndex].toUpperCase();
            progressBadge.textContent = `Word ${currentWordIndex + 1} of ${wordList.length}`;

            let chars = targetWord.split('');
            for (let i = chars.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [chars[i], chars[j]] = [chars[j], chars[i]];
            }

            letterTiles = chars.map((char, index) => ({
                id: `tile-${index}`,
                char: char,
                isPlaced: false
            }));

            placedLetters = new Array(targetWord.length).fill(null);
            renderBoard();
        }

        function renderBoard(animateTileId = null) {
            slotsContainer.innerHTML = '';
            placedLetters.forEach((tileId, index) => {
                const slotDiv = document.createElement('div');
                slotDiv.className = `w-14 h-16 md:w-20 md:h-24 flex items-center justify-center border-4 rounded-2xl transition-all cursor-pointer bg-white dark:bg-slate-800 ${
                    tileId ? 'border-transparent shadow-none' : 'border-dark/20 dark:border-slate-500 border-dashed hover:bg-dark/5 dark:hover:bg-slate-600/50'
                }`;
                slotDiv.onclick = () => handleSlotClick(index);

                if (tileId) {
                    const tile = letterTiles.find(t => t.id === tileId);
                    const isAnimating = tileId === animateTileId;
                    slotDiv.appendChild(createTileElement(tile, true, isAnimating));
                }
                slotsContainer.appendChild(slotDiv);
            });

            lettersContainer.innerHTML = '';
            letterTiles.forEach(tile => {
                if (!tile.isPlaced) {
                    const isAnimating = tile.id === animateTileId;
                    lettersContainer.appendChild(createTileElement(tile, false, isAnimating));
                }
            });
        }

        function createTileElement(tile, inSlot, shouldAnimate) {
            const btn = document.createElement('button');
            btn.className = `btn-brutal w-14 h-16 md:w-20 md:h-24 font-heading text-4xl md:text-5xl font-bold flex items-center justify-center border-4 border-dark rounded-2xl shadow-brutal dark:shadow-brutal_dark dark:border-slate-400 ${
                inSlot ? 'bg-orange text-dark hover:bg-orange/90' : 'bg-pink text-dark hover:bg-pink/90'
            } ${shouldAnimate ? 'animate-pop' : ''}`;
            
            btn.textContent = tile.char;
            
            if (!inSlot) {
                btn.onclick = () => handleLetterClick(tile.id);
            }
            return btn;
        }

        // Mechanics
        function handleLetterClick(tileId) {
            const emptyIndex = placedLetters.indexOf(null);
            if (emptyIndex !== -1) {
                const tile = letterTiles.find(t => t.id === tileId);
                
                placedLetters[emptyIndex] = tileId;
                tile.isPlaced = true;
                renderBoard(tileId); 
                checkWin();
            }
        }

        function handleSlotClick(slotIndex) {
            const tileId = placedLetters[slotIndex];
            if (tileId) {
                placedLetters[slotIndex] = null;
                const tile = letterTiles.find(t => t.id === tileId);
                tile.isPlaced = false;
                renderBoard(tileId); 
            }
        }

        function checkWin() {
            if (placedLetters.includes(null)) return; 

            let spelledWord = placedLetters.map(id => letterTiles.find(t => t.id === id).char).join('');
            
            if (spelledWord === targetWord) {
                if (currentWordIndex < wordList.length - 1) {
                    setTimeout(() => showAlert("Awesome!", "You spelled it right!", true, "next"), 400);
                } else {
                    setTimeout(() => showAlert("Level Complete!", "You spelled all the words perfectly!", true, "finish"), 400);
                }
            } else {
                gameBoard.classList.remove('animate-shake');
                void gameBoard.offsetWidth; 
                gameBoard.classList.add('animate-shake');
                
                setTimeout(() => showAlert("Oops!", "That's not quite right. Try again!", false, "close"), 600);
            }
        }

        // Keyboard Support
        document.addEventListener('keydown', (e) => {
            if (!alertModal.classList.contains('hidden') || !settingsModal.classList.contains('hidden')) {
                if(e.key === 'Enter' && !alertModal.classList.contains('hidden')) {
                    handleAlertAction();
                }
                return;
            }

            const key = e.key.toUpperCase();
            
            if (key === 'BACKSPACE') {
                for (let i = placedLetters.length - 1; i >= 0; i--) {
                    if (placedLetters[i] !== null) {
                        handleSlotClick(i);
                        break;
                    }
                }
                return;
            }

            if (/^[A-Z]$/.test(key)) {
                const targetTile = letterTiles.find(t => !t.isPlaced && t.char === key);
                if (targetTile) {
                    handleLetterClick(targetTile.id);
                }
            }
        });

        // Modals - using universal input modal
        async function showAlert(title, message, isSuccess, actionType) {
            const confirmText = actionType === "next" ? "Next Word" : actionType === "finish" ? "Play Again" : "Try Again";
            const iconColor = isSuccess ? "green" : "pink";
            const icon = isSuccess ? "check-circle" : "alert-circle";

            await showAlertModal(message, { title: title, icon: icon, iconColor: iconColor, confirmText: confirmText });

            // Handle action after alert is closed
            if (actionType === "next") {
                currentWordIndex++;
                loadCurrentWord();
            } else if (actionType === "finish") {
                initGame();
            }
        }

        function handleAlertAction() {
            // Kept for compatibility, actions now handled in showAlert
        }

        function openSettings() {
            wordsInput.value = wordList.join(', ');
            settingsModal.classList.remove('hidden');
            wordsInput.focus();
        }

        function closeSettings() {
            settingsModal.classList.add('hidden');
        }

        function saveWords() {
            const rawText = wordsInput.value;
            const newList = rawText.split(',')
                .map(w => w.trim().toUpperCase().replace(/[^A-Z]/g, ''))
                .filter(w => w.length > 0);

            if (newList.length > 0) {
                wordList = newList;
                saveToCloud();
                closeSettings();
                initGame();
                showAlert("Success!", "New word list saved.", true, "close");
            } else {
                showAlert("Error", "Please enter valid words.", false, "close");
            }
        }
        // --- REACH MODE & THEME FUNCTIONS ---

function applyReachMode() {
    // This moves the game board to the bottom of the screen for easier thumb reach
    if (isReachMode) {
        mainWrapper.classList.remove('justify-center');
        mainWrapper.classList.add('justify-end', 'pb-12');
        reachIcon.setAttribute('data-lucide', 'arrow-up');
    } else {
        mainWrapper.classList.remove('justify-end', 'pb-12');
        mainWrapper.classList.add('justify-center');
        reachIcon.setAttribute('data-lucide', 'arrow-down');
    }
    lucide.createIcons();
}

function toggleReachMode() {
    isReachMode = !isReachMode;
    applyReachMode();
    saveToCloud();
}

function toggleDarkMode() {
    document.documentElement.classList.toggle('dark');
    const themeIcon = document.getElementById('theme-icon');
    
    if (document.documentElement.classList.contains('dark')) {
        themeIcon.setAttribute('data-lucide', 'sun');
    } else {
        themeIcon.setAttribute('data-lucide', 'moon');
    }
    
    lucide.createIcons();
    saveToCloud();
}

        // Boot
        loadPreferences();
        initGame();
    </script>
</body>
</html>
