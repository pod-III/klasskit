<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Supabase Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4"></script>
    <script src="/supabase.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crossword</title>
    <link rel="icon" type="image/x-icon" href="../../../media/icon.ico" />
    <link rel="icon" type="image/webp" href="../../../media/icon.webp" />
  <script>if(localStorage.getItem("theme_crossword")==="dark"||(!localStorage.getItem("theme_crossword")&&window.matchMedia("(prefers-color-scheme:dark)").matches)){document.documentElement.classList.add("dark")}</script>
    
    <!-- Icons & Libraries -->
    <script src="https://unpkg.com/lucide@1.16.0"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;800&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        pink: '#FF6B95',
                        orange: '#FF8C42',
                        green: '#00E676',
                        blue: '#2979FF',
                        dark: '#0f172a',
                        chalk: '#f8fafc',
                        surface: 'rgba(255, 255, 255, 0.85)',
                        border: 'rgba(203, 213, 225, 0.6)',
                    },
                    fontFamily: {
                        heading: ['Fredoka', 'sans-serif'], 
                        body: ['Nunito', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px 0px rgba(30, 41, 59, 1)',
                        'hard-md': '6px 6px 0px 0px rgba(30, 41, 59, 1)',
                        'hard-sm': '2px 2px 0px 0px rgba(30, 41, 59, 1)',
                        'inner-hard': 'inset 2px 2px 0px 0px rgba(30, 41, 59, 0.1)',
                    },
                    animation: {
                        'shake': 'shake 0.4s cubic-bezier(.36,.07,.19,.97) both',
                        'pop-in': 'pop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)',
                    },
                    keyframes: {
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
                        },
                        'pop-in': {
                            '0%': { transform: 'scale(0.8)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' }
                        }
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="../../../css/base.css" />
    <link rel="stylesheet" href="../../../css/components.css" />
  
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center p-2 md:p-6">

    <!-- MAIN CONSOLE -->
    <div class="game-console w-full h-full relative flex-col md:flex-row">
        
        <!-- SIDEBAR: CONTROLS (Setup) -->
        <aside id="controls" class="w-full md:w-96 glass-panel border-b-[1px] md:border-b-0 md:border-r-[1px] border-slate-300 dark:border-white/10 flex flex-col z-50 transition-all duration-300 shadow-xl md:shadow-none h-[50%] md:h-full relative shrink-0">
            
            <!-- Header -->
            <div class="p-5 border-b-[1px] border-slate-300 dark:border-white/10 bg-slate-50/50 dark:bg-slate-800/50 flex justify-between items-center transition-colors">
                <div>
                    <h1 class="text-2xl font-heading text-dark dark:text-slate-100 tracking-wide leading-none transition-colors">
                        Crossword
                    </h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">KlassKit</p>
                </div>
                <!-- Mobile Hide Button -->
                <button onclick="toggleControlPanel(true)" class="md:hidden p-2 bg-pink/20 text-pink border-2 border-dark rounded-lg shadow-hard-sm active:translate-y-1 active:shadow-none transition-all">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- Scrollable Content -->
            <div class="flex-1 p-5 overflow-y-auto custom-scrollbar space-y-5 bg-transparent">
                
                <!-- Density Controls removed for Auto-Sizing -->

                <!-- Word Input -->
                <div class="space-y-2 flex-1 flex flex-col">
                    <div class="flex justify-between items-end">
                        <label class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Words & Clues (WORD : CLUE)</label>
                        <span class="text-[10px] bg-green/10 dark:bg-green/20 text-green-600 dark:text-green-400 px-2 py-0.5 rounded border border-green/20 dark:border-green/500/20 font-bold transition-colors">Auto-Saved</span>
                    </div>
                    <textarea id="word-input" spellcheck="false"
                        class="w-full h-48 p-4 bg-white/50 dark:bg-slate-900/50 text-dark dark:text-slate-200 font-mono text-sm border-[1px] border-slate-300 dark:border-white/10 rounded-xl focus:border-blue focus:ring-1 focus:ring-blue outline-none resize-none shadow-inner transition-colors"
                        placeholder="CAT : A small pet&#10;DOG : A loyal friend"
                    ></textarea>
                </div>

                <!-- Generate Button -->
                <button id="generate-btn" 
                    class="w-full btn-chunky bg-green text-dark py-3 rounded-xl text-xl tracking-wide flex items-center justify-center gap-2 hover:brightness-105">
                    <i data-lucide="layout-grid" class="w-5 h-5"></i> BUILD PUZZLE
                </button>

                <!-- Word Sets -->
                <div class="pt-4 border-t-2 border-dashed border-slate-300 dark:border-white/10">
                    <label class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-2 block">Saved Word Sets</label>
                    <div class="flex gap-2 mb-3">
                        <input id="set-name-input" type="text" placeholder="Set name..." 
                            class="flex-1 px-3 py-2 bg-white/50 dark:bg-slate-900/50 text-dark dark:text-slate-200 font-body text-sm border-[1px] border-slate-300 dark:border-white/10 rounded-lg focus:border-blue focus:ring-1 focus:ring-blue outline-none transition-colors" />
                        <button id="save-set-btn" 
                            class="btn-chunky bg-blue text-white px-3 py-2 rounded-lg text-xs flex items-center gap-1 hover:brightness-105 shrink-0">
                            <i data-lucide="save" class="w-3.5 h-3.5"></i> SAVE
                        </button>
                    </div>
                    <div id="sets-list" class="space-y-1.5 max-h-40 overflow-y-auto custom-scrollbar">
                        <p class="text-slate-400 dark:text-slate-500 text-xs italic">No saved sets yet.</p>
                    </div>
                </div>
                
                <!-- Presets -->
                <div class="pt-4 border-t-2 border-dashed border-slate-300 dark:border-white/10">
                     <label class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-2 block">Quick Presets</label>
                      <div class="flex gap-2 flex-wrap">
                        <button class="preset-btn px-3 py-1 bg-white dark:bg-slate-700 text-dark dark:text-slate-200 border-[1px] border-slate-300 dark:border-white/10 rounded-full text-xs font-bold shadow-neo-sm hover:translate-y-[-1px] active:translate-y-[4px] active:shadow-none transition-all" 
                            data-text="TEACHER : The person who teaches&#10;STUDENT : The person who learns&#10;PENCIL : Used for writing&#10;ERASER : Removes pencil marks&#10;BOOK : Has pages to read">
                            Classroom
                        </button>
                        <button class="preset-btn px-3 py-1 bg-white dark:bg-slate-700 text-dark dark:text-slate-200 border-[1px] border-slate-300 dark:border-white/10 rounded-full text-xs font-bold shadow-neo-sm hover:translate-y-[-1px] active:translate-y-[4px] active:shadow-none transition-all" 
                            data-text="RED : The color of fire&#10;BLUE : The color of the sky&#10;GREEN : The color of grass&#10;YELLOW : The color of the sun">
                            Colors
                        </button>
                        <button class="preset-btn px-3 py-1 bg-white dark:bg-slate-700 text-dark dark:text-slate-200 border-[1px] border-slate-300 dark:border-white/10 rounded-full text-xs font-bold shadow-neo-sm hover:translate-y-[-1px] active:translate-y-[4px] active:shadow-none transition-all" 
                            data-text="SUN : Big star in the day&#10;MOON : Appears at night&#10;STAR : Small light in the sky&#10;CLOUD : Holds the rain&#10;RAINBOW : Colors after rain">
                            Nature
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Footer Actions: Only Print button remains -->
<div class="p-3 border-t-[1px] border-slate-300 dark:border-white/10 bg-slate-50/50 dark:bg-slate-800/50 flex gap-2 transition-colors">
                 <button onclick="setPrintMode('combined')" class="w-full btn-chunky bg-white dark:bg-slate-700 text-dark dark:text-slate-200 py-2 rounded-lg text-xs border-[1px] border-slate-300 dark:border-white/10 flex items-center justify-center gap-1 hover:brightness-95" title="Grid and Clues on 1 Page">
                    <i data-lucide="printer" class="w-4 h-4"></i> 1-PAGE
                 </button>
                 <button onclick="setPrintMode('separate')" class="w-full btn-chunky bg-white dark:bg-slate-700 text-dark dark:text-slate-200 py-2 rounded-lg text-xs border-[1px] border-slate-300 dark:border-white/10 flex items-center justify-center gap-1 hover:brightness-95" title="Grid and Clues on Separate Pages">
                    <i data-lucide="file-text" class="w-4 h-4"></i> 2-PAGE
                 </button>
            </div>
        </aside>

        <!-- MAIN DISPLAY AREA -->
        <main class="flex-1 relative h-[50%] md:h-full bg-slate-50/50 dark:bg-slate-900/50 flex flex-col lg:flex-row overflow-hidden group transition-colors">
            
            <!-- Subtle Grid Background -->
            <div class="absolute inset-0 opacity-10 pointer-events-none" 
                 style="background-image: radial-gradient(#1e293b 2px, transparent 2px); background-size: 24px 24px;">
            </div>

            <!-- Floating Controls (Settings and Reveal) -->
            <div class="absolute top-4 left-4 z-20 no-print flex gap-2">
                <!-- Settings Button -->
                <button onclick="toggleControlPanel(false)" class="p-2 bg-white dark:bg-slate-800 border-[1px] border-slate-300 dark:border-white/10 rounded-lg shadow-neo-sm hover:translate-y-[-2px] transition-transform text-slate-700 dark:text-slate-300 hover:text-dark dark:hover:text-white" title="Open Setup Panel">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                </button>
                <button id="theme-toggle" class="p-2 bg-white dark:bg-slate-800 border-[1px] border-slate-300 dark:border-white/10 rounded-lg shadow-neo-sm hover:translate-y-[-2px] transition-transform text-slate-700 dark:text-slate-300 hover:text-dark dark:hover:text-white" title="Toggle Dark Mode">
                    <i data-lucide="moon" class="w-5 h-5 block dark:hidden"></i>
                    <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                </button>
                <!-- Reveal Button (NEW LOCATION) -->
                <button id="solution-btn" class="p-2 bg-white dark:bg-slate-800 border-[1px] border-slate-300 dark:border-white/10 rounded-lg shadow-neo-sm hover:translate-y-[-2px] transition-transform text-orange hover:text-dark dark:hover:text-white" title="Reveal Solution">
                    <i data-lucide="eye" class="w-5 h-5"></i>
                </button>
            </div>
            
            <!-- Puzzle Grid Area -->
            <div class="flex-1 h-full relative flex items-center justify-center p-4 overflow-hidden">
                <div id="crossword-container" class="relative z-10 max-w-full max-h-full">
                    <div id="crossword-grid" class="grid gap-1 transform transition-transform duration-200">
                        <!-- Initial Empty State -->
                        <div class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 opacity-50 pointer-events-none">
                            <i data-lucide="arrow-left" class="w-12 h-12 mb-2 hidden md:block"></i>
                            <i data-lucide="arrow-up" class="w-12 h-12 mb-2 md:hidden"></i>
                            <p class="font-heading text-xl">Build a puzzle to start</p>
                            <p class="text-xs font-mono mt-1">Press BUILD PUZZLE on the left.</p>
                        </div>
                    </div>
                </div>
                
                <!-- Zoom Controls -->
                <div class="absolute bottom-4 right-4 z-20 flex gap-2 no-print">
                    <button id="zoom-out" class="p-2 bg-white dark:bg-slate-800 border-[1px] border-slate-300 dark:border-white/10 rounded-lg shadow-neo-sm hover:bg-slate-50 dark:hover:bg-slate-700 active:translate-y-1 active:shadow-none text-slate-700 dark:text-slate-300"><i data-lucide="minus" class="w-4 h-4"></i></button>
                    <button id="zoom-in" class="p-2 bg-white dark:bg-slate-800 border-[1px] border-slate-300 dark:border-white/10 rounded-lg shadow-neo-sm hover:bg-slate-50 dark:hover:bg-slate-700 active:translate-y-1 active:shadow-none text-slate-700 dark:text-slate-300"><i data-lucide="plus" class="w-4 h-4"></i></button>
                </div>
            </div>

            <!-- Clues Panel (Right Side) -->
            <div class="w-full lg:w-80 h-1/3 lg:h-full glass-panel border-t-[1px] lg:border-t-0 lg:border-l-[1px] border-slate-300 dark:border-white/10 flex flex-col z-10 shadow-xl lg:shadow-none shrink-0 transition-all">
                <div class="p-3 bg-blue/90 dark:bg-blue/80 border-b-[1px] border-slate-300 dark:border-white/10 text-white font-heading text-lg tracking-wide flex items-center gap-2 transition-colors">
                    <i data-lucide="list" class="w-5 h-5"></i> CLUES
                </div>
                <div class="flex-1 overflow-y-auto p-4 custom-scrollbar space-y-6">
                    <div>
                        <h3 class="font-heading text-blue text-xl mb-2 flex items-center gap-2">
                            <i data-lucide="arrow-right" class="w-5 h-5"></i> ACROSS
                        </h3>
                        <div id="clues-across" class="space-y-1">
                            <p class="text-slate-400 text-sm">No words placed yet.</p>
                        </div>
                    </div>
                    <div>
                        <h3 class="font-heading text-pink text-xl mb-2 flex items-center gap-2">
                            <i data-lucide="arrow-down" class="w-5 h-5"></i> DOWN
                        </h3>
                        <div id="clues-down" class="space-y-1">
                            <p class="text-slate-400 text-sm">No words placed yet.</p>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- PRINT LAYOUT (Hidden unless printing) -->
    <div id="print-area" class="hidden">
        <div class="text-center mb-8 border-b-2 border-black pb-4">
            <h1 class="text-4xl font-bold uppercase mb-2">Crossword</h1>
            <div class="text-lg">KlassKit</div>
        </div>
        <div class="flex justify-between text-lg mb-4">
            <div>Name: <span class="border-b border-black w-48 inline-block"></span></div>
            <div>Date: <span class="border-b border-black w-48 inline-block"></span></div>
        </div>
        <!-- Grid and Clues injected here dynamically for print -->
        <div id="print-grid-container" class="my-8"></div>
        <div class="print-columns mt-8">
            <div id="print-clues-across">
                <h3 class="font-bold border-b border-black mb-2 uppercase">Across</h3>
            </div>
            <div id="print-clues-down" class="mt-4">
                <h3 class="font-bold border-b border-black mb-2 uppercase">Down</h3>
            </div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
