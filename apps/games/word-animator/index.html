<!DOCTYPE html>
<html lang="en" class="light">

<head>
    <!-- Supabase Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4"></script>
    <script src="/supabase.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Animator</title>
    <link rel="icon" type="image/x-icon" href="../../../media/icon.ico" />
    <link rel="icon" type="image/webp" href="../../../media/icon.webp" />

    <!-- External Libraries -->
    <script src="https://unpkg.com/lucide@1.16.0"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- Theme Configuration -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        pink: '#FF6B95',
                        orange: '#FF8C42',
                        green: '#00E676',
                        blue: '#2979FF',
                        dark: '#0f172a',
                        chalk: '#f8fafc',
                        surface: 'rgba(255, 255, 255, 0.85)',
                        border: 'rgba(203, 213, 225, 0.6)',
                    },
                    fontFamily: {
                        heading: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    boxShadow: {
                        'neo': '4px 4px 0px 0px rgba(51, 65, 85, 0.15)',
                        'neo-sm': '2px 2px 0px 0px rgba(51, 65, 85, 0.15)',
                        'neo-lg': '8px 8px 0px 0px rgba(51, 65, 85, 0.15)',
                    },
                    animation: {
                        'float-1': 'float-icon-1 20s infinite linear',
                        'float-2': 'float-icon-2 25s infinite linear reverse',
                        'float-3': 'float-icon-3 15s infinite linear',
                    },
                    keyframes: {
                        'float-icon-1': {
                            '0%': { transform: 'translate(0, 0) rotate(0deg)' },
                            '33%': { transform: 'translate(30px, -50px) rotate(120deg)' },
                            '66%': { transform: 'translate(-20px, 20px) rotate(240deg)' },
                            '100%': { transform: 'translate(0, 0) rotate(360deg)' },
                        },
                        'float-icon-2': {
                            '0%': { transform: 'translate(0, 0) rotate(0deg)' },
                            '50%': { transform: 'translate(-40px, -30px) rotate(-180deg)' },
                            '100%': { transform: 'translate(0, 0) rotate(-360deg)' },
                        },
                        'float-icon-3': {
                            '0%': { transform: 'translate(0, 0) scale(1)' },
                            '50%': { transform: 'translate(20px, 40px) scale(1.2)' },
                            '100%': { transform: 'translate(0, 0) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        .bg-float-icon {
            color: rgba(203, 213, 225, 0.4);
            opacity: 0.3;
            position: fixed;
            z-index: 0;
            pointer-events: none;
        }

        html.dark .bg-float-icon {
            opacity: 0.15;
            color: white;
        }

        body {
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            background-color: #f8fafc;
            background-image:
                linear-gradient(#e2e8f0 1.5px, transparent 1.5px),
                linear-gradient(90deg, #e2e8f0 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            color: #1e293b;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s, color 0.3s;
        }

        html.dark body {
            background-color: #020617;
            background-image:
                linear-gradient(#0f172a 1.5px, transparent 1.5px),
                linear-gradient(90deg, #0f172a 1.5px, transparent 1.5px);
            color: #e2e8f0;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        html.dark .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .console-frame {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(203, 213, 225, 0.6);
            border-radius: 1.5rem;
            box-shadow: 8px 8px 0px rgba(51, 65, 85, 0.15);
            display: flex;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        html.dark .console-frame {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.4);
        }

        .btn-chunky {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(0);
            position: relative;
            border: 1px solid rgba(203, 213, 225, 0.6);
            box-shadow: 4px 4px 0 rgba(51, 65, 85, 0.15);
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        html.dark .btn-chunky {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.4);
            background-color: rgba(30, 41, 59, 0.8);
            color: #e2e8f0;
        }

        .btn-chunky:hover:not(:disabled) {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 rgba(51, 65, 85, 0.15);
            filter: brightness(105%);
        }

        html.dark .btn-chunky:hover:not(:disabled) {
            box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.4);
        }

        .btn-chunky:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 rgba(51, 65, 85, 0.15) !important;
        }

        html.dark .btn-chunky:active:not(:disabled) {
            box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.4) !important;
        }

        .btn-chunky:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translateY(2px);
            box-shadow: 0 0 0 rgba(51, 65, 85, 0.15);
            filter: grayscale(100%);
        }

        .custom-scrollbar::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(203, 213, 225, 0.6);
            border-radius: 10px;
            border: 2px solid transparent;
            background-clip: content-box;
        }

        html.dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(148, 163, 184, 0.8);
        }

        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: white;
            border: 2px solid #2979FF;
            margin-top: -8px;
            cursor: pointer;
            box-shadow: 2px 2px 0px rgba(51, 65, 85, 0.15);
            transition: transform 0.1s;
        }

        html.dark input[type=range]::-webkit-slider-thumb {
            background: #0f172a;
            border-color: #2979FF;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.4);
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            background: rgba(203, 213, 225, 0.6);
            border: 1px solid rgba(203, 213, 225, 0.8);
            border-radius: 99px;
        }

        html.dark input[type=range]::-webkit-slider-runnable-track {
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .moving-word {
            position: absolute;
            cursor: default;
            user-select: none;
            transition: opacity 0.5s;
            white-space: nowrap;
            will-change: transform;
            top: 0;
            left: 0;
            -webkit-text-stroke: 2px #1e293b;
            paint-order: stroke fill;
            filter: drop-shadow(4px 4px 0px rgba(51, 65, 85, 0.25));
            z-index: 10;
        }

        html.dark .moving-word {
            -webkit-text-stroke: 1.5px rgba(255, 255, 255, 0.8);
            filter: drop-shadow(4px 4px 0px rgba(0, 0, 0, 0.8));
        }

        .bouncing-img {
            position: absolute;
            cursor: default;
            user-select: none;
            transition: opacity 0.5s;
            will-change: transform;
            top: 0;
            left: 0;
            filter: drop-shadow(4px 4px 0px rgba(51, 65, 85, 0.25));
            z-index: 10;
            border-radius: 12px;
            overflow: hidden;
        }

        html.dark .bouncing-img {
            filter: drop-shadow(4px 4px 0px rgba(0, 0, 0, 0.5));
        }

        .img-thumb-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .img-thumb {
            aspect-ratio: 1;
            border-radius: 8px;
            border: 2px solid rgba(203, 213, 225, 0.6);
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.15s;
        }

        html.dark .img-thumb {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .img-thumb:hover {
            transform: scale(1.05);
        }

        /* Toggle Switch Styling */
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(203, 213, 225, 0.6);
            border: 1px solid rgba(203, 213, 225, 0.8);
            transition: .3s;
            border-radius: 34px;
        }

        html.dark .slider {
            background-color: rgba(30, 41, 59, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            box-shadow: 2px 2px 0px rgba(51, 65, 85, 0.15);
            transition: .3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 50%;
        }

        html.dark .slider:before {
            background-color: #94a3b8;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.4);
        }

        input:checked+.slider {
            background-color: rgba(0, 230, 118, 0.3);
            border-color: #00E676;
        }

        html.dark input:checked+.slider {
            background-color: rgba(0, 230, 118, 0.2);
            border-color: #00E676;
        }

        input:checked+.slider:before {
            transform: translateX(24px);
            background-color: #00E676;
        }

        textarea.input-styled {
            background-image: radial-gradient(rgba(203, 213, 225, 0.6) 1px, transparent 1px);
            background-size: 10px 10px;
        }

        html.dark textarea.input-styled {
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
        }

        .hidden-panel-mobile {
            transform: translateY(100%);
        }

        @media (min-width: 768px) {
            .hidden-panel-desktop {
                margin-left: -24rem;
            }
        }
    </style>
    <link rel="stylesheet" href="../../../css/base.css" />
    <link rel="stylesheet" href="../../../css/components.css" />
    
</head>

<body
    class="h-screen w-screen flex flex-col items-center justify-center p-2 md:p-6 overflow-hidden transition-colors duration-300">

    <div id="toast-container"
        class="fixed top-4 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none"></div>

    <!-- FLOATING BACKGROUND ICONS -->
    <i data-lucide="message-circle" class="bg-float-icon w-32 h-32 top-10 left-10"></i>
    <i data-lucide="alphabet" class="bg-float-icon w-40 h-40 bottom-20 right-20"></i>
    <i data-lucide="book-open" class="bg-float-icon w-24 h-24 top-1/2 left-1/2 -ml-12 -mt-12"></i>

    <div class="console-frame w-full h-full relative flex-col md:flex-row z-10">

        <aside id="controls"
            class="w-full md:w-96 glass-panel border-b-[1px] md:border-b-0 md:border-r-[1px] border-slate-300 dark:border-white/10 flex flex-col z-50 transition-all duration-300 shadow-xl md:shadow-none h-[45%] md:h-full relative shrink-0">

            <div
                class="p-6 border-b-[1px] border-slate-300 dark:border-white/10 bg-slate-50/50 dark:bg-slate-800/50 flex justify-between items-center shrink-0">
                <div>
                    <h1
                        class="text-3xl font-heading text-dark dark:text-slate-100 tracking-wide leading-none drop-shadow-sm transition-colors duration-300">
                        WORD<span class="text-blue">ANIMATOR</span>
                    </h1>
                    <div class="flex items-center gap-2 mt-2">
                        <button onclick="toggleTheme()"
                            class="px-2 py-1 bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 text-[10px] font-bold rounded flex items-center gap-1 hover:bg-slate-300 dark:hover:bg-slate-600 transition-colors">
                            <i data-lucide="moon" class="w-3 h-3 hidden dark:block"></i>
                            <i data-lucide="sun" class="w-3 h-3 block dark:hidden"></i>
                            <span class="hidden dark:inline">DARK</span>
                            <span class="inline dark:hidden">LIGHT</span>
                        </button>
                        <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Saved</span>
                    </div>
                </div>
                <button onclick="toggleControlPanel(true)"
                    class="md:hidden p-2 bg-pink/10 text-pink border-[1px] border-slate-300 dark:border-white/20 rounded-lg shadow-neo-sm active:translate-y-1 active:shadow-none transition-all">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <div class="flex-1 p-6 overflow-y-auto custom-scrollbar space-y-8 bg-transparent relative">

                <!-- PHYSICS SETTINGS -->
                <div
                    class="p-4 bg-slate-50/50 dark:bg-slate-800/50 border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-sm transition-colors duration-300 space-y-3">
                    <div
                        class="flex justify-between items-center border-b-[1px] border-slate-200 dark:border-white/10 pb-2">
                        <label
                            class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="zap" class="w-4 h-4 text-orange"></i> Physics Engine
                        </label>
                    </div>

                    <div class="flex items-center justify-between pt-1">
                        <span class="text-sm font-bold text-dark dark:text-slate-200">Bump Mode (Collision)</span>
                        <label class="switch">
                            <input type="checkbox" id="collision-toggle" checked onchange="updatePhysicsSetting()">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <!-- PRESET MANAGEMENT -->
                <div class="space-y-3 pb-6 border-b-[1px] border-slate-200 dark:border-white/10 border-dashed">
                    <div class="flex justify-between items-end">
                        <label
                            class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="folder-open" class="w-4 h-4 text-blue"></i> Presets
                        </label>
                    </div>
                    <select id="preset-select" onchange="onPresetSelect()"
                        class="w-full p-3 bg-white/50 dark:bg-slate-900/50 text-dark dark:text-slate-200 text-sm border-[1px] border-slate-300 dark:border-white/10 rounded-xl focus:border-blue focus:ring-1 focus:ring-blue outline-none shadow-inner transition-colors cursor-pointer">
                        <option value="">-- Select a Preset --</option>
                    </select>
                    <input type="text" id="preset-name" placeholder="Preset name..."
                        class="w-full p-3 bg-white/50 dark:bg-slate-900/50 text-dark dark:text-slate-200 font-mono text-sm border-[1px] border-slate-300 dark:border-white/10 rounded-xl focus:border-blue focus:ring-1 focus:ring-blue outline-none shadow-inner transition-colors">
                    <div class="flex gap-2">
                        <button onclick="saveCurrentPreset()"
                            class="flex-1 btn-chunky bg-green text-dark dark:text-dark py-2 rounded-xl text-xs font-bold tracking-wider flex items-center justify-center gap-1 hover:scale-[1.02] transition-all">
                            <i data-lucide="save" class="w-3 h-3"></i> SAVE
                        </button>
                        <button onclick="createNewPreset()"
                            class="flex-1 btn-chunky bg-white dark:bg-slate-700 !text-blue dark:!text-blue py-2 rounded-xl text-xs font-bold tracking-wider flex items-center justify-center gap-1 hover:scale-[1.02] transition-all">
                            <i data-lucide="plus" class="w-3 h-3"></i> NEW
                        </button>
                        <button onclick="deleteCurrentPreset()"
                            class="flex-1 btn-chunky bg-white dark:bg-slate-700 !text-pink dark:!text-pink py-2 rounded-xl text-xs font-bold tracking-wider flex items-center justify-center gap-1 hover:scale-[1.02] transition-all">
                            <i data-lucide="trash-2" class="w-3 h-3"></i> DEL
                        </button>
                    </div>
                </div>

                <!-- CSV FORMATTER -->
                <div class="space-y-3 pb-6 border-b-[1px] border-slate-200 dark:border-white/10 border-dashed">
                    <div class="flex justify-between items-end">
                        <label
                            class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="split" class="w-4 h-4 text-pink"></i> CSV Formatter
                        </label>
                    </div>
                    <textarea id="csv-input" spellcheck="false" rows="2"
                        class="input-styled w-full p-3 bg-white/50 dark:bg-slate-900/50 text-dark dark:text-slate-200 font-mono text-sm border-[1px] border-slate-300 dark:border-white/10 rounded-xl focus:border-orange focus:ring-1 focus:ring-orange outline-none resize-none shadow-inner transition-colors duration-300"
                        placeholder="e.g. word1, word2, word3">apple, banana, cherry</textarea>

                    <button onclick="formatList()"
                        class="w-full btn-chunky bg-white dark:bg-slate-700 !text-orange dark:!text-orange py-3 rounded-xl text-sm font-bold tracking-wider flex items-center justify-center gap-2 hover:bg-orange/5 hover:border-orange transition-colors">
                        <i data-lucide="rotate-ccw" class="w-4 h-4"></i> FORMAT TO ANIMATOR INPUT
                    </button>
                </div>

                <!-- WORD LIST -->
                <div class="space-y-3 flex-1 flex flex-col">
                    <div class="flex justify-between items-end">
                        <label
                            class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="list-video" class="w-4 h-4 text-green"></i> Word List (Rounds)
                        </label>
                    </div>
                    <textarea id="word-input" spellcheck="false"
                        class="input-styled w-full h-40 md:h-56 p-4 bg-white/50 dark:bg-slate-900/50 text-dark dark:text-slate-200 font-mono text-sm border-[1px] border-slate-300 dark:border-white/10 rounded-xl focus:border-blue focus:ring-1 focus:ring-blue outline-none resize-none shadow-inner transition-colors duration-300"
                        placeholder="Line 1: Words, for, round, 1&#10;Line 2: Words, for, round, 2">A,P,P,L,E
B,A,N,A,N,A
C,A,T</textarea>
                </div>

                <!-- IMAGE UPLOAD -->
                <div class="space-y-3 pb-6 border-b-[1px] border-slate-200 dark:border-white/10 border-dashed">
                    <div class="flex justify-between items-end">
                        <label
                            class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="image" class="w-4 h-4 text-pink"></i> Images
                        </label>
                        <span id="img-count" class="text-[10px] font-bold text-slate-400">0 images</span>
                    </div>
                    <div id="img-thumb-container" class="img-thumb-grid hidden"></div>
                    <div class="flex gap-2">
                        <label class="flex-1 btn-chunky bg-white dark:bg-slate-700 !text-pink dark:!text-pink py-2 rounded-xl text-xs font-bold tracking-wider flex items-center justify-center gap-1 hover:scale-[1.02] transition-all cursor-pointer">
                            <i data-lucide="upload" class="w-3 h-3"></i> ADD IMAGES
                            <input type="file" id="img-upload" accept="image/*" multiple class="hidden" onchange="handleImageUpload(this.files)">
                        </label>
                        <button onclick="clearImages()" id="clear-img-btn" class="hidden flex-1 btn-chunky bg-white dark:bg-slate-700 !text-slate-500 dark:!text-slate-400 py-2 rounded-xl text-xs font-bold tracking-wider flex items-center justify-center gap-1 hover:scale-[1.02] transition-all">
                            <i data-lucide="x" class="w-3 h-3"></i> CLEAR
                        </button>
                    </div>
                    <p class="text-[10px] text-slate-400">Images bounce alongside words and snap into place on reveal.</p>
                </div>

                <button onclick="parseAndLoadRounds()"
                    class="w-full btn-chunky bg-green text-dark dark:text-dark py-4 rounded-xl text-lg font-bold tracking-wide flex items-center justify-center gap-2 hover:scale-[1.02] transition-all">
                    <i data-lucide="play" class="w-6 h-6 fill-current"></i> LOAD & START
                </button>

            </div>

            <div
                class="p-4 border-t-[1px] border-slate-300 dark:border-white/10 bg-slate-50/50 dark:bg-slate-800/50 flex justify-center items-center shrink-0 transition-colors duration-300">
                <div id="round-counter" class="font-heading font-black text-slate-400 text-lg uppercase tracking-wider">
                    STATUS: <span class="text-slate-500 dark:text-slate-300">READY</span>
                </div>
            </div>
        </aside>

        <main
            class="flex-1 relative h-[55%] md:h-full bg-slate-50/50 dark:bg-slate-900/50 flex flex-col overflow-hidden transition-colors duration-300 group">

            <div class="absolute inset-0 opacity-10 pointer-events-none transition-opacity duration-300"
                style="background-image: radial-gradient(currentColor 2px, transparent 2px); background-size: 24px 24px;">
            </div>

            <div id="word-display" class="w-full h-full relative overflow-hidden z-0">
                <div id="initial-message"
                    class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 space-y-4">
                    <div
                        class="w-24 h-24 rounded-full border-4 border-dashed border-slate-300 dark:border-slate-700 flex items-center justify-center">
                        <i data-lucide="move" class="w-12 h-12"></i>
                    </div>
                    <p class="font-heading font-black text-2xl tracking-widest opacity-80">WAITING FOR DATA...</p>
                </div>
            </div>

            <div class="absolute top-4 left-4 z-20 flex flex-col md:flex-row gap-3">
                <button onclick="toggleControlPanel(false)"

    <script>
        const LS_KEY_WORDS = 'wordAnimatorData_v3';
        const LS_KEY_PHYSICS = 'wordAnimatorPhysics_v3';
        const LS_KEY_THEME = 'theme_word-animator';
        const DB_NAME = 'WordAnimatorDB';
        const DB_VERSION = 1;
        const STORE_PRESETS = 'presets';
        const STORE_SETTINGS = 'settings';

        let dataBase = null;
        let currentPresetId = null;

        let roundsData = [];
        let currentRoundIndex = -1;
        let activeBouncingWords = [];
        let animationFrameId;
        let globalSpeedMultiplier = 1.5;
        let revealEase = 0.1;
        let isRevealed = false;
        let collisionsEnabled = true;
        let uploadedImages = [];

        const colors = ['text-pink', 'text-orange', 'text-green', 'text-blue', 'text-slate-800 dark:text-white'];
        const fontSizes = ["text-5xl md:text-6xl", "text-6xl md:text-7xl", "text-7xl md:text-8xl", "text-8xl md:text-9xl"];
        const UNIFIED_SIZE_CLASS = "text-6xl md:text-8xl";

        const wordInput = document.getElementById("word-input");

        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem(LS_KEY_THEME, 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem(LS_KEY_THEME, 'dark');
            }
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem(LS_KEY_THEME) || 'light';
            if (savedTheme === 'dark') document.documentElement.classList.add('dark');
        }

        // ========== INDEXEDDB ==========
        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result);
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    if (!database.objectStoreNames.contains(STORE_PRESETS)) {
                        const presetsStore = database.createObjectStore(STORE_PRESETS, { keyPath: 'id', autoIncrement: true });
                        presetsStore.createIndex('name', 'name', { unique: false });
                        presetsStore.createIndex('updatedAt', 'updatedAt', { unique: false });
                    }
                    if (!database.objectStoreNames.contains(STORE_SETTINGS)) {
                        database.createObjectStore(STORE_SETTINGS, { keyPath: 'key' });
                    }
                };
            });
        }

        async function initDB() {
            try {
                dataBase = await openDB();
                await migrateFromLocalStorage();
            } catch (e) {
                console.error('Failed to initialize IndexedDB:', e);
            }
        }

        async function migrateFromLocalStorage() {
            const savedWords = localStorage.getItem(LS_KEY_WORDS);
            if (savedWords) {
                await savePreset('Default', savedWords, []);
                localStorage.removeItem(LS_KEY_WORDS);
            }
        }

        async function savePreset(name, content, images = [], id = null) {
            if (!dataBase) return;
            const result = await new Promise((resolve, reject) => {
                const tx = dataBase.transaction(STORE_PRESETS, 'readwrite');
                const store = tx.objectStore(STORE_PRESETS);
                const data = { name, content, images, updatedAt: Date.now() };
                if (id) data.id = id;
                const request = id ? store.put(data) : store.add(data);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
            await syncToCloud();
            return result;
        }

        async function getAllPresets() {
            if (!dataBase) return [];
            return new Promise((resolve, reject) => {
                const tx = dataBase.transaction(STORE_PRESETS, 'readonly');
                const store = tx.objectStore(STORE_PRESETS);
                const index = store.index('updatedAt');
                const request = index.getAll();
                request.onsuccess = () => resolve(request.result.reverse());
                request.onerror = () => reject(request.error);
            });
        }

        async function getPreset(id) {
            if (!dataBase) return null;
            return new Promise((resolve, reject) => {
                const tx = dataBase.transaction(STORE_PRESETS, 'readonly');
                const store = tx.objectStore(STORE_PRESETS);
                const request = store.get(id);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function deletePreset(id) {
            if (!dataBase) return;
            await new Promise((resolve, reject) => {
                const tx = dataBase.transaction(STORE_PRESETS, 'readwrite');
                const store = tx.objectStore(STORE_PRESETS);
                const request = store.delete(id);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
            await syncToCloud();
        }

        async function saveCurrentPresetId(id) {
            if (!dataBase) return;
            await new Promise((resolve, reject) => {
                const tx = dataBase.transaction(STORE_SETTINGS, 'readwrite');
                const store = tx.objectStore(STORE_SETTINGS);
                const request = store.put({ key: 'currentPresetId', value: id });
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
            await syncToCloud();
        }

        // --- CLOUD SYNC HELPERS ---
        let cloudSyncTimeout = null;
        async function syncToCloud() {
            if (cloudSyncTimeout) clearTimeout(cloudSyncTimeout);
            cloudSyncTimeout = setTimeout(async () => {
                const presets = await getAllPresets();
                const currentPresetId = await getCurrentPresetId();
                await saveProgress('word-animator', { presets, currentPresetId });
            }, 1000);
        }

        async function getCurrentPresetId() {
            if (!dataBase) return null;
            return new Promise((resolve, reject) => {
                const tx = dataBase.transaction(STORE_SETTINGS, 'readonly');
                const store = tx.objectStore(STORE_SETTINGS);
                const request = store.get('currentPresetId');
                request.onsuccess = () => resolve(request.result?.value || null);
                request.onerror = () => reject(request.error);
            });
        }

        async function renderPresetSelector() {
            const presets = await getAllPresets();
            const select = document.getElementById('preset-select');
            select.innerHTML = '<option value="">-- Select a Preset --</option>';
            presets.forEach(p => {
                const option = document.createElement('option');
                option.value = p.id;
                option.textContent = p.name;
                if (p.id === currentPresetId) option.selected = true;
                select.appendChild(option);
            });
        }

        async function onPresetSelect() {
            const select = document.getElementById('preset-select');
            const id = parseInt(select.value);
            if (!id) return;
            const preset = await getPreset(id);
            if (preset) {
                currentPresetId = id;
                wordInput.value = preset.content;
                document.getElementById('preset-name').value = preset.name;
                uploadedImages = await resolvePresetImages(preset.images);
                renderImageThumbs();
                await saveCurrentPresetId(id);
                await renderPresetSelector();
            }
        }

        async function saveCurrentPreset() {
            const name = document.getElementById('preset-name').value.trim() || 'Untitled';
            const content = wordInput.value;
            const id = await savePreset(name, content, uploadedImages, currentPresetId);
            currentPresetId = id;
            await saveCurrentPresetId(id);
            await renderPresetSelector();
        }

        async function createNewPreset() {
            document.getElementById('preset-name').value = 'New Preset';
            wordInput.value = '';
            uploadedImages = [];
            renderImageThumbs();
            currentPresetId = null;
            await saveCurrentPresetId(null);
            await renderPresetSelector();
            document.getElementById('preset-select').value = '';
        }

        async function deleteCurrentPreset() {
            if (!currentPresetId) {
                showToast('No preset selected', 'error');
                return;
            }
            showConfirmToast('Delete this preset?', async () => {
                await deletePreset(currentPresetId);
                currentPresetId = null;
                document.getElementById('preset-name').value = '';
                wordInput.value = '';
                uploadedImages = [];
                renderImageThumbs();
                await saveCurrentPresetId(null);
                await renderPresetSelector();
                showToast('Preset deleted', 'success');
            });
        }

        // ========== TOAST NOTIFICATIONS ==========
        function showToast(message, type = 'info', duration = 3000) {
            const container = document.getElementById('toast-container');

            const colors = {
                success: 'bg-green text-dark border-green',

                info: 'bg-blue text-white border-blue',
                warning: 'bg-orange text-dark border-orange'
            };

            const icons = {
                success: 'check-circle',
                error: 'x-circle',
                info: 'info',
                warning: 'alert-triangle'
            };

            toast.className = `${colors[type]} px-4 py-3 rounded-xl shadow-neo border-[1px] font-bold text-sm flex items-center gap-2 pointer-events-auto transform transition-all duration-300 translate-y-[-20px] opacity-0`;
            toast.innerHTML = `<i data-lucide="${icons[type]}" class="w-4 h-4"></i> ${message}`;

            container.appendChild(toast);
            lucide.createIcons();

            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-[-20px]', 'opacity-0');

            setTimeout(() => {
                toast.classList.add('translate-y-[-20px]', 'opacity-0');

            toast.className = 'bg-slate-800 text-white dark:bg-slate-100 dark:text-slate-800 px-4 py-3 rounded-xl shadow-neo-lg border-[1px] border-slate-600 dark:border-slate-300 font-bold text-sm flex items-center gap-3 pointer-events-auto';

                <span>${message}</span>
                <div class="flex gap-2 ml-2">

            container.appendChild(toast);

            toast.querySelector('.confirm-yes').onclick = () => {

            };

        function saveWords(wordsString) {

        async function loadWords() {
            await initDB();
            const savedId = await getCurrentPresetId();
            const presets = await getAllPresets();
            if (savedId && presets.find(p => p.id === savedId)) {
                currentPresetId = savedId;
                const preset = await getPreset(savedId);
                if (preset) {
                    wordInput.value = preset.content;
                    document.getElementById('preset-name').value = preset.name;
                    uploadedImages = await resolvePresetImages(preset.images);
                    renderImageThumbs();

                document.getElementById('preset-name').value = presets[0].name;
                uploadedImages = await resolvePresetImages(presets[0].images);
                renderImageThumbs();
                await saveCurrentPresetId(currentPresetId);
            }
            await renderPresetSelector();
            const savedPhysics = localStorage.getItem(LS_KEY_PHYSICS);
            if (savedPhysics !== null) {
                collisionsEnabled = savedPhysics === 'true';

        function updateSpeed(val) {
            const v = parseFloat(val);
            globalSpeedMultiplier = Math.max(0.1, Math.min(50, v));
            const slider = document.getElementById('speed-slider');
            const num = document.getElementById('speed-number');
            const disp = document.getElementById('speed-display');
            if (slider && Math.abs(parseFloat(slider.value) - globalSpeedMultiplier) > 0.01) slider.value = globalSpeedMultiplier;
            if (num && Math.abs(parseFloat(num.value) - globalSpeedMultiplier) > 0.01) num.value = globalSpeedMultiplier;
            if (disp) disp.innerText = globalSpeedMultiplier.toFixed(1) + 'x';
        }

        function adjustSpeed(delta) {
            updateSpeed(globalSpeedMultiplier + delta);
        }

            const resolved = await Promise.all(
                images.map(async url => {
                    try { return await resolveMediaUrl(url); }
                    catch (e) { console.warn('Failed to resolve image URL:', e); return url; }
                })
            );
            return resolved;

        function formatList() {
            const csvInput = document.getElementById('csv-input').value;
            if (!csvInput.trim()) return;
            const words = csvInput.split(',').map(word => word.trim()).filter(word => word.length > 0);
            const formattedText = words.map(word => {
                const cleaned = word.replace(/\s/g, '');
                // Use Array.from to properly handle emojis (surrogate pairs)
                const chars = Array.from(cleaned);
                // Only uppercase plain letters, preserve emojis/symbols
                return chars.map(ch => /[a-zA-Z]/.test(ch) ? ch.toUpperCase() : ch).join(',');
            }).join('\n');
            wordInput.value = formattedText;
            saveWords(formattedText);
        }

        class BouncingWord {
            constructor(text, containerWidth, containerHeight, imgSrc = null) {
                this.element = document.createElement("div");
                this.isImage = !!imgSrc;
                const initialRotate = Math.floor(Math.random() * 20) - 10;

                if (this.isImage) {
                    const img = document.createElement("img");
                    img.src = imgSrc;
                    img.draggable = false;
                    img.style.width = "100%";
                    img.style.height = "100%";
                    img.style.objectFit = "contain";
                    this.element.appendChild(img);
                    this.element.className = "bouncing-img flex items-center justify-center";
                    this.element.style.width = "100px";
                    this.element.style.height = "100px";
                } else {
                    this.element.textContent = text;
                    const colorClass = colors[Math.floor(Math.random() * colors.length)];
                    const sizeClass = fontSizes[Math.floor(Math.random() * fontSizes.length)];
                    this.element.className = `moving-word font-heading font-black ${colorClass} ${sizeClass}`;
                }
                this.element.style.opacity = '0';

                document.getElementById("word-display").appendChild(this.element);

                this.width = this.element.offsetWidth;
                this.height = this.element.offsetHeight;

                this.mass = (this.width * this.height) / 500;

                this.x = Math.random() * (containerWidth - this.width);
                this.y = Math.random() * (containerHeight - this.height);
                this.targetX = 0;
                this.targetY = 0;

                const angle = Math.random() * Math.PI * 2;
                this.vx = Math.cos(angle);
                this.vy = Math.sin(angle);

                this.currentRotation = initialRotate;
                this.angularVelocity = (Math.random() - 0.5) * 2;
                this.scale = 1;
                this.targetScale = 1;

                this.updatePosition();

                requestAnimationFrame(() => {
                    this.element.style.opacity = '1';
                });
            }

            get center() {
                return {
                    x: this.x + this.width / 2,
                    y: this.y + this.height / 2
                };
            }

            update(containerWidth, containerHeight) {
                if (isRevealed) {
                    const ease = revealEase;
                    this.x += (this.targetX - this.x) * ease;
                    this.y += (this.targetY - this.y) * ease;
                    this.currentRotation += (0 - this.currentRotation) * ease;
                    this.scale += (1 - this.scale) * ease;
                } else {
                    this.x += this.vx * globalSpeedMultiplier;
                    this.y += this.vy * globalSpeedMultiplier;
                    this.currentRotation += this.angularVelocity * (globalSpeedMultiplier * 0.5);
                    this.angularVelocity *= 0.99;

                    if (this.x <= 0) {
                        this.x = 0; this.vx *= -1;
                        this.onBounce('wall-x');
                    } else if (this.x + this.width >= containerWidth) {
                        this.x = containerWidth - this.width; this.vx *= -1;
                        this.onBounce('wall-x');
                    }

                    if (this.y <= 0) {
                        this.y = 0; this.vy *= -1;
                        this.onBounce('wall-y');
                    } else if (this.y + this.height >= containerHeight) {
                        this.y = containerHeight - this.height; this.vy *= -1;
                        this.onBounce('wall-y');
                    }

                    this.scale += (this.targetScale - this.scale) * 0.15;
                }
                this.updatePosition();
            }

            onBounce(type) {
                this.scale = 0.85;
                this.angularVelocity += (Math.random() - 0.5) * 5;
            }

            updatePosition() {
                this.element.style.transform = `translate(${this.x}px, ${this.y}px) rotate(${this.currentRotation}deg) scale(${this.scale})`;
            }
        }

        function handleCollisions() {
            if (isRevealed || !collisionsEnabled) return;

            for (let i = 0; i < activeBouncingWords.length; i++) {
                for (let j = i + 1; j < activeBouncingWords.length; j++) {
                    const b1 = activeBouncingWords[i];
                    const b2 = activeBouncingWords[j];

                    const dx = b2.center.x - b1.center.x;
                    const dy = b2.center.y - b1.center.y;

                    const combinedHalfWidth = (b1.width + b2.width) / 2;
                    const combinedHalfHeight = (b1.height + b2.height) / 2;

                    const overlapX = combinedHalfWidth - Math.abs(dx);
                    const overlapY = combinedHalfHeight - Math.abs(dy);

                    if (overlapX > 0 && overlapY > 0) {
                        let nx, ny, overlap;

                        if (overlapX < overlapY) {
                            overlap = overlapX;
                            nx = dx > 0 ? 1 : -1;
                            ny = 0;
                        } else {
                            overlap = overlapY;
                            nx = 0;
                            ny = dy > 0 ? 1 : -1;
                        }

                        const totalMass = b1.mass + b2.mass;
                        const m1Ratio = b2.mass / totalMass;
                        const m2Ratio = b1.mass / totalMass;

                        b1.x -= nx * overlap * m1Ratio;
                        b1.y -= ny * overlap * m1Ratio;
                        b2.x += nx * overlap * m2Ratio;
                        b2.y += ny * overlap * m2Ratio;

                        const rvx = b2.vx - b1.vx;
                        const rvy = b2.vy - b1.vy;
                        const velAlongNormal = rvx * nx + rvy * ny;

                        if (velAlongNormal > 0) continue;

                        const e = 0.95;
                        let jImpulse = -(1 + e) * velAlongNormal;
                        jImpulse /= (1 / b1.mass + 1 / b2.mass);

                        const impulseX = jImpulse * nx;
                        const impulseY = jImpulse * ny;

                        b1.vx -= (1 / b1.mass) * impulseX;
                        b1.vy -= (1 / b1.mass) * impulseY;
                        b2.vx += (1 / b2.mass) * impulseX;
                        b2.vy += (1 / b2.mass) * impulseY;

                        const tangentX = -ny;
                        const tangentY = nx;
                        const tanVel = rvx * tangentX + rvy * tangentY;

                        b1.angularVelocity -= tanVel * 0.1;
                        b2.angularVelocity += tanVel * 0.1;

                        b1.onBounce('word');
                        b2.onBounce('word');
                    }
                }
            }
        }

        function calculateRevealPositions() {
            const container = document.getElementById("word-display");
            const containerW = container.clientWidth;
            const containerH = container.clientHeight;
            const gap = 16; // Add a bit more gap

            let currentLine = [];
            let allLines = [];
            let currentLineWidth = 0;
            const maxLineWidth = containerW * 0.85;

            activeBouncingWords.forEach(wordObj => {
                if (currentLineWidth + wordObj.width > maxLineWidth && currentLine.length > 0) {
                    allLines.push({ words: currentLine, width: currentLineWidth - gap });
                    currentLine = [];
                    currentLineWidth = 0;
                }
                currentLine.push(wordObj);
                currentLineWidth += wordObj.width + gap;
            });
            if (currentLine.length > 0) allLines.push({ words: currentLine, width: currentLineWidth - gap });

            const maxLineHeight = activeBouncingWords.reduce((max, w) => Math.max(max, w.height), 0);
            const totalBlockHeight = (allLines.length * maxLineHeight) + ((allLines.length - 1) * gap);
            let startY = (containerH - totalBlockHeight) / 2;

            allLines.forEach(line => {
                let startX = (containerW - line.width) / 2;
                line.words.forEach(wordObj => {
                    wordObj.targetX = startX;
                    wordObj.targetY = startY;
                    startX += wordObj.width + gap;
                });
                startY += maxLineHeight + gap;
            });
        }

        function revealWord() {
            if (activeBouncingWords.length === 0) return;

            // Remove all custom sizing and add unified size before computing target positions
            const measureGhost = (text) => {
                const span = document.createElement('div');
                span.textContent = text;
                span.className = `moving-word font-heading font-black ${UNIFIED_SIZE_CLASS}`;
                span.style.visibility = 'hidden';
                span.style.position = 'absolute';
                document.body.appendChild(span);
                const w = span.offsetWidth;
                const h = span.offsetHeight;
                document.body.removeChild(span);
                return { w, h };
            };

            activeBouncingWords.forEach(word => {
                if (word.isImage) return; // skip images
                const dim = measureGhost(word.element.textContent);
                word.width = dim.w;
                word.height = dim.h;

                // Clear any layout size classes and inject unified class size
                word.element.className = word.element.className.replace(/text-\w+( md:text-\w+)?/g, '').trim() + ' ' + UNIFIED_SIZE_CLASS;
            });

            isRevealed = true;
            calculateRevealPositions();

            document.getElementById('reveal-btn').classList.add('hidden');
            document.getElementById('skip-btn').classList.add('hidden');
            document.getElementById('next-round-btn').classList.remove('hidden');
            document.getElementById('speed-control-display').classList.add('opacity-50', 'pointer-events-none');
        }

        function gameLoop() {
            const container = document.getElementById("word-display");
            if (!container) return;
            const w = container.clientWidth;
            const h = container.clientHeight;

            handleCollisions();
            activeBouncingWords.forEach(word => word.update(w, h));
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function loadRound(index) {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            const display = document.getElementById("word-display");
            display.querySelectorAll('.moving-word, .bouncing-img').forEach(el => el.remove());
            const initialMsg = document.getElementById("initial-message");
            if (initialMsg) initialMsg.style.display = 'none';
            activeBouncingWords = [];
            if (!roundsData.length) return;

            let nextIndex = index;
            if (nextIndex >= roundsData.length) nextIndex = 0;
            currentRoundIndex = nextIndex;

            const words = roundsData[currentRoundIndex];
            isRevealed = false;

            document.getElementById('reveal-btn').classList.remove('hidden');
            document.getElementById('skip-btn').classList.remove('hidden');
            document.getElementById('next-round-btn').classList.add('hidden');
            document.getElementById('speed-control-display').classList.remove('opacity-50', 'pointer-events-none');

            const status = document.getElementById("round-counter");
            status.innerHTML = `ROUND <span class="text-blue font-black text-xl md:text-2xl ml-1 px-2 py-0.5 bg-blue/10 rounded-lg">${currentRoundIndex + 1}</span> / ${roundsData.length}`;

            words.forEach((text) => {
                activeBouncingWords.push(new BouncingWord(text, display.clientWidth, display.clientHeight));
            });
            uploadedImages.forEach(url => {
                activeBouncingWords.push(new BouncingWord(null, display.clientWidth, display.clientHeight, url));
            });
            gameLoop();
        }

        function parseAndLoadRounds() {
            const input = wordInput.value;
            const lines = input.split("\n").map((l) => l.trim()).filter((l) => l.length > 0);
            roundsData = lines.map((line) => line.split(",").map((w) => w.trim()).filter((w) => w.length > 0)).filter((r) => r.length > 0);
            if (!roundsData.length) return;

            if (window.innerWidth < 768) toggleControlPanel(true);
            currentRoundIndex = -1;
            loadNextRound();
        }

        function loadNextRound() {
            if (!roundsData.length) return;
            loadRound(currentRoundIndex + 1);
        }

        function toggleControlPanel(forceHide = false) {
            const controls = document.getElementById('controls');
            const isCurrentlyHidden = window.innerWidth >= 768
                ? controls.classList.contains('hidden-panel-desktop')
                : controls.classList.contains('hidden-panel-mobile');
            if (forceHide || !isCurrentlyHidden) {
                controls.classList.add('hidden-panel-mobile', 'hidden-panel-desktop');
            } else {
                controls.classList.remove('hidden-panel-mobile', 'hidden-panel-desktop');
            }
            setTimeout(() => window.dispatchEvent(new Event('resize')), 350);
        }

        window.addEventListener('resize', () => {
            const controls = document.getElementById('controls');
            if (window.innerWidth >= 768) controls.classList.remove('hidden-panel-mobile');
            else controls.classList.remove('hidden-panel-desktop');
            if (isRevealed) calculateRevealPositions();
        });

        async function init() {
            await requireAuth();

            loadTheme();

            // Load Cloud Progress
            try {
                const cloudData = await loadProgress('word-animator');
                if (cloudData) {
                    await initDB();
                    if (cloudData.presets) {
                        const tx = dataBase.transaction(STORE_PRESETS, 'readwrite');
                        const store = tx.objectStore(STORE_PRESETS);
                        store.clear();
                        for (const p of cloudData.presets) {
                            store.put(p);
                        }
                    }
                    if (cloudData.currentPresetId !== undefined) {
                        const tx = dataBase.transaction(STORE_SETTINGS, 'readwrite');
                        tx.objectStore(STORE_SETTINGS).put({ key: 'currentPresetId', value: cloudData.currentPresetId });
                    }
                }
            } catch (e) {
                console.error("Cloud load failed", e);
            }

            await loadWords();
            wordInput.addEventListener('input', (e) => saveWords(e.target.value));
            updateSpeed(document.getElementById('speed-slider').value);
            lucide.createIcons();
            if (window.innerWidth < 768) toggleControlPanel(true);
        }

        init();
    </script>
</body>
