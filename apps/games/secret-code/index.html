<!doctype html>
<html lang="en" class="light">
    <head>
    <!-- Supabase Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4"></script>
    <script src="/supabase.js"></script>
    <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Secret Code</title>
    <link rel="icon" type="image/x-icon" href="../../../media/icon.ico" />
    <link rel="icon" type="image/webp" href="../../../media/icon.webp" />

        <!-- External Libraries -->
        <script src="https://unpkg.com/lucide@1.16.0"></script>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="../../../components/input-modal.js"></script>

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap"
            rel="stylesheet"
        />

        <script>
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        fontFamily: {
                            heading: ["Fredoka", "sans-serif"],
                            body: ["Nunito", "sans-serif"],
                            mono: ["JetBrains Mono", "monospace"],
                            sans: ["Fredoka", "sans-serif"], // Fallback
                        },
                        colors: {
                            brand: {
                                pink: "#FF6B95",
                                orange: "#FF8C42",
                                green: "#00E676",
                                blue: "#2979FF",
                                dark: "#1e293b",
                                chalk: "#f8fafc",
                            },
                        },
                        boxShadow: {
                            brutal: "4px 4px 0px 0px rgba(30, 41, 59, 1)",
                            "brutal-sm": "2px 2px 0px 0px rgba(30, 41, 59, 1)",
                            "brutal-lg": "8px 8px 0px 0px rgba(30, 41, 59, 1)",
                            "brutal-white":
                                "4px 4px 0px 0px rgba(255, 255, 255, 1)",
                            "brutal-lg-white":
                                "8px 8px 0px 0px rgba(255, 255, 255, 1)",
                        },
                        animation: {
                            pop: "pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)",
                        },
                        keyframes: {
                            pop: {
                                "0%": { transform: "scale(0.8)", opacity: "0" },
                                "100%": { transform: "scale(1)", opacity: "1" },
                            },
                        },
                    },
                },
            };
        </script>
        <style>
            body {
                font-family: "Nunito", sans-serif;
                overflow: hidden;
                background-color: #f8fafc;
                background-image:
                    linear-gradient(#cbd5e1 2px, transparent 2px),
                    linear-gradient(90deg, #cbd5e1 2px, transparent 2px);
                background-size: 40px 40px;
                user-select: none;
                -webkit-tap-highlight-color: transparent;
                transition:
                    background-color 0.3s,
                    background-image 0.3s;
            }

            .dark body {
                background-color: #0f172a;
                background-image:
                    linear-gradient(#1e293b 2px, transparent 2px),
                    linear-gradient(90deg, #1e293b 2px, transparent 2px);
            }

            .game-console {
                background: #ffffff;
                border: 6px solid #1e293b;
                border-radius: 2.5rem;
                box-shadow: 14px 14px 0px rgba(30, 41, 59, 0.15);
                display: flex;
                overflow: hidden;
                transition:
                    transform 0.2s,
                    background-color 0.3s,
                    border-color 0.3s;
            }

            .dark .game-console {
                background: #1e293b;
                border: 6px solid #94a3b8;
                box-shadow: 14px 14px 0px rgba(0, 0, 0, 0.3);
            }

            .btn-chunky {
                transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
                transform: translateY(0);
                position: relative;
                border: 3px solid #1e293b;
                box-shadow: 0 6px 0 #1e293b;
                font-family: "Fredoka", sans-serif;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            .btn-chunky:active:not(:disabled) {
                transform: translateY(6px);
                box-shadow: 0 0 0 #1e293b !important;
                border-bottom-width: 3px;
            }

            .dark .btn-chunky {
                border: 3px solid #f8fafc;
                box-shadow: 0 6px 0 #f8fafc;
            }

            .dark .btn-chunky:active:not(:disabled) {
                box-shadow: 0 0 0 #f8fafc !important;
            }

            .custom-scrollbar::-webkit-scrollbar {
                height: 10px;
                width: 10px;
            }
            .custom-scrollbar::-webkit-scrollbar-track {
                background: transparent;
            }
            .custom-scrollbar::-webkit-scrollbar-thumb {
                background: #cbd5e1;
                border-radius: 10px;
                border: 2px solid #f8fafc;
            }
            .custom-scrollbar::-webkit-scrollbar-thumb:hover {
                background: #94a3b8;
            }

            .dark .custom-scrollbar::-webkit-scrollbar-thumb {
                background: #475569;
                border: 2px solid #1e293b;
            }

            textarea {
                background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
                background-size: 14px 14px;
            }

            .dark textarea {
                background-image: radial-gradient(#334155 1px, transparent 1px);
            }

            /* Sidebar transitions */
            .hidden-panel-mobile {
                transform: translateY(100%);
                border-bottom-width: 0 !important;
            }
            @media (min-width: 768px) {
                .hidden-panel-desktop {
                    margin-left: -24rem;
                    border-right-width: 0 !important;
                }
            }

            /* Generic button press */
            .btn-press {
                transition: all 0.1s ease;
            }
            .btn-press:active:not(:disabled) {
                transform: translate(4px, 4px);
                box-shadow: 0px 0px 0px 0px rgba(30, 41, 59, 1);
            }
            .dark .btn-press:active:not(:disabled) {
                box-shadow: 0px 0px 0px 0px rgba(255, 255, 255, 1);
            }
        </style>
        <link rel="stylesheet" href="../../../css/base.css" />
    <link rel="stylesheet" href="../../../css/components.css" />
  
</head>
    <body
        class="h-screen w-screen flex flex-col items-center justify-center p-2 md:p-6 overflow-hidden text-brand-dark dark:text-white transition-colors duration-300"
    >
        <div class="game-console w-full h-full relative flex-col md:flex-row">
            <!-- SIDEBAR CONTROLS -->
            <aside
                id="controls"
                class="w-full md:w-96 bg-white dark:bg-slate-800 border-b-4 md:border-b-0 md:border-r-4 border-brand-dark dark:border-slate-400 flex flex-col z-[60] transition-all duration-300 shadow-xl md:shadow-none h-[45%] md:h-full relative shrink-0"
            >
                <div
                    class="p-5 border-b-4 border-brand-dark dark:border-slate-400 bg-yellow-50 dark:bg-slate-700 flex justify-between items-center shrink-0"
                >
                    <div class="flex items-center gap-3">
                        <div
                            class="w-10 h-10 bg-brand-orange border-2 border-brand-dark dark:border-slate-300 rounded-xl flex items-center justify-center text-brand-dark shadow-brutal-sm rotate-3"
                        >
                            <i
                                data-lucide="lock-keyhole"
                                class="w-6 h-6 stroke-[3]"
                            ></i>
                        </div>
                        <div>
                            <h1
                                 class="text-2xl font-heading text-brand-dark dark:text-white tracking-wide leading-none"
                             >
                                 Secret Code
                            </h1>
                            <p
                                class="text-[10px] text-slate-500 dark:text-slate-300 font-bold uppercase tracking-widest mt-1"
                            >
                                Caesar Decoder
                            </p>
                        </div>
                    </div>
                    <button
                        onclick="toggleControlPanel(true)"
                        class="md:hidden p-2 bg-brand-pink/20 text-brand-pink border-2 border-brand-dark dark:border-slate-400 rounded-lg shadow-brutal-sm active:translate-y-1 active:shadow-none transition-all"
                    >
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>

                <div
                    class="flex-1 p-5 overflow-y-auto custom-scrollbar space-y-6 bg-white dark:bg-slate-800 relative"
                >
                    <!-- DIFFICULTY / SHIFT SETTINGS -->
                    <div
                        class="p-4 bg-slate-50 dark:bg-slate-900 border-2 border-brand-dark dark:border-slate-400 rounded-xl shadow-brutal-sm space-y-3"
                    >
                        <div class="flex justify-between items-center">
                            <label
                                class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest flex items-center gap-2"
                            >
                                <i
                                    data-lucide="settings-2"
                                    class="w-4 h-4 text-brand-orange"
                                ></i>
                                Difficulty (Shift)
                            </label>
                        </div>

                        <div
                            class="flex items-center justify-between bg-white dark:bg-slate-800 rounded-lg border-2 border-brand-dark dark:border-slate-400 p-1"
                        >
                            <button
                                onclick="changeShift(-1)"
                                class="w-10 h-10 flex items-center justify-center rounded-md hover:bg-brand-pink hover:text-white text-brand-dark dark:text-white transition-colors"
                            >
                                <i
                                    data-lucide="minus"
                                    class="w-6 h-6 stroke-[4]"
                                ></i>
                            </button>
                            <span
                                id="shiftValue"
                                class="text-2xl font-black font-heading w-12 text-center"
                                >3</span
                            >
                            <button
                                onclick="changeShift(1)"
                                class="w-10 h-10 flex items-center justify-center rounded-md hover:bg-brand-green hover:text-brand-dark text-brand-dark dark:text-white transition-colors"
                            >
                                <i
                                    data-lucide="plus"
                                    class="w-6 h-6 stroke-[4]"
                                ></i>
                            </button>
                        </div>
                    </div>

                    <!-- MISSION INPUT -->
                    <div class="space-y-2 flex-1 flex flex-col">
                        <div class="flex justify-between items-end">
                            <label
                                class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest flex items-center gap-1"
                            >
                                <i
                                    data-lucide="message-square-dashed"
                                    class="w-4 h-4 text-brand-blue"
                                ></i>
                                Secret Messages
                            </label>
                            <span
                                class="text-[10px] bg-brand-green/10 text-brand-green px-2 py-0.5 rounded border border-brand-green/20 font-bold uppercase"
                                >Auto-Saved</span
                            >
                        </div>
                        <textarea
                            id="secretInput"
                            spellcheck="false"
                            class="w-full h-32 md:h-48 p-4 bg-slate-50 dark:bg-slate-900 text-brand-dark dark:text-white font-heading font-bold text-lg border-2 border-brand-dark dark:border-slate-400 rounded-xl focus:border-brand-blue dark:focus:border-brand-blue focus:ring-0 outline-none resize-none shadow-inner custom-scrollbar uppercase"
                            placeholder="ONE MESSAGE PER LINE&#10;EXAMPLE:&#10;HELLO WORLD&#10;SECRET AGENT"
                        ></textarea>
                        <p
                            class="text-xs text-brand-blue dark:text-brand-orange mt-1 font-bold font-body"
                        >
                            Separate missions by new line or comma.
                        </p>
                    </div>

                    <div class="space-y-3 pt-2">
                        <button
                            onclick="setSecret()"
                            class="w-full btn-chunky bg-brand-blue text-white py-3 rounded-xl text-lg tracking-wide flex items-center justify-center gap-2 hover:brightness-105"
                        >
                            <i
                                data-lucide="refresh-cw"
                                class="w-5 h-5 stroke-[3]"
                            ></i>
                            UPDATE MISSION
                        </button>

                        <button
                            onclick="clearGame()"
                            class="w-full py-2 rounded-xl text-sm font-bold text-brand-dark dark:text-slate-300 border-2 border-dashed border-slate-300 dark:border-slate-600 hover:bg-red-50 dark:hover:bg-red-900/20 hover:text-red-500 hover:border-red-300 transition-colors"
                        >
                            Clear All Data
                        </button>
                    </div>

                    <!-- Word Sets -->
                    <div class="pt-4 border-t-2 border-dashed border-slate-300 dark:border-slate-600">
                        <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest flex items-center gap-1 mb-2">
                            <i data-lucide="folder" class="w-4 h-4 text-brand-orange"></i>
                            Saved Message Sets
                        </label>
                        <div class="flex gap-2 mb-3">
                            <input id="set-name-input" type="text" placeholder="Set name..."
                                class="flex-1 px-3 py-2 bg-slate-50 dark:bg-slate-900 text-brand-dark dark:text-white font-heading font-bold text-sm border-2 border-brand-dark dark:border-slate-400 rounded-lg focus:border-brand-blue outline-none transition-colors" />
                            <button onclick="saveCurrentSet()"
                                class="btn-chunky bg-brand-blue text-white px-3 py-2 rounded-lg text-xs flex items-center gap-1">
                                <i data-lucide="save" class="w-3.5 h-3.5"></i> SAVE
                            </button>
                        </div>
                        <div id="sets-list" class="space-y-1.5 max-h-32 overflow-y-auto custom-scrollbar">
                            <p class="text-slate-400 dark:text-slate-500 text-xs italic">No saved sets yet.</p>
                        </div>
                    </div>
                </div>

                <div
                    class="p-3 border-t-4 border-brand-dark dark:border-slate-400 bg-brand-chalk dark:bg-slate-900 text-center shrink-0 flex justify-between items-center px-4"
                >
                    <div
                        id="round-counter"
                        class="font-heading text-slate-500 dark:text-slate-400 text-sm font-bold tracking-widest flex items-center gap-2 w-full justify-between"
                    >
                        <span>MISSION STATUS:</span>
                        <span
                            id="roundIndicator"
                            class="text-brand-blue text-lg"
                            >READY</span
                        >
                    </div>
                </div>
            </aside>

            <!-- MAIN AREA -->
            <main
                class="flex-1 relative h-[55%] md:h-full bg-slate-50 dark:bg-slate-800 overflow-hidden group flex flex-col"
            >
                <!-- Dot Pattern Background -->
                <div
                    class="absolute inset-0 opacity-10 pointer-events-none z-0"
                    style="
                        background-image: radial-gradient(
                            #1e293b 2px,
                            transparent 2px
                        );
                        background-size: 24px 24px;
                    "
                ></div>
                <div
                    class="absolute inset-0 opacity-10 pointer-events-none z-0 hidden dark:block"
                    style="
                        background-image: radial-gradient(
                            #f8fafc 2px,
                            transparent 2px
                        );
                        background-size: 24px 24px;
                    "
                ></div>

                <!-- Top Floating Controls -->
                <div
                    class="relative z-20 flex justify-between items-start p-4 shrink-0 pointer-events-none"
                >
                    <div class="pointer-events-auto flex items-center gap-2">
                        <button
                            onclick="toggleControlPanel(false)"
                            class="p-2 bg-white dark:bg-slate-700 border-2 border-brand-dark dark:border-slate-400 rounded-lg shadow-brutal-sm hover:translate-y-[-2px] transition-transform text-slate-500 dark:text-white hover:text-brand-dark"
                        >
                            <i
                                data-lucide="settings"
                                class="w-6 h-6 stroke-[3]"
                            ></i>
                        </button>

                        <!-- Quick Difficulty Shift -->
                        <div class="flex items-center bg-white dark:bg-slate-800 border-2 border-brand-dark dark:border-slate-400 rounded-lg shadow-brutal-sm px-1 py-1 h-[44px]">
                            <button onclick="changeShift(-1)" class="w-8 h-8 flex items-center justify-center hover:bg-brand-pink/20 text-brand-dark dark:text-white rounded transition-colors group">
                                <i data-lucide="chevron-left" class="w-5 h-5 stroke-[3] group-hover:text-brand-pink"></i>
                            </button>
                            <div class="flex flex-col items-center px-2 min-w-[50px]">
                                <span class="text-[8px] font-bold text-slate-400 dark:text-slate-300 uppercase leading-none mb-0.5">Shift</span>
                                <span id="shiftValueQuick" class="text-sm font-black font-heading leading-none text-brand-orange">3</span>
                            </div>
                            <button onclick="changeShift(1)" class="w-8 h-8 flex items-center justify-center hover:bg-brand-green/20 text-brand-dark dark:text-white rounded transition-colors group">
                                <i data-lucide="chevron-right" class="w-5 h-5 stroke-[3] group-hover:text-brand-green"></i>
                            </button>
                        </div>
                        <button
                            onclick="toggleDarkMode()"
                            id="darkModeBtn"
                            class="p-2 bg-brand-chalk dark:bg-slate-700 border-2 border-brand-dark dark:border-slate-400 rounded-lg shadow-brutal-sm hover:translate-y-[-2px] transition-transform text-brand-dark dark:text-white"
                        >
                            <i
                                data-lucide="moon"
                                class="w-6 h-6 stroke-[3]"
                            ></i>
                        </button>
                    </div>

                    <button
                        onclick="toggleDecoder()"
                        id="toggleDecoderBtn"
                        class="pointer-events-auto p-2 px-4 bg-white dark:bg-slate-700 border-2 border-brand-dark dark:border-slate-400 rounded-lg shadow-brutal-sm hover:translate-y-[-2px] transition-transform text-brand-dark dark:text-white font-heading font-bold flex items-center gap-2"
                    >
                        <i data-lucide="eye-off" class="w-5 h-5 stroke-[3]"></i>
                        <span>Hide Key</span>
                    </button>
                </div>

                <!-- Decoder Key Container -->
                <div
                    id="decoderContent"
                    class="relative z-10 px-4 transition-all duration-300 origin-top shrink-0"
                >
                    <div
                        class="bg-white dark:bg-slate-900 border-4 border-brand-dark dark:border-slate-400 rounded-2xl shadow-brutal overflow-hidden flex flex-col"
                    >
                        <div
                            class="bg-brand-dark text-white text-[10px] font-bold uppercase tracking-widest py-1.5 px-4 text-center font-heading flex justify-between items-center gap-2"
                        >
                            <div class="flex items-center gap-2">
                                <i data-lucide="key" class="w-3 h-3 text-brand-orange"></i>
                                <span>Master Decoder Key</span>
                            </div>
                            <div class="flex items-center gap-2 bg-white/10 rounded-full px-2 py-0.5 border border-white/20">
                                <span class="opacity-70">Shift:</span>
                                <div class="flex items-center gap-1.5">
                                    <button onclick="changeShift(-1)" class="hover:text-brand-pink transition-colors">
                                        <i data-lucide="minus-circle" class="w-3.5 h-3.5"></i>
                                    </button>
                                    <span id="shiftValueModal" class="text-brand-orange w-4 font-black text-center">3</span>
                                    <button onclick="changeShift(1)" class="hover:text-brand-green transition-colors">
                                        <i data-lucide="plus-circle" class="w-3.5 h-3.5"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div
                            class="flex flex-col p-2 sm:p-3 gap-1.5 sm:gap-2 bg-brand-chalk dark:bg-slate-800 w-full"
                            id="decoderStrip"
                        >
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>

                <!-- Puzzle Display -->
                <div
                    class="flex-1 relative z-10 flex flex-col items-center justify-center p-4 md:p-8 overflow-y-auto overflow-x-hidden custom-scrollbar"
                >
                    <!-- Empty State -->
                    <div
                        id="emptyState"
                        class="flex flex-col items-center justify-center text-center max-w-sm animate-pop bg-white dark:bg-slate-700 p-6 rounded-2xl border-4 border-brand-dark dark:border-slate-400 shadow-brutal"
                    >
                        <div
                            class="w-20 h-20 bg-brand-chalk dark:bg-slate-800 border-4 border-brand-dark dark:border-slate-400 rounded-2xl shadow-brutal-sm flex items-center justify-center mb-4 rotate-[-5deg]"
                        >
                            <i
                                data-lucide="lock"
                                class="w-10 h-10 stroke-[3] text-brand-dark dark:text-white"
                            ></i>
                        </div>
                        <h4
                            class="text-2xl font-black font-heading text-brand-dark dark:text-white mb-2"
                        >
                            Vault is Empty
                        </h4>
                        <p
                            class="font-body text-brand-dark/70 dark:text-slate-300 font-bold text-sm"
                        >
                            Use the sidebar to enter secret messages and update
                            the mission!
                        </p>
                    </div>

                    <!-- Puzzle Tiles Container -->
                    <div
                        id="puzzleContainer"
                        class="flex flex-wrap justify-center gap-x-4 sm:gap-x-8 gap-y-10 w-full transition-opacity duration-300 pb-20"
                    >
                        <!-- Populated by JS -->
                    </div>

                    <!-- Answer Overlay -->
                    <div
                        id="answerContainer"
                        class="hidden absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 transition-all duration-500 ease-out opacity-0 z-30 w-[90%] max-w-3xl"
                    >
                        <div
                            class="relative bg-brand-orange border-4 border-brand-dark px-6 py-8 md:py-12 rounded-2xl shadow-brutal-lg text-center break-words rotate-1"
                        >
                            <span
                                class="absolute -top-4 left-1/2 transform -translate-x-1/2 bg-white dark:bg-slate-800 text-brand-dark dark:text-white border-4 border-brand-dark text-sm font-black font-heading px-4 py-1 rounded-xl uppercase tracking-widest shadow-brutal-sm"
                            >
                                Solution
                            </span>
                            <span
                                id="revealedText"
                                class="text-4xl sm:text-6xl md:text-7xl font-black font-heading text-brand-dark tracking-widest leading-tight drop-shadow-md"
                            ></span>
                        </div>
                    </div>
                </div>

                <!-- Bottom Actions -->
                <div
                    class="absolute bottom-6 right-6 z-40 flex gap-3 items-end"
                >
                    <button
                        id="revealBtn"
                        onclick="toggleReveal()"
                        disabled
                        class="btn-chunky bg-brand-pink text-white px-6 py-4 rounded-xl text-xl font-heading flex items-center gap-3 opacity-50 pointer-events-none"
                    >
                        <i data-lucide="eye" class="w-6 h-6 stroke-[3]"></i>
                        <span id="revealText">REVEAL</span>
                    </button>

                    <button
                        id="nextWordBtn"
                        onclick="nextWord()"
                        class="hidden btn-chunky bg-brand-green text-brand-dark px-6 py-4 rounded-xl text-xl font-heading flex items-center gap-2"
                    >
                        NEXT
                        <i
                            data-lucide="arrow-right"
                            class="w-6 h-6 stroke-[3]"
                        ></i>
                    </button>
                </div>
            </main>
        </div>

        <!-- Custom Alert Modal -->
        <div
            id="alertModal"
            class="fixed inset-0 bg-brand-dark/90 z-[100] hidden flex items-center justify-center backdrop-blur-sm opacity-0 transition-opacity duration-300 p-4"
        >
            <div
                class="bg-brand-pink border-4 border-brand-dark rounded-3xl p-8 w-full max-w-sm shadow-brutal-lg transform scale-95 transition-transform duration-300 text-center"
                id="alertContent"
            >
                <div
                    class="w-16 h-16 bg-white border-4 border-brand-dark rounded-full mx-auto mb-4 flex items-center justify-center shadow-brutal-sm"
                >
                    <i
                        data-lucide="alert-triangle"
                        class="w-8 h-8 stroke-[3] text-brand-pink"
                    ></i>
                </div>
                <h3
                    class="text-3xl font-black text-white font-heading mb-3 tracking-wide drop-shadow-md"
                >
                    Oops!
                </h3>
                <p
                    id="alertMessage"
                    class="text-white font-bold font-body mb-8 text-lg"
                >
                    Error message.
                </p>
                <button
                    onclick="closeCustomAlert()"
                    class="btn-chunky bg-white text-brand-dark w-full py-3 rounded-xl text-xl"
                >
                    Got it!
                </button>
            </div>
        </div>

        <canvas
            id="confettiCanvas"
            class="fixed inset-0 pointer-events-none z-[50] hidden"
        ></canvas>

        <script>
            // --- Game Logic & Persistence ---
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let currentShift = 3;
            let secretList = [];
            let currentRoundIndex = -1;
            let isRevealed = false;
            let isDecoderKeyVisible = true;

            const decoderContent = document.getElementById("decoderContent");
            const decoderStrip = document.getElementById("decoderStrip");
            const puzzleContainer = document.getElementById("puzzleContainer");
            const emptyState = document.getElementById("emptyState");
            const answerContainer = document.getElementById("answerContainer");
            const revealedText = document.getElementById("revealedText");
            const secretInput = document.getElementById("secretInput");
            const revealBtn = document.getElementById("revealBtn");
            const revealTextSpan = document.getElementById("revealText");
            const nextWordBtn = document.getElementById("nextWordBtn");
            const shiftValueDisplay = document.getElementById("shiftValue");
            const roundIndicator = document.getElementById("roundIndicator");

            // Initialization
            lucide.createIcons();

            // --- THEME PERSISTENCE ---
            function initTheme() {
                const saved = localStorage.getItem('theme_secret-code') || 'light';
                if (saved === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
                updateDarkModeIcon();
            }
            function updateDarkModeIcon() {
                const btn = document.getElementById('darkModeBtn');
                if (!btn) return;
                const isDark = document.documentElement.classList.contains('dark');
                btn.innerHTML = isDark
                    ? `<i data-lucide="sun" class="w-6 h-6 stroke-[3]"></i>`
                    : `<i data-lucide="moon" class="w-6 h-6 stroke-[3]"></i>`;
                lucide.createIcons();
            }

            // --- IndexedDB PERSISTENCE ---
            const DB_NAME = 'SecretCodeDB';
            const DB_VER = 1;
            const STATE_STORE = 'game_state';
            const SETS_STORE = 'word_sets';

            async function initDB() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(DB_NAME, DB_VER);
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(STATE_STORE)) db.createObjectStore(STATE_STORE);
                        if (!db.objectStoreNames.contains(SETS_STORE)) db.createObjectStore(SETS_STORE, { keyPath: 'id', autoIncrement: true });
                    };
                    req.onsuccess = (e) => resolve(e.target.result);
                    req.onerror = (e) => reject(e.target.error);
                });
            }
            async function dbPut(key, data) {
                try { const db = await initDB(); db.transaction(STATE_STORE, 'readwrite').objectStore(STATE_STORE).put(data, key); } catch(e) { console.error(e); }
            }
            async function dbGet(key) {
                try {
                    const db = await initDB();
                    return new Promise((res) => { const r = db.transaction(STATE_STORE, 'readonly').objectStore(STATE_STORE).get(key); r.onsuccess = () => res(r.result); r.onerror = () => res(null); });
                } catch(e) { return null; }
            }

            // Word Sets CRUD
            async function saveWordSetToDB(name, content) {
                const db = await initDB();
                const tx = db.transaction(SETS_STORE, 'readwrite');
                tx.objectStore(SETS_STORE).put({ name, content, createdAt: Date.now() });
                return new Promise(r => { tx.oncomplete = r; });
            }
            async function getAllWordSets() {
                try {
                    const db = await initDB();
                    return new Promise((res) => { const r = db.transaction(SETS_STORE, 'readonly').objectStore(SETS_STORE).getAll(); r.onsuccess = () => res(r.result || []); r.onerror = () => res([]); });
                } catch(e) { return []; }
            }
            async function deleteWordSet(id) {
                const db = await initDB();
                const tx = db.transaction(SETS_STORE, 'readwrite');
                tx.objectStore(SETS_STORE).delete(id);
                return new Promise(r => { tx.oncomplete = r; });
            }

            async function renderWordSets() {
                const list = document.getElementById('sets-list');
                if (!list) return;
                const sets = await getAllWordSets();
                if (sets.length === 0) { list.innerHTML = '<p class="text-slate-400 dark:text-slate-500 text-xs italic">No saved sets yet.</p>'; return; }
                list.innerHTML = '';
                sets.forEach(set => {
                    const item = document.createElement('div');
                    item.className = 'flex items-center gap-2 p-2 bg-slate-50 dark:bg-slate-900 border-2 border-brand-dark/10 dark:border-slate-600 rounded-lg hover:border-brand-blue/40 transition-all';
                    item.innerHTML = `
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-bold text-brand-dark dark:text-white truncate">${set.name}</p>
                            <p class="text-[10px] text-slate-400 dark:text-slate-500 truncate">${set.content.split('\n').filter(l => l.trim()).length} messages</p>
                        </div>
                        <button class="set-load p-1.5 bg-brand-blue/10 text-brand-blue rounded-md border border-brand-blue/20 hover:bg-brand-blue hover:text-white transition-all" title="Load">
                            <i data-lucide="upload" class="w-3.5 h-3.5 pointer-events-none"></i>
                        </button>
                        <button class="set-del p-1.5 bg-brand-pink/10 text-brand-pink rounded-md border border-brand-pink/20 hover:bg-brand-pink hover:text-white transition-all" title="Delete">
                            <i data-lucide="trash-2" class="w-3.5 h-3.5 pointer-events-none"></i>
                        </button>`;
                    item.querySelector('.set-load').onclick = () => { secretInput.value = set.content; saveState(); };
                    item.querySelector('.set-del').onclick = async () => { await deleteWordSet(set.id); renderWordSets(); };
                    list.appendChild(item);
                });
                lucide.createIcons();
            }

            async function saveCurrentSet() {
                const nameInput = document.getElementById('set-name-input');
                const name = nameInput.value.trim();
                const content = secretInput.value.trim();
                if (!name || !content) return;
                await saveWordSetToDB(name, content);
                nameInput.value = '';
                renderWordSets();
            }

            // --- State Persistence (Cloud-First with IndexedDB Cache) ---
            async function saveState() {
                const state = {
                    shift: currentShift,
                    secrets: secretList,
                    roundIndex: currentRoundIndex,
                };
                // Update Local Cache
                await dbPut('caesarState', state);
                // Update Cloud
                saveProgress('secret_code', state);
            }

            async function loadState() {
                await requireAuth();
                
                // 1. Try Cloud
                const cloudState = await loadProgress('secret_code');
                
                // 2. Try Local if cloud fails or for speed (loadProgress already does this for localStorage, but we use IndexedDB here)
                const localState = await dbGet('caesarState');
                
                const state = cloudState || localState;

                if (state) {
                    currentShift = state.shift ?? 3;
                    secretList = state.secrets ?? [];
                    currentRoundIndex = state.roundIndex ?? 0;
                    
                    // Update local if cloud was different
                    if (cloudState) await dbPut('caesarState', cloudState);
                }

                if (secretList.length > 0) {
                    secretInput.value = secretList.join("\n");
                }

                renderDecoder();
                if (secretList.length > 0) {
                    loadRound();
                } else {
                    renderEmptyState();
                }

                if (window.innerWidth < 768 && secretList.length === 0) {
                    toggleControlPanel(false);
                } else if (window.innerWidth < 768 && secretList.length > 0) {
                    toggleControlPanel(true);
                }
                
                renderWordSets(); // Refresh word sets list
            }

            function clearGame() {
                // Clear IndexedDB state
                dbPut('caesarState', null);
                secretList = [];
                currentRoundIndex = -1;
                secretInput.value = "";
                resetRevealState(true);
                renderEmptyState();
                updateNavControls();
            }

            function toggleDarkMode() {
                const isDark = document.documentElement.classList.toggle("dark");
                localStorage.setItem('theme_secret-code', isDark ? 'dark' : 'light');
                updateDarkModeIcon();
            }

            function toggleDecoder() {
                isDecoderKeyVisible = !isDecoderKeyVisible;
                const btn = document.getElementById("toggleDecoderBtn");

                if (isDecoderKeyVisible) {
                    decoderContent.style.maxHeight =
                        decoderContent.scrollHeight + "px";
                    decoderContent.classList.remove(
                        "opacity-0",
                        "scale-y-0",
                        "mb-[-100px]",
                    );
                    btn.innerHTML = `<i data-lucide="eye-off" class="w-5 h-5 stroke-[3]"></i> <span>Hide Key</span>`;
                } else {
                    decoderContent.style.maxHeight = "0px";
                    decoderContent.classList.add(
                        "opacity-0",
                        "scale-y-0",
                        "mb-[-100px]",
                    );
                    btn.innerHTML = `<i data-lucide="eye" class="w-5 h-5 stroke-[3]"></i> <span>Show Key</span>`;
                }
                lucide.createIcons();
            }

            function showCustomAlert(msg) {
                document.getElementById("alertMessage").textContent = msg;
                const alertModal = document.getElementById("alertModal");
                const alertContent = document.getElementById("alertContent");
                alertModal.classList.remove("hidden");
                void alertModal.offsetWidth;
                alertModal.classList.remove("opacity-0");
                alertContent.classList.remove("scale-95");
                alertContent.classList.add("scale-100");
            }

            function closeCustomAlert() {
                const alertModal = document.getElementById("alertModal");
                const alertContent = document.getElementById("alertContent");
                alertModal.classList.add("opacity-0");
                alertContent.classList.remove("scale-100");
                alertContent.classList.add("scale-95");
                setTimeout(() => alertModal.classList.add("hidden"), 300);
            }

            // --- Game Functions ---

            function getCipherLetter(char, shift) {
                const idx = alphabet.indexOf(char);
                if (idx === -1) return char;
                return alphabet[(idx + shift) % 26];
            }

            function renderDecoder() {
                decoderStrip.innerHTML = "";
                if (shiftValueDisplay) shiftValueDisplay.textContent = currentShift;
                if (document.getElementById("shiftValueQuick")) document.getElementById("shiftValueQuick").textContent = currentShift;
                if (document.getElementById("shiftValueModal")) document.getElementById("shiftValueModal").textContent = currentShift;

                const row1 = document.createElement("div");
                row1.className = "flex w-full gap-1 sm:gap-2 justify-center";

                const row2 = document.createElement("div");
                row2.className = "flex w-full gap-1 sm:gap-2 justify-center";

                for (let i = 0; i < alphabet.length; i++) {
                    const plainChar = alphabet[i];
                    const cipherChar = getCipherLetter(plainChar, currentShift);

                    const card = document.createElement("div");
                    card.className =
                        "flex flex-col border-[1.5px] sm:border-2 border-brand-dark dark:border-slate-400 rounded-md sm:rounded-lg shadow-brutal-sm overflow-hidden flex-1 max-w-[3rem]";

                    card.innerHTML = `
                        <div class="w-full h-8 sm:h-10 bg-brand-pink text-white flex items-center justify-center font-black font-heading text-sm sm:text-xl border-b-[1.5px] sm:border-b-2 border-brand-dark dark:border-slate-400">
                            ${cipherChar}
                        </div>
                        <div class="w-full h-8 sm:h-10 bg-brand-orange text-brand-dark flex items-center justify-center font-black font-heading text-sm sm:text-xl">
                            ${plainChar}
                        </div>
                    `;

                    if (i < 13) {
                        row1.appendChild(card);
                    } else {
                        row2.appendChild(card);
                    }
                }

                decoderStrip.appendChild(row1);
                decoderStrip.appendChild(row2);
                saveState();
            }

            function changeShift(amount) {
                currentShift = (currentShift + amount + 26) % 26;
                if (currentShift === 0) currentShift = amount > 0 ? 1 : 25;
                renderDecoder();
                if (secretList.length > 0 && currentRoundIndex >= 0) {
                    renderPuzzle(secretList[currentRoundIndex]);
                }
            }

            async function setSecret() {
                const rawInput = secretInput.value.toUpperCase();
                const newList = rawInput
                    .split(/[\n,]+/)
                    .map((s) => s.replace(/[^A-Z\s]/g, "").trim())
                    .filter((s) => s.length > 0);

                if (newList.length === 0) {
                    await showAlertModal("Please enter at least one secret message!", { title: "Input Required", icon: "alert-circle", iconColor: "orange" });
                    return;
                }

                secretList = newList;
                currentRoundIndex = 0;
                renderDecoder();
                loadRound();

                if (window.innerWidth < 768) {
                    toggleControlPanel(true);
                }
            }

            function renderEmptyState() {
                emptyState.classList.remove("hidden");
                puzzleContainer.innerHTML = "";
                revealBtn.disabled = true;
                revealBtn.classList.add("opacity-50", "pointer-events-none");
                updateNavControls();
            }

            function loadRound() {
                if (secretList.length === 0) return;
                emptyState.classList.add("hidden");
                resetRevealState(true);
                renderPuzzle(secretList[currentRoundIndex]);
                updateNavControls();

                revealBtn.disabled = false;
                revealBtn.classList.remove("opacity-50", "pointer-events-none");
                saveState();
            }

            function changeRound(delta) {
                const newIndex = currentRoundIndex + delta;
                if (newIndex >= 0 && newIndex < secretList.length) {
                    currentRoundIndex = newIndex;
                    loadRound();
                }
            }

            function nextWord() {
                if (currentRoundIndex < secretList.length - 1) changeRound(1);
            }

            function updateNavControls() {
                if (secretList.length > 0) {
                    roundIndicator.innerHTML = `<span class="text-brand-dark dark:text-white">${currentRoundIndex + 1}</span> / ${secretList.length}`;
                } else {
                    roundIndicator.textContent = "WAITING";
                }

                if (
                    secretList.length > 1 &&
                    currentRoundIndex < secretList.length - 1
                ) {
                    nextWordBtn.classList.remove("hidden");
                } else {
                    nextWordBtn.classList.add("hidden");
                }
            }

            function renderPuzzle(text) {
                puzzleContainer.innerHTML = "";
                puzzleContainer.style.opacity = "0";

                setTimeout(() => {
                    puzzleContainer.style.opacity = "1";
                    const words = text.split(" ");

                    words.forEach((word) => {
                        const wordDiv = document.createElement("div");
                        wordDiv.className =
                            "flex gap-2 sm:gap-3 flex-wrap justify-center";

                        for (let char of word) {
                            const encryptedChar = getCipherLetter(
                                char,
                                currentShift,
                            );
                            const charDiv = document.createElement("div");
                            charDiv.className =
                                "flex flex-col items-center gap-2 animate-pop";

                            charDiv.innerHTML = `
                            <div class="relative group z-10">
                                <div class="w-12 h-14 sm:w-16 sm:h-20 md:w-20 md:h-24 bg-white dark:bg-slate-700 text-brand-dark dark:text-white rounded-xl shadow-brutal border-[3px] border-brand-dark dark:border-slate-400 flex items-center justify-center text-3xl sm:text-4xl md:text-5xl font-black font-heading transition-transform hover:-translate-y-1 hover:rotate-1">
                                    ${encryptedChar}
                                </div>
                            </div>
                            <div class="w-10 h-3 sm:w-14 sm:h-4 md:w-16 md:h-5 border-[3px] border-dashed border-brand-dark/20 dark:border-slate-400/40 rounded-md mt-[-8px] z-0"></div>
                            `;
                            wordDiv.appendChild(charDiv);
                        }
                        puzzleContainer.appendChild(wordDiv);
                    });
                }, 50);
                revealedText.textContent = text;
            }

            function toggleReveal() {
                if (secretList.length === 0) return;
                isRevealed = !isRevealed;

                if (isRevealed) {
                    answerContainer.classList.remove("hidden");
                    void answerContainer.offsetWidth;
                    answerContainer.classList.remove("opacity-0", "scale-90");
                    answerContainer.classList.add("opacity-100", "scale-100");

                    puzzleContainer.classList.add("blur-sm", "opacity-40");

                    revealTextSpan.textContent = "HIDE";
                    revealBtn.classList.replace(
                        "bg-brand-pink",
                        "bg-slate-600",
                    );
                    fireConfetti();
                } else {
                    resetRevealState(false);
                }
            }

            function resetRevealState(instant = false) {
                isRevealed = false;
                const canvas = document.getElementById("confettiCanvas");
                canvas.classList.add("hidden");

                puzzleContainer.classList.remove("blur-sm", "opacity-40");

                if (instant) {
                    answerContainer.classList.add("hidden");
                    answerContainer.classList.remove(
                        "opacity-100",
                        "scale-100",
                    );
                    answerContainer.classList.add("opacity-0", "scale-90");
                } else {
                    answerContainer.classList.remove(
                        "opacity-100",
                        "scale-100",
                    );
                    answerContainer.classList.add("opacity-0", "scale-90");
                    setTimeout(() => {
                        if (!isRevealed)
                            answerContainer.classList.add("hidden");
                    }, 300);
                }
                revealTextSpan.textContent = "REVEAL";
                revealBtn.classList.replace("bg-slate-600", "bg-brand-pink");
            }

            // --- Layout Controls ---

            function toggleControlPanel(forceHide = false) {
                const controls = document.getElementById("controls");
                const isCurrentlyHidden =
                    window.innerWidth >= 768
                        ? controls.classList.contains("hidden-panel-desktop")
                        : controls.classList.contains("hidden-panel-mobile");

                if (forceHide || !isCurrentlyHidden) {
                    controls.classList.add(
                        "hidden-panel-mobile",
                        "hidden-panel-desktop",
                    );
                } else {
                    controls.classList.remove(
                        "hidden-panel-mobile",
                        "hidden-panel-desktop",
                    );
                }
            }

            window.addEventListener("resize", () => {
                const controls = document.getElementById("controls");
                if (window.innerWidth >= 768) {
                    controls.classList.remove("hidden-panel-mobile");
                } else {
                    controls.classList.remove("hidden-panel-desktop");
                }
            });

            // --- Confetti ---
            function fireConfetti() {
                const canvas = document.getElementById("confettiCanvas");
                const ctx = canvas.getContext("2d");
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                canvas.classList.remove("hidden");
                const particles = [];
                const colors = ["#FF6B95", "#FF8C42", "#00E676", "#2979FF"];
                for (let i = 0; i < 150; i++) {
                    particles.push({
                        x: canvas.width / 2,
                        y: canvas.height / 2,
                        vx: (Math.random() - 0.5) * 25,
                        vy: (Math.random() - 0.5) * 25,
                        size: Math.random() * 10 + 6,
                        color: colors[
                            Math.floor(Math.random() * colors.length)
                        ],
                        life: 150,
                    });
                }
                function animate() {
                    if (!isRevealed) {
                        canvas.classList.add("hidden");
                        return;
                    }
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    let active = false;
                    particles.forEach((p) => {
                        if (p.life > 0) {
                            active = true;
                            p.x += p.vx;
                            p.y += p.vy;
                            p.vy += 0.5;
                            p.vx *= 0.95;
                            p.life--;
                            p.size *= 0.96;
                            ctx.fillStyle = p.color;
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.strokeStyle = "#1e293b";
                            ctx.lineWidth = 2;
                            ctx.stroke();
                        }
                    });
                    if (active) requestAnimationFrame(animate);
                    else canvas.classList.add("hidden");
                }
                animate();
            }

            // --- INITIALIZATION ---
            decoderContent.style.maxHeight = "500px"; // initial open state
            initTheme();
            loadState(); // calls the new async loadState at line 733

            // Auto-save textarea on input (debounced)
            let inputTimeout;
            secretInput.addEventListener('input', () => {
                if (inputTimeout) clearTimeout(inputTimeout);
                inputTimeout = setTimeout(() => {
                    saveState();
                }, 1000);
            });
        </script>
    </body>
</html>
