<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlassKit Observation Form</title>
    <link rel="icon" type="image/x-icon" href="../../../media/icon.ico" />
    <link rel="icon" type="image/webp" href="../../../media/icon.webp" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap"
        rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4"></script>
    <script src="/supabase.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        kkpink: '#FF6B95',
                        kkorange: '#FF8C42',
                        kkgreen: '#00E676',
                        kkblue: '#2979FF',
                        dark: '#1e293b',
                        chalk: '#f8fafc',
                    },
                    fontFamily: {
                        fredoka: ['Fredoka', 'sans-serif'],
                        nunito: ['Nunito', 'sans-serif'],
                    },
                    boxShadow: {
                        'hard': '6px 6px 0px 0px rgba(30, 41, 59, 1)',
                        'hard-sm': '3px 3px 0px 0px rgba(30, 41, 59, 1)',
                    },
                    borderWidth: {
                        '3': '3px',
                        '4': '4px',
                    }
                }
            }
        }
    </script>

    <style>
        /* --- SCREEN STYLES --- */
        body {
            background-color: #f8fafc;
            background-image:
                linear-gradient(rgba(30, 41, 59, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30, 41, 59, 0.1) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .dark body {
            background-color: #0f172a;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
        }

        textarea {
            resize: none;
            overflow: hidden;
            min-height: 50px;
        }

        /* --- PRINT STYLES --- */
        @media print {
            @page {
                margin: 0.75cm;
                size: A4 portrait;
            }

            body {
                background: white !important;
                color: black !important;
                font-family: 'Times New Roman', serif;
                -webkit-print-color-adjust: exact;
                padding: 0 !important;
                font-size: 11pt;
            }

            .no-print,
            header .lucide-save,
            #saveStatus,
            button {
                display: none !important;
            }

            main {
                border: none !important;
                box-shadow: none !important;
                width: 100% !important;
                max-width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            input,
            textarea {
                border: none !important;
                border-bottom: 1px solid #ccc !important;
                background: transparent !important;
                padding: 0px !important;
                color: black !important;
                font-weight: normal;
            }

            textarea:placeholder-shown {
                min-height: 100px !important;
                border: 1px solid #ddd !important;
                background-color: #fafafa !important;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                border: 2px solid black;
            }

            th {
                background-color: #f0f0f0 !important;
                color: black !important;
                border: 1px solid black !important;
                font-weight: bold;
                padding: 4px !important;
            }

            td {
                border: 1px solid black !important;
                padding: 4px !important;
                vertical-align: top;
            }

            td input,
            td textarea {
                border: none !important;
            }

            td .time-display {
                display: block !important;
                font-size: 10pt !important;
                color: black !important;
                font-weight: bold !important;
            }

            .delete-row-btn {
                display: none !important;
            }

            .grid-cols-1.md\:grid-cols-3 {
                display: flex !important;
                flex-direction: row !important;
                gap: 1cm !important;
            }

            .relative.group {
                flex: 1;
                border: 1px solid black !important;
                border-radius: 8px !important;
                box-shadow: none !important;
            }

            .absolute.inset-0 {
                display: none !important;
            }

            .relative.bg-white {
                border: none !important;
                padding: 10px !important;
            }

            #action_plan {
                border: 1px solid black !important;
                min-height: 150px !important;
                padding: 10px !important;
                border-radius: 8px;
            }

            h1 {
                font-size: 18pt !important;
                color: black !important;
                margin-bottom: 5px !important;
            }

            h2,
            h3 {
                font-size: 14pt !important;
                color: black !important;
                margin-bottom: 5px !important;
            }

            label {
                font-weight: bold !important;
                color: #333 !important;
            }

            tr,
            .relative.group,
            .action-plan-container {
                page-break-inside: avoid;
            }
        }
    </style>
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/components.css" />
  
</head>

<body class="text-dark dark:text-white p-4 md:p-10 font-nunito min-h-screen flex flex-col items-center">

    <input type="file" id="importFile" accept=".json" class="hidden" onchange="handleFileImport(this)">

    <div class="fixed top-4 right-4 flex flex-wrap gap-2 z-50 no-print justify-end">

        <div class="flex gap-2 bg-white dark:bg-slate-800 p-1 rounded-xl border-3 border-dark shadow-hard mr-2">
            <button onclick="exportData()" title="Export Data" class="bg-kkgreen text-dark px-3 py-2 rounded-lg border-2 border-dark hover:bg-kkgreen/80 transition-colors">
                <i data-lucide="download" class="w-5 h-5"></i>
            </button>
            <button onclick="document.getElementById('importFile').click()" title="Import Data" class="bg-kkorange text-dark px-3 py-2 rounded-lg border-2 border-dark hover:bg-kkorange/80 transition-colors">
                <i data-lucide="upload" class="w-5 h-5"></i>
            </button>
        </div>

        <button onclick="window.print()" class="bg-kkblue text-white px-4 py-2 rounded-xl border-3 border-dark shadow-hard hover:translate-y-1 hover:shadow-hard-sm transition-all font-fredoka font-bold flex items-center gap-2">
            <i data-lucide="printer" class="w-5 h-5"></i> <span class="hidden md:inline">Print</span>
        </button>
        <button id="resetBtn" class="bg-kkpink text-dark px-4 py-2 rounded-xl border-3 border-dark shadow-hard hover:translate-y-1 hover:shadow-hard-sm transition-all font-fredoka font-bold flex items-center gap-2">
            <i data-lucide="trash-2" class="w-5 h-5"></i> <span class="hidden md:inline">Clear</span>
        </button>
        <button onclick="document.documentElement.classList.toggle('dark')" class="bg-dark text-white dark:bg-slate-700 dark:text-white p-2 rounded-xl border-3 border-dark shadow-hard hover:translate-y-1 hover:shadow-hard-sm transition-all">
            <i data-lucide="moon" class="w-6 h-6 dark:hidden"></i>
            <i data-lucide="sun" class="w-6 h-6 hidden dark:block"></i>
        </button>
    </div>

    <main
        class="w-full max-w-5xl bg-white dark:bg-slate-900 border-4 border-dark rounded-3xl shadow-hard p-6 md:p-10 relative">

        <header
            class="flex flex-col md:flex-row justify-between items-start md:items-end border-b-4 border-dark pb-6 mb-6 gap-4 print:border-b-2 print:border-black print:pb-2 print:mb-4">
            <div class="w-full">
                <div class="flex justify-between items-center w-full">
                    <div
                        class="bg-kkblue text-white inline-block px-3 py-1 rounded-lg border-2 border-dark font-fredoka text-sm mb-2 shadow-hard-sm print:bg-transparent print:text-black print:border-black print:shadow-none print:px-0 print:py-0 print:mb-0 print:text-xs print:font-bold">
                        KLASSKIT
                    </div>
                    <div class="hidden print:block text-xs text-gray-500">
                        Date Printed: <span id="printDate"></span>
                    </div>
                </div>
                <h1 class="font-fredoka text-4xl font-bold tracking-tight print:text-2xl">Observation Record</h1>
            </div>
            <div class="flex items-center gap-2 opacity-70 no-print">
                <i data-lucide="save" class="w-4 h-4"></i>
                <span id="saveStatus" class="text-sm font-bold font-nunito">Auto-saving...</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-6 mb-8 print:gap-4 print:mb-4">
            <div class="md:col-span-8 space-y-4 print:space-y-2">
                <div class="flex items-center gap-4">
                    <label class="w-24 font-fredoka font-bold text-lg text-right print:text-left print:text-base print:w-20">Teacher:</label>
                    <input type="text" id="teacher_name" class="flex-1 border-b-3 border-dark bg-transparent p-2 font-bold focus:border-kkpink outline-none transition-colors print:p-0 print:text-sm">
                </div>
                <div class="flex items-center gap-4">
                    <label class="w-24 font-fredoka font-bold text-lg text-right print:text-left print:text-base print:w-20">Observer:</label>
                    <input type="text" id="observer_name" class="flex-1 border-b-3 border-dark bg-transparent p-2 font-bold focus:border-kkpink outline-none transition-colors print:p-0 print:text-sm">
                </div>

            </div>

            <div
                class="md:col-span-4 bg-kkorange/20 border-3 border-dark rounded-xl p-4 space-y-3 shadow-hard-sm print:bg-transparent print:border-none print:shadow-none print:p-0 print:space-y-2">
                <div class="print:flex print:gap-2 print:items-center">
                    <label class="font-fredoka font-bold text-sm block print:w-20 print:text-base">DATE:</label>
                    <input type="datetime-local" id="date_time" class="w-full bg-white dark:bg-slate-800 border-2 border-dark rounded-lg p-2 mt-1 print:bg-transparent print:border-none print:mt-0 print:p-0 print:w-full">
                </div>
                <div class="print:flex print:gap-2 print:items-center">
                    <label class="font-fredoka font-bold text-sm block print:w-20 print:text-base">CLASS:</label>
                    <input type="text" id="class_name" class="w-full bg-white dark:bg-slate-800 border-2 border-dark rounded-lg p-2 mt-1 print:bg-transparent print:border-none print:mt-0 print:p-0 print:w-full">
                </div>
            </div>
        </div>

        <div class="mb-10 print:mb-6">
            <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-2">
                    <div class="bg-dark w-3 h-3 rounded-full print:hidden"></div>
                    <h3 class="font-fredoka text-xl font-bold print:text-lg">Lesson Flow</h3>
                </div>
            </div>

            <div
                class="border-3 border-dark rounded-xl overflow-hidden shadow-hard-sm print:border-none print:shadow-none print:rounded-none">
                <table class="w-full text-left border-collapse" id="observationTable">
                    <thead class="bg-dark text-white print:bg-gray-200 print:text-black">
                        <tr>
                            <th class="p-3 font-fredoka border-r-2 border-slate-600 text-center print:border-black" style="width:110px">
                                Time</th>
                            <th class="p-3 font-fredoka border-r-2 border-slate-600 print:border-black" style="width:20%">Stage / Interaction</th>
                            <th class="p-3 font-fredoka border-r-2 border-slate-600 print:border-black" style="width:40%">Procedures</th>
                            <th class="p-3 font-fredoka print:border-black">Comments</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"
                        class="bg-white dark:bg-slate-800 divide-y-2 divide-dark print:divide-black print:border-black">
                    </tbody>
                </table>
            </div>

            <div class="mt-4 flex items-center gap-3 no-print">
                <button onclick="addRow()" class="flex-1 bg-kkgreen/20 border-dashed border-3 border-dark text-dark dark:text-white font-fredoka font-bold py-3 rounded-xl hover:bg-kkgreen/40 transition-all flex justify-center items-center gap-2">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i> Add Row
                </button>
                <div class="bg-dark text-white font-fredoka font-bold px-5 py-3 rounded-xl border-3 border-dark shadow-hard-sm flex items-center gap-2 text-sm whitespace-nowrap">
                    <i data-lucide="clock" class="w-4 h-4"></i>
                    Total: <span id="totalMinutes">0</span> min
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 print:gap-4 print:mb-4">
            <div class="relative group">
                <div
                    class="absolute inset-0 bg-dark rounded-2xl translate-x-2 translate-y-2 group-hover:translate-x-1 group-hover:translate-y-1 transition-transform no-print">
                </div>
                <div
                    class="relative bg-white dark:bg-slate-800 border-3 border-dark rounded-2xl p-5 h-full flex flex-col print:border-black print:rounded-lg">
                    <div class="flex items-center gap-2 mb-3 text-kkgreen print:text-black print:mb-1">
                        <i data-lucide="check-circle" class="w-8 h-8 stroke-[3px] print:w-5 print:h-5"></i>
                        <h3 class="font-fredoka text-xl font-bold text-dark dark:text-white print:text-base">Keep Doing
                        </h3>
                    </div>
                    <textarea id="keep_doing"
                class="w-full bg-kkgreen/10 dark:bg-kkgreen/5 border-2 border-kkgreen/30 rounded-xl p-3 outline-none focus:border-kkgreen transition-colors auto-expand print:bg-transparent print:border-none print:p-0 print:text-sm"
                placeholder="Strengths..."
                oninput="autoExpand(this)"></textarea>
                </div>
            </div>

            <div class="relative group">
                <div
                    class="absolute inset-0 bg-dark rounded-2xl translate-x-2 translate-y-2 group-hover:translate-x-1 group-hover:translate-y-1 transition-transform no-print">
                </div>
                <div
                    class="relative bg-white dark:bg-slate-800 border-3 border-dark rounded-2xl p-5 h-full flex flex-col print:border-black print:rounded-lg">
                    <div class="flex items-center gap-2 mb-3 text-kkblue print:text-black print:mb-1">
                        <i data-lucide="play-circle" class="w-8 h-8 stroke-[3px] print:w-5 print:h-5"></i>
                        <h3 class="font-fredoka text-xl font-bold text-dark dark:text-white print:text-base">Start Doing
                        </h3>
                    </div>
                    <textarea id="start_doing"
                class="w-full bg-kkblue/10 dark:bg-kkblue/5 border-2 border-kkblue/30 rounded-xl p-3 outline-none focus:border-kkblue transition-colors auto-expand print:bg-transparent print:border-none print:p-0 print:text-sm"
                placeholder="New strategies..."
                oninput="autoExpand(this)"></textarea>
                </div>
            </div>

            <div class="relative group">
                <div
                    class="absolute inset-0 bg-dark rounded-2xl translate-x-2 translate-y-2 group-hover:translate-x-1 group-hover:translate-y-1 transition-transform no-print">
                </div>
                <div
                    class="relative bg-white dark:bg-slate-800 border-3 border-dark rounded-2xl p-5 h-full flex flex-col print:border-black print:rounded-lg">
                    <div class="flex items-center gap-2 mb-3 text-kkpink print:text-black print:mb-1">
                        <i data-lucide="x-circle" class="w-8 h-8 stroke-[3px] print:w-5 print:h-5"></i>
                        <h3 class="font-fredoka text-xl font-bold text-dark dark:text-white print:text-base">Avoid Doing
                        </h3>
                    </div>
                    <textarea id="avoid_doing"
                class="w-full bg-kkpink/10 dark:bg-kkpink/5 border-2 border-kkpink/30 rounded-xl p-3 outline-none focus:border-kkpink transition-colors auto-expand print:bg-transparent print:border-none print:p-0 print:text-sm"
                placeholder="Habits to break..."
                oninput="autoExpand(this)"></textarea>
                </div>
            </div>
        </div>

        <div class="relative action-plan-container mt-12">
            <div
                class="bg-kkorange text-dark font-fredoka font-bold absolute -top-4 left-6 px-4 py-1 border-3 border-dark rounded-lg shadow-hard-sm z-10 print:static print:bg-transparent print:text-black print:border-none print:shadow-none print:p-0 print:mb-1 print:text-lg">
                ACTION PLAN
            </div>
            <div
                class="bg-white dark:bg-slate-800 border-3 border-dark rounded-2xl p-6 pt-8 shadow-hard print:border-none print:shadow-none print:p-0">
                <textarea id="action_plan"
            class="w-full bg-transparent outline-none text-lg resize-none auto-expand print:border print:border-black print:rounded-lg print:p-2 print:text-sm"
            placeholder="Write specific steps for improvement here..."
            oninput="autoExpand(this)"></textarea>
            </div>
        </div>

    </main>

    <div class="mt-8 text-dark/50 dark:text-white/30 font-bold font-fredoka text-sm no-print">
        KLASSKIT • TEACHER TOOLS
    </div>

    <script>
        // --- 1. SETUP & UTILS ---
        lucide.createIcons();
        const statusSpan = document.getElementById('saveStatus');

        // Set Print Date
        const d = new Date();
        document.getElementById('printDate').innerText = d.toLocaleDateString();

        // Auto-expand textarea
        const autoExpand = (field) => {
            field.style.height = 'auto';
            field.style.height = field.scrollHeight + 'px';
        };

        // --- 2. TIME CALCULATION ---

        // Get the start time from the date_time field (returns total minutes from midnight)
        function getStartMinutes() {
            const dt = document.getElementById('date_time').value;
            if (!dt) return null;
            const parts = dt.split('T');
            if (parts.length < 2) return null;
            const [hStr, mStr] = parts[1].split(':');
            return parseInt(hStr, 10) * 60 + parseInt(mStr, 10);
        }

        // Format minutes-from-midnight to "HH:MM"
        function formatTime(totalMins) {
            const h = Math.floor(totalMins / 60) % 24;
            const m = totalMins % 60;
            return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
        }

        // Detect legacy "HH:MM" format vs new plain-minutes format
        function isLegacyTimeValue(val) {
            if (!val && val !== 0) return false;
            return !/^\d+$/.test(String(val).trim());
        }

        // Recalculate all row time displays and update total counter.
        // Backward-compatible: legacy HH:MM values show as-is, excluded
        // from running clock calculation.
        function updateAllTimes() {
            const startMins = getStartMinutes();
            let running = startMins !== null ? startMins : null;
            let totalMins = 0;

            document.querySelectorAll('#tableBody tr').forEach(tr => {
                const input = tr.querySelector('.time-minutes-input');
                const display = tr.querySelector('.time-display');
                if (!input || !display) return;

                const rawVal = input.value.trim();

                if (isLegacyTimeValue(rawVal)) {
                    // Legacy row: show stored value as-is, don't advance running clock
                    display.textContent = rawVal || '\u2014';
                    return;
                }

                const duration = parseInt(rawVal, 10) || 0;
                totalMins += duration;

                if (running !== null) {
                    const end = running + duration;
                    display.textContent = duration > 0
                        ? `${formatTime(running)} \u2013 ${formatTime(end)}`
                        : formatTime(running);
                    running = end;
                } else {
                    display.textContent = duration > 0 ? `${duration} min` : '\u2014';
                }
            });

            document.getElementById('totalMinutes').textContent = totalMins;
        }

        // --- 3. DYNAMIC TABLE LOGIC ---

        function createRowHTML(values = {}) {
            const safeStage = (values.stage || '').replace(/</g,'&lt;');
            const safeProc  = (values.proc  || '').replace(/</g,'&lt;');
            const safeComm  = (values.comm  || '').replace(/</g,'&lt;');
            return `
                <td class="border-r-2 border-dark p-0 print:border-black" style="width:110px">
                    <div class="flex flex-col items-center gap-1 p-2">
                        <span class="time-display font-fredoka text-xs font-bold text-center text-kkblue dark:text-kkblue leading-tight print:text-black">—</span>
                        <input
                            type="text"
                            inputmode="numeric"
                            value="${values.time || ''}"
                            class="time-minutes-input row-input w-full text-center bg-kkblue/10 dark:bg-kkblue/20 border-2 border-dark/20 rounded-lg p-1 text-sm font-bold outline-none focus:border-kkblue focus:bg-kkblue/20 transition-colors print:hidden"
                            placeholder="min"
                            data-key="time">
                        <span class="hidden print:inline text-xs text-gray-500 row-print-duration">${values.time || ''}</span>
                    </div>
                </td>
                <td class="border-r-2 border-dark p-0 print:border-black">
                    <textarea class="row-input w-full p-3 bg-transparent outline-none focus:bg-kkblue/10 transition-colors print:p-1 print:text-sm" style="resize:none;overflow:hidden;min-height:54px" data-key="stage">${safeStage}</textarea>
                </td>
                <td class="border-r-2 border-dark p-0 print:border-black">
                    <textarea class="row-input w-full p-3 bg-transparent outline-none focus:bg-kkblue/10 transition-colors print:p-1 print:text-sm" style="resize:none;overflow:hidden;min-height:54px" data-key="proc">${safeProc}</textarea>
                </td>
                <td class="p-0 relative">
                    <textarea class="row-input w-full p-3 bg-transparent outline-none focus:bg-kkblue/10 transition-colors print:p-1 print:text-sm" style="resize:none;overflow:hidden;min-height:54px" data-key="comm">${safeComm}</textarea>
                    <button onclick="deleteRow(this)" title="Delete row"
                        class="delete-row-btn absolute top-1 right-1 w-6 h-6 rounded-md bg-kkpink/20 hover:bg-kkpink text-kkpink hover:text-white border border-kkpink/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all no-print text-xs font-bold leading-none">
                        ✕
                    </button>
                </td>
            `;
        }

        function deleteRow(btn) {
            const tr = btn.closest('tr');
            if (document.querySelectorAll('#tableBody tr').length <= 1) return; // keep at least 1
            tr.remove();
            updateAllTimes();
            saveData();
        }

        function addRow(values = {}) {
            const tbody = document.getElementById('tableBody');
            const tr = document.createElement('tr');
            tr.className = "group border-b-2 border-dark/10 dark:border-slate-600 last:border-b-0";
            tr.innerHTML = createRowHTML(values);
            tbody.appendChild(tr);

            // Listeners for textareas and time input
            tr.querySelectorAll('textarea').forEach(ta => {
                ta.addEventListener('input', () => { autoExpand(ta); saveData(); });
                autoExpand(ta);
            });

            const timeInput = tr.querySelector('.time-minutes-input');
            timeInput.addEventListener('input', () => {
                updateAllTimes();
                saveData();
            });

            lucide.createIcons({ el: tr });
            updateAllTimes();
        }

        // --- 4. SAVE/LOAD SYSTEM ---

        function getDataObject() {
            const staticFields = {};
            ['teacher_name', 'observer_name', 'date_time', 'class_name', 'keep_doing', 'start_doing', 'avoid_doing', 'action_plan'].forEach(id => {
                const el = document.getElementById(id);
                if (el) staticFields[id] = el.value;
            });

            const rows = [];
            document.querySelectorAll('#tableBody tr').forEach(tr => {
                const rowData = {};
                tr.querySelectorAll('.row-input').forEach(input => {
                    rowData[input.dataset.key] = input.tagName === 'TEXTAREA' ? input.value : input.value;
                });
                rows.push(rowData);
            });

            return { staticFields, rows };
        }

        function saveData() {
            const fullData = getDataObject();
            localStorage.setItem('obsFormV3', JSON.stringify(fullData));
            statusSpan.innerText = "Saved";
            statusSpan.classList.add('text-kkgreen');
            setTimeout(() => statusSpan.classList.remove('text-kkgreen'), 1000);
        }

        function loadData() {
            const saved = JSON.parse(localStorage.getItem('obsFormV3'));

            if (saved) {
                for (const [key, value] of Object.entries(saved.staticFields || {})) {
                    const el = document.getElementById(key);
                    if (el) el.value = value;
                }
                if (saved.rows && saved.rows.length > 0) {
                    saved.rows.forEach(rowData => addRow(rowData));
                } else {
                    addRow(); addRow(); addRow();
                }
            } else {
                addRow(); addRow(); addRow(); addRow(); addRow();
            }

            setTimeout(() => {
                document.querySelectorAll('textarea').forEach(autoExpand);
                updateAllTimes();
            }, 100);
        }

        // --- 5. EXPORT / IMPORT LOGIC ---

        function exportData() {
            const data = localStorage.getItem('obsFormV3');
            if (!data) { alert('No data to export!'); return; }
            const teacher = document.getElementById('teacher_name').value || 'observation';
            const date = new Date().toISOString().slice(0,10);
            const filename = `${teacher.replace(/\s+/g, '_')}_${date}.json`;
            const blob = new Blob([data], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename; a.click();
            URL.revokeObjectURL(url);
        }

        function handleFileImport(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.staticFields || !data.rows) throw new Error("Invalid file format.");
                    if (!confirm("Importing will overwrite current data. Continue?")) { input.value = ''; return; }
                    localStorage.setItem('obsFormV3', JSON.stringify(data));
                    location.reload();
                } catch (err) {
                    alert("Error importing file: " + err.message);
                }
            };
            reader.readAsText(file);
        }

        // --- 6. INITIALIZATION ---

        ['teacher_name', 'observer_name', 'date_time', 'class_name', 'keep_doing', 'start_doing', 'avoid_doing', 'action_plan'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('input', () => {
                if (id === 'date_time') updateAllTimes();
                saveData();
            });
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            if (confirm("Clear all data? This cannot be undone.")) {
                localStorage.removeItem('obsFormV3');
                location.reload();
            }
        });

        window.onload = async () => {
            await requireAuth();
            loadData();
        };

    </script>
</body>

</html>
