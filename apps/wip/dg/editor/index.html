<!doctype html>
<html lang="en" class="transition-colors duration-300">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mystery Case Builder (Vanilla)</title>
    <link rel="icon" type="image/x-icon" href="../../../../media/icon.ico" />
    <link rel="icon" type="image/webp" href="../../../../media/icon.webp" />

        <!-- Tailwind CSS -->
        <script src="https://cdn.tailwindcss.com"></script>

        <!-- Lucide Icons -->
        <script src="https://unpkg.com/lucide@1.16.0"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4"></script>
        <script src="/supabase.js"></script>
        <script src="../../../../components/input-modal.js"></script>

        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap"
            rel="stylesheet"
        />

        <script>
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            pink: "#FF6B95",
                            orange: "#FF8C42",
                            green: "#00E676",
                            blue: "#2979FF",
                            dark: "#1e293b",
                            chalk: "#f8fafc",
                        },
                        fontFamily: {
                            heading: ["Fredoka", "sans-serif"],
                            body: ["Nunito", "sans-serif"],
                        },
                    },
                },
            };
        </script>

        <style>
            /* Custom Scrollbar for Neo-Brutalism feel */
            ::-webkit-scrollbar {
                width: 12px;
                height: 12px;
            }
            ::-webkit-scrollbar-track {
                background: #f8fafc;
                border-left: 4px solid #1e293b;
            }
            .dark ::-webkit-scrollbar-track {
                background: #0f172a;
                border-left: 4px solid #94a3b8;
            }
            ::-webkit-scrollbar-thumb {
                background: #ff8c42;
                border: 4px solid #1e293b;
                border-radius: 10px;
            }
            .dark ::-webkit-scrollbar-thumb {
                border: 4px solid #94a3b8;
            }

            /* Graph Paper Background */
            .bg-graph {
                background-color: #f8fafc;
                background-image:
                    linear-gradient(#cbd5e1 1px, transparent 1px),
                    linear-gradient(90deg, #cbd5e1 1px, transparent 1px);
                background-size: 24px 24px;
            }
            .dark .bg-graph {
                background-color: #0f172a;
                background-image:
                    linear-gradient(#1e293b 1px, transparent 1px),
                    linear-gradient(90deg, #1e293b 1px, transparent 1px);
            }

            /* Base styles to apply fonts */
            body {
                font-family: "Nunito", sans-serif;
            }
            h1,
            h2,
            h3,
            h4,
            h5,
            h6,
            button,
            .font-heading {
                font-family: "Fredoka", sans-serif;
            }

            /* Reusable brutal input/textarea styles */
            .brutal-input {
                width: 100%;
                padding: 0.5rem 0.75rem;
                background-color: #ffffff;
                color: #0f172a;
                border: 4px solid #1e293b;
                border-radius: 0.75rem;
                outline: none;
                transition: all 0.2s;
                box-shadow: 4px 4px 0px 0px rgba(30, 41, 59, 1);
            }
            .brutal-input:focus {
                box-shadow:
                    4px 4px 0px 0px rgba(30, 41, 59, 1),
                    0 0 0 4px rgba(255, 140, 66, 0.5);
            }
            .dark .brutal-input {
                background-color: #1e293b;
                color: #ffffff;
                border-color: #94a3b8;
                box-shadow: 4px 4px 0px 0px rgba(148, 163, 184, 1);
            }
            .dark .brutal-input:focus {
                box-shadow:
                    4px 4px 0px 0px rgba(148, 163, 184, 1),
                    0 0 0 4px rgba(255, 140, 66, 0.5);
            }

            /* Reusable Brutal Button styles */
            .brutal-btn {
                font-weight: 700;
                padding: 0.5rem 1rem;
                border: 4px solid #1e293b;
                border-radius: 0.75rem;
                box-shadow: 4px 4px 0px 0px rgba(30, 41, 59, 1);
                transition: all 0.1s;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 0.5rem;
                cursor: pointer;
            }
            .dark .brutal-btn {
                border-color: #94a3b8;
                box-shadow: 4px 4px 0px 0px rgba(148, 163, 184, 1);
            }
            .brutal-btn:hover {
                transform: translateY(-2px);
                box-shadow: 6px 6px 0px 0px rgba(30, 41, 59, 1);
            }
            .dark .brutal-btn:hover {
                box-shadow: 6px 6px 0px 0px rgba(148, 163, 184, 1);
            }
            .brutal-btn:active {
                transform: translateY(2px);
                box-shadow: none !important;
            }

            .btn-pink {
                background-color: #ff6b95;
                color: white;
            }
            .btn-orange {
                background-color: #ff8c42;
                color: white;
            }
            .btn-green {
                background-color: #00e676;
                color: #1e293b;
            }
            .btn-blue {
                background-color: #2979ff;
                color: white;
            }
            .btn-white {
                background-color: #ffffff;
                color: #1e293b;
            }
            .btn-dark {
                background-color: #1e293b;
                color: white;
            }
            .dark .btn-white {
                background-color: #334155;
                color: white;
            }

            /* Custom Range Slider for Neo-Brutalism */
            input[type="range"].brutal-range {
                -webkit-appearance: none;
                width: 100%;
                background: transparent;
            }
            input[type="range"].brutal-range::-webkit-slider-thumb {
                -webkit-appearance: none;
                height: 24px;
                width: 24px;
                border-radius: 50%;
                background: #ff8c42;
                cursor: pointer;
                border: 4px solid #1e293b;
                margin-top: -8px;
            }
            .dark input[type="range"].brutal-range::-webkit-slider-thumb {
                border-color: #94a3b8;
            }
            input[type="range"].brutal-range::-webkit-slider-runnable-track {
                width: 100%;
                height: 12px;
                cursor: pointer;
                background: #ffffff;
                border: 4px solid #1e293b;
                border-radius: 6px;
            }
            .dark
                input[type="range"].brutal-range::-webkit-slider-runnable-track {
                background: #1e293b;
                border-color: #94a3b8;
            }
        </style>
        <link rel="stylesheet" href="../../../css/base.css" />
    <link rel="stylesheet" href="../../../css/components.css" />
  
</head>
    <body
        class="min-h-screen bg-graph text-slate-900 dark:text-slate-100 flex flex-col"
    >
        <!-- Header Navigation -->
        <header
            class="sticky top-0 z-50 p-4 border-b-4 border-slate-900 dark:border-slate-400 bg-white dark:bg-slate-900 flex flex-wrap items-center justify-between gap-4 shadow-md"
        >
            <div class="flex items-center gap-3">
                <div
                    class="w-12 h-12 bg-pink rounded-xl border-4 border-slate-900 dark:border-slate-400 flex items-center justify-center shadow-[4px_4px_0px_0px_rgba(30,41,59,1)]"
                >
                    <span class="font-heading font-bold text-2xl text-white"
                        >M</span
                    >
                </div>
                <h1
                    class="text-2xl font-heading font-bold text-slate-900 dark:text-white"
                >
                    Case Builder
                </h1>
            </div>

            <div class="flex items-center gap-3">
                <button
                    id="tab-editor"
                    class="brutal-btn btn-orange"
                    onclick="switchTab('editor')"
                >
                    <i data-lucide="layout-list" class="w-5 h-5"></i> Editor
                </button>
                <button
                    id="tab-json"
                    class="brutal-btn btn-white"
                    onclick="switchTab('json')"
                >
                    <i data-lucide="file-json" class="w-5 h-5"></i> JSON Tools
                </button>
                <button
                    class="brutal-btn btn-dark px-3"
                    onclick="toggleDarkMode()"
                >
                    <i
                        data-lucide="moon"
                        id="icon-theme"
                        class="w-5 h-5 text-white"
                    ></i>
                </button>
            </div>
        </header>

        <!-- Global Hidden File Input -->
        <input
            type="file"
            id="file-upload"
            accept=".json"
            class="hidden"
            onchange="handleFileUpload(event)"
        />

        <!-- Icon Picker Modal -->
        <div
            id="icon-picker-modal"
            class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4"
        >
            <div
                class="bg-white dark:bg-slate-800 border-4 border-slate-900 dark:border-slate-400 rounded-2xl p-6 w-full max-w-lg shadow-[8px_8px_0px_0px_rgba(30,41,59,1)] flex flex-col gap-4 max-h-[80vh]"
            >
                <div
                    class="flex justify-between items-center border-b-4 border-slate-900 dark:border-slate-400 pb-4"
                >
                    <h3 class="text-2xl font-heading font-bold text-blue">
                        Select Icon
                    </h3>
                    <button
                        class="brutal-btn btn-pink px-2 py-1"
                        onclick="closeIconPicker()"
                    >
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <div
                    class="grid grid-cols-4 sm:grid-cols-6 gap-3 overflow-y-auto p-2"
                    id="icon-grid"
                >
                    <!-- populated by JS -->
                </div>
            </div>
        </div>

        <main class="flex-1 max-w-[1600px] w-full mx-auto p-4 md:p-6 lg:p-8">
            <!-- EDITOR VIEW -->
            <div id="view-editor" class="flex flex-col lg:flex-row gap-8">
                <!-- Sidebar - Case List -->
                <aside class="w-full lg:w-80 flex-shrink-0 flex flex-col gap-4">
                    <div
                        class="bg-blue border-4 border-slate-900 dark:border-slate-400 rounded-2xl p-4 shadow-[6px_6px_0px_0px_rgba(30,41,59,1)] dark:shadow-[6px_6px_0px_0px_rgba(148,163,184,1)]"
                    >
                        <h2
                            class="text-xl font-heading font-bold text-white mb-4 flex items-center gap-2"
                        >
                            <i data-lucide="layout-list" class="w-6 h-6"></i>
                            Directory
                        </h2>
                        <div id="case-list" class="flex flex-col gap-3">
                            <!-- Case list generated by JS -->
                        </div>
                        <div class="mt-4 flex flex-col gap-3">
                            <button
                                class="brutal-btn btn-white w-full"
                                onclick="addNewCase()"
                            >
                                <i data-lucide="plus" class="w-5 h-5"></i> New
                                Case
                            </button>
                            <div class="grid grid-cols-2 gap-3">
                                <button
                                    class="brutal-btn btn-orange w-full text-sm px-2"
                                    onclick="
                                        document
                                            .getElementById('file-upload')
                                            .click()
                                    "
                                >
                                    <i data-lucide="upload" class="w-4 h-4"></i>
                                    Import
                                </button>
                                <button
                                    class="brutal-btn btn-green w-full text-sm px-2"
                                    onclick="exportToFile()"
                                >
                                    <i
                                        data-lucide="download"
                                        class="w-4 h-4"
                                    ></i>
                                    Export
                                </button>
                            </div>
                        </div>
                    </div>
                </aside>

                <!-- Main Form Area -->
                <div id="form-area" class="flex-1 flex flex-col gap-6 hidden">
                    <!-- Basic Info Card -->
                    <section
                        class="bg-white dark:bg-slate-900 border-4 border-slate-900 dark:border-slate-400 rounded-2xl p-6 md:p-8 shadow-[8px_8px_0px_0px_rgba(30,41,59,1)] dark:shadow-[8px_8px_0px_0px_rgba(148,163,184,1)]"
                    >
                        <div class="flex justify-between items-center mb-6">
                            <h2
                                class="text-3xl font-heading font-bold text-orange"
                            >
                                Case Details
                            </h2>
                            <button
                                class="brutal-btn btn-pink"
                                onclick="deleteActiveCase()"
                            >
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                                Delete Case
                            </button>
                        </div>

                        <div
                            class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6"
                        >
                            <div class="flex flex-col gap-1">
                                <label
                                    class="text-sm font-bold font-heading text-slate-800 dark:text-slate-200"
                                    >Case ID (Unique)</label
                                >
                                <input
                                    type="text"
                                    data-field="id"
                                    class="brutal-input"
                                />
                            </div>
                            <div class="flex flex-col gap-1">
                                <label
                                    class="text-sm font-bold font-heading text-slate-800 dark:text-slate-200"
                                    >Difficulty</label
                                >
                                <select
                                    data-field="difficulty"
                                    class="brutal-input bg-white dark:bg-slate-800 cursor-pointer appearance-none"
                                >
                                    <option value="EASY">EASY</option>
                                    <option value="NORMAL">NORMAL</option>
                                    <option value="HARD">HARD</option>
                                    <option value="EXTREME">EXTREME</option>
                                </select>
                            </div>
                            <div class="flex flex-col gap-1">
                                <label
                                    class="text-sm font-bold font-heading text-slate-800 dark:text-slate-200"
                                    >Title</label
                                >
                                <input
                                    type="text"
                                    data-field="title"
                                    class="brutal-input"
                                />
                            </div>
                            <div class="flex flex-col gap-1">
                                <label
                                    class="text-sm font-bold font-heading text-slate-800 dark:text-slate-200"
                                    >Subtitle</label
                                >
                                <input
                                    type="text"
                                    data-field="subtitle"
                                    class="brutal-input"
                                />
                            </div>
                            <div class="flex flex-col gap-1">
                                <label
                                    class="text-sm font-bold font-heading text-slate-800 dark:text-slate-200"
                                    >Time Limit (Min : Sec)</label
                                >
                                <div class="flex gap-2">
                                    <div
                                        class="flex-1 flex items-center bg-white dark:bg-slate-800 border-4 border-slate-900 dark:border-slate-400 rounded-xl overflow-hidden shadow-[4px_4px_0px_0px_rgba(30,41,59,1)] focus-within:ring-4 focus-within:ring-orange/50 transition-all"
                                    >
                                        <input
                                            type="number"
                                            id="time-min"
                                            class="w-full px-3 py-1.5 outline-none bg-transparent text-center font-bold"
                                            min="0"
                                            placeholder="0"
                                        />
                                        <span
                                            class="px-3 py-1.5 font-bold bg-slate-100 dark:bg-slate-700 border-l-4 border-slate-900 dark:border-slate-400"
                                            >m</span
                                        >
                                    </div>
                                    <div
                                        class="flex-1 flex items-center bg-white dark:bg-slate-800 border-4 border-slate-900 dark:border-slate-400 rounded-xl overflow-hidden shadow-[4px_4px_0px_0px_rgba(30,41,59,1)] focus-within:ring-4 focus-within:ring-orange/50 transition-all"
                                    >
                                        <input
                                            type="number"
                                            id="time-sec"
                                            class="w-full px-3 py-1.5 outline-none bg-transparent text-center font-bold"
                                            min="0"
                                            max="59"
                                            placeholder="0"
                                        />
                                        <span
                                            class="px-3 py-1.5 font-bold bg-slate-100 dark:bg-slate-700 border-l-4 border-slate-900 dark:border-slate-400"
                                            >s</span
                                        >
                                    </div>
                                </div>
                            </div>
                            <div class="flex flex-col gap-1">
                                <label
                                    class="text-sm font-bold font-heading text-slate-800 dark:text-slate-200"
                                    >Culprit Name</label
                                >
                                <input
                                    type="text"
                                    data-field="culprit"
                                    class="brutal-input"
                                />
                            </div>
                            <div class="flex flex-col gap-1 col-span-full">
                                <label
                                    class="text-sm font-bold font-heading text-slate-800 dark:text-slate-200"
                                    >Image URL/Path</label
                                >
                                <input
                                    type="text"
                                    data-field="image"
                                    class="brutal-input"
                                />
                            </div>
                            <div class="flex flex-col gap-1 col-span-full">
                                <label
                                    class="text-sm font-bold font-heading text-slate-800 dark:text-slate-200"
                                    >Brief (Intro text)</label
                                >
                                <textarea
                                    data-field="brief"
                                    rows="3"
                                    class="brutal-input resize-y"
                                ></textarea>
                            </div>
                            <div class="flex flex-col gap-1 col-span-full">
                                <label
                                    class="text-sm font-bold font-heading text-slate-800 dark:text-slate-200"
                                    >Solution Text (Ending)</label
                                >
                                <textarea
                                    data-field="text"
                                    rows="3"
                                    class="brutal-input resize-y"
                                ></textarea>
                            </div>
                        </div>
                    </section>

                    <!-- Clues Section -->
                    <section
                        class="bg-[#f8fafc] dark:bg-slate-800 border-4 border-slate-900 dark:border-slate-400 rounded-2xl p-6 md:p-8 shadow-[8px_8px_0px_0px_rgba(30,41,59,1)] dark:shadow-[8px_8px_0px_0px_rgba(148,163,184,1)]"
                    >
                        <div class="flex justify-between items-center mb-6">
                            <h2
                                class="text-3xl font-heading font-bold text-blue"
                            >
                                Evidence & Clues
                            </h2>
                            <button
                                class="brutal-btn btn-green"
                                onclick="addClue()"
                            >
                                <i data-lucide="plus" class="w-4 h-4"></i> Add
                                Clue
                            </button>
                        </div>
                        <div id="clues-container" class="flex flex-col gap-6">
                            <!-- Clues generated by JS -->
                        </div>
                    </section>

                    <!-- Suspects Section -->
                    <section
                        class="bg-white dark:bg-slate-900 border-4 border-slate-900 dark:border-slate-400 rounded-2xl p-6 md:p-8 shadow-[8px_8px_0px_0px_rgba(30,41,59,1)] dark:shadow-[8px_8px_0px_0px_rgba(148,163,184,1)]"
                    >
                        <div class="flex justify-between items-center mb-6">
                            <h2
                                class="text-3xl font-heading font-bold text-pink"
                            >
                                Suspects
                            </h2>
                            <button
                                class="brutal-btn btn-green"
                                onclick="addSuspect()"
                            >
                                <i data-lucide="plus" class="w-4 h-4"></i> Add
                                Suspect
                            </button>
                        </div>
                        <div
                            id="suspects-container"
                            class="flex flex-col gap-6"
                        >
                            <!-- Suspects generated by JS -->
                        </div>
                    </section>
                </div>

                <!-- Empty State / Placeholder -->
                <div
                    id="empty-state"
                    class="flex-1 flex flex-col items-center justify-center gap-4 text-slate-500 dark:text-slate-400"
                >
                    <i
                        data-lucide="folder-search"
                        class="w-24 h-24 mb-4 opacity-50"
                    ></i>
                    <h2
                        class="text-2xl font-heading font-bold text-slate-700 dark:text-slate-300"
                    >
                        No Case Selected
                    </h2>
                    <p>
                        Create a new case or import a JSON file to start
                        editing.
                    </p>
                    <button
                        class="brutal-btn btn-orange mt-4"
                        onclick="document.getElementById('file-upload').click()"
                    >
                        <i data-lucide="upload" class="w-5 h-5"></i> Import JSON
                        File
                    </button>
                </div>
            </div>

            <!-- JSON VIEW -->
            <div id="view-json" class="hidden flex-col gap-6 max-w-4xl mx-auto">
                <div
                    class="bg-white dark:bg-slate-900 border-4 border-slate-900 dark:border-slate-400 rounded-2xl p-6 md:p-8 shadow-[8px_8px_0px_0px_rgba(30,41,59,1)] dark:shadow-[8px_8px_0px_0px_rgba(148,163,184,1)]"
                >
                    <h2 class="text-3xl font-heading font-bold text-blue mb-6">
                        JSON Source
                    </h2>

                    <textarea
                        id="json-input"
                        rows="20"
                        class="w-full p-4 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 font-mono text-sm border-4 border-slate-900 dark:border-slate-400 rounded-xl outline-none focus:ring-4 focus:ring-blue/50 shadow-inner mb-6"
                        spellcheck="false"
                    ></textarea>

                    <div class="flex flex-wrap gap-4">
                        <button
                            class="brutal-btn btn-orange"
                            onclick="
                                document.getElementById('file-upload').click()
                            "
                        >
                            <i data-lucide="upload" class="w-5 h-5"></i> Import
                            File
                        </button>
                        <button
                            class="brutal-btn btn-green"
                            onclick="exportToFile()"
                        >
                            <i data-lucide="download" class="w-5 h-5"></i>
                            Export JSON
                        </button>
                        <button
                            class="brutal-btn btn-pink"
                            onclick="copyJSON()"
                        >
                            <i data-lucide="copy" class="w-5 h-5"></i> Copy JSON
                        </button>
                        <button
                            class="brutal-btn btn-blue"
                            onclick="loadJSON()"
                        >
                            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                            Apply Textarea
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Application Logic -->
        <script>
            // --- State Initialization ---
            // Start with empty cases (not hardcoded)
            let cases = [];
            let activeCaseId = null;
            let isDarkMode = false;
            let currentTab = "editor";

            // --- Utility: Escape HTML to prevent injection bugs ---
            function escapeHTML(str) {
                if (typeof str !== "string") return str;
                return str.replace(
                    /[&<>'"]/g,
                    (tag) =>
                        ({
                            "&": "&amp;",
                            "<": "&lt;",
                            ">": "&gt;",
                            "'": "&#39;",
                            '"': "&quot;",
                        })[tag] || tag,
                );
            }

            // --- State & Rendering Engine ---

            function getActiveCase() {
                return cases.find((c) => c.id === activeCaseId) || null;
            }

            function renderSidebar() {
                const container = document.getElementById("case-list");
                container.innerHTML = "";

                if (cases.length === 0) {
                    container.innerHTML = `<div class="text-white opacity-80 text-sm italic p-2 text-center">No cases found.</div>`;
                }

                cases.forEach((c) => {
                    const btn = document.createElement("button");
                    const isActive = c.id === activeCaseId;

                    btn.className = `text-left p-3 rounded-xl border-4 border-slate-900 dark:border-slate-400 font-bold transition-all ${
                        isActive
                            ? "bg-green text-slate-900 shadow-[4px_4px_0px_0px_rgba(30,41,59,1)] translate-x-2"
                            : "bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700"
                    }`;
                    btn.onclick = () => selectCase(c.id);

                    btn.innerHTML = `
          <div class="text-sm opacity-80 font-normal">#${escapeHTML(c.id)}</div>
          <div class="truncate">${escapeHTML(c.title) || "Untitled Case"}</div>
        `;
                    container.appendChild(btn);
                });
            }

            function renderActiveCase() {
                const c = getActiveCase();
                const formArea = document.getElementById("form-area");
                const emptyState = document.getElementById("empty-state");

                if (!c) {
                    formArea.classList.add("hidden");
                    emptyState.classList.remove("hidden");
                    return;
                }
                formArea.classList.remove("hidden");
                emptyState.classList.add("hidden");

                // Populate base form fields
                document.querySelector('input[data-field="id"]').value =
                    c.id || "";
                document.querySelector(
                    'select[data-field="difficulty"]',
                ).value = c.difficulty || "NORMAL";
                document.querySelector('input[data-field="title"]').value =
                    c.title || "";
                document.querySelector('input[data-field="subtitle"]').value =
                    c.subtitle || "";

                const minutes = Math.floor((c.time || 0) / 60);
                const seconds = (c.time || 0) % 60;
                document.getElementById("time-min").value = minutes;
                document.getElementById("time-sec").value = seconds;

                document.querySelector('input[data-field="culprit"]').value =
                    c.culprit || "";
                document.querySelector('input[data-field="image"]').value =
                    c.image || "";
                document.querySelector('textarea[data-field="brief"]').value =
                    c.brief || "";
                document.querySelector('textarea[data-field="text"]').value =
                    c.text || "";

                renderClues();
                renderSuspects();
                lucide.createIcons();
            }

            function renderClues() {
                const c = getActiveCase();
                const container = document.getElementById("clues-container");
                container.innerHTML = "";

                if (!c.clues) c.clues = [];

                c.clues.forEach((clue, idx) => {
                    const clueHTML = `
          <div class="bg-white dark:bg-slate-900 border-4 border-slate-900 dark:border-slate-400 rounded-xl p-5 relative shadow-[4px_4px_0px_0px_rgba(30,41,59,1)] dark:shadow-[4px_4px_0px_0px_rgba(148,163,184,1)]">
            <button onclick="deleteClue(${idx})" class="absolute -top-4 -right-4 bg-pink text-white p-2 rounded-xl border-4 border-slate-900 dark:border-slate-400 shadow-[2px_2px_0px_0px_rgba(30,41,59,1)] hover:scale-110 active:scale-95 transition-transform" title="Delete Clue">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div class="flex flex-col gap-1">
                <label class="text-sm font-bold font-heading">Clue ID</label>
                <input type="text" data-list="clues" data-index="${idx}" data-field="id" value="${escapeHTML(clue.id)}" class="brutal-input">
              </div>
              <div class="flex flex-col gap-1">
                <label class="text-sm font-bold font-heading">Icon Name</label>
                <button onclick="openIconPicker(${idx})" class="brutal-btn btn-white w-full flex justify-between items-center h-[44px]">
                  <div class="flex items-center gap-2">
                    <i data-lucide="${escapeHTML(clue.icon)}" class="w-5 h-5 text-blue"></i>
                    <span class="truncate">${escapeHTML(clue.icon)}</span>
                  </div>
                  <i data-lucide="chevron-down" class="w-4 h-4 opacity-50"></i>
                </button>
              </div>
              <div class="flex flex-col gap-1 col-span-full">
                <label class="text-sm font-bold font-heading">Name</label>
                <input type="text" data-list="clues" data-index="${idx}" data-field="name" value="${escapeHTML(clue.name)}" class="brutal-input">
              </div>
              <div class="flex flex-col gap-1 col-span-full">
                <label class="text-sm font-bold font-heading">Description (Public)</label>
                <textarea data-list="clues" data-index="${idx}" data-field="desc" rows="2" class="brutal-input resize-y">${escapeHTML(clue.desc)}</textarea>
              </div>
              <div class="flex flex-col gap-1 col-span-full">
                <label class="text-sm font-bold font-heading">Hidden Insight (Scanned)</label>
                <textarea data-list="clues" data-index="${idx}" data-field="hidden" rows="2" class="brutal-input resize-y">${escapeHTML(clue.hidden)}</textarea>
              </div>
              <div class="col-span-full grid grid-cols-2 gap-6 bg-slate-100 dark:bg-slate-800 p-5 rounded-xl border-4 border-slate-900 dark:border-slate-600 mt-2 shadow-inner">
                <div class="flex flex-col gap-3">
                  <label class="text-sm font-bold font-heading flex justify-between items-center">
                    <span>Pos X (Left &rarr; Right)</span>
                    <span class="bg-orange text-white px-2 py-1 rounded-lg border-2 border-slate-900 text-xs">${clue.pos ? clue.pos.x : 0}</span>
                  </label>
                  <input type="range" min="0" max="1" step="0.01" data-list="clues" data-index="${idx}" data-field="x" data-is-pos="true" value="${clue.pos ? clue.pos.x : 0}" class="brutal-range">
                </div>
                <div class="flex flex-col gap-3">
                  <label class="text-sm font-bold font-heading flex justify-between items-center">
                    <span>Pos Y (Top &rarr; Bottom)</span>
                    <span class="bg-blue text-white px-2 py-1 rounded-lg border-2 border-slate-900 text-xs">${clue.pos ? clue.pos.y : 0}</span>
                  </label>
                  <input type="range" min="0" max="1" step="0.01" data-list="clues" data-index="${idx}" data-field="y" data-is-pos="true" value="${clue.pos ? clue.pos.y : 0}" class="brutal-range">
                </div>
              </div>
            </div>
          </div>
        `;
                    container.insertAdjacentHTML("beforeend", clueHTML);
                });
            }

            function renderSuspects() {
                const c = getActiveCase();
                const container = document.getElementById("suspects-container");
                container.innerHTML = "";

                if (!c.suspects) c.suspects = [];

                c.suspects.forEach((suspect, idx) => {
                    const suspectHTML = `
          <div class="bg-white dark:bg-slate-900 border-4 border-slate-900 dark:border-slate-400 rounded-xl p-5 relative shadow-[4px_4px_0px_0px_rgba(30,41,59,1)] dark:shadow-[4px_4px_0px_0px_rgba(148,163,184,1)]">
            <button onclick="deleteSuspect(${idx})" class="absolute -top-4 -right-4 bg-pink text-white p-2 rounded-xl border-4 border-slate-900 dark:border-slate-400 shadow-[2px_2px_0px_0px_rgba(30,41,59,1)] hover:scale-110 active:scale-95 transition-transform" title="Delete Suspect">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div class="flex flex-col gap-1">
                <label class="text-sm font-bold font-heading">Name</label>
                <input type="text" data-list="suspects" data-index="${idx}" data-field="name" value="${escapeHTML(suspect.name)}" class="brutal-input">
              </div>
              <div class="flex flex-col gap-1">
                <label class="text-sm font-bold font-heading">Role</label>
                <input type="text" data-list="suspects" data-index="${idx}" data-field="role" value="${escapeHTML(suspect.role)}" class="brutal-input">
              </div>
              <div class="flex flex-col gap-1 col-span-full">
                <label class="text-sm font-bold font-heading">Hint / Alibi</label>
                <textarea data-list="suspects" data-index="${idx}" data-field="hint" rows="2" class="brutal-input resize-y">${escapeHTML(suspect.hint)}</textarea>
              </div>
            </div>
          </div>
        `;
                    container.insertAdjacentHTML("beforeend", suspectHTML);
                });
            }

            // --- Input Data Binding ---

            // Listen to all inputs and textareas in the form area to update state in real time
            document
                .getElementById("form-area")
                .addEventListener("input", (e) => {
                    const target = e.target;

                    const c = getActiveCase();
                    if (!c) return;

                    // Special handling for the new custom time inputs
                    if (target.id === "time-min" || target.id === "time-sec") {
                        const min =
                            parseInt(
                                document.getElementById("time-min").value,
                            ) || 0;
                        const sec =
                            parseInt(
                                document.getElementById("time-sec").value,
                            ) || 0;
                        c.time = min * 60 + sec;
                        return; // Handled
                    }

                    if (!target.matches("input, textarea, select")) return;

                    const field = target.getAttribute("data-field");
                    const list = target.getAttribute("data-list");
                    const index = target.getAttribute("data-index");
                    const isPos = target.getAttribute("data-is-pos");

                    let val =
                        target.type === "number" || target.type === "range"
                            ? parseFloat(target.value) || 0
                            : target.value;

                    if (list) {
                        // Handling nested arrays (clues / suspects)
                        if (isPos) {
                            if (!c[list][index].pos)
                                c[list][index].pos = { x: 0, y: 0 };
                            c[list][index].pos[field] = val;
                            // Update the visual label bubble next to the slider immediately
                            if (target.type === "range") {
                                target.previousElementSibling.querySelector(
                                    "span:last-child",
                                ).innerText = val;
                            }
                        } else {
                            c[list][index][field] = val;
                        }
                    } else {
                        // Handling root fields
                        c[field] = val;

                        // Update sidebar immediately if id or title changes
                        if (field === "id") {
                            activeCaseId = val; // follow the id change
                            renderSidebar();
                        }
                        if (field === "title") {
                            renderSidebar();
                        }
                    }
                });

            // --- Actions ---

            function selectCase(id) {
                activeCaseId = id;
                renderSidebar();
                renderActiveCase();
            }

            function addNewCase() {
                const newId = `case_${Date.now()}`;
                cases.push({
                    id: newId,
                    title: "New Case",
                    subtitle: "",
                    difficulty: "NORMAL",
                    time: 300,
                    culprit: "",
                    image: "",
                    brief: "",
                    text: "",
                    clues: [],
                    suspects: [],
                });
                selectCase(newId);
            }

            async function deleteActiveCase() {
                const confirmed = await showConfirmModal("Are you sure you want to delete this case?", {
                    title: "Delete Case?",
                    confirmText: "Delete",
                    cancelText: "Keep",
                    icon: "trash-2",
                    iconColor: "red"
                });
                if (confirmed) {
                    cases = cases.filter((c) => c.id !== activeCaseId);
                    activeCaseId = cases.length > 0 ? cases[0].id : null;
                    renderSidebar();
                    renderActiveCase();
                }
            }

            function addClue() {
                const c = getActiveCase();
                c.clues.push({
                    id: `c_${Date.now()}`,
                    name: "New Clue",
                    desc: "",
                    hidden: "",
                    icon: "search",
                    pos: { x: 0.5, y: 0.5 },
                });
                renderClues();
                lucide.createIcons();
            }

            function deleteClue(index) {
                const c = getActiveCase();
                c.clues.splice(index, 1);
                renderClues();
                lucide.createIcons();
            }

            function addSuspect() {
                const c = getActiveCase();
                c.suspects.push({ name: "New Suspect", role: "", hint: "" });
                renderSuspects();
                lucide.createIcons();
            }

            function deleteSuspect(index) {
                const c = getActiveCase();
                c.suspects.splice(index, 1);
                renderSuspects();
                lucide.createIcons();
            }

            // --- Icon Picker Logic ---
            let activeClueIconIndex = null;
            const commonIcons = [
                "search",
                "book",
                "glasses",
                "footprints",
                "folder-open",
                "glass-water",
                "cup-soda",
                "cylinder",
                "skull",
                "key",
                "lock",
                "file-text",
                "map",
                "clock",
                "alert-triangle",
                "briefcase",
                "camera",
                "crosshair",
                "scissors",
                "syringe",
                "hammer",
                "file-digit",
                "file-question",
                "magnifying-glass",
                "user",
                "image",
                "mail",
                "phone",
                "coffee",
                "car",
                "star",
                "zap",
            ];

            function openIconPicker(clueIndex) {
                activeClueIconIndex = clueIndex;
                const grid = document.getElementById("icon-grid");
                grid.innerHTML = "";

                commonIcons.forEach((iconName) => {
                    const btn = document.createElement("button");
                    btn.className =
                        "p-3 bg-slate-50 dark:bg-slate-700 border-4 border-slate-300 dark:border-slate-500 rounded-xl hover:border-orange hover:bg-orange/10 transition-all flex flex-col items-center gap-2 cursor-pointer focus:outline-none focus:ring-4 focus:ring-orange/50";
                    btn.onclick = () => selectIcon(iconName);
                    btn.innerHTML = `
          <i data-lucide="${iconName}" class="w-6 h-6 text-slate-700 dark:text-slate-200"></i>
          <span class="text-[10px] truncate w-full text-center font-bold font-heading text-slate-600 dark:text-slate-300">${iconName}</span>
        `;
                    grid.appendChild(btn);
                });

                document
                    .getElementById("icon-picker-modal")
                    .classList.remove("hidden");
                lucide.createIcons();
            }

            function closeIconPicker() {
                document
                    .getElementById("icon-picker-modal")
                    .classList.add("hidden");
                activeClueIconIndex = null;
            }

            function selectIcon(iconName) {
                if (activeClueIconIndex !== null) {
                    const c = getActiveCase();
                    c.clues[activeClueIconIndex].icon = iconName;
                    renderClues();
                    lucide.createIcons();
                }
                closeIconPicker();
            }

            // --- JSON Tools ---

            function handleFileUpload(event) {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const parsed = JSON.parse(e.target.result);
                        if (Array.isArray(parsed)) {
                            cases = parsed;
                            activeCaseId =
                                cases.length > 0 ? cases[0].id : null;
                            document.getElementById("json-input").value =
                                JSON.stringify(cases, null, 2);
                            await showAlertModal("JSON Imported Successfully!", { title: "Success", icon: "check-circle", iconColor: "green" });
                            renderSidebar();
                            renderActiveCase();
                            lucide.createIcons();
                        } else {
                            await showAlertModal("Invalid JSON format. Expected an array of cases.", { title: "Error", icon: "alert-triangle", iconColor: "red" });
                        }
                    } catch (err) {
                        await showAlertModal("Error parsing JSON file: " + err, { title: "Error", icon: "x-octagon", iconColor: "red" });
                    }
                };
                reader.readAsText(file);
                event.target.value = ""; // Reset input to allow re-uploading the same file
            }

            async function exportToFile() {
                if (cases.length === 0) {
                    await showAlertModal("No cases to export!", { title: "No Data", icon: "alert-circle", iconColor: "orange" });
                    return;
                }
                const jsonStr = JSON.stringify(cases, null, 2);
                const blob = new Blob([jsonStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "cases.json";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            async function loadJSON() {
                const input = document.getElementById("json-input").value;
                try {
                    const parsed = JSON.parse(input);
                    if (Array.isArray(parsed)) {
                        cases = parsed;
                        activeCaseId = cases.length > 0 ? cases[0].id : null;
                        await showAlertModal("JSON Loaded Successfully!", { title: "Success", icon: "check-circle", iconColor: "green" });
                        switchTab("editor");
                    } else {
                        await showAlertModal("Invalid JSON format. Expected an array of cases.", { title: "Error", icon: "alert-triangle", iconColor: "red" });
                    }
                } catch (e) {
                    await showAlertModal("Error parsing JSON. Please check the syntax.", { title: "Error", icon: "x-octagon", iconColor: "red" });
                }
            }

            async function copyJSON() {
                const jsonStr = JSON.stringify(cases, null, 2);
                try {
                    await navigator.clipboard.writeText(jsonStr);
                    await showAlertModal("JSON Copied to Clipboard!", { title: "Copied", icon: "copy", iconColor: "green" });
                } catch (err) {
                    await showAlertModal("Failed to copy text: " + err, { title: "Error", icon: "x-octagon", iconColor: "red" });
                }
            }

            // --- UI State Management ---

            function switchTab(tab) {
                currentTab = tab;

                const btnEditor = document.getElementById("tab-editor");
                const btnJson = document.getElementById("tab-json");
                const viewEditor = document.getElementById("view-editor");
                const viewJson = document.getElementById("view-json");

                if (tab === "editor") {
                    btnEditor.className = "brutal-btn btn-orange";
                    btnJson.className = "brutal-btn btn-white";
                    viewEditor.classList.remove("hidden");
                    viewJson.classList.add("hidden");
                    renderSidebar();
                    renderActiveCase();
                } else {
                    btnEditor.className = "brutal-btn btn-white";
                    btnJson.className = "brutal-btn btn-blue";
                    viewEditor.classList.add("hidden");
                    viewJson.classList.remove("hidden");
                    document.getElementById("json-input").value =
                        JSON.stringify(cases, null, 2);
                }
            }

            function toggleDarkMode() {
                isDarkMode = !isDarkMode;
                const html = document.documentElement;
                const icon = document.getElementById("icon-theme");

                if (isDarkMode) {
                    html.classList.add("dark");
                    icon.setAttribute("data-lucide", "sun");
                } else {
                    html.classList.remove("dark");
                    icon.setAttribute("data-lucide", "moon");
                }
                lucide.createIcons();
            }

            // --- Initialization ---
            window.onload = async () => {
                await requireAdmin();
                renderSidebar();
                renderActiveCase();
                lucide.createIcons();
            };
        </script>
    </body>
</html>
